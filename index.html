<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">

}">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="theme-color" content="#0d9488">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>היומן שלי</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f3f0ff;min-height:100vh}
button,input{font-family:inherit}
::-webkit-scrollbar{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#f3f0ff}
@media(min-width:768px){
  body{background:#e9e4f8;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;min-height:100vh}
  #app{border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);min-height:calc(100vh - 64px);max-height:calc(100vh - 64px);overflow:hidden;position:sticky;top:32px}
  .content{overflow-y:auto;max-height:calc(100vh - 200px)}
}

/* ── HOME ── */
.home{flex:1;display:flex;flex-direction:column;padding:28px 20px 32px;gap:16px;overflow-y:auto}
.home-title{text-align:center;padding:24px 0 8px}
.home-title h1{font-size:26px;font-weight:900;color:#134e4a;letter-spacing:.5px}
.home-title p{font-size:14px;color:#5eead4;margin-top:4px}
.cards-row{display:flex;gap:14px}
.card{flex:1;border-radius:24px;padding:28px 16px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s;animation:pop .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card:active{transform:scale(.96)}
.card-emoji{font-size:48px;margin-bottom:12px;line-height:1}
.card-name{font-size:20px;font-weight:900;letter-spacing:.5px}
.card-sub{font-size:12px;margin-top:4px;opacity:.75}
.card-therapy{background:linear-gradient(145deg,#3b82f6,#1d4ed8);color:white}
.card-therapy2{background:linear-gradient(145deg,#f472b6,#db2777);color:white}
.card-diary{background:linear-gradient(145deg,#0d9488,#0f766e);color:white;padding:22px 16px}
.card-diary .card-emoji{font-size:36px;margin-bottom:8px}
.card-diary .card-name{font-size:18px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:14px 16px 12px;flex-shrink:0;color:white}
.hdr-back{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white}
.hdr-info{flex:1;text-align:center}
.hdr-title2{font-weight:bold;font-size:17px}
.hdr-sub{font-size:12px;opacity:.8;margin-top:2px}
.hdr-space{width:36px}

/* ── TABS ── */
.tabs{background:white;border-bottom:1px solid #f3f4f6;display:flex;flex-shrink:0}
.tab{flex:1;padding:12px 0;font-size:13px;font-weight:bold;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#9ca3af}
.tab.on{border-bottom-color:var(--tc,#0d9488);color:var(--tc,#0f766e)}
.content{flex:1;overflow-y:auto;padding:12px}

/* ── CALENDAR ── */

.cal-card{border-radius:18px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.10)}
.cal-hdr{position:relative;height:90px;overflow:hidden}
.cal-hdr-grad{position:absolute;top:0;left:0;right:0;bottom:0}
.cal-hdr-photo{position:absolute;top:0;left:0;right:0;bottom:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;opacity:0;transition:opacity 1s ease}
.cal-hdr-photo.on{opacity:1}
.cal-hdr-dim{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.52))}
.cal-hdr-row{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px}
.cal-hdr-title{color:#fff;font-size:19px;font-weight:900;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.cal-hdr-year{color:rgba(255,255,255,.7);font-size:12px;font-weight:500;margin-top:1px}
.cal-hdr-btns{display:flex;gap:6px}
.cal-hdr-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.18);color:#fff;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-body{background:#fff;padding:8px 10px 12px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-banner{width:100%;height:140px;border-radius:16px;object-fit:cover;margin-bottom:12px;display:block;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.cnb{background:none;border:none;cursor:pointer;font-size:22px;font-weight:bold;width:34px;height:34px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:11px;color:#9ca3af;padding:2px 0}
.cal-day{min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;padding:1px;position:relative;border:none;background:transparent;color:#374151;font-size:13px;font-family:inherit}
.cal-day.today{background:#f0fdfa;color:#134e4a;font-weight:bold}
.cal-day.sel{color:white!important}
.cal-day.hol{border:1px solid #fcd34d}
.cal-day-heb{font-size:9px;line-height:1;color:#5eead4}
.cal-day.sel .cal-day-heb,.cal-day.sel .cal-day-hol{color:rgba(255,255,255,.8)}
.cal-day-hol{font-size:7px;line-height:1;color:#d97706;max-width:100%;overflow:hidden;padding:0 1px}
.cal-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.task-num{font-weight:bold;font-size:12px;width:18px;text-align:center;flex-shrink:0;opacity:.5}
.task-inp{flex:1;border:1px solid #f0fdfa;border-radius:10px;padding:10px 12px;text-align:right;font-size:14px;outline:none;background:white}
.add-btn{width:100%;margin-top:6px;padding:10px;border-radius:10px;border:2px dashed;background:transparent;font-size:13px;cursor:pointer;font-family:inherit}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.sheet{background:white;width:100%;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;padding-bottom:24px;animation:slideUp .25s ease}
.sh{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:12px auto 14px}
.sb{padding:0 20px}
.inp{width:100%;border:1px solid #ddd6fe;border-radius:12px;padding:11px 14px;text-align:right;font-size:15px;outline:none;margin-bottom:10px;background:#f0fdfa;display:block}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:bold;border-radius:14px;font-size:15px;padding:13px 0;width:100%}
.btn-v{background:#0d9488;color:white}
.btn-g{background:#f3f4f6;color:#374151}
.appt-card{margin-bottom:10px;padding:12px;background:#f0fdfa;border-radius:14px;border:1px solid #f0fdfa}
.slot-btn{width:100%;text-align:right;padding:9px 14px;border-radius:10px;border:none;margin-bottom:2px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit}
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.mo-btn{padding:11px 0;border-radius:14px;cursor:pointer;position:relative;font-size:13px;font-weight:bold;font-family:inherit;border:2px solid transparent}
.task-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.task-modal{background:white;border-radius:20px;width:100%;max-width:380px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .2s ease}
.task-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.task-modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#9ca3af;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.task-modal-close:hover{background:#f3f4f6;color:#374151}
textarea.task-modal-area{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:12px 14px;font-size:15px;text-align:right;resize:none;outline:none;font-family:inherit;line-height:1.6;min-height:160px}
@keyframes cellPop{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(0.95)}100%{transform:scale(1)}}
.healing-beam-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999}
.loader{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#f0fdfa}

.spinner{width:44px;height:44px;border:4px solid #99f6e4;border-top-color:#0d9488;border-radius:50%;animation:spin .9s linear infinite}

/* ── History Panel ─────────────────────────────── */
.hist-sheet{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:#f8f7fc}
.hist-hdr{background:linear-gradient(135deg,#0d9488,#115e59);padding:18px 16px;flex-shrink:0;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.hist-hdr-info{flex:1}
.hist-hdr-title{font-size:17px;font-weight:900;color:white}
.hist-hdr-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}
.hist-close{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:50%;width:36px;height:36px;color:white;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hist-tabs{display:flex;background:white;border-bottom:1px solid #f0fdfa;flex-shrink:0;overflow-x:auto}
.hist-tab{flex-shrink:0;padding:11px 13px;font-size:11px;font-weight:700;border:none;background:transparent;cursor:pointer;border-bottom:2.5px solid transparent;color:#9ca3af;transition:.2s;white-space:nowrap;font-family:inherit}
.hist-tab.on{color:#0d9488;border-bottom-color:#0d9488;background:#f0fdfa}
.hist-badge{border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;color:white;display:inline-block;margin-right:3px}
.hist-content{flex:1;overflow-y:auto;padding:14px}
/* Next appt hero */
.next-hero{background:linear-gradient(135deg,#0d9488,#115e59);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(124,58,237,.35);overflow:hidden}
.next-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.next-hero-name{font-size:20px;font-weight:900;color:white;margin-bottom:4px}
.next-hero-detail{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:12px}
.next-hero-date{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:white;margin-bottom:12px}
.countdown{display:flex;gap:7px}
.cd-seg{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px;text-align:center;min-width:50px}
.cd-num{font-size:22px;font-weight:900;color:white;line-height:1;font-family:monospace;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.cd-sep{color:rgba(255,255,255,.5);font-size:22px;font-weight:900;align-self:flex-start;margin-top:8px}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.65}}
.countdown.urgent .cd-num{color:#fca5a5;animation:urgentPulse 1s ease-in-out infinite}
/* Appt cards */
.appt-card-pro{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;border:1px solid transparent}
.appt-time-pill{border-radius:10px;padding:7px 10px;text-align:center;font-size:13px;font-weight:800;flex-shrink:0;min-width:52px;border:1.5px solid}
.appt-card-info{flex:1;text-align:right}
.appt-card-name{font-size:14px;font-weight:800;color:#1e1b4b;margin-bottom:2px}
.appt-card-meta{font-size:12px;color:#6b7280}
.appt-card-date{display:inline-flex;align-items:center;background:#f0fdfa;color:#0d9488;border-radius:8px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:4px}
.hist-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;gap:12px;align-items:center;opacity:.85;border:1px solid #f3f4f6}
.hist-time-pill{background:#f9fafb;color:#6b7280;border-radius:10px;padding:7px 10px;text-align:center;font-size:12px;font-weight:700;flex-shrink:0;min-width:48px;border:1.5px solid #e5e7eb}
.hist-card-info{flex:1;text-align:right}
.hist-card-name{font-size:14px;font-weight:700;color:#374151}
.hist-card-meta{font-size:11px;color:#9ca3af;margin-top:2px}
/* Payments */
.pay-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pay-stat-val{font-size:20px;font-weight:900;color:#0d9488}
.pay-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}
.pay-stat.full{grid-column:1/-1;background:linear-gradient(135deg,#0d9488,#115e59)}
.pay-stat.full .pay-stat-val{color:white;font-size:26px}
.pay-stat.full .pay-stat-lbl{color:rgba(255,255,255,.7)}
.pay-filter{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto}
.pay-filter-btn{flex-shrink:0;padding:5px 12px;border-radius:18px;border:1.5px solid #f0fdfa;background:white;color:#6b7280;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.pay-filter-btn.on{background:#0d9488;color:white;border-color:#0d9488}
.pay-row{background:white;border-radius:12px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.04)}
.pay-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pay-row-name{font-size:13px;font-weight:800;color:#1e1b4b}
.pay-row-amount{font-size:15px;font-weight:900;color:#059669}
.pay-row-meta{font-size:11px;color:#6b7280}
.pay-row-date{font-size:10px;color:#5eead4;font-weight:600;margin-top:2px}
.export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#059669,#047857);color:white;border:none;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(5,150,105,.3);margin-bottom:14px}
.pay-month-hdr{font-size:10px;font-weight:800;color:#5eead4;letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px;display:flex;justify-content:space-between}
/* Goals */
.goals-hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:18px;padding:16px;margin-bottom:14px}
.goals-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.goals-hero-rev{font-size:22px;font-weight:900;color:white;margin-bottom:12px}
.goals-prog{background:rgba(255,255,255,.1);border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px}
.goals-prog-fill{height:100%;border-radius:20px;transition:width .8s}
.goals-prog-fill.gn{background:linear-gradient(90deg,#059669,#34d399)}
.goals-prog-fill.gy{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goals-prog-fill.gp{background:linear-gradient(90deg,#0d9488,#5eead4)}
.goals-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.ghs{text-align:center}
.ghs-val{font-size:15px;font-weight:900;color:white}
.ghs-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.goal-card{background:white;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.goal-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.goal-card-title{font-size:14px;font-weight:800;color:#1e1b4b}
.goal-card-period{font-size:10px;color:#5eead4;font-weight:700;background:#f0fdfa;padding:2px 8px;border-radius:14px}
.goal-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.goal-current{font-size:20px;font-weight:900;color:#0d9488}
.goal-target{font-size:13px;color:#9ca3af}
.goal-bar{background:#f3f4f6;border-radius:20px;height:8px;overflow:hidden;margin-bottom:7px}
.goal-bar-fill{height:100%;border-radius:20px;transition:width .8s}
.goal-bar-fill.hit{background:linear-gradient(90deg,#059669,#34d399)}
.goal-bar-fill.close{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goal-bar-fill.far{background:linear-gradient(90deg,#0d9488,#5eead4)}
.goal-footer{display:flex;justify-content:space-between;align-items:center}
.goal-pct.hit{color:#059669;font-size:12px;font-weight:800}
.goal-pct.close{color:#d97706;font-size:12px;font-weight:800}
.goal-pct.far{color:#0d9488;font-size:12px;font-weight:800}
.add-goal-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0d9488,#115e59);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.goal-inp-card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;border:2px solid #0d9488}
.goal-inp{width:100%;border:1.5px solid #f0fdfa;border-radius:12px;padding:10px 14px;text-align:right;font-size:14px;outline:none;margin-bottom:8px;background:#f0fdfa;font-family:inherit}
.goal-inp:focus{border-color:#0d9488}
.goal-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.goal-type-btn{padding:9px;border-radius:12px;border:1.5px solid #f0fdfa;background:#f0fdfa;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.goal-type-btn.on{border-color:#0d9488;background:#f0fdfa;color:#0d9488}
/* CRM */
.crm-search-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:white;border:1.5px solid #f0fdfa;border-radius:16px;padding:6px 6px 6px 14px;box-shadow:0 2px 12px rgba(13,148,136,.08);transition:border .2s}
.crm-search-wrap:focus-within{border-color:#0d9488;box-shadow:0 2px 16px rgba(13,148,136,.18)}
.crm-search-icon{font-size:16px;flex-shrink:0;opacity:.5}
.crm-search-inp{flex:1;border:none;padding:8px 0;font-size:15px;outline:none;background:transparent;text-align:right;font-family:inherit;color:#134e4a;min-width:0}.crm-clear-btn{background:none;border:none;color:#9ca3af;font-size:16px;cursor:pointer;padding:4px 6px;border-radius:50%;flex-shrink:0;font-family:inherit}
.crm-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}

  'linear-gradient(135deg,#2d4a7a,#7eb8e0)',   // Feb - icy blue

// ── Calendar HTML ─────────────────────────────────────
function calHTML(y,m,sel,dots,showH,color,redDots){
  const f=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate();
  const photoUrl='https://picsum.photos/seed/landscape-'+MO_IMG[m-1]+'/600/180';
  const grad=MO_GRAD[m-1];
  let h=`<div class="cal-card">
  <div class="cal-hdr">
    <div class="cal-hdr-grad" style="background:${grad}"></div>
    <img class="cal-hdr-photo" src="${photoUrl}" loading="lazy" onload="this.classList.add('on')" alt="">
    <div class="cal-hdr-dim"></div>
    <div class="cal-hdr-row">
      <div><div class="cal-hdr-title">${MO[m-1]}</div><div class="cal-hdr-year" onclick="openYearPicker('${color}',${y},${m})" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px">${y} ▾</div></div>

        <button class="cal-hdr-btn" onclick="nc('${color}',1,${y},${m})">›</button>
        <button class="cal-hdr-btn" onclick="nc('${color}',-1,${y},${m})">‹</button>
      </div>
    </div>
  </div>
  <div class="cal-body"><div class="cal-grid">${DY.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;
  for(let i=0;i<f;i++)h+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const k=tk(y,m,d),isSel=k===sel,isT=k===TD,hol=HOLS[k],dot=(dots||[]).includes(k),he=showH?hd(y,m,d):'';
    const selBg=isSel?`background:${color};`:'';
    h+=`<button class="cal-day${isSel?' sel':isT&&!isSel?' today':''}${hol&&!isSel?' hol':''}" style="${selBg}" onclick="dc_${color.replace('#','')}('${k}')">${d}`;
    if(he)h+=`<span class="cal-day-heb">${he}</span>`;
    if(hol)h+=`<span class="cal-day-hol">${x(hol)}</span>`;
    if(dot&&!isSel)h+=redDots?`<span style="position:absolute;inset:0;border-radius:10px;background:#fee2e2;z-index:-1"></span><span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ef4444"></span>`:`<span class="cal-dot" style="background:${color}"></span>`;

function deployToGitHub(){
  const token=localStorage.getItem('gh_token')||'';
  if(!token){
    const t=prompt('הכנס GitHub Token (נשמר בטלפון שלך בלבד):');
    if(!t)return;
    localStorage.setItem('gh_token',t.trim());
  }
  const ghToken=localStorage.getItem('gh_token');
  const apiUrl='https://api.github.com/repos/pinto1212121212-create/therapy-hodaya/contents/index.html';
  const btn=document.getElementById('deploy-btn');
  // Create file input
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.html';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const content=ev.target.result;
      const encoded=btoa(unescape(encodeURIComponent(content)));
      fetch(apiUrl,{headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}})
        .then(r=>r.json())
        .then(data=>{
          const sha=data.sha||undefined;
          const body={message:'Update from app',content:encoded};
          if(sha)body.sha=sha;
          return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
        })
        .then(r=>r.json())
        .then(d=>{
          if(d.content){if(btn){btn.textContent='✅';btn.style.background='#059669';}setTimeout(()=>{if(btn){btn.textContent='🚀';btn.disabled=false;btn.style.background='';}},3000);}

// ── Laser SVG Animation ──────────────────────────────
function fireLaserBeam(sx,sy,tx,ty,cb){
  // Create SVG overlay for the beam
  const overlay=document.createElement('div');
  overlay.className='healing-beam-overlay';
  overlay.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;overflow:visible';
  overlay.appendChild(svg);
  document.body.appendChild(overlay);

  // Beam path
  const dx=tx-sx, dy=ty-sy, dist=Math.sqrt(dx*dx+dy*dy);
  const mx=sx+dx*0.4+(-dy*0.18), my=sy+dy*0.4+(dx*0.18);

  // Glowing beam line
  const beam=document.createElementNS(ns,'path');
  const d=`M${sx},${sy} Q${mx},${my} ${tx},${ty}`;
  beam.setAttribute('d',d);
  beam.setAttribute('stroke','#5eead4');
  beam.setAttribute('stroke-width','3');
  beam.setAttribute('fill','none');
  beam.setAttribute('stroke-linecap','round');
  beam.setAttribute('opacity','0.85');
  const len=dist;
  beam.style.strokeDasharray=len;
  beam.style.strokeDashoffset=len;
  beam.style.transition='stroke-dashoffset 0.35s cubic-bezier(.4,0,.2,1)';
  svg.appendChild(beam);

  // Glow copy
  const glow=document.createElementNS(ns,'path');
  glow.setAttribute('d',d);
  glow.setAttribute('stroke','#99f6e4');
  glow.setAttribute('stroke-width','8');
  glow.setAttribute('fill','none');
  glow.setAttribute('stroke-linecap','round');
  glow.setAttribute('opacity','0.25');
  glow.style.filter='blur(4px)';
  glow.style.strokeDasharray=len;
  glow.style.strokeDashoffset=len;
  glow.style.transition='stroke-dashoffset 0.35s cubic-bezier(.4,0,.2,1)';
  svg.insertBefore(glow,beam);

  // Sparkles at target
  const colors=['#5eead4','#fbbf24','#c084fc','#99f6e4','#f472b6'];
  const sparks=[];
  for(let i=0;i<7;i++){
    const c=document.createElementNS(ns,'circle');
    const angle=(i/7)*Math.PI*2;
    const r=18+Math.random()*14;
    c.setAttribute('cx',tx);c.setAttribute('cy',ty);
    c.setAttribute('r','3');
    c.setAttribute('fill',colors[i%colors.length]);
    c.setAttribute('opacity','0');
    c.dataset.tx=tx+Math.cos(angle)*r;
    c.dataset.ty=ty+Math.sin(angle)*r;
    svg.appendChild(c);sparks.push(c);
  }

  // Burst circle
  const burst=document.createElementNS(ns,'circle');
  burst.setAttribute('cx',tx);burst.setAttribute('cy',ty);
  burst.setAttribute('r','4');
  burst.setAttribute('fill','none');
  burst.setAttribute('stroke','#5eead4');
  burst.setAttribute('stroke-width','2');
  burst.setAttribute('opacity','0');
  svg.appendChild(burst);

  // Animate
  requestAnimationFrame(()=>{
    beam.style.strokeDashoffset='0';
    glow.style.strokeDashoffset='0';
  });

  setTimeout(()=>{
    // Sparkles burst
    burst.setAttribute('opacity','0.8');
    burst.style.transition='r 0.4s ease-out, opacity 0.4s ease-out';
    requestAnimationFrame(()=>{
      burst.setAttribute('r','28');
      burst.setAttribute('opacity','0');
    });
    sparks.forEach((c,i)=>{
      c.setAttribute('opacity','1');
      c.style.transition=`cx 0.4s ease-out ${i*0.02}s, cy 0.4s ease-out ${i*0.02}s, opacity 0.4s ease-out 0.25s`;
      requestAnimationFrame(()=>{
        c.setAttribute('cx',c.dataset.tx);
        c.setAttribute('cy',c.dataset.ty);
        setTimeout(()=>c.setAttribute('opacity','0'),250);
      });
    });
    if(cb)cb();
    setTimeout(()=>overlay.remove(),600);
  },380);
}

async function syncData(){
  try{
    const [a,t,g,bg,cl,canc,pkgs]=await Promise.all([store.get('appts'),store.get('tasks'),store.get('goals'),store.get('bgoals'),store.get('clients'),store.get('cancellations'),store.get('packages')]);
    // Only update if data actually changed
    let changed=false;
    if(a&&typeof a==='object'){const prev=JSON.stringify(S.A);S.A=a;if(JSON.stringify(S.A)!==prev)changed=true;}
    if(t&&typeof t==='object'){const prev=JSON.stringify(S.T);S.T=t;if(JSON.stringify(S.T)!==prev)changed=true;}
    if(g&&typeof g==='object'){const prev=JSON.stringify(S.G);S.G=g;if(JSON.stringify(S.G)!==prev)changed=true;}
    if(bg&&typeof bg==='object'){const prev=JSON.stringify(S.BG);S.BG=bg;if(JSON.stringify(S.BG)!==prev)changed=true;}
    if(cl&&typeof cl==='object'){const prev=JSON.stringify(S.CL);S.CL=cl;if(JSON.stringify(S.CL)!==prev)changed=true;}
    if(canc&&typeof canc==='object'){const prev=JSON.stringify(S.CANC);S.CANC=canc;if(JSON.stringify(S.CANC)!==prev)changed=true;}
    if(pkgs&&typeof pkgs==='object'){const prev=JSON.stringify(S.PKGS);S.PKGS=pkgs;if(JSON.stringify(S.PKGS)!==prev)changed=true;}
    // Data updated silently - UI updates only on user interaction
  }catch(e){}
}

let _timerInt=null;

function allAppts(){const a=[];Object.entries(S.A).forEach(([date,slots])=>{Object.entries(slots||{}).forEach(([time,d])=>{if(d&&d.name)a.push({date,time,d,dt:getApptDT(date,time)});});});a.sort((a,b)=>a.dt-b.dt);return a;}
function getNextAppt(){const n=new Date(),a=allAppts().filter(a=>a.dt>n);return a[0]||null;}
function startTimer(){
  if(_timerInt)clearInterval(_timerInt);
  _timerInt=setInterval(()=>{
    const e={d:document.getElementById('cd-d'),h:document.getElementById('cd-h'),m:document.getElementById('cd-m'),s:document.getElementById('cd-s'),w:document.getElementById('cd-wrap')};
    if(!e.d){clearInterval(_timerInt);_timerInt=null;return;}
    const next=getNextAppt();if(!next){clearInterval(_timerInt);return;}
    const ms=next.dt-new Date();if(ms<=0){if(S.showHistory)hRender();return;}
    const ts=Math.floor(ms/1000);
    e.d.textContent=String(Math.floor(ts/86400)).padStart(2,'0');

    e.m.textContent=String(Math.floor((ts%3600)/60)).padStart(2,'0');

  },1000);

function renderBGoals(all){

function toggleSens(k,s){if(!S.CL)S.CL={};if(!S.CL[k])S.CL[k]={sens:[]};if(!S.CL[k].sens)S.CL[k].sens=[];const arr=S.CL[k].sens,idx=arr.indexOf(s);if(idx>=0)arr.splice(idx,1);else arr.push(s);store.set('clients',S.CL);crmRender();}
function toggleArea(k,id){
  if(!S.CL)S.CL={};
  if(!S.CL[k])S.CL[k]={areas:[],sens:[]};
  if(!S.CL[k].areas)S.CL[k].areas=[];
  // If "full_body" selected — toggle all or clear all
  if(id==='full_body'){
    if(S.CL[k].areas.includes('full_body')){
      S.CL[k].areas=[];
    } else {
      S.CL[k].areas=TREAT_AREAS.map(a=>a.id);
    }
  } else {
    const arr=S.CL[k].areas;
    const idx=arr.indexOf(id);
    if(idx>=0){
      arr.splice(idx,1);
      // Remove full_body if deselecting individual area
      const fi=arr.indexOf('full_body');
      if(fi>=0)arr.splice(fi,1);
    } else {
      arr.push(id);
      // Auto-select full_body if all others selected
      const allOthers=TREAT_AREAS.filter(a=>a.id!=='full_body').map(a=>a.id);
      if(allOthers.every(aid=>arr.includes(aid)))arr.push('full_body');
    }
  }
  store.set('clients',S.CL);
  crmRender();
}

function hRender(){

  const tabsEl=sheet.querySelector('.hist-tabs');if(tabsEl)tabsEl.innerHTML=tabsHTML(upcoming,history);

  if(S.histTab==='upcoming'){content.innerHTML=buildUpcoming(upcoming);setTimeout(()=>{if(document.getElementById('cd-d'))startTimer();},60);}
  else if(S.histTab==='history')content.innerHTML=buildHistory(history);

function renderDebts(){
  const n=new Date();
  // Find all past appointments with price but not paid
  const debts=[];
  Object.entries(S.A).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(!d||!d.name)return;
      const dt=new Date(date+'T'+time);
      if(dt>n)return; // future - not a debt yet
      if(d.price&&Number(d.price)>0&&!d.paid){
        debts.push({date,time,d,dt,key:date+'_'+time});
      }
    });
  });
  debts.sort((a,b)=>b.dt-a.dt);

  if(!debts.length)return`<div class="empty-state"><span class="empty-icon">🎉</span>אין חובות פתוחים<br><span style="font-size:13px">כל התשלומים מסודרים!</span></div>`;

  const totalDebt=debts.reduce((s,a)=>s+Number(a.d.price),0);
  const clientsWithDebt=new Set(debts.map(a=>a.d.name)).size;
  const n2=new Date(),mk=n2.getFullYear()+'-'+String(n2.getMonth()+1).padStart(2,'0');
  const monthDebt=debts.filter(a=>a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);

  // Group by client
  const byClient={};
  debts.forEach(a=>{
    const k=a.d.name;
    if(!byClient[k])byClient[k]={name:k,phone:a.d.phone||'',items:[],total:0};
    byClient[k].items.push(a);
    byClient[k].total+=Number(a.d.price);
  });

  const hero=`<div class="debt-hero">
    <div class="debt-hero-lbl">💳 חובות פתוחים</div>
    <div class="debt-hero-amount">₪${totalDebt.toLocaleString()}</div>
    <div class="debt-hero-sub">ממתין לגביה</div>
    <div class="debt-hero-stats">
      <div class="dhs"><div class="dhs-val">${clientsWithDebt}</div><div class="dhs-lbl">לקוחות</div></div>
      <div class="dhs"><div class="dhs-val">${debts.length}</div><div class="dhs-lbl">טיפולים</div></div>
      <div class="dhs"><div class="dhs-val">₪${monthDebt.toLocaleString()}</div><div class="dhs-lbl">החודש</div></div>
    </div>
  </div>`;

  const cards=Object.values(byClient).sort((a,b)=>b.total-a.total).map(cl=>{
    const items=cl.items.map(a=>`<div class="debt-item">
      <div class="debt-item-info">
        <div class="debt-item-name">${a.d.type||'טיפול'} — ${a.time}</div>
        <div class="debt-item-date">📅 ${a.date}</div>
      </div>
      <button class="debt-pay-btn" onclick="markPaid('${a.date}','${a.time}')">✓ שולם</button>
    </div>`).join('');
    return`<div class="debt-client-card">
      <div class="debt-client-hdr">
        <div class="debt-client-amount">₪${cl.total.toLocaleString()}</div>
        <div>
          <div class="debt-client-name">${x(cl.name)}</div>
          ${cl.phone?`<div style="font-size:11px;color:#9ca3af">${x(cl.phone)}</div>`:''}
        </div>
      </div>
      ${items}
    </div>`;
  }).join('');

  return hero+`<div class="section-lbl">לפי לקוח</div>`+cards;
}

function openMonthlyChart(yr){
  const n=new Date();
  const chartYear=yr||n.getFullYear();
  const curM=chartYear===n.getFullYear()?n.getMonth()+1:0;

  // Build data
  const data=[];
  for(let m=1;m<=12;m++){
    const mk=chartYear+'-'+String(m).padStart(2,'0');
    let rev=0,count=0;
    Object.entries(S.A||{}).forEach(([d,slots])=>{
      if(!d.startsWith(mk))return;
      Object.values(slots||{}).forEach(ap=>{
        if(ap&&ap.name)count++;
        if(ap&&ap.price&&Number(ap.price)>0)rev+=Number(ap.price);
      });
    });
    data.push({m,mk,name:MO[m-1],short:MO[m-1].slice(0,3),rev,count});
  }

  const maxRev=Math.max(...data.map(d=>d.rev),1);
  const totalY=data.reduce((s,d)=>s+d.rev,0);
  const avgM=data.filter(d=>d.rev>0).length?Math.round(totalY/data.filter(d=>d.rev>0).length):0;
  const cur=data[curM-1]||{rev:0,count:0};
  const prev=data[curM-2]||{rev:0};
  const diff=cur.rev-prev.rev;
  const diffPct=prev.rev>0?Math.round(Math.abs(diff)/prev.rev*100):0;
  const bestM=data.reduce((a,b)=>b.rev>a.rev?b:a,data[0]);

  // SVG Bar Chart
  const W=320,H=100,PL=8,PR=8,PT=24,PB=20;
  const innerW=W-PL-PR,innerH=H-PT-PB;
  const bw=Math.floor(innerW/12)-3;
  const gap=3;

  // Grid lines
  let gridLines='';
  [0.25,0.5,0.75,1].forEach(r=>{
    const y=PT+innerH*(1-r);
    const val=Math.round(maxRev*r);
    const lbl=val>=1000?Math.round(val/1000)+'K':val;
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
    gridLines+=`<text x="${PL-2}" y="${y+3}" text-anchor="end" font-size="6.5" fill="#d1d5db">${lbl}</text>`;
  });

  // Bars
  let bars='',labels='';
  data.forEach((d,i)=>{
    const x=PL+i*(bw+gap);
    const bh=d.rev>0?Math.max(3,Math.round((d.rev/maxRev)*innerH)):2;
    const y=PT+innerH-bh;
    const isCur=d.m===curM;
    const isPrev=d.m===curM-1&&chartYear===n.getFullYear();
    const id='bar-'+i;

    // Gradient per bar
    let fill,opacity=1;
    if(isCur){fill=`url(#gc)`;opacity=1;}
    else if(isPrev){fill='#99f6e4';opacity=.9;}
    else if(d.rev>0){fill='#f0fdfa';opacity=.8;}
    else{fill='#f3f4f6';opacity=.5;}

    if(d.rev>0){
      bars+=`<rect id="${id}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${fill}" opacity="${opacity}" style="cursor:pointer;transition:opacity .2s" onclick="showBarTip(${i},${d.rev},${d.count},'${d.name}')" onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='${opacity}'"/>`;
      if(isCur)bars+=`<rect x="${x-1}" y="${y-1}" width="${bw+2}" height="${bh+2}" rx="4" fill="none" stroke="#0d9488" stroke-width="1.5"/>`;
    } else {
      bars+=`<rect x="${x}" y="${PT+innerH-2}" width="${bw}" height="2" rx="1" fill="#e5e7eb"/>`;
    }
    labels+=`<text x="${x+bw/2}" y="${H-5}" text-anchor="middle" font-size="7.5" fill="${isCur?'#0d9488':'#9ca3af'}" font-weight="${isCur?'800':'400'}">${d.short}</text>`;
  });

  // Table rows
  const tableRows=data.map(d=>{
    const isCur=d.m===curM;
    const prevD=data[d.m-2];
    const chg=prevD&&prevD.rev>0?Math.round((d.rev-prevD.rev)/prevD.rev*100):null;
    const trendTxt=chg!==null?(chg>0?`<span style="color:#059669">▲${chg}%</span>`:`<span style="color:#dc2626">▼${Math.abs(chg)}%</span>`):`<span style="color:#d1d5db">—</span>`;
    const pct=d.rev>0?Math.round(d.rev/maxRev*100):0;
    return`<div class="chart-row${isCur?' cur':d.rev>0?' has':' empty'}" onclick="showBarTip(${d.m-1},${d.rev},${d.count},'${d.name}')">
      <div class="chart-row-mo${isCur?' cur':''}">${d.name}</div>
      <div class="chart-row-bar-wrap"><div class="chart-row-bar${isCur?' cur':''}" style="width:${pct}%" id="rb-${d.m}"></div></div>
      <div class="chart-row-rev${isCur?' cur':''}">${d.rev>0?'₪'+d.rev.toLocaleString():'—'}</div>
      <div class="chart-row-trend">${d.rev>0?trendTxt:'—'}</div>
    </div>`;
  }).join('');

  const html=`<div class="chart-screen" id="chart-screen">
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs></svg>
  <div class="chart-hero">
    <div class="chart-hero-nav">
      <button class="chart-back" onclick="document.getElementById('chart-screen').remove()">←</button>
      <div class="chart-hero-title">📊 ניתוח הכנסות</div>
      <div class="chart-year-sel">
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear-1})">‹</button>
        <span class="chart-year-val">${chartYear}</span>
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear+1})">›</button>
      </div>
    </div>
    <div class="chart-kpis">
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${totalY>=1000?Math.round(totalY/1000)+'K':totalY.toLocaleString()}</div>
        <div class="chart-kpi-lbl">סה"כ ${chartYear}</div>
        ${diff!==0&&curM?`<div class="chart-kpi-diff ${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'}${diffPct}% החודש</div>`:''}
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${avgM>=1000?Math.round(avgM/1000)+'K':avgM}</div>
        <div class="chart-kpi-lbl">ממוצע חודשי</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">${data.filter(d=>d.rev>0).length} חודשים פעילים</div>
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">${bestM.short}</div>
        <div class="chart-kpi-lbl">חודש הכי חזק</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">₪${bestM.rev.toLocaleString()}</div>
      </div>
    </div>
  </div>
  <div class="chart-body">
    <!-- SVG Chart -->
    <div style="background:white;padding:16px 16px 8px;position:relative" id="chart-area">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
        <defs>
          <linearGradient id="gc2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#0d9488"/>
          </linearGradient>
        </defs>
        ${gridLines}
        ${bars}
        ${labels}
      </svg>
      <div style="display:flex;align-items:center;gap:14px;margin-top:6px;padding:0 4px;font-size:10px;color:#9ca3af">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:linear-gradient(#a855f7,#0d9488);margin-left:4px;vertical-align:middle"></span>החודש</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#99f6e4;margin-left:4px;vertical-align:middle"></span>חודש קודם</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#f0fdfa;margin-left:4px;vertical-align:middle"></span>שאר</span>
      </div>
    </div>
    <!-- Monthly breakdown -->
    <div class="chart-table-wrap">
      <div class="chart-table-title">פירוט חודשי</div>
      ${tableRows}
    </div>
  </div>
  </div>`;

  // Remove existing
  document.getElementById('chart-screen')?.remove();
  const el=document.createElement('div');el.innerHTML=html;
  document.body.appendChild(el.firstChild);

  // Animate bars on load
  setTimeout(()=>{
    document.querySelectorAll('.chart-row-bar').forEach((el,i)=>{
      el.style.transition=`width .8s cubic-bezier(.34,1.56,.64,1) ${i*0.04}s`;
    });
  },50);
}

function showBarTip(idx,rev,count,name){
  document.querySelectorAll('.chart-tooltip-box').forEach(e=>e.remove());
  if(!rev)return;
  const bar=document.getElementById('bar-'+idx);
  if(!bar)return;
  const rect=bar.getBoundingClientRect();
  const chartRect=document.getElementById('chart-area').getBoundingClientRect();
  const tip=document.createElement('div');
  tip.className='chart-tooltip-box';
  tip.style.cssText=`position:absolute;bottom:${chartRect.bottom-rect.top+8}px;left:${rect.left-chartRect.left+rect.width/2}px;transform:translateX(-50%)`;
  tip.innerHTML=`${name}: ₪${rev.toLocaleString()} · ${count} טיפולים`;
  document.getElementById('chart-area').style.position='relative';
  document.getElementById('chart-area').appendChild(tip);
  setTimeout(()=>tip.remove(),3000);
}

  const hero=pkgs.length?`<div class="pkg-hero">
    <div class="pkg-hero-lbl">📦 חבילות פעילות</div>

      <input class="pkg-inp" id="pk-cost" placeholder="עלות חבילה ₪" type="number" style="flex:1" oninput="updatePkgCalc(null)">
      <input class="pkg-inp" id="pk-paid" placeholder="שולם עד כה ₪" type="number" style="flex:1" oninput="updatePkgCalc(null)">
    </div>
    <input class="pkg-inp" id="pk-note" placeholder="הערות (אופציונלי)">
    <div id="pk-calc" style="display:none" class="pkg-row-calc">
      <span class="pkg-calc-label">נותר לתשלום:</span>
      <span class="pkg-calc-val remaining" id="pk-rem">₪0</span>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="S.showAddPkg=false;hRender()" style="flex:1;padding:11px;border-radius:12px;border:none;background:#f3f4f6;color:#374151;font-weight:700;cursor:pointer;font-family:inherit">ביטול</button>
      <button onclick="savePkg()" style="flex:2;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;font-weight:700;cursor:pointer;font-family:inherit">💾 שמור חבילה</button>
    </div>
  </div>`:`<button class="add-pkg-btn" onclick="S.showAddPkg=true;hRender()">➕ הוסף חבילה חדשה</button>`;

  const cards=pkgs.map(([id,p])=>{
    const cost=Number(p.cost||0),paid=Number(p.paid||0),rem=Math.max(0,cost-paid);
    const pct=cost>0?Math.min(100,Math.round(paid/cost*100)):0;
    const isFullPaid=paid>=cost&&cost>0;
    const isEdit=S.editPkgKey===id;

    if(isEdit){
      return`<div class="pkg-card" style="border-color:#0891b2">
        <div style="font-size:13px;font-weight:800;color:#0891b2;margin-bottom:10px;text-align:right">✏️ עריכה</div>
        <input class="pkg-inp-sm" id="pe-name-${id}" placeholder="שם לקוח" value="${x(p.name||'')}">
        <input class="pkg-inp-sm" id="pe-type-${id}" placeholder="סוג חבילה" value="${x(p.type||'')}">
        <div style="display:flex;gap:7px">
          <input class="pkg-inp-sm" id="pe-cost-${id}" placeholder="עלות ₪" type="number" value="${x(p.cost||'')}" style="flex:1;margin-bottom:7px" oninput="updatePkgCalc('${id}')">
          <input class="pkg-inp-sm" id="pe-paid-${id}" placeholder="שולם ₪" type="number" value="${x(p.paid||'')}" style="flex:1;margin-bottom:7px" oninput="updatePkgCalc('${id}')">
        </div>
        <div class="pkg-row-calc" id="pec-${id}">
          <span class="pkg-calc-label">נותר:</span>
          <span class="pkg-calc-val remaining" id="per-${id}">₪${rem.toLocaleString()}</span>
        </div>
        <input class="pkg-inp-sm" id="pe-note-${id}" placeholder="הערות" value="${x(p.note||'')}" style="margin-top:7px">
        <div style="display:flex;gap:7px;margin-top:8px">
          <button onclick="S.editPkgKey=null;hRender()" style="flex:1;padding:9px;border-radius:10px;border:none;background:#f3f4f6;color:#374151;font-weight:700;cursor:pointer;font-family:inherit">ביטול</button>
          <button onclick="deletePkg('${id}')" style="flex:1;padding:9px;border-radius:10px;border:none;background:#fef2f2;color:#dc2626;font-weight:700;cursor:pointer;font-family:inherit">🗑 מחק</button>
          <button onclick="updatePkg('${id}')" style="flex:2;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;font-weight:700;cursor:pointer;font-family:inherit">💾 שמור</button>
        </div>
      </div>`;
    }

    return`<div class="pkg-card ${isFullPaid?'paid-full':rem<cost?'partial':''}">
      <div class="pkg-card-top">
        <div style="text-align:left">

        </div>
        <div style="text-align:right">
          <div class="pkg-card-name">${x(p.name||'')}</div>
          ${p.type?`<span class="pkg-card-type">${x(p.type)}</span>`:''}
        </div>
      </div>
      <div class="pkg-progress-wrap">
        <div class="pkg-progress-bar">
          <div class="pkg-progress-fill${isFullPaid?' full':''}" style="width:${pct}%"></div>
        </div>
        <div class="pkg-amounts">
          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#dc2626">₪${rem.toLocaleString()}</div><div class="pkg-amount-lbl">נותר</div></div>
          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#6b7280">${pct}%</div><div class="pkg-amount-lbl">שולם</div></div>
          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#059669">₪${paid.toLocaleString()}</div><div class="pkg-amount-lbl">שולם</div></div>
          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#0891b2">₪${cost.toLocaleString()}</div><div class="pkg-amount-lbl">סה"כ</div></div>
        </div>
      </div>
      ${p.note?`<div style="font-size:12px;color:#6b7280;margin-bottom:8px;text-align:right">📝 ${x(p.note)}</div>`:''}
      <div style="font-size:10px;color:#9ca3af;text-align:right;margin-bottom:8px">📅 ${p.created?p.created.substring(0,10):''}</div>
      <div class="pkg-card-actions">
        <button class="pkg-action-btn del" onclick="deletePkg('${id}')">🗑 מחק</button>
        <button class="pkg-action-btn edit" onclick="S.editPkgKey='${id}';hRender()">✏️ ערוך</button>
        ${!isFullPaid?`<button class="pkg-action-btn pay" onclick="markPkgPaid('${id}')">✓ סומן כשולם</button>`:''}
      </div>
    </div>`;
  }).join('');

  return (hero||'')+addForm+(pkgs.length?`<div class="section-lbl">חבילות קיימות</div>`+cards:`<div class="empty-state" style="padding:28px"><span class="empty-icon">📦</span>אין חבילות עדיין</div>`);
}

function savePkg(){
  const name=(document.getElementById('pk-name')||{}).value||'';
  if(!name.trim()){alert('נא להזין שם לקוח');return;}
  const id='pkg_'+Date.now();
  if(!S.PKGS)S.PKGS={_devTaps:0,};
  S.PKGS[id]={
    name,
    type:(document.getElementById('pk-type')||{}).value||'',
    cost:(document.getElementById('pk-cost')||{}).value||'0',
    paid:(document.getElementById('pk-paid')||{}).value||'0',
    note:(document.getElementById('pk-note')||{}).value||'',
    created:new Date().toISOString()
  };
  store.set('packages',S.PKGS);
  S.showAddPkg=false;
  hRender();
}
function updatePkg(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id]={
    ...S.PKGS[id],
    name:(document.getElementById('pe-name-'+id)||{}).value||'',
    type:(document.getElementById('pe-type-'+id)||{}).value||'',
    cost:(document.getElementById('pe-cost-'+id)||{}).value||'0',
    paid:(document.getElementById('pe-paid-'+id)||{}).value||'0',
    note:(document.getElementById('pe-note-'+id)||{}).value||''
  };
  store.set('packages',S.PKGS);
  S.editPkgKey=null;
  hRender();
}
function deletePkg(id){
  if(!confirm('למחוק חבילה זו?'))return;
  delete S.PKGS[id];
  store.set('packages',S.PKGS);
  S.editPkgKey=null;
  hRender();
}
function markPkgPaid(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id].paid=S.PKGS[id].cost;
  store.set('packages',S.PKGS);
  hRender();
}
function updatePkgCalc(id){
  const cost=Number((document.getElementById((id?'pe-cost-'+id:'pk-cost'))||{}).value||0);
  const paid=Number((document.getElementById((id?'pe-paid-'+id:'pk-paid'))||{}).value||0);
  const rem=Math.max(0,cost-paid);
  const remEl=document.getElementById(id?'per-'+id:'pk-rem');
  const calcEl=document.getElementById(id?'pec-'+id:'pk-calc');
  if(remEl)remEl.textContent='₪'+rem.toLocaleString();
  if(calcEl)calcEl.style.display='flex';
}

function getClientTags(name,phone){
  // Auto-detect tags based on data
  const key=phone||name;
  const cd=S.CL?.[key]||{};
  const manual=cd.tags||[];
  const tags=[];
  // Count visits
  const visits=[];
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name)visits.push({date,time,d});
    });
  });
  // Check debt
  const n=new Date();
  const hasDebt=visits.some(v=>v.d.price&&Number(v.d.price)>0&&!v.d.paid&&new Date(v.date+'T'+v.time)<=n);
  // Check package
  const hasPkg=Object.values(S.PKGS||{}).some(p=>p.name===name);
  // Auto tags
  if(manual.includes('vip'))tags.push({id:'vip',label:'👑 VIP',cls:'vip'});
  if(visits.length===1){
    // Check if this is first ever visit (only 1 total)
    tags.push({id:'new',label:'✨ מטופל חדש',cls:'new'});
  } else if(visits.length>=3&&!manual.includes('vip'))tags.push({id:'returning',label:'🔄 חוזר',cls:'returning'});
  if(hasPkg)tags.push({id:'package',label:'📦 חבילה',cls:'package'});
  if(hasDebt)tags.push({id:'debt',label:'⚠️ חוב',cls:'debt'});
  if(manual.includes('problematic'))tags.push({id:'problematic',label:'⚠️ בעייתי',cls:'problematic'});
  if(manual.includes('nopay'))tags.push({id:'nopay',label:'💳 לא משלם',cls:'nopay'});
  return tags;
}
function getDebtAmount(name){
  const n=new Date();
  let total=0;
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name&&d.price&&Number(d.price)>0&&!d.paid&&new Date(date+'T'+time)<=n)
        total+=Number(d.price);
    });
  });
  return total;
}

function getWeekDates(offset){
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const mon=new Date(now);
  mon.setDate(now.getDate()-day+offset*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);
    d.setDate(mon.getDate()+i);
    days.push(d);
  }
  return days;
}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pLaserWeekly(){
  const days=getWeekDates(S.weekOffset);
  const DY_HEB=['א\'','ב\'','ג\'','ד\'','ה\'','ו\'','ש\''];
  const now=new Date(),todayStr=fmtDate(now);
  // Week range label
  const first=days[0],last=days[6];
  const weekLbl=first.getDate()+' '+MO[first.getMonth()]+' — '+last.getDate()+' '+MO[last.getMonth()]+' '+last.getFullYear();
  // Week stats
  let weekRev=0,weekAppts=0,weekClients=new Set();
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    Object.values(slots).forEach(ap=>{
      if(!ap||!ap.name)return;
      weekAppts++;
      weekClients.add(ap.name);
      if(ap.price&&Number(ap.price)>0)weekRev+=Number(ap.price);
    });
  });
  // Today appts for bottom detail
  const selStr=S.lSel&&days.find(d=>fmtDate(d)===S.lSel)?S.lSel:todayStr;
  const selSlots=S.A[selStr]||{};
  const selAppts=Object.entries(selSlots).filter(([,d])=>d&&d.name).sort((a,b)=>a[0].localeCompare(b[0]));

  let h=`<div style="background:white;border-radius:0 0 20px 20px;margin-bottom:8px;padding-bottom:8px;box-shadow:0 4px 16px rgba(0,0,0,.06)">`;
  // Navigation
  h+=`<div class="week-nav">
    <button class="week-nav-btn" onclick="S.weekOffset++;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">›</button>
    <div class="week-nav-lbl">${weekLbl}</div>
    <button class="week-nav-btn" onclick="S.weekOffset--;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">‹</button>
  </div>`;
  // Week summary
  h+=`<div class="week-summary">
    <div class="ws"><div class="ws-val">${weekAppts}</div><div class="ws-lbl">תורים</div></div>
    <div class="ws"><div class="ws-val">${weekClients.size}</div><div class="ws-lbl">לקוחות</div></div>
    <div class="ws"><div class="ws-val">₪${weekRev.toLocaleString()}</div><div class="ws-lbl">הכנסות</div></div>
    <div class="ws"><div class="ws-val">${S.weekOffset===0?'השבוע':S.weekOffset>0?'הבא':'שעבר'}</div><div class="ws-lbl">שבוע</div></div>
  </div>`;
  // Day headers
  h+=`<div class="week-row">`;
  days.forEach(d=>{h+=`<div class="week-day-hdr${fmtDate(d)===todayStr?' today':''}">${DY_HEB[d.getDay()]}</div>`;});
  h+=`</div>`;
  // Day columns
  h+=`<div class="week-row">`;
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    const appts=Object.entries(slots).filter(([,ap])=>ap&&ap.name).sort((a,b)=>a[0].localeCompare(b[0]));
    const isToday=ds===todayStr;
    const isSel=ds===S.lSel;
    const isShabat=d.getDay()===6;
    const dayRev=appts.reduce((s,[,ap])=>s+(ap.price?Number(ap.price):0),0);
    h+=`<div class="week-day-col${isToday?' today-col':''}${appts.length?' has-appts':''}${isShabat?' shabbat':''}${isSel&&!isToday?' has-appts':''}" onclick="S.lSel='${ds}';S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()" style="${isSel&&!isToday?'border:2px solid #0d9488;':''}">
      <div class="week-day-num">${d.getDate()}</div>
      ${appts.slice(0,3).map(([time,ap])=>`<span class="week-appt-dot${ap.paid?' paid':(!ap.paid&&ap.price&&Number(ap.price)>0)?' debt':''}">${time.substring(0,5)} ${x(ap.name.split(' ')[0])}</span>`).join('')}
      ${appts.length>3?`<span style="font-size:8px;color:#5eead4;text-align:center;display:block">+${appts.length-3}</span>`:''}
      ${dayRev>0?`<div class="week-day-rev">₪${dayRev>=1000?Math.round(dayRev/1000)+'K':dayRev}</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;
  // Selected day detail
  const selDay=days.find(d=>fmtDate(d)===selStr)||days.find(d=>fmtDate(d)===todayStr);
  const selDayHeb=selDay?DY_HEB[selDay.getDay()]+' '+selDay.getDate()+' '+MO[selDay.getMonth()]:'';
  h+=`<div style="padding:0 12px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <button onclick="S.lModal='add';S.lSlot=null;S.lF={};modalRender()" style="background:#0d9488;color:white;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ תור</button>
    <span style="font-size:13px;font-weight:800;color:#1e1b4b">${selDayHeb}</span>
  </div>`;
  if(selAppts.length){
    h+=selAppts.map(([time,ap])=>`<div class="appt-card-pro" style="margin-bottom:7px">
      <div class="appt-time-pill" style="background:#f0fdf4;color:#059669;border-color:#bbf7d0;font-size:12px">${time}</div>
      <div class="appt-card-info">
        <div class="appt-card-name" style="font-size:14px">${x(ap.name)}</div>
        <div class="appt-card-meta">${ap.type?x(ap.type):''}${ap.price?' · ₪'+ap.price:''}</div>
        ${clientTagsHTML(ap.name,ap.phone)}
      </div>
      ${contactBtns(ap.phone,ap.name,selStr+' '+time)}
    </div>`).join('');
  } else {
    h+=`<div style="text-align:center;padding:20px;color:#d1d5db;font-size:13px">אין תורים ביום זה</div>`;
  }
  h+=`</div>`;
  return h;
}

    const data=await r.json();
    const body={message:'Update from app',content:encoded};
    if(data.sha)body.sha=data.sha;
    const r2=await fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r2.json();
    if(d.content){btn.textContent='✅ עלה!';btn.style.background='#059669';setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';btn.disabled=false;btn.style.background='';},3000);}
    else{btn.textContent='❌ שגיאה';btn.disabled=false;setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';},3000);}
  }catch(e){btn.textContent='❌ שגיאה';btn.disabled=false;setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';},3000);}
}
</script>
</body>
