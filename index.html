// ── Laser SVG Animation ──────────────────────────────
function fireLaserBeam(sx,sy,tx,ty,cb){
  // Remove any existing overlay
  document.querySelector('.laser-beam-overlay')?.remove();

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','laser-beam-overlay');
  svg.setAttribute('viewBox',`0 0 ${window.innerWidth} ${window.innerHeight}`);
  svg.setAttribute('width',window.innerWidth);
  svg.setAttribute('height',window.innerHeight);

  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  grad.id='beamLG';
  const len=Math.hypot(tx-sx,ty-sy);
  grad.setAttribute('gradientUnits','userSpaceOnUse');
  grad.setAttribute('x1',sx); grad.setAttribute('y1',sy);
  grad.setAttribute('x2',tx); grad.setAttribute('y2',ty);
  const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#ffffff');
  const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s2.setAttribute('offset','50%');s2.setAttribute('stop-color','#e879f9');
  const s3=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s3.setAttribute('offset','100%');s3.setAttribute('stop-color','#7c3aed');s3.setAttribute('stop-opacity','0.3');
  grad.appendChild(s1);grad.appendChild(s2);grad.appendChild(s3);
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Filter glow
  const filt=document.createElementNS('http://www.w3.org/2000/svg','filter');
  filt.id='bGlow';
  const blur=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  blur.setAttribute('stdDeviation','3');
  filt.appendChild(blur);
  defs.appendChild(filt);

  // Glow beam (wide)
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',sx);glow.setAttribute('y1',sy);
  glow.setAttribute('x2',sx);glow.setAttribute('y2',sy);
  glow.setAttribute('stroke','#e879f9');glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-linecap','round');glow.setAttribute('opacity','0.4');
  glow.setAttribute('filter','url(#bGlow)');
  svg.appendChild(glow);

  // Core beam
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',sx);line.setAttribute('y1',sy);
  line.setAttribute('x2',sx);line.setAttribute('y2',sy);
  line.setAttribute('stroke','url(#beamLG)');line.setAttribute('stroke-width','3');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);

  // Impact circle
  const circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circ.setAttribute('cx',tx);circ.setAttribute('cy',ty);
  circ.setAttribute('r','0');circ.setAttribute('fill','#e879f9');
  circ.setAttribute('filter','url(#bGlow)');circ.setAttribute('opacity','0');
  svg.appendChild(circ);

  document.body.appendChild(svg);

  // Animate: extend beam to target over 220ms
  const start=performance.now();
  const dur=220;
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const cx=sx+(tx-sx)*p, cy=sy+(ty-sy)*p;
    line.setAttribute('x2',cx);line.setAttribute('y2',cy);
    glow.setAttribute('x2',cx);glow.setAttribute('y2',cy);
    if(p<1) requestAnimationFrame(step);
    else{
      // Impact flash
      circ.setAttribute('opacity','1');
      let r=0;
      const flash=setInterval(()=>{
        r+=3;circ.setAttribute('r',r);
        if(r>14){clearInterval(flash);svg.remove();cb();}
      },16);
    }
  }
  requestAnimationFrame(step);
}

.claude-setup-sheet{background:#fafaf9;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border-radius:28px 28px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);font-family:inherit;direction:rtl;padding-bottom:env(safe-area-inset-bottom,0)}
.claude-setup-overlay.on .claude-setup-sheet{transform:translateY(0)}
@media(min-width:768px){.claude-setup-overlay{align-items:center}.claude-setup-sheet{border-radius:28px;margin:16px;max-height:85vh}}
.claude-setup-hdr{background:linear-gradient(135deg,#1e1b4b,#312e81);color:white;padding:20px;position:relative;overflow:hidden;display:flex;align-items:center;gap:12px}
.claude-setup-hdr::before{content:'';position:absolute;top:-60px;left:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.2),transparent 65%)}
.claude-setup-hdr-ico{font-size:32px;position:relative;z-index:1}
.claude-setup-hdr-txt{flex:1;min-width:0;position:relative;z-index:1}
.claude-setup-hdr-title{font-size:17px;font-weight:900;line-height:1.2}
.claude-setup-hdr-sub{font-size:12px;font-weight:600;opacity:.85;margin-top:3px}
.claude-setup-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:background .15s;flex-shrink:0}
.claude-setup-close:hover{background:rgba(255,255,255,.3)}
.claude-setup-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.claude-setup-info{background:white;border:1.5px solid #e5e7eb;border-radius:14px;padding:14px}
.claude-setup-info-title{font-size:13px;font-weight:900;color:#1e1b4b;margin-bottom:10px}
.claude-setup-info-steps{display:flex;flex-direction:column;gap:10px}
.claude-setup-step{display:flex;gap:10px;align-items:flex-start}
.claude-setup-step-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center}
.claude-setup-step div{font-size:12.5px;color:#374151;line-height:1.55;font-weight:600;flex:1}
.claude-setup-step b{color:#1e1b4b;font-weight:900}
.claude-setup-pricing{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #fcd34d;border-radius:14px;padding:14px;display:flex;gap:12px}
.claude-setup-pricing-ico{font-size:26px;flex-shrink:0}
.claude-setup-pricing-title{font-size:13px;font-weight:900;color:#78350f;margin-bottom:3px}
.claude-setup-pricing-desc{font-size:11.5px;color:#92400e;line-height:1.55;font-weight:600}
.claude-setup-howto{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:14px;padding:14px}
.claude-setup-howto-title{font-size:13px;font-weight:900;color:#0c4a6e;margin-bottom:10px}
.claude-setup-howto-list{margin:0;padding:0 16px 0 0;font-size:12.5px;color:#0c4a6e;line-height:1.75;font-weight:600}
.claude-setup-howto-list li{margin-bottom:4px}
.claude-setup-howto-list a{color:#0284c7;text-decoration:underline}
.claude-setup-howto-list code{background:#1e1b4b;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
.claude-setup-active{background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center}
.claude-setup-active-ico{font-size:28px;flex-shrink:0}
.claude-setup-active-title{font-size:13px;font-weight:900;color:#065f46}
.claude-setup-active-key{font-size:12px;color:#047857;font-weight:600;margin-top:2px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;text-align:right}
.claude-setup-form{display:flex;flex-direction:column;gap:8px}
.claude-setup-label{font-size:12px;font-weight:800;color:#1e1b4b;padding-right:2px}
.claude-setup-input{padding:12px 14px;border-radius:12px;border:1.5px solid #e5e7eb;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;outline:none;transition:border-color .15s;background:white}
.claude-setup-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.claude-setup-hint{font-size:11px;color:#6b7280;font-weight:600;line-height:1.55;margin-top:2px}
.claude-setup-actions{display:flex;gap:8px}
.claude-setup-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.2px}
.claude-setup-btn.primary{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;box-shadow:0 4px 12px rgba(124,58,237,.3)}
.claude-setup-btn.primary:hover{box-shadow:0 6px 16px rgba(124,58,237,.4);transform:translateY(-1px)}
.claude-setup-btn.danger{background:white;color:#b91c1c;border:1.5px solid #fecaca}
.claude-setup-btn.danger:hover{background:#fef2f2}
.claude-setup-btn:active{transform:scale(.98)}
.claude-setup-test{background:#fafaf9;border-radius:12px;padding:12px;text-align:center;border:1px dashed #d1d5db}
.claude-setup-test-btn{padding:10px 18px;border-radius:10px;border:1.5px solid #c4b5fd;background:white;color:#7c3aed;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.claude-setup-test-btn:hover{background:#faf5ff}
.claude-setup-test-hint{font-size:10.5px;color:#6b7280;margin-top:6px;line-height:1.5;font-weight:600}

/* Claude button in advisor tab header */
.claude-btn-row{display:flex;gap:8px;margin-top:10px;position:relative;z-index:1}
.claude-btn{flex:1;background:rgba(255,255,255,.9);border:1.5px solid rgba(0,0,0,.06);color:#78350f;font-size:11.5px;font-weight:900;padding:8px 10px;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.claude-btn:hover{background:white;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.claude-btn.connected{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#86efac;color:#065f46}

/* Claude tip card in advisor */
.claude-tip-card{background:linear-gradient(135deg,#0c0a1e 0%,#1e1b4b 50%,#0c0a1e 100%);border-radius:20px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;border:1.5px solid rgba(251,191,36,.3);box-shadow:0 10px 32px rgba(12,10,30,.5)}
.claude-tip-card::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.25),transparent 65%);pointer-events:none;animation:advOrbFloat 10s ease-in-out infinite}
.claude-tip-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;z-index:1}
.claude-tip-badge{font-size:9px;font-weight:900;color:#78350f;background:linear-gradient(135deg,#fbbf24,#f59e0b);padding:3px 9px;border-radius:8px;letter-spacing:.5px;box-shadow:0 2px 6px rgba(245,158,11,.4)}
.claude-tip-label{font-size:12px;font-weight:900;color:#fbbf24;letter-spacing:.3px}
.claude-tip-date{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;margin-right:auto}
.claude-tip-body{position:relative;z-index:1;font-size:14.5px;color:white;line-height:1.65;font-weight:600;letter-spacing:.1px;margin-bottom:12px}
.claude-tip-emoji{font-size:22px;margin-left:8px;display:inline-block;vertical-align:middle}
.claude-tip-action{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:10px 12px;position:relative;z-index:1}
.claude-tip-action-label{font-size:10px;font-weight:900;color:#fbbf24;letter-spacing:.8px;margin-bottom:4px}
.claude-tip-action-body{font-size:12.5px;color:#fde68a;font-weight:700;line-height:1.55}
.claude-tip-meta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.claude-tip-type{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.claude-tip-refresh{margin-right:auto;background:none;border:none;color:rgba(255,255,255,.7);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all .15s}
.claude-tip-refresh:hover{background:rgba(255,255,255,.08);color:white}
.claude-tip-refresh:disabled{opacity:.4;cursor:not-allowed}
.adv-hdr{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:18px;padding:16px;margin-bottom:14px}
.adv-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.adv-hdr-icon{font-size:36px;flex-shrink:0}
.adv-hdr-txt{flex:1;min-width:0}
.adv-hdr-title{font-size:18px;font-weight:900;color:#78350f}
.adv-hdr-sub{font-size:12px;color:#92400e;font-weight:600;margin-top:2px}
.adv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.adv-stat{background:rgba(255,255,255,.6);border-radius:12px;padding:10px 8px;text-align:center;}
.adv-stat-val{font-size:20px;font-weight:900;color:#78350f;line-height:1}
.adv-stat-lbl{font-size:10px;font-weight:700;color:#92400e;margin-top:4px;line-height:1.3}
.adv-insights{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.adv-card{background:white;border-radius:16px;padding:14px;border:1.5px solid #e5e7eb;box-shadow:0 2px 10px rgba(0,0,0,.04);overflow:hidden;position:relative}
.adv-card.adv-p-high{border-color:#fecaca;background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.adv-card.adv-p-high::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#dc2626,#f87171)}
.adv-card.adv-p-medium{border-color:#fcd34d;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.adv-card.adv-p-medium::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.adv-card.adv-p-good{border-color:#a7f3d0;background:linear-gradient(135deg,#f0fdf4,#d1fae5)}
.adv-card.adv-p-good::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#059669,#10b981)}
.adv-card.adv-p-low{border-color:#bfdbfe;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.adv-card.adv-p-low::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
.adv-card-hdr{display:flex;gap:10px;margin-bottom:10px}
.adv-card-ico{font-size:26px;flex-shrink:0}
.adv-card-hdr-txt{flex:1;min-width:0}
.adv-card-priority{font-size:10px;font-weight:800;color:#6b7280;letter-spacing:.5px;margin-bottom:3px}
.adv-card-title{font-size:15px;font-weight:900;color:#1e1b4b;line-height:1.3}
.adv-card-body{font-size:13px;color:#374151;line-height:1.55;margin-bottom:10px}
.adv-card-body b{font-weight:800;color:#1e1b4b}
.adv-card-details{background:rgba(255,255,255,.6);border-radius:10px;padding:10px 12px;font-size:11.5px;color:#4b5563;font-weight:600;line-height:1.75;margin-bottom:10px;white-space:pre-line}
.adv-card-action{background:rgba(255,255,255,.75);border-radius:12px;padding:11px 13px;border-right:3px solid #7c3aed}
.adv-card-action-label{font-size:10px;font-weight:900;color:#7c3aed;letter-spacing:.8px;margin-bottom:5px}
.adv-card-action-body{font-size:12.5px;color:#1e1b4b;font-weight:600;line-height:1.6}
.adv-card-action-body b{font-weight:900;color:#7c3aed}
.adv-empty{background:white;border-radius:18px;padding:40px 24px;text-align:center;border:1.5px dashed #d1fae5}
.adv-empty-ico{font-size:56px;margin-bottom:10px}
.adv-empty-title{font-size:18px;font-weight:900;color:#059669;margin-bottom:6px}
.adv-empty-sub{font-size:13px;color:#6b7280;line-height:1.6}
.adv-footer{background:#f9fafb;border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;border:1px solid #f3f4f6;margin-top:8px}
.adv-footer-ico{font-size:20px;flex-shrink:0}
.adv-footer-txt{font-size:11px;color:#6b7280;line-height:1.55;font-weight:600}
/* Next appt hero */
.next-hero{background:linear-gradient(135deg,#7c3aed,#5b21b6);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(124,58,237,.35);overflow:hidden}
.next-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.next-hero-name{font-size:20px;font-weight:900;color:white;margin-bottom:4px}
.next-hero-detail{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:12px}
.next-hero-date{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:white;margin-bottom:12px}
.countdown{display:flex;gap:7px;justify-content:center}
.cd-seg{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px;text-align:center;min-width:50px}
.cd-num{font-size:22px;font-weight:900;color:white;line-height:1;font-family:monospace;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.cd-sep{color:rgba(255,255,255,.5);font-size:22px;font-weight:900;align-self:flex-start;margin-top:8px}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.65}}
.countdown.urgent .cd-num{color:#fca5a5;animation:urgentPulse 1s ease-in-out infinite}.countdown.warning .cd-num{color:#fed7aa;animation:urgentPulse 1.5s ease-in-out infinite}.countdown.soon .cd-num{color:#fef08a}
/* Appt cards */
.appt-card-pro{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;border:1px solid transparent}
.appt-time-pill{border-radius:10px;padding:7px 10px;text-align:center;font-size:13px;font-weight:800;flex-shrink:0;min-width:52px;border:1.5px solid}
.appt-card-info{flex:1;text-align:right}
.appt-card-name{font-size:14px;font-weight:800;color:#1e1b4b;margin-bottom:2px}
.appt-card-meta{font-size:12px;color:#6b7280}
.appt-card-date{display:inline-flex;align-items:center;background:#f5f3ff;color:#7c3aed;border-radius:8px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:4px}
.hist-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;gap:12px;align-items:center;opacity:.85;border:1px solid #f3f4f6}
.hist-time-pill{background:#f9fafb;color:#6b7280;border-radius:10px;padding:7px 10px;text-align:center;font-size:12px;font-weight:700;flex-shrink:0;min-width:48px;border:1.5px solid #e5e7eb}
.hist-card-info{flex:1;text-align:right}
.hist-card-name{font-size:14.5px;font-weight:600;color:#5b3a87;font-family:Georgia,"Times New Roman",serif;letter-spacing:-.1px}
.hist-card-meta{font-size:11px;color:#9ca3af;margin-top:2px}
/* Payments */
.pay-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pay-stat-val{font-size:20px;font-weight:900;color:#7c3aed}
.pay-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}
.pay-stat.full{grid-column:1/-1;background:linear-gradient(135deg,#7c3aed,#5b21b6)}
.pay-stat.full .pay-stat-val{color:white;font-size:26px}
.pay-stat.full .pay-stat-lbl{color:rgba(255,255,255,.7)}
.pay-filter{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto}
.pay-filter-btn{flex-shrink:0;padding:5px 12px;border-radius:18px;border:1.5px solid #ede9fe;background:white;color:#6b7280;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.pay-filter-btn.on{background:#7c3aed;color:white;border-color:#7c3aed}
.pay-row{background:white;border-radius:12px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.04)}
.pay-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pay-row-name{font-size:14px;font-weight:600;color:#5b3a87;font-family:Georgia,"Times New Roman",serif;letter-spacing:-.1px}
.pay-row-amount{font-size:15px;font-weight:900;color:#059669}
.pay-row-meta{font-size:11px;color:#6b7280}
.pay-row-date{font-size:10px;color:#a78bfa;font-weight:600;margin-top:2px}
.export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#059669,#047857);color:white;border:none;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(5,150,105,.3);margin-bottom:14px}
.pay-month-hdr{font-size:10px;font-weight:800;color:#a78bfa;letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px;display:flex;justify-content:space-between}
/* Goals */
.goals-hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:18px;padding:16px;margin-bottom:14px}
.goals-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.goals-hero-rev{font-size:22px;font-weight:900;color:white;margin-bottom:12px}
.goals-prog{background:rgba(255,255,255,.1);border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px}
.goals-prog-fill{height:100%;border-radius:20px;transition:width .8s}
.goals-prog-fill.gn{background:linear-gradient(90deg,#059669,#34d399)}
.goals-prog-fill.gy{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goals-prog-fill.gp{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.goals-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.ghs{text-align:center}
.ghs-val{font-size:15px;font-weight:900;color:white}
.ghs-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.goal-card{background:white;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.goal-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.goal-card-title{font-size:14px;font-weight:800;color:#1e1b4b}
.goal-card-period{font-size:10px;color:#a78bfa;font-weight:700;background:#f5f3ff;padding:2px 8px;border-radius:14px}
.goal-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.goal-current{font-size:20px;font-weight:900;color:#7c3aed}
.goal-target{font-size:13px;color:#9ca3af}
.goal-bar{background:#f3f4f6;border-radius:20px;height:8px;overflow:hidden;margin-bottom:7px}
.goal-bar-fill{height:100%;border-radius:20px;transition:width .8s}
.goal-bar-fill.hit{background:linear-gradient(90deg,#059669,#34d399)}
.goal-bar-fill.close{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goal-bar-fill.far{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.goal-footer{display:flex;justify-content:space-between;align-items:center}
.goal-pct.hit{color:#059669;font-size:12px;font-weight:800}
.goal-pct.close{color:#d97706;font-size:12px;font-weight:800}

.web-hint{background:linear-gradient(135deg,#fef9c3,#fde68a);padding:10px 14px;display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid #fcd34d}

/* ── Monthly Chart — Professional ── */

.contact-copy{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 20px 0;padding:14px;background:#f9fafb;border-radius:14px;cursor:pointer;border:none;width:calc(100% - 40px);font-family:inherit}
.contact-copy:active{background:#f3f4f6}
.contact-copy-num{font-size:15px;font-weight:700;color:#1e1b4b;direction:ltr}
.contact-copy-lbl{font-size:12px;color:#9ca3af}
.contact-sheet-close{display:flex;justify-content:center;margin-top:16px}
.contact-sheet-close button{background:none;border:1.5px solid #e5e7eb;border-radius:20px;padding:10px 40px;font-size:14px;font-weight:700;color:#6b7280;cursor:pointer;font-family:inherit}

/* ── Client Tags ── */
.client-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;justify-content:flex-end}
.ctag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:800;letter-spacing:.2px}
.ctag.returning{background:#eff6ff;color:#1d4ed8}
.ctag.vip{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border:1px solid #fcd34d}
.ctag.package{background:#e0f2fe;color:#0369a1}
.ctag.debt{background:#fef2f2;color:#dc2626;animation:debtPulse 1.5s ease-in-out infinite}
.ctag.problematic{background:#fff7ed;color:#c2410c}
.ctag.nopay{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.ctag.new{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);color:#0369a1;border:1px solid #bae6fd}
@keyframes debtPulse{0%,100%{opacity:1}50%{opacity:.65}}
/* Debt alert box */
.debt-alert{background:linear-gradient(135deg,#fef2f2,#fff5f5);border:2px solid #fca5a5;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.debt-alert-icon{font-size:24px;flex-shrink:0}
.debt-alert-text{text-align:right}
.debt-alert-title{font-size:13px;font-weight:900;color:#dc2626}
.debt-alert-sub{font-size:11px;color:#ef4444;margin-top:2px}
/* Tag picker in edit */
.tag-picker{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.tag-pick-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:inherit;transition:.15s}
.tag-pick-btn:active{transform:scale(.95)}
.tag-pick-btn.on-vip{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border-color:#fcd34d}
.tag-pick-btn.off-vip{background:#fffbeb;color:#9ca3af;border-color:#e5e7eb}
.tag-pick-btn.on-problematic{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.tag-pick-btn.off-problematic{background:#fff7ed;color:#9ca3af;border-color:#e5e7eb}
.tag-pick-btn.on-nopay{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.tag-pick-btn.off-nopay{background:#fef2f2;color:#9ca3af;border-color:#e5e7eb}

/* ── Client Mini Sheet ── */
.mini-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end}
.mini-sheet{background:white;width:100%;border-radius:24px 24px 0 0;padding:0 0 32px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);max-height:80vh;display:flex;flex-direction:column}
.mini-sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid #f3f4f6;flex-shrink:0}
.mini-sheet-title{font-size:16px;font-weight:900;color:#1e1b4b}
.mini-sheet-close{background:#f3f4f6;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mini-sheet-body{flex:1;overflow-y:auto;padding:14px 18px}
.pay-hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f9fafb}
.pay-hist-row:last-child{border-bottom:none}
.pay-hist-date{font-size:12px;color:#6b7280}
.pay-hist-type{font-size:13px;font-weight:700;color:#374151}
.pay-hist-amount{font-size:14px;font-weight:900;color:#059669}
.pay-hist-amount.unpaid{color:#dc2626}
.notes-area{width:100%;border:1.5px solid #ede9fe;border-radius:14px;padding:12px 14px;font-size:14px;text-align:right;resize:none;outline:none;min-height:90px;font-family:inherit;margin-top:8px;background:#faf5ff}
.notes-area:focus{border-color:#7c3aed}
.notes-save-btn{width:100%;padding:11px;background:#7c3aed;color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.notes-preview{font-size:11px;color:#6b7280;margin-top:4px;font-style:italic;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
/* Tag for pay history */
.ctag.payhist{background:#f0fdf4;color:#059669;cursor:pointer}
.ctag.payhist:active{opacity:.7}
.ctag.hasnotes{background:#f5f3ff;color:#7c3aed;cursor:pointer}
.ctag.hasnotes:active{opacity:.7}

/* ── Cal View Toggle ── */
.cal-view-toggle{display:flex;background:#f3f0ff;border-radius:20px;padding:3px;margin:10px auto;width:fit-content;gap:2px}
.cal-vbtn{padding:7px 18px;border-radius:17px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;color:#9ca3af;background:transparent}
.cal-vbtn.on{background:white;color:#7c3aed;box-shadow:0 2px 8px rgba(124,58,237,.2)}
/* Weekly view */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.week-nav-lbl{font-size:14px;font-weight:800;color:#1e1b4b;text-align:center}
.week-nav-btn{background:#f5f3ff;border:none;border-radius:50%;width:32px;height:32px;color:#7c3aed;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px 6px}
.week-day-hdr{text-align:center;font-size:10px;font-weight:700;color:#9ca3af;padding:3px 0}
.week-day-hdr.today{color:#7c3aed}
.week-day-col{border-radius:12px;overflow:hidden;min-height:54px;cursor:pointer;transition:.15s;position:relative}
.week-day-col:active{transform:scale(.97)}
.week-day-num{text-align:center;font-size:13px;font-weight:700;padding:6px 4px 3px;color:#374151}
.week-day-col.today-col .week-day-num{color:white;background:#7c3aed;border-radius:10px;margin:2px;padding:4px 2px}
.week-day-col.has-appts{background:#faf5ff}
.week-day-col.today-col{background:#f5f3ff;border:2px solid #c4b5fd}
.week-day-col.shabbat .week-day-num{color:#ef4444}
.week-appt-dot{display:block;margin:1px 3px;border-radius:4px;padding:2px 4px;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:white;background:#7c3aed;line-height:1.3}
.week-appt-dot.paid{background:#059669}
.week-appt-dot.debt{background:#dc2626}
.week-day-rev{text-align:center;font-size:9px;font-weight:700;color:#059669;padding:1px 2px 3px}
/* Week summary bar */
.week-summary{display:flex;gap:8px;padding:8px 12px 4px;background:#faf5ff;margin:0 0 6px}
.ws{flex:1;text-align:center}
.ws-val{font-size:15px;font-weight:900;color:#7c3aed}
.ws-lbl{font-size:9px;color:#9ca3af;margin-top:1px}

/* ── CRM Filter Pills ── */
.crm-filter-pills{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.crm-pill{padding:7px 14px;border-radius:20px;border:1.5px solid #ede9fe;background:white;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:5px}
.crm-pill.on{background:#7c3aed;color:white;border-color:#7c3aed;box-shadow:0 2px 8px rgba(124,58,237,.3)}
.crm-pill.red.on{background:#dc2626;border-color:#dc2626;box-shadow:0 2px 8px rgba(220,38,38,.3)}
.crm-pill.blue.on{background:#2563eb;border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.crm-pill-badge{background:rgba(255,255,255,.3);border-radius:10px;padding:0 6px;font-size:10px}
/* Discount field */
.discount-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:#fefce8;border-radius:12px;padding:10px 14px;border:1.5px solid #fde68a}
.discount-lbl{font-size:12px;color:#92400e;font-weight:700;flex-shrink:0}
.discount-inp{flex:1;border:1.5px solid #fde68a;border-radius:10px;padding:8px 12px;font-size:14px;outline:none;background:white;text-align:center;font-family:inherit;width:60px}
.discount-inp:focus{border-color:#f59e0b}
.discount-result{font-size:14px;font-weight:800;color:#059669;flex-shrink:0}

// ── Auto sync every 15s ──────────────────────────────
async function syncData(){
  if(_writing>0)return; // don't overwrite state mid-write
  try{
    const [a,t,g,bg,cl,canc,pkgs,exp,web]=await Promise.all([store.get('appts'),store.get('tasks'),store.get('goals'),store.get('bgoals'),store.get('clients'),store.get('cancellations'),store.get('packages'),store.get('expenses'),store.get('website')]);
    if(_writing>0)return; // double-check after await
    // Only update if data actually changed
    let changed=false;
    if(a&&typeof a==='object'){const prev=JSON.stringify(S.A);S.A=a;if(JSON.stringify(S.A)!==prev)changed=true;}
    if(t&&typeof t==='object'){const prev=JSON.stringify(S.T);S.T=t;if(JSON.stringify(S.T)!==prev)changed=true;}
    if(g&&typeof g==='object'){const prev=JSON.stringify(S.G);S.G=g;if(JSON.stringify(S.G)!==prev)changed=true;}
    if(bg&&typeof bg==='object'){const prev=JSON.stringify(S.BG);S.BG=bg;if(JSON.stringify(S.BG)!==prev)changed=true;}
    if(cl&&typeof cl==='object'){const prev=JSON.stringify(S.CL);S.CL=cl;if(JSON.stringify(S.CL)!==prev)changed=true;}
    if(canc&&typeof canc==='object'){const prev=JSON.stringify(S.CANC);S.CANC=canc;if(JSON.stringify(S.CANC)!==prev)changed=true;}
    if(pkgs&&typeof pkgs==='object'){const prev=JSON.stringify(S.PKGS);S.PKGS=pkgs;if(JSON.stringify(S.PKGS)!==prev)changed=true;}
    if(exp&&typeof exp==='object'){const prev=JSON.stringify(S.EXP);S.EXP=exp;if(JSON.stringify(S.EXP)!==prev)changed=true;}
    if(web&&typeof web==='object'){const prev=JSON.stringify(S.WEB);S.WEB=web;if(JSON.stringify(S.WEB)!==prev)changed=true;}
    // Data updated silently - UI updates only on user interaction
  }catch(e){}
}
setInterval(syncData,15000);


// ── History Panel Functions ─────────────────────────
let _timerInt=null;
function getApptDT(date,time){const[y,m,d]=date.split('-').map(Number),[h,mi]=time.split(':').map(Number);return new Date(y,m-1,d,h,mi,0);}
function allAppts(){const a=[];Object.entries(S.A).forEach(([date,slots])=>{Object.entries(slots||{}).forEach(([time,d])=>{if(d&&d.name)a.push({date,time,d,dt:getApptDT(date,time)});});});a.sort((a,b)=>a.dt-b.dt);return a;}
function getNextAppt(){const n=new Date(),a=allAppts().filter(a=>a.dt>n);return a[0]||null;}
function startTimer(){
  if(_timerInt)clearInterval(_timerInt);
  _timerInt=setInterval(()=>{
    const e={d:document.getElementById('cd-d'),h:document.getElementById('cd-h'),m:document.getElementById('cd-m'),s:document.getElementById('cd-s'),w:document.getElementById('cd-wrap')};
    if(!e.d){clearInterval(_timerInt);_timerInt=null;return;}
    const next=getNextAppt();if(!next){clearInterval(_timerInt);return;}
    const ms=next.dt-new Date();if(ms<=0){if(S.showHistory)hRender();return;}
    const ts=Math.floor(ms/1000);
    e.d.textContent=String(Math.floor(ts/86400)).padStart(2,'0');
    e.h.textContent=String(Math.floor((ts%86400)/3600)).padStart(2,'0');
    e.m.textContent=String(Math.floor((ts%3600)/60)).padStart(2,'0');
    e.s.textContent=String(ts%60).padStart(2,'0');
    if(e.w)e.w.className='countdown'+(ts<3600?' urgent':ts<10800?' warning':ts<86400?' soon':'');
    const hero=document.getElementById('next-hero-card');
    if(hero){
      if(ts<3600)hero.style.background='linear-gradient(135deg,#dc2626,#991b1b)';
      else if(ts<10800)hero.style.background='linear-gradient(135deg,#ea580c,#c2410c)';
      else if(ts<86400)hero.style.background='linear-gradient(135deg,#ca8a04,#a16207)';
      else hero.style.background='';
    }
  },1000);
}
function buildUpcoming(upcoming){
  if(!upcoming.length)return`<div class="empty-state"><span class="empty-icon">📭</span>אין תורים קרובים</div>`;

  const next=upcoming[0];
  const ms=next.dt-new Date(),ts=Math.floor(ms/1000);

  // Timer hero (compact)
  const heroBg=ts<3600?'linear-gradient(135deg,#dc2626,#991b1b)':ts<10800?'linear-gradient(135deg,#ea580c,#c2410c)':ts<86400?'linear-gradient(135deg,#ca8a04,#a16207)':'';
  const timerHero=`<div id="next-hero-card" class="next-hero" style="margin-bottom:12px${heroBg?';background:'+heroBg:''}">
    <div class="next-hero-lbl">⚡ התור הקרוב ביותר — ${next.date===TD?'היום':next.date} 🕐 ${next.time}</div>
    <div class="next-hero-name">${x(next.d.name)}</div>
    <div class="next-hero-detail">${next.d.type?'💆 '+x(next.d.type):''}${next.d.duration?' · '+x(next.d.duration)+' דק':''}${next.d.price?' · ₪'+x(next.d.price):''}</div>
    <div id="cd-wrap" class="countdown" style="margin-top:10px;direction:ltr">
      <div class="cd-seg"><div class="cd-num" id="cd-d">${String(Math.floor(ts/86400)).padStart(2,'0')}</div><div class="cd-lbl">ימים</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-seg"><div class="cd-num" id="cd-h">${String(Math.floor((ts%86400)/3600)).padStart(2,'0')}</div><div class="cd-lbl">שעות</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-seg"><div class="cd-num" id="cd-m">${String(Math.floor((ts%3600)/60)).padStart(2,'0')}</div><div class="cd-lbl">דקות</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-seg"><div class="cd-num" id="cd-s">${String(ts%60).padStart(2,'0')}</div><div class="cd-lbl">שניות</div></div>
    </div>
  </div>`;

  // Smart date label helper
  const smartDateLabel=(dateStr)=>{
    const d=new Date(dateStr);
    const today=new Date(TD);
    const diff=Math.round((d-today)/86400000);
    const dayNames=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
    const monthNames=['ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
    const dayName=dayNames[d.getDay()];
    const dayNum=d.getDate();
    const monthName=monthNames[d.getMonth()];
    if(diff===0)return{main:'היום',sub:`יום ${dayName} · ${dayNum} ${monthName}`,isToday:true,isPast:false};
    if(diff===1)return{main:'מחר',sub:`יום ${dayName} · ${dayNum} ${monthName}`,isToday:false,isPast:false};
    if(diff===-1)return{main:'אתמול',sub:`יום ${dayName} · ${dayNum} ${monthName}`,isToday:false,isPast:true};
    if(diff>=2&&diff<=6)return{main:`יום ${dayName}`,sub:`עוד ${diff} ימים · ${dayNum} ${monthName}`,isToday:false,isPast:false};
    if(diff>6&&diff<=13)return{main:`שבוע הבא`,sub:`יום ${dayName} · ${dayNum} ${monthName}`,isToday:false,isPast:false};
    return{main:`${dayNum} ${monthName}`,sub:`יום ${dayName}`,isToday:false,isPast:diff<0};
  };

  // Group all by date
  const byDate={};
  upcoming.forEach(a=>{
    if(!byDate[a.date])byDate[a.date]=[];
    byDate[a.date].push(a);
  });

  const dateGroups=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,appts])=>{
    const dateInfo=smartDateLabel(date);
    const dayTotal=appts.reduce((s,a)=>s+(a.d.price?Number(a.d.price):0),0);
    const apptCount=appts.length;
    
    const rows=appts.map((a,i)=>{
      const isNext=a===next;
      const debtAmt=getDebtAmount(a.d.name);
      const cd=S.CL?.[a.d.phone||a.d.name]||{};
      const tags=getClientTags(a.d.name,a.d.phone);
      const hasNote=cd.notes&&cd.notes.trim();
      const isNewClient=tags.some(t=>t.label&&t.label.includes('חדש'));
      
      // Status determination
      let statusColor='#a78bfa'; // default purple
      let statusRing=false;
      if(a.d.paid)statusColor='#10b981'; // green = paid
      else if(debtAmt)statusColor='#ef4444'; // red = debt
      else if(isNewClient)statusColor='#f59e0b'; // amber = new
      if(isNext)statusRing=true;
      
      return`<div class="apt2${isNext?' apt2-next':''}${dateInfo.isToday?' apt2-today':''}">
        <div class="apt2-time-col">
          <div class="apt2-time">${a.time}</div>
          <div class="apt2-status-dot" style="background:${statusColor}${statusRing?';box-shadow:0 0 0 3px rgba(124,58,237,.15)':''}"></div>
          ${a.d.duration?`<div class="apt2-duration">${x(a.d.duration)}ד</div>`:''}
        </div>
        <div class="apt2-main">
          <div class="apt2-top">
            <div class="apt2-name-wrap">
              <div class="apt2-name">${x(a.d.name)}${isNext?' <span class="apt2-next-bolt">⚡</span>':''}</div>
              ${a.d.type?`<div class="apt2-type">${x(a.d.type)}</div>`:''}
            </div>
            ${a.d.price?`<div class="apt2-price-wrap">
              <div class="apt2-price${a.d.paid?' paid':''}">${a.d.paid?'✓ ':''}₪${Number(a.d.price).toLocaleString()}</div>
            </div>`:''}
          </div>
          ${(isNewClient||hasNote||debtAmt)?`<div class="apt2-badges">
            ${isNewClient?`<span class="apt2-badge new">✨ מטופלת חדשה</span>`:''}
            ${debtAmt?`<span class="apt2-badge debt">⚠️ חוב ₪${debtAmt.toLocaleString()}</span>`:''}
            ${hasNote?`<span class="apt2-badge note">📝 ${x(cd.notes.substring(0,24))}${cd.notes.length>24?'...':''}</span>`:''}
          </div>`:''}
          <div class="apt2-actions">
            ${contactBtns(a.d.phone,a.d.name,a.date+' '+a.time)}
            ${reminderBtn(a)}
            <button class="apt2-action-btn delete" onclick="if(confirm('למחוק תור?')){delete S.A['${a.date}']['${a.time}'];store.set('appts',S.A);render();}" title="מחיקה">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
          </div>
        </div>
      </div>`;
    }).join('');
    
    return`<div class="apt2-day-group${dateInfo.isToday?' today':''}">
      <div class="apt2-day-header">
        <div class="apt2-day-label">
          <span class="apt2-day-main${dateInfo.isToday?' today':''}">${dateInfo.main}</span>
          <span class="apt2-day-sub">${dateInfo.sub}</span>
        </div>
        <div class="apt2-day-stats">
          <span class="apt2-day-count">${apptCount} ${apptCount===1?'תור':'תורים'}</span>
          ${dayTotal>0?`<span class="apt2-day-total">₪${dayTotal.toLocaleString()}</span>`:''}
        </div>
      </div>
      <div class="apt2-day-items">${rows}</div>
    </div>`;
  }).join('');

  return timerHero+dateGroups;
}

function buildHistory(history){
  return history.length?history.map(a=>`<div class="hist-card"><div class="hist-time-pill">${a.time}</div><div class="hist-card-info"><div class="hist-card-name">${x(a.d.name)}</div><div class="hist-card-meta">${a.d.type?x(a.d.type):''}${a.d.price?' · ₪'+x(a.d.price):''}<br>📅 ${a.date}</div></div></div>`).join(''):`<div class="empty-state"><span class="empty-icon">🗂️</span>אין היסטוריה</div>`;
}
// ── Expenses Functions ──────────────────────────────
const EXP_CATS={
  supplies:{i:'🧴',l:'ציוד',c:'#ea580c'},
  rent:{i:'🏢',l:'שכירות',c:'#7c3aed'},
  marketing:{i:'📢',l:'שיווק',c:'#0891b2'},
  utilities:{i:'💡',l:'חשמל/מים',c:'#eab308'},
  vendors:{i:'🚚',l:'ספקים',c:'#db2777'},
  tax:{i:'📋',l:'מיסים',c:'#dc2626'},
  car:{i:'🚗',l:'רכב',c:'#059669'},
  other:{i:'💼',l:'אחר',c:'#6b7280'}
};
function todayISO(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function saveExpense(){
  const a=document.getElementById('exp-amt'),d=document.getElementById('exp-desc'),v=document.getElementById('exp-vendor'),dt=document.getElementById('exp-date');
  const amt=Number(a?.value||0);
  if(!amt||amt<=0){a?.focus();a&&(a.style.borderColor='#dc2626');return;}
  const desc=(d?.value||'').trim();
  if(!desc){d?.focus();d&&(d.style.borderColor='#dc2626');return;}
  const date=dt?.value||todayISO();
  const key=S.editExpKey||('e_'+Date.now()+'_'+Math.random().toString(36).substr(2,5));
  S.EXP[key]={amount:amt,category:S.newExp.category||'other',description:desc,vendor:(v?.value||'').trim(),date,recurring:!!S.newExp.recurring,updated:Date.now()};
  store.set('expenses',S.EXP);
  S.showAddExp=false;S.editExpKey=null;
  S.newExp={amount:"",category:"supplies",description:"",vendor:"",date:"",recurring:false};
  hRender();
}
function deleteExpense(key){
  if(!confirm('למחוק את ההוצאה?'))return;
  if(S.EXP&&S.EXP[key])delete S.EXP[key];
  store.set('expenses',S.EXP||{});
  S.editExpKey=null;
  hRender();
}
function editExpense(key){
  const e=S.EXP[key];if(!e)return;
  S.editExpKey=key;
  S.newExp={amount:e.amount,category:e.category||'other',description:e.description||'',vendor:e.vendor||'',date:e.date||todayISO(),recurring:!!e.recurring};
  S.showAddExp=true;
  hRender();
}
function toggleExpRecurring(){S.newExp.recurring=!S.newExp.recurring;hRender();}
function setExpCat(c){S.newExp.category=c;hRender();}
function openExpForm(){
  S.showAddExp=true;S.editExpKey=null;
  S.newExp={amount:"",category:"supplies",description:"",vendor:"",date:todayISO(),recurring:false};
  hRender();
}
function closeExpForm(){S.showAddExp=false;S.editExpKey=null;hRender();}
function duplicateRecurring(){
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  const pm=new Date(n.getFullYear(),n.getMonth()-1,1);
  const pmk=pm.getFullYear()+'-'+String(pm.getMonth()+1).padStart(2,'0');
  const prevRecurring=Object.values(S.EXP||{}).filter(e=>e.recurring&&e.date&&e.date.startsWith(pmk));
  const currMonthDescs=new Set(Object.values(S.EXP||{}).filter(e=>e.date&&e.date.startsWith(mk)).map(e=>(e.description||'').trim()));
  const missing=prevRecurring.filter(e=>!currMonthDescs.has((e.description||'').trim()));
  if(!missing.length){alert('אין הוצאות חוזרות חסרות לחודש הזה');return;}
  const total=missing.reduce((s,e)=>s+Number(e.amount||0),0);
  if(!confirm(`לשכפל ${missing.length} הוצאות חוזרות לחודש הנוכחי?\nסה"כ: ₪${total.toLocaleString()}\n\n(התאריך יוגדר ל-1 בחודש הנוכחי, תוכל לערוך אחר כך)`))return;
  const firstDay=mk+'-01';
  missing.forEach(e=>{
    const key='e_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    S.EXP[key]={amount:Number(e.amount)||0,category:e.category||'other',description:e.description||'',vendor:e.vendor||'',date:firstDay,recurring:true,updated:Date.now()};
  });
  store.set('expenses',S.EXP);
  hRender();
}

function renderExpenses(all){
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'),yk=String(n.getFullYear());
  // Previous month key
  const pm=new Date(n.getFullYear(),n.getMonth()-1,1);
  const pmk=pm.getFullYear()+'-'+String(pm.getMonth()+1).padStart(2,'0');
  const pmLbl=MO[pm.getMonth()];
  
  const expArr=Object.entries(S.EXP||{}).map(([k,e])=>({k,...e,dt:e.date?new Date(e.date):new Date(0)})).sort((a,b)=>b.dt-a.dt);
  
  // Income calculations
  const incMonth=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);
  const incYear=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(yk)).reduce((s,a)=>s+Number(a.d.price),0);
  const incTotal=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0).reduce((s,a)=>s+Number(a.d.price),0);
  const incPrevMonth=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(pmk)).reduce((s,a)=>s+Number(a.d.price),0);
  
  // Expense calculations
  const expMonth=expArr.filter(e=>e.date&&e.date.startsWith(mk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const expYear=expArr.filter(e=>e.date&&e.date.startsWith(yk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const expTotal=expArr.reduce((s,e)=>s+Number(e.amount||0),0);
  const expPrevMonth=expArr.filter(e=>e.date&&e.date.startsWith(pmk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const recurCount=expArr.filter(e=>e.recurring).length;
  
  // Recurring expenses from previous month (for forecast + duplicate)
  const prevRecurring=expArr.filter(e=>e.recurring&&e.date&&e.date.startsWith(pmk));
  const prevRecurringSum=prevRecurring.reduce((s,e)=>s+Number(e.amount||0),0);
  
  // Check if current month already has recurring duplicates from prev month
  const currMonthDescs=new Set(expArr.filter(e=>e.date&&e.date.startsWith(mk)).map(e=>(e.description||'').trim()));
  const missingRecurring=prevRecurring.filter(e=>!currMonthDescs.has((e.description||'').trim()));
  
  // Month filter options
  const months=['הכל'],mkeys=[];
  expArr.forEach(e=>{if(!e.date)return;const k=e.date.substring(0,7);if(!mkeys.includes(k)){mkeys.push(k);const[y,m]=k.split('-');months.push(MO[Number(m)-1]+' '+y);}});
  const filtered=S.expFilter==='all'?expArr:expArr.filter(e=>{if(!e.date)return false;const[y,m]=e.date.split('-');return MO[Number(m)-1]+' '+y===S.expFilter;});
  
  // Category breakdown (for filtered period)
  const catTotals={};
  filtered.forEach(e=>{const c=e.category||'other';catTotals[c]=(catTotals[c]||0)+Number(e.amount||0);});
  const totalFiltered=Object.values(catTotals).reduce((s,v)=>s+v,0);
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  
  // Delta calculations (this month vs previous)
  let expDeltaPct=null,expDeltaDir='',expDeltaCls='';
  if(expPrevMonth>0){
    expDeltaPct=Math.round((expMonth-expPrevMonth)/expPrevMonth*100);
    expDeltaDir=expDeltaPct>0?'↑':expDeltaPct<0?'↓':'=';
    // Higher expenses = bad (red), lower = good (green)
    expDeltaCls=expDeltaPct>5?'bad':expDeltaPct<-5?'good':'neutral';
  }
  
  // Hero - big orange expense card with delta
  const deltaBadge=expDeltaPct!==null?`<div class="exp-delta ${expDeltaCls}">${expDeltaDir} ${Math.abs(expDeltaPct)}% מ${pmLbl}</div>`:'';
  const hero=`<div class="exp-hero">
    <div class="exp-hero-lbl">💸 הוצאות ${MO[n.getMonth()]} ${n.getFullYear()}</div>
    <div class="exp-hero-val">₪${expMonth.toLocaleString()}</div>
    ${deltaBadge}
    <div class="exp-hero-stats">
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">₪${expYear.toLocaleString()}</div><div class="exp-hero-stat-l">השנה</div></div>
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">${expArr.length}</div><div class="exp-hero-stat-l">רישומים</div></div>
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">${recurCount}</div><div class="exp-hero-stat-l">חוזרות</div></div>
    </div>
  </div>`;
  
  // Profit card - THE MOST IMPORTANT VIEW
  const netMonth=incMonth-expMonth,netYear=incYear-expYear;
  const netPrevMonth=incPrevMonth-expPrevMonth;
  let netDeltaTxt='';
  if(netPrevMonth!==0){
    const diff=netMonth-netPrevMonth;
    const arrow=diff>0?'↑':diff<0?'↓':'=';
    const cls=diff>0?'good':diff<0?'bad':'';
    netDeltaTxt=`<div class="profit-delta ${cls}">${arrow} ${diff>=0?'+':''}₪${Math.abs(diff).toLocaleString()} מ${pmLbl}</div>`;
  }
  const profit=`<div class="profit-card">
    <div class="profit-cell"><div class="profit-cell-lbl">הכנסות ${MO[n.getMonth()].substring(0,4)}</div><div class="profit-cell-val in">₪${incMonth.toLocaleString()}</div></div>
    <div class="profit-cell"><div class="profit-cell-lbl">הוצאות ${MO[n.getMonth()].substring(0,4)}</div><div class="profit-cell-val out">₪${expMonth.toLocaleString()}</div></div>
    <div class="profit-cell"><div class="profit-cell-lbl">רווח נטו</div><div class="profit-cell-val net${netMonth<0?' neg':''}">${netMonth<0?'-':''}₪${Math.abs(netMonth).toLocaleString()}</div>${netDeltaTxt}</div>
  </div>`;
  
  // Forecast / recurring reminder
  let forecast='';
  if(missingRecurring.length>0){
    const projectedExp=expMonth+prevRecurringSum-prevRecurring.filter(e=>currMonthDescs.has((e.description||'').trim())).reduce((s,e)=>s+Number(e.amount||0),0);
    const projectedNet=incMonth-projectedExp;
    forecast=`<div class="exp-forecast">
      <div class="exp-forecast-top">
        <div class="exp-forecast-title">🔄 הוצאות חוזרות ממתינות</div>
        <button class="exp-forecast-btn" onclick="duplicateRecurring()">📋 שכפל הכל</button>
      </div>
      <div class="exp-forecast-sub">${missingRecurring.length} הוצאות חוזרות מ${pmLbl} לא הוזנו עדיין (סה"כ ₪${missingRecurring.reduce((s,e)=>s+Number(e.amount||0),0).toLocaleString()})</div>
      <div class="exp-forecast-list">${missingRecurring.slice(0,4).map(e=>{const info=EXP_CATS[e.category]||EXP_CATS.other;return`<div class="exp-forecast-item">${info.i} ${x(e.description)} · <b>₪${Number(e.amount).toLocaleString()}</b></div>`;}).join('')}${missingRecurring.length>4?`<div class="exp-forecast-item" style="color:#9ca3af">+${missingRecurring.length-4} נוספות...</div>`:''}</div>
    </div>`;
  }
  
  // Category breakdown bars
  let catBreakdown='';
  if(catSorted.length){
    const maxVal=catSorted[0][1]||1;
    catBreakdown=`<div class="exp-cat-bar"><div style="font-size:11px;font-weight:800;color:#9a3412;margin-bottom:10px;letter-spacing:.5px;text-align:right">📊 פילוח לפי קטגוריה</div>`+
      catSorted.map(([c,v])=>{const info=EXP_CATS[c]||EXP_CATS.other,pct=Math.round(v/maxVal*100),pctTotal=totalFiltered?Math.round(v/totalFiltered*100):0;return`<div class="exp-cat-row"><div class="exp-cat-ico">${info.i}</div><div class="exp-cat-name">${info.l}</div><div class="exp-cat-track"><div class="exp-cat-fill" style="width:${pct}%;background:linear-gradient(90deg,${info.c},${info.c})"></div></div><div class="exp-cat-amt">₪${v.toLocaleString()} ·${pctTotal}%</div></div>`;}).join('')+
      `</div>`;
  }
  
  // Add/Edit form
  const isEdit=!!S.editExpKey;
  const form=S.showAddExp?`<div class="exp-form">
    <div class="exp-form-ttl">${isEdit?'✏️ עריכת הוצאה':'➕ הוצאה חדשה'}<button onclick="closeExpForm()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9a3412;padding:0">✕</button></div>
    <input class="exp-inp" id="exp-amt" type="number" inputmode="numeric" placeholder="סכום ₪ *" value="${S.newExp.amount||''}">
    <input class="exp-inp" id="exp-desc" placeholder="תיאור ההוצאה *" value="${x(S.newExp.description||'')}">
    <input class="exp-inp" id="exp-vendor" placeholder="ספק/חנות (לא חובה)" value="${x(S.newExp.vendor||'')}">
    <input class="exp-inp" id="exp-date" type="date" value="${S.newExp.date||todayISO()}">
    <div style="font-size:11px;color:#9a3412;margin:10px 0 6px;text-align:right;font-weight:700">קטגוריה:</div>
    <div class="exp-cat-grid">${Object.entries(EXP_CATS).map(([k,v])=>`<button class="exp-cat-btn${S.newExp.category===k?' on':''}" onclick="setExpCat('${k}')"><span class="exp-cat-btn-i">${v.i}</span>${v.l}</button>`).join('')}</div>
    <div class="exp-recur${S.newExp.recurring?' on':''}" onclick="toggleExpRecurring()"><div class="exp-recur-chk">${S.newExp.recurring?'✓':''}</div><span>🔄 הוצאה חוזרת (שכירות, חשמל וכו')</span></div>
    <div class="exp-form-btns">
      <button class="exp-btn-cancel" onclick="closeExpForm()">ביטול</button>
      <button class="exp-btn-save" onclick="saveExpense()">💾 ${isEdit?'עדכן':'שמור'}</button>
    </div>
  </div>`:`<button class="exp-add-btn" onclick="openExpForm()">➕ הוסף הוצאה חדשה</button>`;
  
  // Month filter
  const filterBar=months.length>1?`<div class="pay-filter" style="margin-bottom:10px">${months.map(m=>`<button class="pay-filter-btn${S.expFilter===(m==='הכל'?'all':m)?' on':''}" onclick="S.expFilter='${m==='הכל'?'all':m}';hRender()" style="${S.expFilter===(m==='הכל'?'all':m)?'background:#ea580c;border-color:#ea580c':''}">${m}</button>`).join('')}</div>`:'';
  
  // Empty state
  if(!expArr.length){
    return hero+profit+form+`<div class="exp-empty"><span class="exp-empty-i">💸</span><div class="exp-empty-t">אין עדיין הוצאות</div><div class="exp-empty-s">הוסף הוצאות עסק כדי לראות רווח נטו,<br>פילוח לפי קטגוריה, וכמה כסף הולך לאן</div></div>`;
  }
  
  // Group by month
  const byMonth={};
  filtered.forEach(e=>{if(!e.date)return;const[y,m]=e.date.split('-');const key=MO[Number(m)-1]+' '+y;if(!byMonth[key])byMonth[key]=[];byMonth[key].push(e);});
  
  const rows=Object.entries(byMonth).map(([mo,items])=>{
    const mt=items.reduce((s,e)=>s+Number(e.amount||0),0);
    return`<div class="exp-month-hdr"><span>₪${mt.toLocaleString()}</span><span>${mo}</span></div>`+items.map(e=>{
      const info=EXP_CATS[e.category]||EXP_CATS.other;
      const dateDisp=e.date?e.date.split('-').reverse().join('/'):'';
      return`<div class="exp-row${e.recurring?' recurring':''}">
        <div class="exp-row-top">
          <div class="exp-row-left">
            <div class="exp-row-desc">${x(e.description||'')}</div>
            <div class="exp-row-meta">
              <span class="exp-row-pill">${info.i} ${info.l}</span>
              ${e.recurring?'<span class="exp-row-pill recur">🔄 חוזרת</span>':''}
              ${e.vendor?'<span>· '+x(e.vendor)+'</span>':''}
            </div>
            <div class="exp-row-date">📅 ${dateDisp}</div>
          </div>
          <div class="exp-row-amt${e.recurring?' recurring':''}">₪${Number(e.amount).toLocaleString()}</div>
        </div>
        <div class="exp-row-actions">
          <button class="edit" onclick="editExpense('${e.k}')">✏️ עריכה</button>
          <button class="del" onclick="deleteExpense('${e.k}')">🗑 מחק</button>
        </div>
      </div>`;
    }).join('');
  }).join('');
  
  return hero+profit+forecast+catBreakdown+form+filterBar+rows;
}

function renderPayments(all){
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  const paid=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0).sort((a,b)=>b.dt-a.dt);
  if(!paid.length)return`<div class="empty-state"><span class="empty-icon">💰</span>אין תשלומים עדיין</div>`;

function toggleArea(k,id){

  if(id==='full_body'){

async function deleteClient(k){
  if(!k){webToast('שגיאה: מזהה מטופל חסר',true);return;}
  const cd=(S.CL&&S.CL[k])||{};
  // נסה למצוא שם/טלפון גם דרך התורים אם אין ב-CL
  let name=cd.name||'';
  let phone=cd.phone||'';
  if(!name && S.A){
    outer:for(const date in S.A){
      for(const time in (S.A[date]||{})){
        const d=S.A[date][time];
        if(!d)continue;
        const dKey=d.phone||d.name;
        if(dKey===k){name=d.name||name;phone=d.phone||phone;break outer;}
      }
    }
  }
  const displayName=name||k||'מטופל זה';
  webConfirm(`למחוק את "${displayName}"?\nכל התורים וההיסטוריה יימחקו.\nלא ניתן לבטל.`,async()=>{
    try{
      // 1. מחק מ-S.CL
      if(S.CL&&S.CL[k])delete S.CL[k];
      if(S.CL){
        if(phone&&S.CL[phone])delete S.CL[phone];
        if(name&&S.CL[name])delete S.CL[name];
      }
      // 2. מחק תורים שקשורים למטופל
      if(S.A){
        for(const date of Object.keys(S.A)){
          for(const time of Object.keys(S.A[date]||{})){
            const d=S.A[date][time];
            if(!d)continue;
            const match=(phone&&d.phone===phone)||(name&&d.name===name)||(d.phone===k)||(d.name===k);
            if(match)delete S.A[date][time];
          }
          if(Object.keys(S.A[date]||{}).length===0)delete S.A[date];
        }
      }
      // 3. שמירה SYNCRONIC אמיתית ל-Firebase (לא דרך store.set שלא מחכה)
      const token=await auth.getToken();
      if(!token){webToast('❌ אין חיבור ל-Firebase',true);return;}
      // localStorage
      try{localStorage.setItem('hodaya_clients',JSON.stringify(S.CL||{}));}catch(e){}
      try{localStorage.setItem('hodaya_appts',JSON.stringify(S.A||{}));}catch(e){}
      // Firebase — PUT עם await אמיתי
      const putOptions={method:'PUT',headers:{'Content-Type':'application/json'}};
      const [r1,r2]=await Promise.all([
        fetch(FB+'/clients.json?auth='+encodeURIComponent(token),{...putOptions,body:JSON.stringify(S.CL||{})}),
        fetch(FB+'/appts.json?auth='+encodeURIComponent(token),{...putOptions,body:JSON.stringify(S.A||{})})
      ]);
      if(!r1.ok||!r2.ok){
        webToast('⚠️ שגיאת שמירה — נסה שוב',true);
        return;
      }
      // 4. ניקוי UI
      S.openClient=null;S.editClient=false;
      crmRender();
      webToast('✅ המטופל נמחק לצמיתות');
    }catch(e){
      webToast('❌ שגיאה: '+(e.message||e),true);
    }
  });
}

  return`<button class="hist-tab${S.histTab==='upcoming'?' on':''}" onclick="S.histTab='upcoming';hRender()">📅 תורים ${upcoming.length?`<span class="hist-badge" style="background:#059669">${upcoming.length}</span>`:''}</button><button class="hist-tab${S.histTab==='clients'?' on':''}" onclick="S.histTab='clients';hRender()">👥 מטופלות</button><button class="hist-tab${S.histTab==='debts'?' on':''}" onclick="S.histTab='debts';hRender()">💳 חובות ${debtCount?`<span class="hist-badge" style="background:#dc2626">${debtCount}</span>`:''}</button><button class="hist-tab${S.histTab==='history'?' on':''}" onclick="S.histTab='history';hRender()">🗂 היסטוריית עסקאות ${history.length?`<span class="hist-badge" style="background:#7c3aed">${history.length}</span>`:''}</button><button class="hist-tab${S.histTab==='cancellations'?' on':''}" onclick="S.histTab='cancellations';hRender()">❌ ביטולים ${cancCount?`<span class="hist-badge" style="background:#dc2626">${cancCount}</span>`:''}</button><button class="hist-tab${S.histTab==='payments'?' on':''}" onclick="S.histTab='payments';hRender()">💰 תשלומים</button><button class="hist-tab${S.histTab==='expenses'?' on':''}" onclick="S.histTab='expenses';hRender()">💸 הוצאות ${expCount?`<span class="hist-badge" style="background:#ea580c">${expCount}</span>`:''}</button><button class="hist-tab${S.histTab==='bgoals'?' on':''}" onclick="S.histTab='bgoals';hRender()">🎯 יעדים</button><button class="hist-tab${S.histTab==='packages'?' on':''}" onclick="S.histTab='packages';hRender()">📦 חבילות ${pkgCount?`<span class="hist-badge" style="background:#0891b2">${pkgCount}</span>`:''}</button><button class="hist-tab${S.histTab==='promo'?' on':''}" onclick="S.histTab='promo';hRender()">📢 איפה לפרסם <span class="hist-badge" style="background:#0891b2">מתעדכן</span></button><button class="hist-tab${S.histTab==='website'?' on':''}" onclick="S.histTab='website';hRender()">🌐 האתר</button><button class="hist-tab${S.histTab==='advisor'?' on':''}" onclick="S.histTab='advisor';hRender()" style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#78350f;font-weight:900;border:1.5px solid #f59e0b">🤖 יועץ AI <span class="hist-badge" style="background:#f59e0b">חדש</span></button>`;
}
function hRender(){
  const sheet=document.querySelector('.hist-sheet');
  if(!sheet){render();return;}
  const n=new Date(),all2=allAppts(),upcoming=all2.filter(a=>a.dt>n),history=all2.filter(a=>a.dt<=n).reverse();
  const sub=sheet.querySelector('.hist-hdr-sub');if(sub)sub.textContent=upcoming.length+' קרובים · '+history.length+' בהיסטוריה';
  const tabsEl=sheet.querySelector('.hist-tabs');if(tabsEl)tabsEl.innerHTML=tabsHTML(upcoming,history);
  const content=sheet.querySelector('.hist-content');if(!content)return;
  if(S.histTab==='upcoming'){content.innerHTML=buildUpcoming(upcoming);setTimeout(()=>{if(document.getElementById('cd-d'))startTimer();},60);}
  else if(S.histTab==='history')content.innerHTML=buildHistory(history);
  else if(S.histTab==='payments')content.innerHTML=renderPayments(all2);
  else if(S.histTab==='expenses')content.innerHTML=renderExpenses(all2);
  else if(S.histTab==='bgoals')content.innerHTML=renderBGoals(all2);
  else if(S.histTab==='packages')content.innerHTML=renderPackages();
  else if(S.histTab==='promo')content.innerHTML=renderPromoTab();
  else if(S.histTab==='website')content.innerHTML=renderWebsiteTab();
  else if(S.histTab==='debts')content.innerHTML=renderDebts();
  else if(S.histTab==='cancellations')content.innerHTML=renderCancellations();
  else if(S.histTab==='advisor')content.innerHTML=renderAdvisor();
  else if(S.histTab==='clients')content.innerHTML=renderCRM();
}
function renderHistory(){
  const n=new Date(),all2=allAppts(),upcoming=all2.filter(a=>a.dt>n),history=all2.filter(a=>a.dt<=n).reverse();
  let tabContent='';
  if(S.histTab==='upcoming')tabContent=buildUpcoming(upcoming);
  else if(S.histTab==='history')tabContent=buildHistory(history);
  else if(S.histTab==='payments')tabContent=renderPayments(all2);
  else if(S.histTab==='expenses')tabContent=renderExpenses(all2);
  else if(S.histTab==='bgoals')tabContent=renderBGoals(all2);
  else if(S.histTab==='packages')tabContent=renderPackages();
  else if(S.histTab==='promo')tabContent=renderPromoTab();
  else if(S.histTab==='website')tabContent=renderWebsiteTab();
  else if(S.histTab==='debts')tabContent=renderDebts();
  else if(S.histTab==='cancellations')tabContent=renderCancellations();
  else if(S.histTab==='advisor')tabContent=renderAdvisor();
  else tabContent=renderCRM();
  const html=`<div class="hist-sheet"><div class="hist-hdr"><button class="hist-close" onclick="closeHistPanel()">✕</button><div class="hist-hdr-info"><div class="hist-hdr-title">📋 ניהול תורים ומטופלות</div><div class="hist-hdr-sub">${upcoming.length} קרובים · ${history.length} בהיסטוריה</div></div></div><div class="hist-tabs">${tabsHTML(upcoming,history)}</div><div class="hist-content">${tabContent}</div></div>`;
  setTimeout(()=>{if(S.histTab==='upcoming'&&document.getElementById('cd-d'))startTimer();},80);
  return html;
}
function renderCancellations(){
  const cancs=Object.entries(S.CANC||{}).sort((a,b)=>b[1].created.localeCompare(a[1].created));
  if(!cancs.length)return`<div class="empty-state"><span class="empty-icon">✅</span>אין ביטולים רשומים<br><span style="font-size:13px">מעולה!</span></div>`;
  const total=cancs.length;
  const lostRev=cancs.filter(([,c])=>c.price&&Number(c.price)>0).reduce((s,[,c])=>s+Number(c.price),0);
  const byReason={client:0,noshow:0,me:0,other:0};
  cancs.forEach(([,c])=>{if(byReason[c.reason]!==undefined)byReason[c.reason]++;else byReason.other++;});
  const reasonLabel={client:'ביטל המטופל',noshow:'לא הגיע',me:'ביטלתי',other:'אחר'};
  const reasonCls={client:'client',noshow:'noshow',me:'me',other:''};
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  const monthCancs=cancs.filter(([,c])=>c.date&&c.date.startsWith(mk)).length;
  return`<div class="canc-summary">
    <div class="canc-stat full"><div class="canc-stat-val">${total} ביטולים</div><div class="canc-stat-lbl">₪${lostRev.toLocaleString()} הכנסות שנפסדו</div></div>
    <div class="canc-stat"><div class="canc-stat-val" style="color:#dc2626">${monthCancs}</div><div class="canc-stat-lbl">החודש</div></div>
    <div class="canc-stat"><div class="canc-stat-val" style="color:#c2410c">${byReason.noshow}</div><div class="canc-stat-lbl">לא הגיעו</div></div>
    <div class="canc-stat"><div class="canc-stat-val" style="color:#7c3aed">${byReason.me}</div><div class="canc-stat-lbl">ביטלתי אני</div></div>
    <div class="canc-stat"><div class="canc-stat-val" style="color:#dc2626">${byReason.client}</div><div class="canc-stat-lbl">ביטל המטופל</div></div>
  </div>
  <div class="section-lbl">רשימת ביטולים</div>
  ${cancs.map(([id,c])=>`<div class="canc-card ${c.reason==='noshow'?'noshow':c.reason==='me'?'me':''}">
    <div class="canc-card-top">
      <span class="canc-card-reason ${reasonCls[c.reason]||''}">${reasonLabel[c.reason]||'אחר'}</span>
      <div class="canc-card-name">${x(c.name||'לא ידוע')}</div>
    </div>
    <div class="canc-card-meta">${c.type?x(c.type):''}${c.price?' · ₪'+x(c.price):''}${c.phone?' · '+x(c.phone):''}</div>
    <div class="canc-card-date">📅 ${c.date||''} 🕐 ${c.time||''}</div>
  </div>`).join('')}`;
}

// ── Month / Year Pickers ─────────────────────────────
function openMonthPicker(color,y,m){
  // Build month picker overlay
  const apptMonths=new Set(Object.keys(S.A||{}).map(k=>k.substring(0,7)));
  const nowM=new Date().getMonth()+1,nowY=new Date().getFullYear();
  let html=`<div class="picker-overlay" id="mo-picker" onclick="if(event.target.id==='mo-picker')document.getElementById('mo-picker').remove()">
  <div class="picker-sheet">
    <div class="picker-hdr">
      <span class="picker-title">בחר חודש — ${y}</span>
      <button class="picker-close" onclick="document.getElementById('mo-picker').remove()">✕</button>
    </div>
    <div class="months-picker-grid">`;
  for(let i=1;i<=12;i++){
    const mk=y+'-'+String(i).padStart(2,'0');
    const has=apptMonths.has(mk);
    const isSel=i===m;
    const isNow=i===nowM&&y===nowY;
    const cls=isSel?'sel':has?'has':isNow?'today':'empty';
    html+=`<button class="mo-pick-btn ${cls}" onclick="ncPick('${color}',${y},${i});document.getElementById('mo-picker').remove()">${MO[i-1]}</button>`;
  }
  html+=`</div></div></div>`;
  const el=document.createElement('div');el.innerHTML=html;document.body.appendChild(el.firstChild);
}
function openYearPicker(color,y,m){
  const apptYears=new Set(Object.keys(S.A||{}).map(k=>k.substring(0,4)));
  const nowY=new Date().getFullYear();
  const years=[];
  for(let yr=nowY-2;yr<=nowY+5;yr++)years.push(yr);
  let html=`<div class="picker-overlay" id="yr-picker" onclick="if(event.target.id==='yr-picker')document.getElementById('yr-picker').remove()">
  <div class="picker-sheet">
    <div class="picker-hdr">
      <span class="picker-title">בחר שנה</span>
      <button class="picker-close" onclick="document.getElementById('yr-picker').remove()">✕</button>
    </div>
    <div class="years-picker-list">`;
  years.forEach(yr=>{
    const has=apptYears.has(String(yr));
    const count=has?Object.keys(S.A||{}).filter(k=>k.startsWith(String(yr))).length:0;
    html+=`<button class="yr-pick-btn${yr===y?' sel':''}" onclick="ncPick('${color}',${yr},${m});document.getElementById('yr-picker').remove()">
      <span>${yr===nowY?'📅 '+yr:yr}</span>
      ${count?`<span class="yr-count">${count} תורים</span>`:'<span class="yr-count" style="color:#e5e7eb">ריק</span>'}
    </button>`;
  });
  html+=`</div></div></div>`;
  const el=document.createElement('div');el.innerHTML=html;document.body.appendChild(el.firstChild);
}
function ncPick(color,y,m){
  if(color==="#7c3aed"){S.lY=y;S.lM=m;S.lSel=TD;}
  else if(color==="#3b82f6"){S.dY=y;S.dM=m;}
  else if(color==="#db2777"){S.rY=y;S.rM=m;}
  else if(color==="#0891b2"){S.moveY=y;S.moveM=m;}
  else{S.tY=y;S.tM=m;}
  const dc=document.querySelector('#diary-content');
  if(dc&&S.screen==='diary'){diaryRender();}
  else if(S.screen==='daniel'||S.screen==='rinat'){const p=document.querySelector('#personal-content');if(p)p.innerHTML=personalPanel(S.screen);}
  else render();
}

// ═══ 🤖 AI Advisor — מנתח את העסק ונותן תובנות  ═══
// ═══════════════════════════════════════════════════════

// Analyze the business data and extract actionable insights
function advisorAnalyze(){
  const n=new Date();
  const all=allAppts();
  const insights=[];
  
  // ══ 1. Client retention — clients who haven't come back ══
  const clientVisits={};
  all.filter(a=>a.dt<n).forEach(a=>{
    const name=a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit){
      clientVisits[name].lastVisit=a.dt;
    }
    if(a.paid&&Number(a.price)>0)clientVisits[name].totalPaid+=Number(a.price);
  });
  
  const lostClients=Object.entries(clientVisits).filter(([name,v])=>{
    const daysSince=(n-v.lastVisit)/(1000*60*60*24);
    return daysSince>60&&daysSince<180&&v.count>=2; // was regular, 2-6 months gone
  }).sort((a,b)=>b[1].totalPaid-a[1].totalPaid).slice(0,5);
  
  if(lostClients.length>=2){
    insights.push({
      priority:'high',
      icon:'🎯',
      title:`${lostClients.length} מטופלות קבועות "נעלמו" — הן שווה זהב`,
      body:`זיהיתי ${lostClients.length} מטופלות שהגיעו לפחות פעמיים, אבל לא חזרו כבר חודשיים-חצי שנה. לפי הנתונים הן שילמו סה"כ ${lostClients.reduce((s,[,v])=>s+v.totalPaid,0).toLocaleString('he-IL')} ₪ — זה כסף שמפספסים.`,
      action:`השבוע: שלחי להן הודעת WhatsApp אישית — לא שיווקית. משהו כמו "היי ${lostClients[0][0]}, שמתי לב שמזמן לא נפגשנו! אני מחדשת את ה[טיפול האחרון שלה] בהנחה של 15% לשבוע הקרוב. אשמח לראות אותך". זה ממיר 30-40% מהמטופלות שחזרו.`,
      details:lostClients.map(([name,v])=>{
        const daysSince=Math.floor((n-v.lastVisit)/(1000*60*60*24));
        return `• ${name} — ${v.count} ביקורים · ${v.totalPaid.toLocaleString('he-IL')} ₪ · נעדרת ${daysSince} ימים`;
      }).join('\n')
    });
  }
  
  // ══ 2. Cancellation rate ══
  const cancs=Object.entries(S.CANC||{});
  const last30days=cancs.filter(([k,c])=>{
    const d=new Date(c.created);
    return (n-d)<30*24*60*60*1000;
  });
  const last30Appts=all.filter(a=>(n-a.dt)<30*24*60*60*1000&&a.dt<n);
  const cancRate=last30Appts.length>0?(last30days.length/(last30Appts.length+last30days.length))*100:0;
  
  if(cancRate>=10){
    // Analyze WHY
    const reasons={};
    last30days.forEach(([,c])=>{
      const r=c.reason||'לא צוין';
      reasons[r]=(reasons[r]||0)+1;
    });
    const topReason=Object.entries(reasons).sort((a,b)=>b[1]-a[1])[0];
    insights.push({
      priority:cancRate>=20?'high':'medium',
      icon:'⚠️',
      title:`${cancRate.toFixed(0)}% ביטולים בחודש האחרון — גבוה מהממוצע`,
      body:`בחודש האחרון היו ${last30days.length} ביטולים מתוך ${last30Appts.length+last30days.length} תורים. הממוצע בתחום הוא 5-8%, את נמצאת על ${cancRate.toFixed(0)}%. ${topReason?`הסיבה הנפוצה: "${topReason[0]}" (${topReason[1]} פעמים).`:''}`,
      action:`פתרון פשוט: הכניסי <b>אישור תור ב-WhatsApp יום לפני</b>. רוב המטופלות שבאמת רצו לבטל — יבטלו ביום שלפני במקום לפספס. ככה תוכלי למלא את המקום. אם את עוד לא עושה, תכניסי בטופס רישום שדה "מי מתחייבת" — מטופלות שחתמו על התחייבות בטלים ב-60% פחות.`
    });
  }
  
  // ══ 3. Outstanding debts ══
  let totalDebt=0;
  const debtClients=[];
  Object.entries(S.DEBTS||{}).forEach(([name,d])=>{
    if(d.amount>0){
      totalDebt+=d.amount;
      debtClients.push({name,amount:d.amount,since:d.since});
    }
  });
  
  if(totalDebt>500){
    const oldDebts=debtClients.filter(d=>{
      if(!d.since)return false;
      return (n-new Date(d.since))>60*24*60*60*1000; // over 2 months
    });
    insights.push({
      priority:totalDebt>2000?'high':'medium',
      icon:'💳',
      title:`${totalDebt.toLocaleString('he-IL')} ₪ חובות פתוחים${oldDebts.length?` · ${oldDebts.length} מעל חודשיים`:''}`,
      body:`יש לך ${debtClients.length} מטופלות עם חובות — סה"כ ${totalDebt.toLocaleString('he-IL')} ₪. ${oldDebts.length?`מתוכן ${oldDebts.length} חייבות מעל חודשיים (${oldDebts.reduce((s,d)=>s+d.amount,0).toLocaleString('he-IL')} ₪) — לרוב חוב מתיישן יותר קשה לגבות.`:'רובן עדיין "טריים".'}`,
      action:`השבוע: שלחי תזכורת עדינה בווטסאפ למטופלות שחייבות מעל 30 יום. נוסח מוצע: "היי [שם], נשאר לך חיוב פתוח של X ₪ מהטיפול ב-[תאריך]. אם נוח לך, אפשר לסגור את זה בביט/מזומן בתור הבא או עכשיו בלינק: [לינק]". עדיף לא להמתין שייצברו — ואם כבר הצטברו חובות ישנים, שקלי להציע הסדר תשלומים של 2-3 פעמים.`
    });
  }
  
  // ══ 4. Weak days analysis ══
  const dayStats=[0,0,0,0,0,0,0]; // 0=Sunday...6=Saturday
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  all.filter(a=>a.dt<n&&(n-a.dt)<90*24*60*60*1000).forEach(a=>{
    dayStats[a.dt.getDay()]++;
  });
  const activeTotal=dayStats.reduce((s,v)=>s+v,0);
  if(activeTotal>=20){
    const workdays=dayStats.map((c,i)=>({day:i,count:c})).filter(d=>d.day!==5&&d.day!==6); // exclude Fri/Sat
    const weakest=workdays.sort((a,b)=>a.count-b.count)[0];
    const strongest=workdays.sort((a,b)=>b.count-a.count)[0];
    if(strongest.count>0&&weakest.count<strongest.count*0.5){
      insights.push({
        priority:'medium',
        icon:'📅',
        title:`יום ${dayNames[weakest.day]} הכי חלש — חצי פחות מיום ${dayNames[strongest.day]}`,
        body:`ב-3 חודשים אחרונים: ${dayNames[strongest.day]} — ${strongest.count} תורים. ${dayNames[weakest.day]} — רק ${weakest.count}. יום חלש שחוזר על עצמו זה הזדמנות — המטופלות פשוט לא חושבות עליו.`,
        action:`הציעי "מבצע יום ${dayNames[weakest.day]}" — הנחה של 10-15% רק בימי ${dayNames[weakest.day]}. שווה לך להוריד מחיר מלקבל 0 שקלים. תפרסמי את זה פעם בשבועיים בסטטוס + בסטורי.`
      });
    }
  }
  
  // ══ 5. Revenue trend (last 3 months vs previous 3) ══
  const last3Months=all.filter(a=>a.paid&&(n-a.dt)<90*24*60*60*1000&&a.dt<n).reduce((s,a)=>s+(Number(a.price)||0),0);
  const prev3Months=all.filter(a=>a.paid&&(n-a.dt)>=90*24*60*60*1000&&(n-a.dt)<180*24*60*60*1000).reduce((s,a)=>s+(Number(a.price)||0),0);
  
  if(prev3Months>500&&last3Months>0){
    const diff=((last3Months-prev3Months)/prev3Months)*100;
    if(Math.abs(diff)>=15){
      const isGrowing=diff>0;
      insights.push({
        priority:isGrowing?'good':'high',
        icon:isGrowing?'📈':'📉',
        title:isGrowing?`צומחת — ${Math.abs(diff).toFixed(0)}% יותר הכנסות מרבעון קודם!`:`ירידה של ${Math.abs(diff).toFixed(0)}% ברבעון האחרון`,
        body:`3 חודשים אחרונים: ${last3Months.toLocaleString('he-IL')} ₪. 3 חודשים לפני: ${prev3Months.toLocaleString('he-IL')} ₪.`,
        action:isGrowing?`את עושה משהו נכון — תזהי מה השתנה! האם חידשת שירות? התחלת לפרסם במקום חדש? חזרת לרשימת המטופלות הישנות? מה שפעל — תמשיכי לעשות יותר.`:`בדקי: האם הייתה תקופת חגים שלא ספרתי? האם איבדת מטופלות קבועות? האם המחירים עודכנו ולא ידעת? חזור לשאלה 1 של היועץ — ייתכן והמטופלות שנעלמו הן הסיבה.`
      });
    }
  }
  
  // ══ 6. Average ticket ══
  const paid=all.filter(a=>a.paid&&Number(a.price)>0);
  if(paid.length>=10){
    const avg=paid.reduce((s,a)=>s+Number(a.price),0)/paid.length;
    const highTicket=paid.filter(a=>Number(a.price)>avg*1.5).length;
    const lowTicket=paid.filter(a=>Number(a.price)<avg*0.5).length;
    
    if(highTicket<paid.length*0.1){
      insights.push({
        priority:'low',
        icon:'💎',
        title:`יכולה לייקר — רק ${highTicket} טיפולים פרימיום מתוך ${paid.length}`,
        body:`ממוצע טיפול אצלך: ${avg.toFixed(0)} ₪. רק ${highTicket} טיפולים בפרמיום (מעל ${(avg*1.5).toFixed(0)} ₪) בכל ההיסטוריה. יש פה פוטנציאל — לא כל מטופלת רוצה את הזול, חלק ישמחו לשלם יותר עבור משהו מיוחד.`,
        action:`הוסיפי "חבילת VIP" — שילוב של טיפול + שירות נוסף (הסרת שיער פנים חינם, בדיקת עור, תה צמחים מיוחד). תמחור ${(avg*1.6).toFixed(0)}-${(avg*2).toFixed(0)} ₪. 5-10% מהמטופלות יבחרו באוטומט, וזה מעלה ממוצע עסקה ב-15-20%.`
      });
    }
  }
  
  // ══ 7. New clients growth ══
  const firstVisitMap={};
  all.filter(a=>a.dt<n).forEach(a=>{
    const name=a.name;
    if(!name)return;
    if(!firstVisitMap[name]||a.dt<firstVisitMap[name]){
      firstVisitMap[name]=a.dt;
    }
  });
  const newLast30=Object.values(firstVisitMap).filter(d=>(n-d)<30*24*60*60*1000).length;
  const newPrev30=Object.values(firstVisitMap).filter(d=>(n-d)>=30*24*60*60*1000&&(n-d)<60*24*60*60*1000).length;
  
  if(newLast30+newPrev30>=4){
    const ratio=newPrev30>0?newLast30/newPrev30:newLast30;
    if(ratio<0.5&&newPrev30>=3){
      insights.push({
        priority:'medium',
        icon:'🌱',
        title:`${newLast30} מטופלות חדשות החודש — חצי מהחודש הקודם`,
        body:`ראיתי ${newLast30} מטופלות חדשות החודש, לעומת ${newPrev30} בחודש לפני. ייתכן שהפרסום דעך או שמישהי אחרת "לוקחת" מטופלות פוטנציאליות.`,
        action:`לכי לטאב <b>📢 פרסום</b>. בחרי ערוץ חדש שעדיין לא ניסית (נסי לוח רמות אם עוד לא פרסמת שם — הוא מאוד אפקטיבי לשכונה). בנוסף, בקשי מ-3 מטופלות מרוצות להמליץ עלייך בקבוצת WhatsApp של רמות — המלצה אישית שווה 10 מודעות.`
      });
    }else if(ratio>1.5){
      insights.push({
        priority:'good',
        icon:'🚀',
        title:`${newLast30} מטופלות חדשות החודש — ${((ratio-1)*100).toFixed(0)}% יותר!`,
        body:`מעולה! הגיעו ${newLast30} מטופלות חדשות (לעומת ${newPrev30} בחודש קודם). זאת אומרת שמשהו בשיווק שלך עובד.`,
        action:`קריטי: אל תעצרי, <b>תגברי</b>. שאלי את המטופלות החדשות "איך הגעת אליי?" ותרשמי בהערות. ככה תדעי איזה ערוץ עובד הכי טוב ותוכלי להשקיע יותר בו.`
      });
    }
  }
  
  // Sort by priority: high > medium > good > low
  const priorityOrder={high:0,medium:1,good:2,low:3};
  insights.sort((a,b)=>priorityOrder[a.priority]-priorityOrder[b.priority]);
  
  return insights;
}
