/* ═══ Website Performance Analyzer ═══ */
.web-perf-card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;border:1.5px solid #e5e7eb;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.web-perf-prompt{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px dashed #93c5fd;border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:12px}
.web-perf-prompt-ico{font-size:40px;margin-bottom:8px}
.web-perf-prompt-title{font-size:15px;font-weight:900;color:#1e3a8a;margin-bottom:4px}
.web-perf-prompt-sub{font-size:12px;color:#1e40af;line-height:1.5;font-weight:600}
.web-perf-hdr{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.web-perf-score{width:82px;height:82px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .5s ease}
.web-perf-score-inner{width:68px;height:68px;border-radius:50%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 4px rgba(0,0,0,.06)}
.web-perf-score-num{font-size:26px;font-weight:900;line-height:1}
.web-perf-score-lbl{font-size:9px;font-weight:700;color:#9ca3af;margin-top:2px;letter-spacing:.3px}
.web-perf-info{flex:1;min-width:0}
.web-perf-label{font-size:11px;font-weight:800;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.web-perf-title{font-size:20px;font-weight:900;line-height:1.1}
.web-perf-sub{font-size:12px;color:#6b7280;font-weight:600;margin-top:4px}
.web-perf-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;padding:10px;background:#f9fafb;border-radius:12px;border:1px solid #f3f4f6}
.web-perf-stat{text-align:center}
.web-perf-stat-val{font-size:17px;font-weight:900;color:#1e1b4b;line-height:1}
.web-perf-stat-lbl{font-size:10px;font-weight:700;color:#6b7280;margin-top:3px;letter-spacing:.2px}
.web-perf-section-title{font-size:11px;font-weight:900;color:#0d9488;letter-spacing:.8px;text-transform:uppercase;margin:12px 0 10px}
.web-perf-issue{background:#fafafa;border:1px solid #e5e7eb;border-right:4px solid #9ca3af;border-radius:12px;padding:12px;margin-bottom:10px}
.web-perf-issue.sev-high{border-right-color:#dc2626;background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.web-perf-issue.sev-medium{border-right-color:#f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.web-perf-issue.sev-low{border-right-color:#3b82f6;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.web-perf-issue-hdr{display:flex;gap:10px;margin-bottom:8px}
.web-perf-issue-ico{font-size:22px;flex-shrink:0}
.web-perf-issue-body{flex:1;min-width:0}
.web-perf-issue-title{font-size:13px;font-weight:900;color:#1e1b4b;line-height:1.3;margin-bottom:3px}
.web-perf-issue-detail{font-size:11.5px;color:#4b5563;font-weight:600;line-height:1.55}
.web-perf-issue-fix{background:rgba(255,255,255,.7);border-radius:10px;padding:9px 11px;font-size:12px;color:#1e1b4b;font-weight:600;line-height:1.55;margin-bottom:8px;border:1px solid rgba(0,0,0,.04)}
.web-perf-issue-fix code{background:#1e1b4b;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
.web-perf-issue-fix b{color:#0d9488;font-weight:800}
.web-perf-fix-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#0d9488,#134e4a);color:white;font-size:12.5px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(13,148,136,.3);transition:all .15s}
.web-perf-fix-btn:hover{box-shadow:0 5px 14px rgba(13,148,136,.45);transform:translateY(-1px)}
.web-perf-fix-btn:active{transform:scale(.97)}
.web-perf-fix-all{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(16,185,129,.35);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;transition:all .15s;letter-spacing:.3px}
.web-perf-fix-all:hover{box-shadow:0 8px 22px rgba(16,185,129,.5);transform:translateY(-2px)}
.web-perf-fix-all:active{transform:scale(.98)}
.web-perf-fix-all span:first-child{font-size:18px}
.web-perf-excellent{background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:24px 18px;text-align:center}
.web-perf-excellent-ico{font-size:42px;margin-bottom:8px}
.web-perf-excellent-title{font-size:16px;font-weight:900;color:#065f46;margin-bottom:4px}
.web-perf-excellent-sub{font-size:12px;color:#047857;font-weight:600;line-height:1.5}

.web-info-title{font-size:12.5px;font-weight:900;color:#78350f;margin-bottom:10px;text-align:right}
.web-info-item{font-size:12px;color:#78350f;line-height:1.7;padding:3px 0;text-align:right;font-weight:600}
.web-info-item b{color:#92400e;font-weight:900;margin-left:6px}
.web-info-sub{font-size:11.5px;color:#92400e;margin-top:10px;padding-top:8px;border-top:1px dashed #fcd34d;text-align:right;font-weight:700}

/* Editor screen — fullscreen light panel, matches the diary style */
.web-edit-screen{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;background:#f8f7fc;direction:rtl;font-family:inherit}
.web-edit-screen.on{display:flex}
.web-edit-hdr{background:linear-gradient(135deg,#0d9488,#134e4a);padding:16px 14px;flex-shrink:0;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(13,148,136,.3)}
.web-edit-back{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:50%;width:38px;height:38px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;font-weight:700}
.web-edit-hdr-info{flex:1;min-width:0}
.web-edit-hdr-title{font-size:16px;font-weight:900;color:white;text-align:right}
.web-edit-hdr-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;text-align:right;word-break:break-all}
/* View mode tabs */
.web-edit-tabs{display:flex;background:white;border-bottom:1px solid #f0fdfa;flex-shrink:0}
.web-edit-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:800;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s}
.web-edit-tab.on{color:#0d9488;border-bottom-color:#0d9488;background:#faf5ff}
.web-edit-tab-icon{font-size:15px}
.web-edit-status-bar{padding:10px 14px;font-size:12px;font-weight:700;text-align:center;background:#f0fdfa;color:#115e59;flex-shrink:0;transition:all .2s}
.web-edit-status-bar.ok{background:#d1fae5;color:#065f46}
.web-edit-status-bar.err{background:#fee2e2;color:#991b1b}
.web-edit-status-bar a{color:inherit;text-decoration:underline;font-weight:900;margin-right:6px}
.web-edit-body{flex:1;min-height:0;display:flex;background:white;position:relative}
.web-edit-body.code-mode{padding:10px;background:#f8f7fc}
.web-edit-textarea{flex:1;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#e2e8f0;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;padding:12px;resize:none;outline:none;direction:ltr;text-align:left;line-height:1.6;width:100%;display:none}
.web-edit-textarea.orig{display:block!important;background:#18181b;border-color:#3f3f46;color:#d4d4d8;min-height:200px;flex:1}
.web-edit-textarea.orig[readonly]{background:#27272a;color:#a1a1aa;cursor:not-allowed}

/* Original-code tab panel */
.web-edit-orig-wrap{flex:1;min-height:0;display:none;flex-direction:column;background:#f8f7fc;padding:10px;overflow-y:auto}
.web-edit-orig-wrap.on{display:flex}
.web-orig-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
.web-orig-hdr{background:linear-gradient(135deg,#18181b,#27272a);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;color:white;flex-shrink:0}
.web-orig-hdr-icon{font-size:32px;flex-shrink:0}
.web-orig-hdr-txt{flex:1;min-width:0}
.web-orig-hdr-title{font-size:15px;font-weight:900}
.web-orig-hdr-sub{font-size:11.5px;opacity:.7;margin-top:2px;direction:ltr;text-align:right;font-family:ui-monospace,monospace}
.web-orig-unlock-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:white;padding:8px 12px;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.web-orig-unlock-btn:hover{background:rgba(255,255,255,.25)}
.web-orig-unlock-btn.unlocked{background:#dc2626;border-color:#dc2626}
.web-orig-warn{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:11px 13px;font-size:11.5px;color:#78350f;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.web-orig-warn-ico{font-size:18px;flex-shrink:0}
.web-orig-actions{display:flex;gap:8px;flex-shrink:0}
.web-orig-action-btn{flex:1;padding:12px;border-radius:12px;border:1.5px solid transparent;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.web-orig-action-btn.save{background:linear-gradient(135deg,#10b981,#059669);color:white}
.web-orig-action-btn.save:hover{background:linear-gradient(135deg,#059669,#047857)}
.web-orig-action-btn.cancel{background:#f3f4f6;color:#4b5563;border-color:#e5e7eb}
.web-orig-action-btn.revert{background:white;color:#b91c1c;border-color:#fecaca}
.web-orig-action-btn.revert:hover{background:#fef2f2}
.web-edit-textarea.on{display:block}
.web-edit-textarea:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.2)}
.web-edit-iframe-wrap{flex:1;position:relative;overflow:hidden;display:none}
.web-edit-iframe-wrap.on{display:block}
.web-edit-iframe{width:100%;height:100%;border:0;background:white;display:block}
/* My own loader over the iframe — disappears as soon as iframe content is ready */
.web-iframe-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:white;z-index:5;transition:opacity .3s ease}
.web-iframe-loader.gone{opacity:0;pointer-events:none}
.web-iframe-loader-spin{width:44px;height:44px;border:4px solid #f0fdfa;border-top-color:#0d9488;border-radius:50%;animation:webspin 0.9s linear infinite}
@keyframes webspin{to{transform:rotate(360deg)}}
.web-iframe-loader-txt{color:#0d9488;font-weight:800;font-size:14px}
.web-iframe-loader-sub{color:#2dd4bf;font-weight:600;font-size:11px;margin-top:-6px}
.web-edit-hint{position:absolute;top:10px;right:10px;left:10px;background:linear-gradient(135deg,#fef9c3,#fde68a);border:1px solid #fcd34d;border-radius:12px;padding:10px 12px;font-size:11.5px;color:#78350f;font-weight:700;text-align:right;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:hintFade 6s ease forwards}
@keyframes hintFade{0%,70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px);pointer-events:none}}
.web-edit-btns{display:flex;gap:8px;padding:10px 12px 14px;background:white;border-top:1px solid #f0fdfa;flex-shrink:0}
.web-edit-btn{border:none;border-radius:12px;padding:13px 10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;color:white;transition:transform .1s}
.web-edit-btn:active{transform:scale(.97)}
.web-edit-btn:disabled{opacity:.6;cursor:wait}
.web-edit-btn.save{flex:2;background:linear-gradient(135deg,#0d9488,#134e4a);box-shadow:0 4px 14px rgba(13,148,136,.35)}
.web-edit-btn.cancel{flex:1;background:#f3f4f6;color:#4b5563}
.web-edit-btn.download{flex:1;background:#f0fdfa;color:#134e4a;border:1px solid #5eead4}

/* ═══ Editor Toolbar — Pro Toolkit ═══ */
.wt-toolbar{background:white;border-bottom:1px solid #f0fdfa;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(15,118,110,.06)}
.wt-row{display:flex;gap:4px;padding:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.wt-row::-webkit-scrollbar{display:none}
.wt-row.contextual{background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-top:1px solid #f0fdfa;animation:wtSlide .25s ease}
@keyframes wtSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.wt-btn{flex-shrink:0;background:white;border:1px solid #e9d5ff;border-radius:10px;padding:8px 10px;color:#115e59;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s}
.wt-btn:active{transform:scale(.94)}
.wt-btn:hover{background:#f3e8ff;border-color:#c084fc}
.wt-btn.on{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border-color:#134e4a;box-shadow:0 2px 8px rgba(13,148,136,.35)}
.wt-btn.primary{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border-color:transparent}
.wt-btn.primary:hover{background:linear-gradient(135deg,#0f766e,#115e59)}
.wt-btn.danger{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.wt-btn.danger:hover{background:#fee2e2}
.wt-btn-ico{font-size:14px;line-height:1}
.wt-btn-txt{font-size:11px;font-weight:800}
.wt-btn.icon-only{padding:8px 10px}
.wt-btn.icon-only .wt-btn-txt{display:none}
.wt-sep{width:1px;background:#e9d5ff;margin:4px 2px;flex-shrink:0}
.wt-group-lbl{font-size:10px;font-weight:900;color:#0d9488;letter-spacing:.8px;text-transform:uppercase;padding:0 10px 0 4px;display:flex;align-items:center;flex-shrink:0}

/* Popups (color picker, font size, link, etc.) */
.wt-pop-overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:450;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.wt-pop-overlay.on{display:flex;animation:wtFade .2s ease}
@keyframes wtFade{from{opacity:0}to{opacity:1}}
.wt-pop{background:white;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;animation:wtSlideUp .3s cubic-bezier(.34,1.56,.64,1);padding-bottom:env(safe-area-inset-bottom,0)}
@keyframes wtSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.wt-pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:white;z-index:2}
.wt-pop-title{font-size:15px;font-weight:900;color:#1e1b4b}
.wt-pop-close{background:#f3f4f6;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;color:#6b7280;display:flex;align-items:center;justify-content:center;font-family:inherit}
.wt-pop-close:hover{background:#e5e7eb}
.wt-pop-body{padding:16px 18px}
@media(min-width:768px){
  .wt-pop-overlay{align-items:center}
  .wt-pop{border-radius:22px;max-height:80vh;margin:16px}
}

/* Color palette */
.wt-colors{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.wt-color{aspect-ratio:1;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:transform .1s;position:relative}
.wt-color:active{transform:scale(.9)}
.wt-color.sel{border-color:#1e1b4b;box-shadow:0 0 0 2px white inset}
.wt-color.transparent{background:repeating-conic-gradient(#e5e7eb 0% 25%, white 0% 50%) 50%/10px 10px}
.wt-color-custom-wrap{margin-top:14px;padding-top:14px;border-top:1px dashed #e9d5ff}
.wt-color-custom-row{display:flex;gap:8px;align-items:center}
.wt-color-custom-row input[type=color]{width:46px;height:46px;border:2px solid #f0fdfa;border-radius:10px;cursor:pointer;padding:0;background:white}
.wt-color-custom-row input[type=text]{flex:1;padding:12px 14px;border:1.5px solid #f0fdfa;border-radius:12px;font-family:ui-monospace,monospace;font-size:13px;text-align:center;text-transform:uppercase;direction:ltr;outline:none}
.wt-color-custom-row input[type=text]:focus{border-color:#0d9488}

/* Font size / alignment slider groups */
.wt-size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.wt-size-btn{padding:14px 8px;border-radius:12px;border:1.5px solid #f0fdfa;background:white;color:#115e59;font-weight:800;cursor:pointer;font-family:inherit;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:4px}
.wt-size-btn:active{transform:scale(.96)}
.wt-size-btn.on{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border-color:transparent}
.wt-size-btn-name{font-size:11px;font-weight:700;opacity:.7}

/* Link form */
.wt-form-row{margin-bottom:12px}
.wt-form-lbl{font-size:12px;font-weight:800;color:#115e59;margin-bottom:6px;display:block}
.wt-form-inp{width:100%;padding:12px 14px;border:1.5px solid #f0fdfa;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.wt-form-inp:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.wt-form-inp.ltr{direction:ltr;text-align:left;font-family:ui-monospace,monospace;font-size:13px}
.wt-form-hint{font-size:11px;color:#9ca3af;margin-top:4px;font-weight:600}
.wt-form-actions{display:flex;gap:8px;margin-top:16px}
.wt-form-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.wt-form-btn.ok{background:linear-gradient(135deg,#0d9488,#134e4a);color:white}
.wt-form-btn.cancel{background:#f3f4f6;color:#4b5563}
.wt-form-btn.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}

/* Media upload */
.wt-upload-drop{border:2.5px dashed #5eead4;border-radius:16px;padding:24px 18px;text-align:center;background:linear-gradient(135deg,#faf5ff,#f3e8ff);cursor:pointer;transition:all .2s;margin-bottom:12px}
.wt-upload-drop:hover{border-color:#0d9488;background:linear-gradient(135deg,#f3e8ff,#e9d5ff)}
.wt-upload-drop.drag-over{border-color:#0d9488;background:#e9d5ff;transform:scale(1.01)}
.wt-upload-ico{font-size:36px;margin-bottom:8px}
.wt-upload-title{font-size:14px;font-weight:900;color:#115e59;margin-bottom:4px}
.wt-upload-sub{font-size:11.5px;color:#0d9488;font-weight:600}
.wt-upload-divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:#c084fc;font-size:11px;font-weight:800;letter-spacing:1px}
.wt-upload-divider::before,.wt-upload-divider::after{content:'';flex:1;height:1px;background:#f0fdfa}
.wt-upload-progress{display:none;margin-top:10px;background:#f0fdfa;border-radius:8px;overflow:hidden;height:6px}
.wt-upload-progress-bar{height:100%;background:linear-gradient(90deg,#0d9488,#14b8a6);width:0%;transition:width .3s}

/* Element actions (when image/video is selected) */
.wt-elem-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#faf5ff;border-bottom:1px solid #f0fdfa;font-size:12px;font-weight:700;color:#115e59}
.wt-elem-info-ico{font-size:18px}
.wt-elem-info-close{margin-right:auto;background:none;border:none;color:#0d9488;font-size:16px;cursor:pointer;font-family:inherit;padding:4px 8px}

/* Quick swatches (inline color buttons on toolbar) */
.wt-swatch{width:22px;height:22px;border-radius:6px;border:1.5px solid white;box-shadow:0 0 0 1px #5eead4;flex-shrink:0}

/* Emoji picker */
.wt-emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.wt-emoji{aspect-ratio:1;background:none;border:none;font-size:22px;cursor:pointer;border-radius:8px;transition:background .1s;padding:0;font-family:inherit}
.wt-emoji:hover{background:#f3e8ff}
.wt-emoji:active{transform:scale(.9);background:#e9d5ff}

/* Undo/Redo */
.wt-history{display:flex;gap:2px;margin-right:auto}

/* Insert menu grid (when clicking "+" between sections) */
.wt-insert-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wt-insert-item{background:white;border:1.5px solid #f0fdfa;border-radius:14px;padding:16px 8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s}
.wt-insert-item:hover{border-color:#0d9488;background:#faf5ff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(13,148,136,.15)}
.wt-insert-item:active{transform:scale(.96)}
.wt-insert-ico{font-size:28px}
.wt-insert-lbl{font-size:12px;font-weight:800;color:#115e59}

/* Divider styles grid */
.wt-divider-styles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wt-divider-style{background:white;border:1.5px solid #f0fdfa;border-radius:12px;padding:14px 12px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;gap:10px}
.wt-divider-style:hover{border-color:#0d9488;background:#faf5ff}
.wt-divider-style:active{transform:scale(.97)}
.wt-divider-preview{width:100%;padding:8px 0}
.wt-divider-name{font-size:12px;font-weight:800;color:#115e59;text-align:center}

/* Guide cards inside popups */
.wt-guide{background:linear-gradient(135deg,#ecfeff,#cffafe);border:1.5px solid #a5f3fc;border-radius:14px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden}
.wt-guide::before{content:'';position:absolute;top:-20px;left:-20px;width:60px;height:60px;background:rgba(6,182,212,.08);border-radius:50%}
.wt-guide-title{font-size:13px;font-weight:900;color:#0e7490;margin-bottom:8px;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.wt-guide-steps{position:relative;z-index:1}
.wt-guide-step{display:flex;align-items:flex-start;gap:10px;padding:6px 0;color:#155e75;font-size:12.5px;font-weight:600;line-height:1.5}
.wt-guide-step-num{background:#0891b2;color:white;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wt-guide-step b{color:#0e7490;font-weight:800}
.wt-recommended{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #10b981;border-radius:14px;padding:14px;margin-bottom:12px;position:relative}
.wt-recommended-badge{position:absolute;top:-10px;right:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:10px;font-weight:900;padding:3px 10px;border-radius:12px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(16,185,129,.4)}
.wt-recommended-title{font-size:14px;font-weight:900;color:#065f46;margin-bottom:8px;margin-top:2px}
.wt-recommended-list{font-size:12.5px;color:#047857;line-height:1.7;font-weight:600}
.wt-recommended-list div{display:flex;align-items:center;gap:6px;padding:2px 0}
.wt-warn-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:#78350f;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start}
.wt-warn-ico{font-size:18px;flex-shrink:0}
.wt-section-hdr{font-size:11px;font-weight:900;color:#0d9488;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px;text-align:right;padding-top:8px;border-top:1px dashed #f0fdfa}
.wt-section-hdr:first-child{margin-top:0;padding-top:0;border-top:none}
.wt-cursor-reminder{background:#faf5ff;border:1.5px dashed #5eead4;border-radius:12px;padding:10px 12px;margin-bottom:14px;font-size:11.5px;color:#134e4a;font-weight:700;text-align:right;display:flex;align-items:center;gap:8px}
.wt-cursor-reminder-ico{font-size:20px;flex-shrink:0}

@media(min-width:768px){
  .web-edit-screen{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(15,118,110,.25);overflow:hidden}
}



/* Toast */
.web-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#0d9488,#134e4a);color:white;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:800;z-index:99999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.25);direction:rtl;font-family:inherit}
.web-toast.err{background:linear-gradient(135deg,#ef4444,#dc2626)}
.web-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Monthly Chart — Professional ── */
.chart-screen{position:fixed;inset:0;z-index:500;background:#f8f7fc;display:flex;flex-direction:column;animation:slideUp .32s cubic-bezier(.22,.68,0,1.2)}
.chart-hero{background:linear-gradient(160deg,#115e59 0%,#0d9488 50%,#0f766e 100%);padding:20px 20px 28px;flex-shrink:0;position:relative;overflow:hidden}
.chart-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.chart-hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.chart-hero-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:relative;z-index:1}
.chart-back{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.chart-hero-title{font-size:17px;font-weight:900;color:white}
.chart-year-sel{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px}
.chart-year-btn{background:none;border:none;color:white;cursor:pointer;font-size:16px;font-weight:900;padding:0 2px}
.chart-year-val{font-size:14px;font-weight:700;color:white;min-width:40px;text-align:center}
.chart-kpis{display:flex;gap:0;position:relative;z-index:1}
.chart-kpi{flex:1;text-align:center}
.chart-kpi+.chart-kpi{border-right:1px solid rgba(255,255,255,.15)}
.chart-kpi-val{font-size:22px;font-weight:900;color:white;line-height:1}
.chart-kpi-lbl{font-size:10px;color:rgba(255,255,255,.65);margin-top:4px;letter-spacing:.3px}
.chart-kpi-diff{font-size:11px;font-weight:700;margin-top:3px}
.chart-kpi-diff.up{color:#6ee7b7}
.chart-kpi-diff.down{color:#fca5a5}
.chart-body{flex:1;overflow-y:auto;padding:0 0 20px}
/* Bar chart */
.chart-canvas{padding:16px 16px 0;background:white;margin:0}
@keyframes barRise{0%{height:0;opacity:0}100%{opacity:1}}
.chart-tooltip-box{background:#1e1b4b;color:white;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.chart-tooltip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e1b4b}
/* Monthly table */
.chart-table-wrap{padding:0 16px;margin-top:14px}
.chart-table-title{font-size:11px;font-weight:800;color:#2dd4bf;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}
.chart-row{display:flex;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;transition:.15s}
.chart-row:active{transform:scale(.99)}
.chart-row.cur{background:#f5f3ff;border:1.5px solid #5eead4}
.chart-row.has{background:white;border:1px solid #f3f4f6}
.chart-row.empty{background:#fafafa;opacity:.6}
.chart-row-mo{font-size:14px;font-weight:700;color:#374151;width:56px;flex-shrink:0}
.chart-row-mo.cur{color:#0d9488;font-weight:900}
.chart-row-bar-wrap{flex:1;height:8px;background:#f3f4f6;border-radius:20px;overflow:hidden;margin:0 12px}
.chart-row-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#0d9488,#2dd4bf);transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.chart-row-bar.cur{background:linear-gradient(90deg,#0d9488,#c084fc)}
.chart-row-rev{font-size:13px;font-weight:800;color:#1e1b4b;width:72px;text-align:left;flex-shrink:0}
.chart-row-rev.cur{color:#0d9488}
.chart-row-trend{font-size:10px;font-weight:700;width:40px;text-align:left;flex-shrink:0}

/* ── Treatment Areas ── */
.areas-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.area-bubble{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:inherit;transition:.15s;user-select:none}
.area-bubble:active{transform:scale(.96)}
.area-bubble.on{background:#0d9488;color:white;border-color:#0d9488;box-shadow:0 2px 8px rgba(13,148,136,.35)}
.area-bubble.off{background:#f5f3ff;color:#6b7280;border-color:#f0fdfa}
.area-bubble.full{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border-color:#0d9488;font-size:13px}
.area-bubble.full.off{background:#f5f3ff;color:#6b7280;border-color:#f0fdfa}
.areas-section-lbl{font-size:10px;font-weight:800;color:#2dd4bf;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px}

/* ── Packages Tab ── */
.pkg-hero{background:linear-gradient(135deg,#0891b2,#0e7490);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 24px rgba(8,145,178,.3)}
.pkg-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.pkg-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.phs{text-align:center;flex:1}
.phs-val{font-size:18px;font-weight:900;color:white}
.phs-lbl{font-size:9px;color:rgba(255,255,255,.55);margin-top:1px}
.add-pkg-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;box-shadow:0 4px 14px rgba(8,145,178,.3)}
.pkg-form{background:white;border-radius:16px;padding:15px;margin-bottom:12px;border:2px solid #0891b2;box-shadow:0 4px 16px rgba(8,145,178,.12)}
.pkg-inp{width:100%;border:1.5px solid #e0f2fe;border-radius:12px;padding:10px 14px;text-align:right;font-size:14px;outline:none;margin-bottom:8px;background:#f0f9ff;font-family:inherit}
.pkg-inp:focus{border-color:#0891b2}
.pkg-row-calc{background:#f0f9ff;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pkg-calc-label{font-size:12px;color:#6b7280;font-weight:600}
.pkg-calc-val{font-size:18px;font-weight:900;color:#0891b2}
.pkg-calc-val.paid{color:#059669}
.pkg-calc-val.remaining{color:#dc2626}
.pkg-card{background:white;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);border-right:4px solid #0891b2}
.pkg-card.paid-full{border-right-color:#059669}
.pkg-card.partial{border-right-color:#f59e0b}
.pkg-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pkg-card-name{font-size:15px;font-weight:800;color:#1e1b4b}
.pkg-card-type{font-size:12px;color:#0891b2;font-weight:700;background:#e0f2fe;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.pkg-progress-wrap{margin-bottom:10px}
.pkg-progress-bar{background:#f3f4f6;border-radius:20px;height:10px;overflow:hidden;margin-bottom:5px}
.pkg-progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#0891b2,#22d3ee);transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.pkg-progress-fill.full{background:linear-gradient(90deg,#059669,#34d399)}
.pkg-amounts{display:flex;justify-content:space-between;font-size:11px}
.pkg-amount-item{text-align:center}
.pkg-amount-val{font-weight:800;font-size:13px}
.pkg-amount-lbl{color:#9ca3af;margin-top:1px}
.pkg-card-actions{display:flex;gap:7px;margin-top:10px;border-top:1px solid #f3f4f6;padding-top:10px}
.pkg-action-btn{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pkg-action-btn.edit{background:#e0f2fe;color:#0891b2}
.pkg-action-btn.del{background:#fef2f2;color:#dc2626}
.pkg-action-btn.pay{background:linear-gradient(135deg,#059669,#047857);color:white}
.pkg-edit-form{background:#f0f9ff;border-radius:12px;padding:12px;margin-top:8px;border:1px solid #bae6fd}
.pkg-inp-sm{width:100%;border:1.5px solid #bae6fd;border-radius:10px;padding:8px 12px;text-align:right;font-size:13px;outline:none;background:white;font-family:inherit;margin-bottom:7px}
.pkg-inp-sm:focus{border-color:#0891b2}

/* ── Contact Bottom Sheet ── */
.contact-icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#9ca3af;transition:.15s;flex-shrink:0}
.contact-icon-btn:active{background:#f3f4f6;transform:scale(.9)}
/* ═══ Reminder Button (inline on appt cards) ═══ */
.rem-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#9ca3af;transition:all .15s;flex-shrink:0;position:relative}
.rem-btn:hover{color:#0d9488;background:#faf5ff}
.rem-btn:active{transform:scale(.85)}
.rem-btn.active{color:#f59e0b;background:linear-gradient(135deg,#fef3c7,#fde68a);box-shadow:0 2px 8px rgba(245,158,11,.3)}
.rem-btn.active::after{content:'';position:absolute;top:2px;left:2px;width:7px;height:7px;border-radius:50%;background:#dc2626;box-shadow:0 0 0 2px white;animation:remDot 2s ease-in-out infinite}
@keyframes remDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.25);opacity:.75}}
/* ═══ Reminder Bottom Sheet ═══ */
.rem-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:700;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s ease}
.rem-overlay.on{opacity:1}
.rem-sheet{background:#fafaf9;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border-radius:28px 28px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);font-family:inherit;direction:rtl;padding-bottom:env(safe-area-inset-bottom,0)}
.rem-overlay.on .rem-sheet{transform:translateY(0)}
@media(min-width:768px){.rem-overlay{align-items:center}.rem-sheet{border-radius:28px;margin:16px;max-height:82vh}}
.rem-hdr{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;padding:20px;position:relative;overflow:hidden}
.rem-hdr::before{content:'';position:absolute;top:-60px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08)}
.rem-hdr::after{content:'';position:absolute;bottom:-80px;right:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
.rem-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1}
.rem-hdr-icon{font-size:32px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.2));animation:remBell 2.5s ease-in-out infinite}
@keyframes remBell{0%,100%{transform:rotate(0)}15%{transform:rotate(-8deg)}30%{transform:rotate(6deg)}45%{transform:rotate(-4deg)}60%{transform:rotate(2deg)}75%{transform:rotate(0)}}
.rem-hdr-txt{flex:1;min-width:0}
.rem-hdr-title{font-size:18px;font-weight:900;letter-spacing:.3px;line-height:1.1}
.rem-hdr-sub{font-size:12px;margin-top:3px;opacity:.9;font-weight:600}
.rem-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.rem-close:hover{background:rgba(255,255,255,.3)}
.rem-close:active{transform:scale(.9)}
.rem-appt-info{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:12px 14px;position:relative;z-index:1}
.rem-appt-name{font-size:17px;font-weight:900;color:white;margin-bottom:2px}
.rem-appt-meta{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.rem-body{padding:18px}
.rem-section-title{font-size:12px;font-weight:900;color:#0d9488;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;padding-right:2px}
.rem-options{display:flex;flex-direction:column;gap:8px}
.rem-option{background:white;border:1.5px solid #e5e7eb;border-radius:14px;padding:12px 14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;transition:all .15s;text-align:right}
.rem-option:hover:not(.disabled){border-color:#5eead4;background:#faf5ff;transform:translateX(-2px)}
.rem-option:active:not(.disabled){transform:scale(.98)}
.rem-option.selected{border-color:#0d9488;background:linear-gradient(135deg,#f5f3ff,#f0fdfa);box-shadow:0 4px 14px rgba(13,148,136,.2)}
.rem-option.disabled{opacity:.4;cursor:not-allowed;background:#f9fafb}
.rem-option-ico{font-size:22px;flex-shrink:0;width:40px;height:40px;background:#faf5ff;border-radius:10px;display:flex;align-items:center;justify-content:center}
.rem-option.selected .rem-option-ico{background:#0d9488}
.rem-option-txt{flex:1;min-width:0}
.rem-option-title{font-size:14px;font-weight:800;color:#1e1b4b;margin-bottom:2px}
.rem-option-sub{font-size:11.5px;color:#6b7280;font-weight:600}
.rem-option-check{font-size:20px;color:#0d9488;font-weight:900;flex-shrink:0}
.rem-methods{display:flex;flex-direction:column;gap:10px}
.rem-method-card{background:white;border:1.5px solid #e5e7eb;border-radius:16px;padding:14px;transition:border-color .15s}
.rem-method-card:hover{border-color:#5eead4}
.rem-method-hdr{display:flex;gap:12px;margin-bottom:12px}
.rem-method-ico{font-size:26px;flex-shrink:0;width:44px;height:44px;background:linear-gradient(135deg,#faf5ff,#f0fdfa);border-radius:12px;display:flex;align-items:center;justify-content:center}
.rem-method-body{flex:1;min-width:0}
.rem-method-title{font-size:14px;font-weight:900;color:#1e1b4b;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rem-method-badge{font-size:9px;font-weight:900;background:linear-gradient(135deg,#10b981,#059669);color:white;padding:2px 7px;border-radius:8px;letter-spacing:.5px}
.rem-method-desc{font-size:11.5px;color:#6b7280;font-weight:600;line-height:1.55}
.rem-method-btn{width:100%;padding:11px;border-radius:12px;border:none;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#0d9488,#134e4a);color:white;transition:all .15s;box-shadow:0 4px 12px rgba(13,148,136,.25)}
.rem-method-btn:hover{box-shadow:0 6px 16px rgba(13,148,136,.35);transform:translateY(-1px)}
.rem-method-btn:active{transform:scale(.98)}
.rem-method-btn.secondary{background:white;color:#0d9488;border:1.5px solid #5eead4;box-shadow:none}
.rem-method-btn.secondary:hover{background:#faf5ff;transform:translateY(-1px)}
.rem-active-info{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:12px 14px;margin-top:14px}
.rem-active-ico{font-size:24px;flex-shrink:0}
.rem-active-title{font-size:13px;font-weight:900;color:#065f46}
.rem-active-sub{font-size:11px;font-weight:600;color:#047857;margin-top:2px}
.rem-active-cancel{background:white;border:1.5px solid #fecaca;color:#b91c1c;font-size:12px;font-weight:800;padding:7px 12px;border-radius:10px;cursor:pointer;font-family:inherit;margin-right:auto;flex-shrink:0;transition:all .15s}
.rem-active-cancel:hover{background:#fef2f2}

.contact-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end}
.contact-sheet{background:white;width:100%;border-radius:24px 24px 0 0;padding:0 0 36px;animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
.contact-sheet-client{display:flex;align-items:center;gap:14px;padding:20px 20px 16px;border-bottom:1px solid #f3f4f6}
.contact-sheet-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#2dd4bf);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:white;flex-shrink:0}
.contact-sheet-name{font-size:17px;font-weight:900;color:#1e1b4b}
.contact-sheet-phone{font-size:14px;color:#6b7280;margin-top:3px;direction:ltr;text-align:right}
.contact-sheet-appt{font-size:12px;color:#2dd4bf;margin-top:4px;font-weight:600}
.contact-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:20px 20px 8px}
.contact-action{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.contact-action-icon{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:.15s;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.contact-action-icon:active{transform:scale(.92)}

const MO_IMG=[
  'january','february','march','april','may','june',
  'july','august','september','october','november','december'
];
// Beautiful gradient fallback per month (shows instantly, even without internet)
// Teal/cyan/blue palette aligned with Hodaya's brand — seasonal variation within palette
const MO_GRAD=[
  'linear-gradient(135deg,#134e4a,#0d9488)',   // Jan - deep teal winter
  'linear-gradient(135deg,#155e75,#22d3ee)',   // Feb - icy cyan
  'linear-gradient(135deg,#115e59,#5eead4)',   // Mar - spring teal
  'linear-gradient(135deg,#0f766e,#2dd4bf)',   // Apr - fresh mint
  'linear-gradient(135deg,#0891b2,#67e8f9)',   // May - bright cyan
  'linear-gradient(135deg,#0d9488,#14b8a6)',   // Jun - summer teal
  'linear-gradient(135deg,#0c4a6e,#0ea5e9)',   // Jul - ocean blue
  'linear-gradient(135deg,#164e63,#0891b2)',   // Aug - deep cyan
  'linear-gradient(135deg,#134e4a,#14b8a6)',   // Sep - autumn teal

const now=new Date(), TD=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');

// ── State ─────────────────────────────────────────────
const S={

  tY:now.getFullYear(),tM:now.getMonth()+1,tSel:TD,

  // data
  DT:{},RT:{},A:{},T:{},G:{},BG:{},CL:{},CANC:{},PKGS:{},EXP:{},WEB:{},showHistory:false,histTab:"upcoming",payFilter:"all",expFilter:"all",expCat:"all",showAddGoal:false,newGoal:{title:"",target:"",period:"month",type:"revenue"},openClient:null,editClient:false,crmSearch:"",crmFilter:"all",showMonthPicker:false,showYearPicker:false,editPayKey:null,showAddPkg:false,editPkgKey:null,showAddExp:false,newExp:{amount:"",category:"supplies",description:"",vendor:"",date:"",recurring:false},editExpKey:null,editWeb:false,showAddPromoItem:false,newPromoItem:{title:"",desc:""}
};

// ── Calendar HTML ─────────────────────────────────────
function calHTML(y,m,sel,dots,showH,color,redDots){
  const f=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate();
  const photoUrl='https://picsum.photos/seed/landscape-'+MO_IMG[m-1]+'/600/180';
  const grad=MO_GRAD[m-1];
  let h=`<div class="cal-card">
  <div class="cal-hdr">
    <div class="cal-hdr-grad" style="background:${grad}"></div>
    <img class="cal-hdr-photo" src="${photoUrl}" loading="lazy" onload="this.classList.add('on')" alt="">
    <div class="cal-hdr-dim"></div>
    <div class="cal-hdr-row">
      <div><div class="cal-hdr-title">${MO[m-1]}</div><div class="cal-hdr-year" onclick="openYearPicker('${color}',${y},${m})" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px">${y} ▾</div></div>
      <div class="cal-hdr-btns">
        <button class="cal-hdr-btn" onclick="nc('${color}',1,${y},${m})">›</button>
        <button class="cal-hdr-btn" onclick="nc('${color}',-1,${y},${m})">‹</button>
      </div>
    </div>
  </div>
  <div class="cal-body"><div class="cal-grid">${DY.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;
  for(let i=0;i<f;i++)h+=`<div></div>`;
  for(let d=1;d<=dim;d++){
    const k=tk(y,m,d),isSel=k===sel,isT=k===TD,hol=HOLS[k],dot=(dots||[]).includes(k),he=showH?hd(y,m,d):'';
    const selBg=isSel?`background:${color};`:'';
    h+=`<button class="cal-day${isSel?' sel':isT&&!isSel?' today':''}${hol&&!isSel?' hol':''}" style="${selBg}" onclick="dc_${color.replace('#','')}('${k}')">${d}`;
    if(he)h+=`<span class="cal-day-heb">${he}</span>`;
    if(hol)h+=`<span class="cal-day-hol">${x(hol)}</span>`;
    if(dot&&!isSel)h+=redDots?`<span style="position:absolute;inset:0;border-radius:10px;background:#fee2e2;z-index:-1"></span><span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#ef4444"></span>`:`<span class="cal-dot" style="background:${color}"></span>`;
    h+=`</button>`;
  }
  return h+`</div></div></div></div>`;
}

// ── Personal Tasks Panel ──────────────────────────────
function personalTasksPanel(who){
  const isD=who==='daniel';
  const color=isD?'#3b82f6':'#db2777';
  const y=isD?S.dY:S.rY, m=isD?S.dM:S.rM, sel=isD?S.dSel:S.rSel;
  const key=isD?'DT':'RT', data=S[key];
  const dots=Object.keys(data).filter(k=>Array.isArray(data[k])&&data[k].some(t=>t));
  const raw=data[sel]||[], rows=raw.length<10?[...raw,...Array(10-raw.length).fill('')]:[...raw];

  // register day click handler dynamically
  window['dc_'+color.replace('#','')]=k=>{if(isD)S.dSel=k;else S.rSel=k;const _p=document.querySelector('#personal-content');if(_p)_p.innerHTML=personalPanel(who);else render();};

  let h=calHTML(y,m,sel,dots,true,color);
  h+=`<div style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <span style="font-size:12px;color:#9ca3af">${rows.filter(r=>r).length}/${rows.length}</span>
      <b style="color:#374151">${sel}</b>
    </div>`;
  rows.forEach((t,i)=>{h+=`<div class="task-row">
    <button class="task-num" style="color:${color};background:${color}15;width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:13px;font-weight:bold;flex-shrink:0;display:flex;align-items:center;justify-content:center" onclick="openTaskModal('${who}','${sel}',${i})">${i+1}</button>
    <input class="task-inp" style="border-color:${color}22" value="${x(t)}" placeholder="משימה ${i+1}..." oninput="upt_${who}(${i},this.value)">
  </div>`;});
  h+=`<button class="add-btn" style="border-color:${color};color:${color}" onclick="apt_${who}()">+ הוסף שורה</button></div>`;

  // task modal
  if(S.tModal&&S.tModal.who===who){

function deployToGitHub(){
  const token=localStorage.getItem('gh_token_diary')||'';
  if(!token){
    const t=prompt('הכנס GitHub Token:');
    if(!t)return;
    localStorage.setItem('gh_token_diary',t.trim());
  }
  const ghToken=localStorage.getItem('gh_token_diary');
  const apiUrl='https://api.github.com/repos/pinto1212121212-create/therapy-hodaya/contents/index.html';
  const btn=document.getElementById('deploy-btn');
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.html';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const content=ev.target.result;
      const encoded=btoa(unescape(encodeURIComponent(content)));
      fetch(apiUrl,{headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}})
        .then(r=>r.json())
        .then(data=>{
          const sha=data.sha||undefined;
          const body={message:'Update from app',content:encoded};
          if(sha)body.sha=sha;
          return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
        })
        .then(r=>r.json())
        .then(d=>{
          if(d.content){if(btn){btn.textContent='✅';btn.style.background='#059669';}setTimeout(()=>{if(btn){btn.textContent='🚀';btn.disabled=false;btn.style.background='';}},3000);}
          else{localStorage.removeItem('gh_token_diary');if(btn){btn.textContent='❌';btn.disabled=false;}setTimeout(()=>{if(btn){btn.textContent='🚀';}},3000);}
        })
        .catch(()=>{localStorage.removeItem('gh_token_diary');if(btn){btn.textContent='❌';btn.disabled=false;}setTimeout(()=>{if(btn){btn.textContent='🚀';}},3000);});
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── Laser SVG Animation ──────────────────────────────
function fireLaserBeam(sx,sy,tx,ty,cb){
  // Remove any existing overlay
  document.querySelector('.laser-beam-overlay')?.remove();

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','laser-beam-overlay');
  svg.setAttribute('viewBox',`0 0 ${window.innerWidth} ${window.innerHeight}`);
  svg.setAttribute('width',window.innerWidth);
  svg.setAttribute('height',window.innerHeight);

  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  grad.id='beamLG';
  const len=Math.hypot(tx-sx,ty-sy);
  grad.setAttribute('gradientUnits','userSpaceOnUse');
  grad.setAttribute('x1',sx); grad.setAttribute('y1',sy);
  grad.setAttribute('x2',tx); grad.setAttribute('y2',ty);
  const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#fce7f3');
  const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s2.setAttribute('offset','50%');s2.setAttribute('stop-color','#f472b6');
  const s3=document.createElementNS('http://www.w3.org/2000/svg','stop');
  s3.setAttribute('offset','100%');s3.setAttribute('stop-color','#14b8a6');s3.setAttribute('stop-opacity','0.3');
  grad.appendChild(s1);grad.appendChild(s2);grad.appendChild(s3);
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Filter glow
  const filt=document.createElementNS('http://www.w3.org/2000/svg','filter');
  filt.id='bGlow';
  const blur=document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
  blur.setAttribute('stdDeviation','3');
  filt.appendChild(blur);
  defs.appendChild(filt);

  // Glow beam (wide)
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',sx);glow.setAttribute('y1',sy);
  glow.setAttribute('x2',sx);glow.setAttribute('y2',sy);
  glow.setAttribute('stroke','#f472b6');glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-linecap','round');glow.setAttribute('opacity','0.4');
  glow.setAttribute('filter','url(#bGlow)');
  svg.appendChild(glow);

  // Core beam
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',sx);line.setAttribute('y1',sy);
  line.setAttribute('x2',sx);line.setAttribute('y2',sy);
  line.setAttribute('stroke','url(#beamLG)');line.setAttribute('stroke-width','3');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);

  // Impact circle
  const circ=document.createElementNS('http://www.w3.org/2000/svg','circle');
  circ.setAttribute('cx',tx);circ.setAttribute('cy',ty);
  circ.setAttribute('r','0');circ.setAttribute('fill','#f472b6');
  circ.setAttribute('filter','url(#bGlow)');circ.setAttribute('opacity','0');
  svg.appendChild(circ);

  document.body.appendChild(svg);

  // Animate: extend beam to target over 220ms
  const start=performance.now();
  const dur=220;
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const cx=sx+(tx-sx)*p, cy=sy+(ty-sy)*p;
    line.setAttribute('x2',cx);line.setAttribute('y2',cy);
    glow.setAttribute('x2',cx);glow.setAttribute('y2',cy);
    if(p<1) requestAnimationFrame(step);
    else{
      // Impact flash
      circ.setAttribute('opacity','1');
      let r=0;
      const flash=setInterval(()=>{
        r+=3;circ.setAttribute('r',r);
        if(r>14){clearInterval(flash);svg.remove();cb();}
      },16);
    }
  }
  requestAnimationFrame(step);
}

    let changed=false;
    if(a&&typeof a==='object'){const prev=JSON.stringify(S.A);S.A=a;if(JSON.stringify(S.A)!==prev)changed=true;}
    if(t&&typeof t==='object'){const prev=JSON.stringify(S.T);S.T=t;if(JSON.stringify(S.T)!==prev)changed=true;}

    if(cl&&typeof cl==='object'){const prev=JSON.stringify(S.CL);S.CL=cl;if(JSON.stringify(S.CL)!==prev)changed=true;}
    if(canc&&typeof canc==='object'){const prev=JSON.stringify(S.CANC);S.CANC=canc;if(JSON.stringify(S.CANC)!==prev)changed=true;}
    if(pkgs&&typeof pkgs==='object'){const prev=JSON.stringify(S.PKGS);S.PKGS=pkgs;if(JSON.stringify(S.PKGS)!==prev)changed=true;}
    if(exp&&typeof exp==='object'){const prev=JSON.stringify(S.EXP);S.EXP=exp;if(JSON.stringify(S.EXP)!==prev)changed=true;}

  }catch(e){}
}

  const prevRecurring=Object.values(S.EXP||{}).filter(e=>e.recurring&&e.date&&e.date.startsWith(pmk));
  const currMonthDescs=new Set(Object.values(S.EXP||{}).filter(e=>e.date&&e.date.startsWith(mk)).map(e=>(e.description||'').trim()));
  const missing=prevRecurring.filter(e=>!currMonthDescs.has((e.description||'').trim()));
  if(!missing.length){alert('אין הוצאות חוזרות חסרות לחודש הזה');return;}
  const total=missing.reduce((s,e)=>s+Number(e.amount||0),0);
  if(!confirm(`לשכפל ${missing.length} הוצאות חוזרות לחודש הנוכחי?\nסה"כ: ₪${total.toLocaleString()}\n\n(התאריך יוגדר ל-1 בחודש הנוכחי, תוכל לערוך אחר כך)`))return;
  const firstDay=mk+'-01';
  missing.forEach(e=>{
    const key='e_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    S.EXP[key]={amount:Number(e.amount)||0,category:e.category||'other',description:e.description||'',vendor:e.vendor||'',date:firstDay,recurring:true,updated:Date.now()};
  });
  store.set('expenses',S.EXP);
  hRender();
}

function renderExpenses(all){
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'),yk=String(n.getFullYear());
  // Previous month key
  const pm=new Date(n.getFullYear(),n.getMonth()-1,1);
  const pmk=pm.getFullYear()+'-'+String(pm.getMonth()+1).padStart(2,'0');
  const pmLbl=MO[pm.getMonth()];
  
  const expArr=Object.entries(S.EXP||{}).map(([k,e])=>({k,...e,dt:e.date?new Date(e.date):new Date(0)})).sort((a,b)=>b.dt-a.dt);
  
  // Income calculations
  const incMonth=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);
  const incYear=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(yk)).reduce((s,a)=>s+Number(a.d.price),0);
  const incTotal=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0).reduce((s,a)=>s+Number(a.d.price),0);
  const incPrevMonth=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(pmk)).reduce((s,a)=>s+Number(a.d.price),0);
  
  // Expense calculations
  const expMonth=expArr.filter(e=>e.date&&e.date.startsWith(mk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const expYear=expArr.filter(e=>e.date&&e.date.startsWith(yk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const expTotal=expArr.reduce((s,e)=>s+Number(e.amount||0),0);
  const expPrevMonth=expArr.filter(e=>e.date&&e.date.startsWith(pmk)).reduce((s,e)=>s+Number(e.amount||0),0);
  const recurCount=expArr.filter(e=>e.recurring).length;
  
  // Recurring expenses from previous month (for forecast + duplicate)
  const prevRecurring=expArr.filter(e=>e.recurring&&e.date&&e.date.startsWith(pmk));
  const prevRecurringSum=prevRecurring.reduce((s,e)=>s+Number(e.amount||0),0);
  
  // Check if current month already has recurring duplicates from prev month
  const currMonthDescs=new Set(expArr.filter(e=>e.date&&e.date.startsWith(mk)).map(e=>(e.description||'').trim()));
  const missingRecurring=prevRecurring.filter(e=>!currMonthDescs.has((e.description||'').trim()));
  
  // Month filter options
  const months=['הכל'],mkeys=[];
  expArr.forEach(e=>{if(!e.date)return;const k=e.date.substring(0,7);if(!mkeys.includes(k)){mkeys.push(k);const[y,m]=k.split('-');months.push(MO[Number(m)-1]+' '+y);}});
  const filtered=S.expFilter==='all'?expArr:expArr.filter(e=>{if(!e.date)return false;const[y,m]=e.date.split('-');return MO[Number(m)-1]+' '+y===S.expFilter;});
  
  // Category breakdown (for filtered period)
  const catTotals={};
  filtered.forEach(e=>{const c=e.category||'other';catTotals[c]=(catTotals[c]||0)+Number(e.amount||0);});
  const totalFiltered=Object.values(catTotals).reduce((s,v)=>s+v,0);
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  
  // Delta calculations (this month vs previous)
  let expDeltaPct=null,expDeltaDir='',expDeltaCls='';
  if(expPrevMonth>0){
    expDeltaPct=Math.round((expMonth-expPrevMonth)/expPrevMonth*100);
    expDeltaDir=expDeltaPct>0?'↑':expDeltaPct<0?'↓':'=';
    // Higher expenses = bad (red), lower = good (green)
    expDeltaCls=expDeltaPct>5?'bad':expDeltaPct<-5?'good':'neutral';
  }
  
  // Hero - big orange expense card with delta
  const deltaBadge=expDeltaPct!==null?`<div class="exp-delta ${expDeltaCls}">${expDeltaDir} ${Math.abs(expDeltaPct)}% מ${pmLbl}</div>`:'';
  const hero=`<div class="exp-hero">
    <div class="exp-hero-lbl">💸 הוצאות ${MO[n.getMonth()]} ${n.getFullYear()}</div>
    <div class="exp-hero-val">₪${expMonth.toLocaleString()}</div>
    ${deltaBadge}
    <div class="exp-hero-stats">
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">₪${expYear.toLocaleString()}</div><div class="exp-hero-stat-l">השנה</div></div>
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">${expArr.length}</div><div class="exp-hero-stat-l">רישומים</div></div>
      <div class="exp-hero-stat"><div class="exp-hero-stat-v">${recurCount}</div><div class="exp-hero-stat-l">חוזרות</div></div>
    </div>
  </div>`;
  
  // Profit card - THE MOST IMPORTANT VIEW
  const netMonth=incMonth-expMonth,netYear=incYear-expYear;
  const netPrevMonth=incPrevMonth-expPrevMonth;
  let netDeltaTxt='';
  if(netPrevMonth!==0){
    const diff=netMonth-netPrevMonth;
    const arrow=diff>0?'↑':diff<0?'↓':'=';
    const cls=diff>0?'good':diff<0?'bad':'';
    netDeltaTxt=`<div class="profit-delta ${cls}">${arrow} ${diff>=0?'+':''}₪${Math.abs(diff).toLocaleString()} מ${pmLbl}</div>`;
  }
  const profit=`<div class="profit-card">
    <div class="profit-cell"><div class="profit-cell-lbl">הכנסות ${MO[n.getMonth()].substring(0,4)}</div><div class="profit-cell-val in">₪${incMonth.toLocaleString()}</div></div>
    <div class="profit-cell"><div class="profit-cell-lbl">הוצאות ${MO[n.getMonth()].substring(0,4)}</div><div class="profit-cell-val out">₪${expMonth.toLocaleString()}</div></div>
    <div class="profit-cell"><div class="profit-cell-lbl">רווח נטו</div><div class="profit-cell-val net${netMonth<0?' neg':''}">${netMonth<0?'-':''}₪${Math.abs(netMonth).toLocaleString()}</div>${netDeltaTxt}</div>
  </div>`;
  
  // Forecast / recurring reminder
  let forecast='';
  if(missingRecurring.length>0){
    const projectedExp=expMonth+prevRecurringSum-prevRecurring.filter(e=>currMonthDescs.has((e.description||'').trim())).reduce((s,e)=>s+Number(e.amount||0),0);
    const projectedNet=incMonth-projectedExp;
    forecast=`<div class="exp-forecast">
      <div class="exp-forecast-top">
        <div class="exp-forecast-title">🔄 הוצאות חוזרות ממתינות</div>
        <button class="exp-forecast-btn" onclick="duplicateRecurring()">📋 שכפל הכל</button>
      </div>
      <div class="exp-forecast-sub">${missingRecurring.length} הוצאות חוזרות מ${pmLbl} לא הוזנו עדיין (סה"כ ₪${missingRecurring.reduce((s,e)=>s+Number(e.amount||0),0).toLocaleString()})</div>
      <div class="exp-forecast-list">${missingRecurring.slice(0,4).map(e=>{const info=EXP_CATS[e.category]||EXP_CATS.other;return`<div class="exp-forecast-item">${info.i} ${x(e.description)} · <b>₪${Number(e.amount).toLocaleString()}</b></div>`;}).join('')}${missingRecurring.length>4?`<div class="exp-forecast-item" style="color:#9ca3af">+${missingRecurring.length-4} נוספות...</div>`:''}</div>
    </div>`;
  }
  
  // Category breakdown bars
  let catBreakdown='';
  if(catSorted.length){
    const maxVal=catSorted[0][1]||1;
    catBreakdown=`<div class="exp-cat-bar"><div style="font-size:11px;font-weight:800;color:#9a3412;margin-bottom:10px;letter-spacing:.5px;text-align:right">📊 פילוח לפי קטגוריה</div>`+
      catSorted.map(([c,v])=>{const info=EXP_CATS[c]||EXP_CATS.other,pct=Math.round(v/maxVal*100),pctTotal=totalFiltered?Math.round(v/totalFiltered*100):0;return`<div class="exp-cat-row"><div class="exp-cat-ico">${info.i}</div><div class="exp-cat-name">${info.l}</div><div class="exp-cat-track"><div class="exp-cat-fill" style="width:${pct}%;background:linear-gradient(90deg,${info.c},${info.c})"></div></div><div class="exp-cat-amt">₪${v.toLocaleString()} ·${pctTotal}%</div></div>`;}).join('')+
      `</div>`;
  }
  
  // Add/Edit form
  const isEdit=!!S.editExpKey;
  const form=S.showAddExp?`<div class="exp-form">
    <div class="exp-form-ttl">${isEdit?'✏️ עריכת הוצאה':'➕ הוצאה חדשה'}<button onclick="closeExpForm()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9a3412;padding:0">✕</button></div>
    <input class="exp-inp" id="exp-amt" type="number" inputmode="numeric" placeholder="סכום ₪ *" value="${S.newExp.amount||''}">
    <input class="exp-inp" id="exp-desc" placeholder="תיאור ההוצאה *" value="${x(S.newExp.description||'')}">
    <input class="exp-inp" id="exp-vendor" placeholder="ספק/חנות (לא חובה)" value="${x(S.newExp.vendor||'')}">
    <input class="exp-inp" id="exp-date" type="date" value="${S.newExp.date||todayISO()}">
    <div style="font-size:11px;color:#9a3412;margin:10px 0 6px;text-align:right;font-weight:700">קטגוריה:</div>
    <div class="exp-cat-grid">${Object.entries(EXP_CATS).map(([k,v])=>`<button class="exp-cat-btn${S.newExp.category===k?' on':''}" onclick="setExpCat('${k}')"><span class="exp-cat-btn-i">${v.i}</span>${v.l}</button>`).join('')}</div>
    <div class="exp-recur${S.newExp.recurring?' on':''}" onclick="toggleExpRecurring()"><div class="exp-recur-chk">${S.newExp.recurring?'✓':''}</div><span>🔄 הוצאה חוזרת (שכירות, חשמל וכו')</span></div>
    <div class="exp-form-btns">
      <button class="exp-btn-cancel" onclick="closeExpForm()">ביטול</button>
      <button class="exp-btn-save" onclick="saveExpense()">💾 ${isEdit?'עדכן':'שמור'}</button>
    </div>
  </div>`:`<button class="exp-add-btn" onclick="openExpForm()">➕ הוסף הוצאה חדשה</button>`;
  
  // Month filter
  const filterBar=months.length>1?`<div class="pay-filter" style="margin-bottom:10px">${months.map(m=>`<button class="pay-filter-btn${S.expFilter===(m==='הכל'?'all':m)?' on':''}" onclick="S.expFilter='${m==='הכל'?'all':m}';hRender()" style="${S.expFilter===(m==='הכל'?'all':m)?'background:#ea580c;border-color:#ea580c':''}">${m}</button>`).join('')}</div>`:'';
  
  // Empty state
  if(!expArr.length){
    return hero+profit+form+`<div class="exp-empty"><span class="exp-empty-i">💸</span><div class="exp-empty-t">אין עדיין הוצאות</div><div class="exp-empty-s">הוסף הוצאות עסק כדי לראות רווח נטו,<br>פילוח לפי קטגוריה, וכמה כסף הולך לאן</div></div>`;
  }
  
  // Group by month
  const byMonth={};
  filtered.forEach(e=>{if(!e.date)return;const[y,m]=e.date.split('-');const key=MO[Number(m)-1]+' '+y;if(!byMonth[key])byMonth[key]=[];byMonth[key].push(e);});
  
  const rows=Object.entries(byMonth).map(([mo,items])=>{
    const mt=items.reduce((s,e)=>s+Number(e.amount||0),0);
    return`<div class="exp-month-hdr"><span>₪${mt.toLocaleString()}</span><span>${mo}</span></div>`+items.map(e=>{
      const info=EXP_CATS[e.category]||EXP_CATS.other;
      const dateDisp=e.date?e.date.split('-').reverse().join('/'):'';
      return`<div class="exp-row${e.recurring?' recurring':''}">
        <div class="exp-row-top">
          <div class="exp-row-left">
            <div class="exp-row-desc">${x(e.description||'')}</div>
            <div class="exp-row-meta">
              <span class="exp-row-pill">${info.i} ${info.l}</span>
              ${e.recurring?'<span class="exp-row-pill recur">🔄 חוזרת</span>':''}
              ${e.vendor?'<span>· '+x(e.vendor)+'</span>':''}
            </div>
            <div class="exp-row-date">📅 ${dateDisp}</div>
          </div>
          <div class="exp-row-amt${e.recurring?' recurring':''}">₪${Number(e.amount).toLocaleString()}</div>
        </div>
        <div class="exp-row-actions">
          <button class="edit" onclick="editExpense('${e.k}')">✏️ עריכה</button>
          <button class="del" onclick="deleteExpense('${e.k}')">🗑 מחק</button>
        </div>
      </div>`;
    }).join('');
  }).join('');
  
  return hero+profit+forecast+catBreakdown+form+filterBar+rows;
}

function renderBGoals(all){
  const n=new Date(),mk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'),yk=String(n.getFullYear());
  const mRev=all.filter(a=>a.dt<=n&&a.d.price&&Number(a.d.price)>0&&a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);
  const mTr=all.filter(a=>a.dt<=n&&a.date.startsWith(mk)).length;
  const mCl=new Set(all.filter(a=>a.dt<=n&&a.date.startsWith(mk)).map(a=>a.d.name)).size;
  const goals=Object.entries(S.BG||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  const topG=goals.find(([,g])=>g.period==='month'&&g.type==='revenue');
  const topT=topG?Number(topG[1].target):0;
  const pct=topT>0?Math.min(100,Math.round(mRev/topT*100)):0;
  const pCls=pct>=100?'gn':pct>=60?'gy':'gp';
  const hero=`<div class="goals-hero"><div class="goals-hero-lbl">📊 ${MO[n.getMonth()]} ${n.getFullYear()}</div><div class="goals-hero-rev">₪${mRev.toLocaleString()} <span style="font-size:13px;opacity:.6">הכנסות</span></div>${topT?`<div class="goals-prog"><div class="goals-prog-fill ${pCls}" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:8px"><span>יעד: ₪${topT.toLocaleString()}</span><span>${pct}%</span></div>`:''}<div class="goals-hero-stats"><div class="ghs"><div class="ghs-val">${mTr}</div><div class="ghs-lbl">טיפולים</div></div><div class="ghs"><div class="ghs-val">${mCl}</div><div class="ghs-lbl">מטופלות</div></div><div class="ghs"><div class="ghs-val">${all.filter(a=>a.dt>n).length}</div><div class="ghs-lbl">קרובים</div></div></div></div>`;

function openMonthPicker(color,y,m){
  // Build month picker overlay

  const nowM=new Date().getMonth()+1,nowY=new Date().getFullYear();

      <button class="picker-close" onclick="document.getElementById('mo-picker').remove()">✕</button>
    </div>
    <div class="months-picker-grid">`;
  for(let i=1;i<=12;i++){

function ncPick(color,y,m){
  if(color==="#0d9488"){S.lY=y;S.lM=m;S.lSel=TD;}

  else if(color==="#db2777"){S.rY=y;S.rM=m;}

    const name=a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit){
      clientVisits[name].lastVisit=a.dt;
    }
    if(a.paid&&Number(a.price)>0)clientVisits[name].totalPaid+=Number(a.price);
  });
  
  const lostClients=Object.entries(clientVisits).filter(([name,v])=>{
    const daysSince=(n-v.lastVisit)/(1000*60*60*24);
    return daysSince>60&&daysSince<180&&v.count>=2; // was regular, 2-6 months gone
  }).sort((a,b)=>b[1].totalPaid-a[1].totalPaid).slice(0,5);
  
  if(lostClients.length>=2){
    insights.push({
      priority:'high',
      icon:'🎯',
      title:`${lostClients.length} מטופלות קבועות "נעלמו" — הן שווה זהב`,
      body:`זיהיתי ${lostClients.length} מטופלות שהגיעו לפחות פעמיים, אבל לא חזרו כבר חודשיים-חצי שנה. לפי הנתונים הן שילמו סה"כ ${lostClients.reduce((s,[,v])=>s+v.totalPaid,0).toLocaleString('he-IL')} ₪ — זה כסף שמפספסים.`,
      action:`השבוע: שלחי להן הודעת WhatsApp אישית — לא שיווקית. משהו כמו "היי ${lostClients[0][0]}, שמתי לב שמזמן לא נפגשנו! אני מחדשת את ה[טיפול האחרון שלה] בהנחה של 15% לשבוע הקרוב. אשמח לראות אותך". זה ממיר 30-40% מהמטופלות שחזרו.`,
      details:lostClients.map(([name,v])=>{
        const daysSince=Math.floor((n-v.lastVisit)/(1000*60*60*24));
        return `• ${name} — ${v.count} ביקורים · ${v.totalPaid.toLocaleString('he-IL')} ₪ · נעדרת ${daysSince} ימים`;
      }).join('\n')
    });
  }
  
  // ══ 2. Cancellation rate ══
  const cancs=Object.entries(S.CANC||{});
  const last30days=cancs.filter(([k,c])=>{
    const d=new Date(c.created);
    return (n-d)<30*24*60*60*1000;
  });
  const last30Appts=all.filter(a=>(n-a.dt)<30*24*60*60*1000&&a.dt<n);
  const cancRate=last30Appts.length>0?(last30days.length/(last30Appts.length+last30days.length))*100:0;
  
  if(cancRate>=10){
    // Analyze WHY
    const reasons={};
    last30days.forEach(([,c])=>{
      const r=c.reason||'לא צוין';
      reasons[r]=(reasons[r]||0)+1;
    });
    const topReason=Object.entries(reasons).sort((a,b)=>b[1]-a[1])[0];
    insights.push({
      priority:cancRate>=20?'high':'medium',
      icon:'⚠️',
      title:`${cancRate.toFixed(0)}% ביטולים בחודש האחרון — גבוה מהממוצע`,
      body:`בחודש האחרון היו ${last30days.length} ביטולים מתוך ${last30Appts.length+last30days.length} תורים. הממוצע בתחום הוא 5-8%, את נמצאת על ${cancRate.toFixed(0)}%. ${topReason?`הסיבה הנפוצה: "${topReason[0]}" (${topReason[1]} פעמים).`:''}`,
      action:`פתרון פשוט: הכניסי <b>אישור תור ב-WhatsApp יום לפני</b>. רוב המטופלות שבאמת רצו לבטל — יבטלו ביום שלפני במקום לפספס. ככה תוכלי למלא את המקום. אם את עוד לא עושה, תכניסי בטופס רישום שדה "מי מתחייבת" — מטופלות שחתמו על התחייבות בטלים ב-60% פחות.`
    });
  }
  
  // ══ 3. Outstanding debts ══
  let totalDebt=0;
  const debtClients=[];
  Object.entries(S.DEBTS||{}).forEach(([name,d])=>{
    if(d.amount>0){
      totalDebt+=d.amount;
      debtClients.push({name,amount:d.amount,since:d.since});
    }
  });
  
  if(totalDebt>500){
    const oldDebts=debtClients.filter(d=>{
      if(!d.since)return false;
      return (n-new Date(d.since))>60*24*60*60*1000; // over 2 months
    });
    insights.push({
      priority:totalDebt>2000?'high':'medium',
      icon:'💳',
      title:`${totalDebt.toLocaleString('he-IL')} ₪ חובות פתוחים${oldDebts.length?` · ${oldDebts.length} מעל חודשיים`:''}`,
      body:`יש לך ${debtClients.length} מטופלות עם חובות — סה"כ ${totalDebt.toLocaleString('he-IL')} ₪. ${oldDebts.length?`מתוכן ${oldDebts.length} חייבות מעל חודשיים (${oldDebts.reduce((s,d)=>s+d.amount,0).toLocaleString('he-IL')} ₪) — לרוב חוב מתיישן יותר קשה לגבות.`:'רובן עדיין "טריים".'}`,
      action:`השבוע: שלחי תזכורת עדינה בווטסאפ למטופלות שחייבות מעל 30 יום. נוסח מוצע: "היי [שם], נשאר לך חיוב פתוח של X ₪ מהטיפול ב-[תאריך]. אם נוח לך, אפשר לסגור את זה בביט/מזומן בתור הבא או עכשיו בלינק: [לינק]". עדיף לא להמתין שייצברו — ואם כבר הצטברו חובות ישנים, שקלי להציע הסדר תשלומים של 2-3 פעמים.`
    });
  }
  
  // ══ 4. Weak days analysis ══
  const dayStats=[0,0,0,0,0,0,0]; // 0=Sunday...6=Saturday
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  all.filter(a=>a.dt<n&&(n-a.dt)<90*24*60*60*1000).forEach(a=>{
    dayStats[a.dt.getDay()]++;
  });
  const activeTotal=dayStats.reduce((s,v)=>s+v,0);
  if(activeTotal>=20){
    const workdays=dayStats.map((c,i)=>({day:i,count:c})).filter(d=>d.day!==5&&d.day!==6); // exclude Fri/Sat
    const weakest=workdays.sort((a,b)=>a.count-b.count)[0];
    const strongest=workdays.sort((a,b)=>b.count-a.count)[0];
    if(strongest.count>0&&weakest.count<strongest.count*0.5){
      insights.push({
        priority:'medium',
        icon:'📅',
        title:`יום ${dayNames[weakest.day]} הכי חלש — חצי פחות מיום ${dayNames[strongest.day]}`,
        body:`ב-3 חודשים אחרונים: ${dayNames[strongest.day]} — ${strongest.count} תורים. ${dayNames[weakest.day]} — רק ${weakest.count}. יום חלש שחוזר על עצמו זה הזדמנות — המטופלות פשוט לא חושבות עליו.`,
        action:`הציעי "מבצע יום ${dayNames[weakest.day]}" — הנחה של 10-15% רק בימי ${dayNames[weakest.day]}. שווה לך להוריד מחיר מלקבל 0 שקלים. תפרסמי את זה פעם בשבועיים בסטטוס + בסטורי.`
      });
    }
  }
  
  // ══ 5. Revenue trend (last 3 months vs previous 3) ══
  const last3Months=all.filter(a=>a.paid&&(n-a.dt)<90*24*60*60*1000&&a.dt<n).reduce((s,a)=>s+(Number(a.price)||0),0);
  const prev3Months=all.filter(a=>a.paid&&(n-a.dt)>=90*24*60*60*1000&&(n-a.dt)<180*24*60*60*1000).reduce((s,a)=>s+(Number(a.price)||0),0);
  
  if(prev3Months>500&&last3Months>0){
    const diff=((last3Months-prev3Months)/prev3Months)*100;
    if(Math.abs(diff)>=15){
      const isGrowing=diff>0;
      insights.push({
        priority:isGrowing?'good':'high',
        icon:isGrowing?'📈':'📉',
        title:isGrowing?`צומחת — ${Math.abs(diff).toFixed(0)}% יותר הכנסות מרבעון קודם!`:`ירידה של ${Math.abs(diff).toFixed(0)}% ברבעון האחרון`,
        body:`3 חודשים אחרונים: ${last3Months.toLocaleString('he-IL')} ₪. 3 חודשים לפני: ${prev3Months.toLocaleString('he-IL')} ₪.`,
        action:isGrowing?`את עושה משהו נכון — תזהי מה השתנה! האם חידשת שירות? התחלת לפרסם במקום חדש? חזרת לרשימת המטופלות הישנות? מה שפעל — תמשיכי לעשות יותר.`:`בדקי: האם הייתה תקופת חגים שלא ספרתי? האם איבדת מטופלות קבועות? האם המחירים עודכנו ולא ידעת? חזור לשאלה 1 של היועץ — ייתכן והמטופלות שנעלמו הן הסיבה.`
      });
    }
  }
  
  // ══ 6. Average ticket ══
  const paid=all.filter(a=>a.paid&&Number(a.price)>0);
  if(paid.length>=10){
    const avg=paid.reduce((s,a)=>s+Number(a.price),0)/paid.length;
    const highTicket=paid.filter(a=>Number(a.price)>avg*1.5).length;
    const lowTicket=paid.filter(a=>Number(a.price)<avg*0.5).length;
    
    if(highTicket<paid.length*0.1){
      insights.push({
        priority:'low',
        icon:'💎',
        title:`יכולה לייקר — רק ${highTicket} טיפולים פרימיום מתוך ${paid.length}`,
        body:`ממוצע טיפול אצלך: ${avg.toFixed(0)} ₪. רק ${highTicket} טיפולים בפרמיום (מעל ${(avg*1.5).toFixed(0)} ₪) בכל ההיסטוריה. יש פה פוטנציאל — לא כל מטופלת רוצה את הזול, חלק ישמחו לשלם יותר עבור משהו מיוחד.`,
        action:`הוסיפי "חבילת VIP" — שילוב של טיפול + שירות נוסף (טיפול רגשי פנים חינם, בדיקת עור, תה צמחים מיוחד). תמחור ${(avg*1.6).toFixed(0)}-${(avg*2).toFixed(0)} ₪. 5-10% מהמטופלות יבחרו באוטומט, וזה מעלה ממוצע עסקה ב-15-20%.`
      });
    }
  }
  
  // ══ 7. New clients growth ══
  const firstVisitMap={};
  all.filter(a=>a.dt<n).forEach(a=>{
    const name=a.name;
    if(!name)return;
    if(!firstVisitMap[name]||a.dt<firstVisitMap[name]){
      firstVisitMap[name]=a.dt;
    }
  });
  const newLast30=Object.values(firstVisitMap).filter(d=>(n-d)<30*24*60*60*1000).length;
  const newPrev30=Object.values(firstVisitMap).filter(d=>(n-d)>=30*24*60*60*1000&&(n-d)<60*24*60*60*1000).length;
  
  if(newLast30+newPrev30>=4){
    const ratio=newPrev30>0?newLast30/newPrev30:newLast30;
    if(ratio<0.5&&newPrev30>=3){
      insights.push({
        priority:'medium',
        icon:'🌱',
        title:`${newLast30} מטופלות חדשות החודש — חצי מהחודש הקודם`,
        body:`ראיתי ${newLast30} מטופלות חדשות החודש, לעומת ${newPrev30} בחודש לפני. ייתכן שהפרסום דעך או שמישהי אחרת "לוקחת" מטופלות פוטנציאליות.`,
        action:`לכי לטאב <b>📢 פרסום</b>. בחרי ערוץ חדש שעדיין לא ניסית (נסי לבקש מ-רופאת המשפחה בסביבה המלצה — הפניות מאנשי מקצוע מביאות מטופלות איכותיות). בנוסף, בקשי מ-3 מטופלות מרוצות להמליץ עלייך בקבוצות אמהות ירושלים — המלצה אישית שווה 10 מודעות.`
      });
    }else if(ratio>1.5){
      insights.push({
        priority:'good',
        icon:'🚀',
        title:`${newLast30} מטופלות חדשות החודש — ${((ratio-1)*100).toFixed(0)}% יותר!`,
        body:`מעולה! הגיעו ${newLast30} מטופלות חדשות (לעומת ${newPrev30} בחודש קודם). זאת אומרת שמשהו בשיווק שלך עובד.`,
        action:`קריטי: אל תעצרי, <b>תגברי</b>. שאלי את המטופלות החדשות "איך הגעת אליי?" ותרשמי בהערות. ככה תדעי איזה ערוץ עובד הכי טוב ותוכלי להשקיע יותר בו.`
      });
    }
  }
  
  // Sort by priority: high > medium > good > low
  const priorityOrder={high:0,medium:1,good:2,low:3};
  insights.sort((a,b)=>priorityOrder[a.priority]-priorityOrder[b.priority]);
  
  return insights;
}
