// Architecture: Claude called 1× per day from Rinat's diary.
// Result cached in Firebase /daily_ai_tip/{YYYY-MM-DD}.
// Public site (rb-prolaser) reads from Firebase — no API key exposed.

const CLAUDE_API_URL='https://api.anthropic.com/v1/messages';
const CLAUDE_MODEL='claude-opus-4-5'; // Best quality for business insights

// API key stored ONLY in localStorage of Rinat's device. Never leaves it.
function getClaudeKey(){
  try{return localStorage.getItem('hodaya_claude_api_key')||'';}catch(e){return '';}
}
function setClaudeKey(k){
  try{
    if(k)localStorage.setItem('hodaya_claude_api_key',k);
    else localStorage.removeItem('hodaya_claude_api_key');
  }catch(e){}
}
function hasClaudeKey(){return !!getClaudeKey();}

// Format today's date key (YYYY-MM-DD)
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Build a compact summary of the business for Claude to analyze
function buildBusinessContext(){
  const now=new Date();
  const all=allAppts();
  const past=all.filter(a=>a.dt<=now);
  const future=all.filter(a=>a.dt>now);
  const paidPast=past.filter(a=>a.paid&&Number(a.d?.price||a.price)>0);
  
  // Last 30 days stats
  const last30=past.filter(a=>(now-a.dt)<30*24*60*60*1000);
  const rev30=last30.filter(a=>a.paid).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  
  // Previous 30 days
  const prev30=past.filter(a=>(now-a.dt)>=30*24*60*60*1000&&(now-a.dt)<60*24*60*60*1000);
  const prevRev30=prev30.filter(a=>a.paid).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  
  // Clients
  const clientVisits={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit)clientVisits[name].lastVisit=a.dt;
    if(a.paid&&Number(a.d?.price||a.price)>0)clientVisits[name].totalPaid+=Number(a.d?.price||a.price);
  });
  
  const activeClients=Object.entries(clientVisits).filter(([,v])=>(now-v.lastVisit)<90*24*60*60*1000).length;
  const lostClients=Object.entries(clientVisits).filter(([,v])=>{
    const d=(now-v.lastVisit)/(1000*60*60*24);
    return d>60&&d<200&&v.count>=2;
  });
  const topLoyal=Object.entries(clientVisits).filter(([,v])=>v.count>=5).length;
  
  // Debts
  const debts=Object.entries(S.DEBTS||{}).filter(([,d])=>d.amount>0);
  const totalDebt=debts.reduce((s,[,d])=>s+d.amount,0);
  
  // Cancellations
  const cancs=Object.entries(S.CANC||{});
  const recentCancs=cancs.filter(([,c])=>(now-new Date(c.created))<30*24*60*60*1000).length;
  const cancRate=last30.length>0?Math.round((recentCancs/(last30.length+recentCancs))*100):0;
  
  // Day of week analysis (past 3 months)
  const dayStats=[0,0,0,0,0,0,0];
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  paidPast.filter(a=>(now-a.dt)<90*24*60*60*1000).forEach(a=>dayStats[a.dt.getDay()]++);
  const strongestDay=dayStats.indexOf(Math.max(...dayStats));
  const weakestWorkday=[0,1,2,3,4].reduce((w,d)=>dayStats[d]<dayStats[w]?d:w,0);
  
  // Average ticket
  const avgTicket=paidPast.length>0?Math.round(paidPast.reduce((s,a)=>s+Number(a.d?.price||a.price||0),0)/paidPast.length):0;
  
  // New clients last 30 days
  const firstSeen={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!firstSeen[name]||a.dt<firstSeen[name])firstSeen[name]=a.dt;
  });
  const newClients30=Object.values(firstSeen).filter(d=>(now-d)<30*24*60*60*1000).length;
  
  // Packages
  const pkgs=Object.entries(S.PKGS||{}).filter(([,p])=>p.remaining>0);
  const pkgsEndingSoon=pkgs.filter(([,p])=>p.remaining<=2).length;
  
  return {
    date:todayKey(),
    dayOfWeek:dayNames[now.getDay()],
    appointments:{
      upcomingTotal:future.length,
      today:future.filter(a=>a.date===TD).length,
      last30days:last30.length,
      historicalTotal:past.length
    },
    revenue:{
      last30Days:rev30,
      previous30Days:prevRev30,
      trendPercent:prevRev30>0?Math.round(((rev30-prevRev30)/prevRev30)*100):null,
      averageTicket:avgTicket
    },
    clients:{
      totalEver:Object.keys(clientVisits).length,
      activeLast90Days:activeClients,
      loyal5PlusVisits:topLoyal,
      newLast30Days:newClients30,
      dormantCouldReturn:lostClients.length
    },
    debts:{
      clientsWithDebt:debts.length,
      totalOwed:totalDebt
    },
    cancellations:{
      last30Days:recentCancs,
      percentOfAppts:cancRate
    },
    schedule:{
      strongestDay:dayNames[strongestDay],
      weakestWorkday:dayNames[weakestWorkday]
    },
    packages:{
      active:pkgs.length,
      endingSoon:pkgsEndingSoon
    }
  };
}

// Call Claude API with business context and get a daily tip back
async function callClaudeForTip(){
  const key=getClaudeKey();
  if(!key)throw new Error('אין מפתח API');
  
  const context=buildBusinessContext();
  
  const systemPrompt=`אתה יועץ עסקי ותיק של קליניקת לייזר יופי בירושלים, שכונת רמות. הבעלים — הודיה. את מדברת/כותבת בעברית בלבד, בטון חברי, אישי, ובגוף נקבה (אל הודיה).

משימה: תקבל סיכום נתוני העסק של הודיה, ותחזיר טיפ אחד מרכזי להיום — קצר, חד, מעשי, מבוסס על הנתונים.

פורמט התשובה — JSON בלבד (בלי טקסט נוסף):
{
  "tip": "תוכן הטיפ בעברית — 2-3 משפטים קצרים, אבל עם ערך אמיתי",
  "action": "פעולה ספציפית שהיא יכולה לעשות היום בבוקר — משפט אחד",
  "insight_type": "growth | retention | cashflow | scheduling | pricing | marketing",
  "emoji": "אימוג'י יחיד שמייצג את הטיפ"
}

חוקים:
- תהיי ספציפית ל*הנתונים* שלה — לא בנאליות כלליות
- אם הנתונים חלשים/חסרים, תני טיפ עונתי/כללי רלוונטי
- אל תמציאי מספרים — השתמשי רק במה שיש בנתונים
- מקסימום 250 תווים לכל שדה`;
  
  const userMsg=`הנה סיכום העסק שלי להיום:
\`\`\`json
${JSON.stringify(context,null,2)}
\`\`\`

תני לי טיפ אחד להיום.`;
  
  const response=await fetch(CLAUDE_API_URL,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:CLAUDE_MODEL,
      max_tokens:500,
      system:systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  
  if(!response.ok){
    const err=await response.text();
    throw new Error(`Claude API error ${response.status}: ${err.substring(0,200)}`);
  }
  
  const data=await response.json();
  const text=data.content?.[0]?.text||'';
  
  // Extract JSON from response
  let parsed;
  try{
    const match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('No JSON in response');
    parsed=JSON.parse(match[0]);
  }catch(e){
    throw new Error('Failed to parse Claude response: '+text.substring(0,100));
  }
  
  return {
    ...parsed,
    generated_at:new Date().toISOString(),
    date:todayKey(),
    source:'claude_opus_4_5'
  };
}

// Get cached tip for today (or null if not generated yet)
async function getCachedClaudeTip(){
  const key=todayKey();
  try{
    const r=await fetch(FB+'/daily_ai_tip/'+key+'.json',{cache:'no-store'});
    if(r.ok){
      const d=await r.json();
      if(d&&d.tip)return d;
    }
  }catch(e){}
  return null;
}

// Save today's tip to Firebase (public readable)
async function saveClaudeTipToFirebase(tip){
  const key=todayKey();
  try{
    await fetch(FB+'/daily_ai_tip/'+key+'.json',{
      method:'PUT',
      body:JSON.stringify(tip)
    });
    // Also save as "latest" for easy public access
    await fetch(FB+'/daily_ai_tip_latest.json',{
      method:'PUT',
      body:JSON.stringify(tip)
    });
    return true;
  }catch(e){
    console.warn('Failed to save tip to Firebase:',e);
    return false;
  }
}

// Main function — check if tip exists for today, generate if needed
async function ensureDailyClaudeTip(forceRefresh){
  // Check cache first (unless forced)
  if(!forceRefresh){
    const cached=await getCachedClaudeTip();
    if(cached)return {tip:cached,fromCache:true};
  }
  
  if(!hasClaudeKey())throw new Error('אין מפתח API — הגדירי קודם');
  
  // Generate new tip
  const tip=await callClaudeForTip();
  await saveClaudeTipToFirebase(tip);
  return {tip,fromCache:false};
}

        <div style="color:white;font-weight:800;font-size:13px;margin-bottom:4px">טוען טיפ יומי מ-Claude...</div>
        <div style="color:rgba(255,255,255,.6);font-size:11px">אם זה לוקח זמן, לחצי "בדיקה ידנית" בהגדרות</div>
      </div>`;
    }
    return; // without key, don't show anything
  }
  
  const tip=cached;
  const dateStr=tip.date?tip.date.split('-').reverse().join('/'):'';
  const typeLabels={
    growth:'📈 צמיחה',
    retention:'🔄 שימור',
    cashflow:'💰 תזרים',
    scheduling:'📅 תכנון',
    pricing:'💎 תמחור',
    marketing:'📢 שיווק'
  };
  const typeLabel=typeLabels[tip.insight_type]||'💡 תובנה';
  
  slot.innerHTML=`<div class="claude-tip-card">
    <div class="claude-tip-hdr">
      <span class="claude-tip-badge">CLAUDE</span>
      <span class="claude-tip-label">טיפ מותאם אישית</span>
      <span class="claude-tip-date">${dateStr}</span>
    </div>
    <div class="claude-tip-body">
      <span class="claude-tip-emoji">${tip.emoji||'💡'}</span>
      <span>${x(tip.tip||'')}</span>
    </div>
    ${tip.action?`<div class="claude-tip-action">
      <div class="claude-tip-action-label">✨ מה לעשות עכשיו</div>
      <div class="claude-tip-action-body">${x(tip.action)}</div>
    </div>`:''}
    <div class="claude-tip-meta">
      <span class="claude-tip-type">${typeLabel}</span>
      ${hasClaudeKey()?`<button class="claude-tip-refresh" onclick="refreshClaudeTip(this)" title="הפק טיפ חדש עכשיו">🔄 עדכני עכשיו</button>`:''}
    </div>
  </div>`;
}

async function refreshClaudeTip(btn){
  if(!hasClaudeKey()){webToast('⚠️ הגדירי קודם Claude',true);return;}
  if(btn)btn.disabled=true;
  webToast('⏳ מבקשת טיפ חדש מ-Claude...');
  try{
    await ensureDailyClaudeTip(true);
    await loadClaudeTipIntoSlot();
    webToast('✅ טיפ חדש נוצר');
  }catch(e){
    webToast('❌ '+e.message,true);
  }
  if(btn)btn.disabled=false;
}

function generateSmartTip(){
  const now=new Date();
  const all=allAppts();
  const future=all.filter(a=>a.dt>now);
  const past=all.filter(a=>a.dt<=now);
  const paidPast=past.filter(a=>a.paid&&Number(a.price)>0);
  
  // Build pool of data-driven tip candidates
  const candidates=[];
  
  // ── Client-focused insights ──
  // 1. Specific client not seen recently
  const clientVisits={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0,phone:a.d?.phone||a.phone||''};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit)clientVisits[name].lastVisit=a.dt;
    if(a.paid&&Number(a.price)>0)clientVisits[name].totalPaid+=Number(a.price);
  });
  const lostClients=Object.entries(clientVisits).filter(([n,v])=>{
    const d=(now-v.lastVisit)/(1000*60*60*24);
    return d>60&&d<200&&v.count>=2;
  }).sort((a,b)=>b[1].totalPaid-a[1].totalPaid);
  if(lostClients.length){
    const [name,info]=lostClients[Math.floor(Math.random()*Math.min(5,lostClients.length))];
    const daysGone=Math.floor((now-info.lastVisit)/(1000*60*60*24));
    candidates.push({
      i:'💌',
      t:`<b>${x(name)}</b> לא הגיעה כבר ${daysGone} ימים. היא ביקרה ${info.count} פעמים ושילמה בסה"כ ₪${info.totalPaid.toLocaleString()}. שלחי לה היום הודעה אישית — מטופלות "אבודות" כאלה חוזרות ב-40% מהמקרים.`,
      priority:2
    });
  }
  
  // 2. Very loyal client celebration
  const topLoyal=Object.entries(clientVisits).filter(([n,v])=>v.count>=8)
    .sort((a,b)=>b[1].count-a[1].count);
  if(topLoyal.length){
    const [name,info]=topLoyal[Math.floor(Math.random()*Math.min(3,topLoyal.length))];
    candidates.push({
      i:'👑',
      t:`<b>${x(name)}</b> הגיעה אליך ${info.count} פעמים — זו מטופלת מיוחדת. תני לה הטבה קטנה בתור הבא (תה צמחים, הסרת שיער פנים בונוס) או הודעה "שמחה שאת איתי כבר ${info.count} טיפולים!". נאמנות כזאת שווה זהב.`,
      priority:2
    });
  }
  
  // 3. Debt reminder for specific client
  const debtors=Object.entries(S.DEBTS||{}).filter(([,d])=>d.amount>0)
    .sort((a,b)=>b[1].amount-a[1].amount);
  if(debtors.length){
    const [name,d]=debtors[Math.floor(Math.random()*Math.min(3,debtors.length))];
    candidates.push({
      i:'💳',
      t:`<b>${x(name)}</b> חייבת ₪${d.amount.toLocaleString()}. הדרך הכי נעימה לגבות: "היי ${x(name)}, נשאר חיוב פתוח של ₪${d.amount} — נוח לך לסגור בביט היום? לינק: [שלחי ביט]". 70% מהמטופלות משלמות בהזדמנות הראשונה שמזכירים.`,
      priority:1
    });
  }
  
  // ── Time-based insights ──
  // 4. Today's schedule
  const today=future.filter(a=>a.date===TD);
  if(today.length>=3){
    const totalToday=today.reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
    candidates.push({
      i:'🔥',
      t:`יש לך <b>${today.length} תורים היום</b> בהכנסה של ₪${totalToday.toLocaleString()}! קחי 2 דקות לסדר את הכלים, למלא מים, ולקחת נשימה. יום עמוס = שירות איכותי רק אם את רגועה.`,
      priority:2
    });
  }else if(today.length===0&&future.length){
    const nextDate=future[0].date;
    candidates.push({
      i:'📅',
      t:`היום ללא תורים. <b>תנצלי את היום</b> — שלחי הודעה ל-3 מטופלות קבועות שלא הגיעו לאחרונה, עדכני פוסט באינסטגרם, או סדרי את הקליניקה. התור הבא שלך: ${nextDate}.`,
      priority:2
    });
  }
  
  // 5. Day-of-week analysis
  const dayStats=[0,0,0,0,0,0,0];
  const dayRev=[0,0,0,0,0,0,0];
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  paidPast.forEach(a=>{
    if((now-a.dt)<90*24*60*60*1000){
      const d=a.dt.getDay();
      dayStats[d]++;
      dayRev[d]+=Number(a.d?.price||a.price)||0;
    }
  });
  const workdays=[0,1,2,3,4].map(i=>({d:i,c:dayStats[i],r:dayRev[i]}));
  const activeWorkdays=workdays.filter(d=>d.c>0);
  if(activeWorkdays.length>=3){
    const strongest=[...activeWorkdays].sort((a,b)=>b.r-a.r)[0];
    const weakest=[...activeWorkdays].sort((a,b)=>a.r-b.r)[0];
    if(strongest.r>weakest.r*2){
      candidates.push({
        i:'📊',
        t:`ב-3 חודשים אחרונים: <b>יום ${dayNames[strongest.d]}</b> הוא היום הכי רווחי (₪${strongest.r.toLocaleString()}), <b>יום ${dayNames[weakest.d]}</b> הכי חלש (₪${weakest.r.toLocaleString()}). שקלי "מבצע יום ${dayNames[weakest.d]}" עם 10% הנחה — עדיף לעבוד ברווח מופחת מלא לעבוד בכלל.`,
        priority:2
      });
    }
  }
  
  // 6. Revenue trend this month vs last
  const thisMonth=paidPast.filter(a=>{
    const d=a.dt;return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  const lastMonthDate=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lastMonth=paidPast.filter(a=>{
    const d=a.dt;return d.getMonth()===lastMonthDate.getMonth()&&d.getFullYear()===lastMonthDate.getFullYear();
  }).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  if(lastMonth>500){
    const diff=((thisMonth-lastMonth)/lastMonth)*100;
    if(Math.abs(diff)>=10){
      const isUp=diff>0;
      candidates.push({
        i:isUp?'📈':'📉',
        t:isUp?`<b>החודש עד עכשיו: ₪${thisMonth.toLocaleString()}</b> — ${diff.toFixed(0)}% יותר מחודש שעבר (₪${lastMonth.toLocaleString()})! תמשיכי במה שאת עושה, ותזהי מה השתנה בחודש הזה כדי לשחזר.`:`החודש עד עכשיו: ₪${thisMonth.toLocaleString()} — <b>ירידה של ${Math.abs(diff).toFixed(0)}%</b> מחודש שעבר (₪${lastMonth.toLocaleString()}). אולי הייתה חופשה/חגים? אם לא — בדקי את מטופלות ה-CRM, ייתכן שיש "נעלמות" שכדאי לדובב.`,
        priority:1
      });
    }
  }
  
  // 7. Cancellation alert
  const cancs=Object.entries(S.CANC||{});
  const recentCancs=cancs.filter(([,c])=>{
    const d=new Date(c.created);
    return (now-d)<14*24*60*60*1000;
  });
  if(recentCancs.length>=3){
    candidates.push({
      i:'⚠️',
      t:`<b>${recentCancs.length} ביטולים בשבועיים האחרונים</b> — זה יותר מהרגיל. הטיפ: שלחי אישור-תור ב-WhatsApp יום לפני כל תור. פסיכולוגית, כשמישהי "מאשרת" היא תבטל פחות. זה מוריד ביטולים ב-60%.`,
      priority:1
    });
  }
  
  // 8. New clients this month
  const firstSeen={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!firstSeen[name]||a.dt<firstSeen[name])firstSeen[name]=a.dt;
  });
  const newThisMonth=Object.values(firstSeen).filter(d=>d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()).length;
  if(newThisMonth>=3){
    candidates.push({
      i:'🌱',
      t:`<b>${newThisMonth} מטופלות חדשות</b> הגיעו החודש! זה מצוין — אל תעצרי. תוך שבוע מהביקור הראשון, שלחי הודעה "איך את מרגישה? יש שאלות?". 80% יהפכו למטופלות קבועות אם מרגישות שחשוב לך.`,
      priority:2
    });
  }
  
  // 9. Pricing insight — cheap clients
  if(paidPast.length>=15){
    const avg=paidPast.reduce((s,a)=>s+Number(a.d?.price||a.price||0),0)/paidPast.length;
    const hasClient=Object.keys(clientVisits).length;
    if(hasClient&&avg<300){
      candidates.push({
        i:'💎',
        t:`ממוצע טיפול אצלך: <b>₪${avg.toFixed(0)}</b>. זה נמוך יחסית. לא חייב להעלות לכל המטופלות — תוסיפי "חבילת פרימיום" במחיר ₪${(avg*1.7).toFixed(0)} עם בונוס (הסרת שיער פנים חינם / תה צמחים / בדיקת עור). 10% יבחרו בה אוטומטית.`,
        priority:2
      });
    }
  }
  
  // 10. Package reminders
  const pkgs=Object.entries(S.PKGS||{}).filter(([,p])=>p.remaining>0&&p.remaining<=2);
  if(pkgs.length){
    const [name,p]=pkgs[Math.floor(Math.random()*pkgs.length)];
    candidates.push({
      i:'📦',
      t:`<b>${x(name)}</b> נותרה לה ${p.remaining} טיפולים בחבילה. <b>זה הזמן להודיע לה</b>: "היי, נשאר לך ${p.remaining} טיפולים מהחבילה — נקבע?". חידוש חבילות אחרי תום ב-80% מהמקרים.`,
      priority:1
    });
  }
  
  // 11. Holiday/season tip (current month)
  const month=now.getMonth()+1; // 1-12
  const seasonTips={
    1:'ינואר — התחלת שנה. <b>פרסמי מחירון מעודכן</b> והציעי "חבילת התחלת שנה" עם הנחה לחתימה על 5+ טיפולים.',
    2:'פברואר — חורף אמצע. מטופלות פחות מתכננות יציאות, <b>זה הזמן לטיפולי עומק ומבצעי "הכנה לקיץ"</b>.',
    3:'מרץ — לקראת פורים ופסח. <b>נשים ישימו לב למראה יותר</b>. דחפי את הפרסום 2 שבועות לפני.',
    4:'אפריל — אחרי פסח. <b>עונת החתונות מתחילה</b>. הציעי חבילות "כלה" / "אמא של הכלה" עם 3-4 טיפולים.',
    5:'מאי — שבועות + קיץ. <b>מטופלות מתחילות להתכונן לים</b>. הסרת שיער והבהרות הם לוהטים.',
    6:'יוני — תחילת קיץ. <b>שיא העומס</b>. תדאגי לרשימת המתנה — מטופלת שלא מצליחה לקבוע הולכת למתחרה.',
    7:'יולי — חופש גדול. <b>הרבה חוסר יציבות</b>. הציעי "כרטיסיית 5 טיפולים" עם תוקף 3 חודשים כדי לעגן אותן.',
    8:'אוגוסט — סוף חופש גדול. <b>אמהות עייפות ורוצות פינוק</b>. פרסמי "חצי שעה רק לעצמך" עם מחיר מיוחד.',
    9:'ספטמבר — חזרה לשגרה + חגים. <b>נשים רוצות להיראות טוב לראש השנה</b>. פתחי רשימת המתנה ליום כיפור.',
    10:'אוקטובר — סוף חגים. <b>תקופה שקטה</b>. שלחי הודעה "תנוחי מהחגים אצלי" עם הנחה 20%.',
    11:'נובמבר — חורף מתחיל. <b>טיפולי עור להכנה לחורף</b>. שיתוף עם קוסמטיקאית יכולה להיות מצוין.',
    12:'דצמבר — סיום שנה. <b>"בלאק פריידי קליניקה"</b> — מבצע 48 שעות בלבד, יצירת דחיפות.'
  };
  if(seasonTips[month]){
    candidates.push({i:'🗓',t:seasonTips[month],priority:3});
  }
  
  // ── Add some from the static pool for diversity ──
  const staticTips=AI_DAILY_TIPS.slice().sort(()=>Math.random()-0.5).slice(0,4);
  staticTips.forEach(s=>candidates.push({...s,priority:3,static:true}));
  
  // Priority-weighted random selection
  // Priority 1 (urgent data): weight 4
  // Priority 2 (important data): weight 3
  // Priority 3 (general): weight 1
  const weighted=[];
  candidates.forEach(c=>{
    const weight=c.priority===1?4:c.priority===2?3:1;
    for(let i=0;i<weight;i++)weighted.push(c);
  });
  
  if(weighted.length===0){
    // Fallback to random static tip
    const t=AI_DAILY_TIPS[Math.floor(Math.random()*AI_DAILY_TIPS.length)];
    return {...t,source:'static'};
  }
  
  const picked=weighted[Math.floor(Math.random()*weighted.length)];
  return {...picked,source:picked.static?'static':'data'};
}

// Counter for how many tips user has browsed
let _advTipCount=1;

// Generate and swap in a fresh tip with animation
function advNextTip(){
  const tip=generateSmartTip();
  const body=document.getElementById('adv-tip-body');
  const ico=document.getElementById('adv-tip-ico');
  const txt=document.getElementById('adv-tip-text');
  const src=document.getElementById('adv-tip-source');
  const counter=document.getElementById('adv-tip-counter');
  const svg=document.getElementById('adv-tip-icon-svg');
  if(!body)return;
  
  // Animate refresh icon spin
  if(svg){
    svg.style.transform='rotate(0deg)';
    svg.style.transition='transform .5s ease';
    requestAnimationFrame(()=>{svg.style.transform='rotate(360deg)';});
  }
  
  // Fade out
  body.style.opacity='0';
  body.style.transform='translateY(6px)';
  setTimeout(()=>{
    if(ico)ico.textContent=tip.i;
    if(txt)txt.innerHTML=tip.t;
    if(src)src.textContent=tip.source==='data'?'🎯 מנתון אמיתי מהעסק':'📚 מבסיס ידע';
    _advTipCount++;
    if(counter)counter.textContent='#'+_advTipCount;
    // Fade back in
    body.style.transform='translateY(0)';
    body.style.opacity='1';
  },220);
}

      <div class="adv-empty-title">הכל נראה מצוין!</div>
      <div class="adv-empty-sub">לא זיהיתי בעיות דחופות בנתונים. תמשיכי כך! ככל שיהיו יותר נתונים (תורים, תשלומים), אוכל לתת תובנות מדויקות יותר.</div>
    </div>`;
    return html;
  }
  
  // Render insights
  html+=`<div class="adv-insights">`;
  insights.forEach((ins,idx)=>{
    const priorityClass='adv-p-'+ins.priority;
    const priorityLabel={high:'🔴 דחוף',medium:'🟡 חשוב',good:'🟢 חיובי',low:'🔵 טיפ'}[ins.priority]||'';
    html+=`<div class="adv-card ${priorityClass}">
      <div class="adv-card-hdr">
        <div class="adv-card-ico">${ins.icon}</div>
        <div class="adv-card-hdr-txt">
          <div class="adv-card-priority">${priorityLabel}</div>
          <div class="adv-card-title">${x(ins.title)}</div>
        </div>
      </div>
      <div class="adv-card-body">${ins.body.replace(/<b>/g,'<b>').replace(/<\/b>/g,'</b>')}</div>
      ${ins.details?`<div class="adv-card-details">${ins.details.split('\n').map(l=>`<div>${x(l)}</div>`).join('')}</div>`:''}
      <div class="adv-card-action">
        <div class="adv-card-action-label">✨ פעולה מומלצת</div>
        <div class="adv-card-action-body">${ins.action}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  
  // Footer note
  html+=`<div class="adv-footer">
    <div class="adv-footer-ico">💡</div>
    <div class="adv-footer-txt">התובנות מבוססות על ניתוח הנתונים שלך — תורים, תשלומים, ביטולים, חובות והוצאות. ככל שיהיו יותר נתונים, התובנות יהיו מדויקות יותר. הניתוח רץ מקומית במכשיר — אף אחד חוץ ממך לא רואה את הנתונים.</div>
  </div>`;
  
  return html;
}

function renderDebts(){
  const n=new Date();
  const allDebts=[];
  Object.entries(S.A).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(!d||!d.name)return;
      const dt=new Date(date+'T'+time);
      if(dt>n)return;
      if(d.price&&Number(d.price)>0){
        allDebts.push({date,time,d,dt,key:date+'_'+time,paid:!!d.paid});
      }
    });
  });
  allDebts.sort((a,b)=>b.dt-a.dt);

  const openDebts=allDebts.filter(a=>!a.paid);
  const paidDebts=allDebts.filter(a=>a.paid);

  if(!allDebts.length)return`<div class="empty-state"><span class="empty-icon">🎉</span>אין חובות פתוחים<br><span style="font-size:13px">כל התשלומים מסודרים!</span></div>`;

  const totalDebt=openDebts.reduce((s,a)=>s+Number(a.d.price),0);
  const clientsWithDebt=new Set(openDebts.map(a=>a.d.name)).size;
  const mk=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
  const monthDebt=openDebts.filter(a=>a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);

  const byClient={};
  allDebts.forEach(a=>{
    const k=a.d.name;
    if(!byClient[k])byClient[k]={name:k,phone:a.d.phone||'',items:[],total:0,openTotal:0};
    byClient[k].items.push(a);
    byClient[k].total+=Number(a.d.price);
    if(!a.paid)byClient[k].openTotal+=Number(a.d.price);
  });

  const hero=openDebts.length?`<div class="debt-hero">
    <div class="debt-hero-lbl">💳 חובות פתוחים</div>
    <div class="debt-hero-amount">₪${totalDebt.toLocaleString()}</div>
    <div class="debt-hero-sub">ממתין לגביה</div>
    <div class="debt-hero-stats">
      <div class="dhs"><div class="dhs-val">${clientsWithDebt}</div><div class="dhs-lbl">מטופלות</div></div>
      <div class="dhs"><div class="dhs-val">${openDebts.length}</div><div class="dhs-lbl">טיפולים</div></div>
      <div class="dhs"><div class="dhs-val">₪${monthDebt.toLocaleString()}</div><div class="dhs-lbl">החודש</div></div>
    </div>
  </div>`:`<div style="background:linear-gradient(135deg,#059669,#047857);border-radius:20px;padding:16px;margin-bottom:14px;text-align:center;color:white"><div style="font-size:22px">🎉</div><div style="font-weight:900;font-size:18px;margin-top:6px">כל החובות שולמו!</div></div>`;

  const cards=Object.values(byClient).sort((a,b)=>b.openTotal-a.openTotal).map(cl=>{
    const items=cl.items.map(a=>`<div class="debt-item" style="${a.paid?'opacity:.6;background:#f0fdf4':''}">
      <div class="debt-item-info">
        <div class="debt-item-name">${a.d.type||'טיפול'} — ${a.time}</div>
        <div class="debt-item-date">📅 ${a.date} · ₪${Number(a.d.price).toLocaleString()}</div>
      </div>
      ${a.paid
        ?`<span style="background:#dcfce7;color:#059669;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:800">✅ שולם</span>`
        :`<button class="debt-pay-btn" onclick="markPaid('${a.date}','${a.time}')">✓ שולם</button>`
      }
    </div>`).join('');
    return`<div class="debt-client-card">
      <div class="debt-client-hdr">
        <div class="debt-client-amount" style="${cl.openTotal===0?'color:#059669':''}">₪${cl.openTotal>0?cl.openTotal.toLocaleString():'שולם הכל'}</div>
        <div>
          <div class="debt-client-name">${x(cl.name)}</div>
          ${cl.phone?`<div style="font-size:11px;color:#9ca3af">${x(cl.phone)}</div>`:''}
        </div>
      </div>
      ${items}
    </div>`;
  }).join('');

  return hero+`<div class="section-lbl">לפי מטופל</div>`+cards;
}
function markPaid(date,time){
  if(!S.A[date]||!S.A[date][time])return;

  store.set('appts',S.A);
  // Update debt tab

function savePayment(date,time){
  if(!S.A[date]||!S.A[date][time])return;
  const pk=date+'_'+time;
  const name=(document.getElementById('pe-name-'+pk)||{}).value||'';
  const type=(document.getElementById('pe-type-'+pk)||{}).value||'';
  const price=(document.getElementById('pe-price-'+pk)||{}).value||'';
  const dur=(document.getElementById('pe-dur-'+pk)||{}).value||'';
  S.A[date][time]={...S.A[date][time],name,type,price,duration:dur};
  store.set('appts',S.A);
  S.editPayKey=null;

}
function deletePayment(date,time){
  if(!confirm('למחוק תשלום זה לצמיתות?'))return;

  store.set('appts',S.A||{});
  S.editPayKey=null;
  hRender();
}

function openMonthlyChart(yr){
  const n=new Date();
  const chartYear=yr||n.getFullYear();
  const curM=chartYear===n.getFullYear()?n.getMonth()+1:0;

  // Build data
  const data=[];
  for(let m=1;m<=12;m++){
    const mk=chartYear+'-'+String(m).padStart(2,'0');
    let rev=0,count=0;
    Object.entries(S.A||{}).forEach(([d,slots])=>{
      if(!d.startsWith(mk))return;
      Object.values(slots||{}).forEach(ap=>{
        if(ap&&ap.name)count++;
        if(ap&&ap.price&&Number(ap.price)>0)rev+=Number(ap.price);
      });
    });
    data.push({m,mk,name:MO[m-1],short:MO[m-1].slice(0,3),rev,count});
  }

  const maxRev=Math.max(...data.map(d=>d.rev),1);
  const totalY=data.reduce((s,d)=>s+d.rev,0);
  const avgM=data.filter(d=>d.rev>0).length?Math.round(totalY/data.filter(d=>d.rev>0).length):0;
  const cur=data[curM-1]||{rev:0,count:0};
  const prev=data[curM-2]||{rev:0};
  const diff=cur.rev-prev.rev;
  const diffPct=prev.rev>0?Math.round(Math.abs(diff)/prev.rev*100):0;
  const bestM=data.reduce((a,b)=>b.rev>a.rev?b:a,data[0]);

  // SVG Bar Chart
  const W=320,H=100,PL=8,PR=8,PT=24,PB=20;
  const innerW=W-PL-PR,innerH=H-PT-PB;
  const bw=Math.floor(innerW/12)-3;
  const gap=3;

  // Grid lines
  let gridLines='';
  [0.25,0.5,0.75,1].forEach(r=>{
    const y=PT+innerH*(1-r);
    const val=Math.round(maxRev*r);
    const lbl=val>=1000?Math.round(val/1000)+'K':val;
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
    gridLines+=`<text x="${PL-2}" y="${y+3}" text-anchor="end" font-size="6.5" fill="#d1d5db">${lbl}</text>`;
  });

  // Bars
  let bars='',labels='';
  data.forEach((d,i)=>{
    const x=PL+i*(bw+gap);
    const bh=d.rev>0?Math.max(3,Math.round((d.rev/maxRev)*innerH)):2;
    const y=PT+innerH-bh;
    const isCur=d.m===curM;
    const isPrev=d.m===curM-1&&chartYear===n.getFullYear();
    const id='bar-'+i;

    // Gradient per bar
    let fill,opacity=1;
    if(isCur){fill=`url(#gc)`;opacity=1;}
    else if(isPrev){fill='#c4b5fd';opacity=.9;}
    else if(d.rev>0){fill='#ede9fe';opacity=.8;}
    else{fill='#f3f4f6';opacity=.5;}

    if(d.rev>0){
      bars+=`<rect id="${id}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${fill}" opacity="${opacity}" style="cursor:pointer;transition:opacity .2s" onclick="showBarTip(${i},${d.rev},${d.count},'${d.name}')" onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='${opacity}'"/>`;
      if(isCur)bars+=`<rect x="${x-1}" y="${y-1}" width="${bw+2}" height="${bh+2}" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>`;
    } else {
      bars+=`<rect x="${x}" y="${PT+innerH-2}" width="${bw}" height="2" rx="1" fill="#e5e7eb"/>`;
    }
    labels+=`<text x="${x+bw/2}" y="${H-5}" text-anchor="middle" font-size="7.5" fill="${isCur?'#7c3aed':'#9ca3af'}" font-weight="${isCur?'800':'400'}">${d.short}</text>`;
  });

  // Table rows
  const tableRows=data.map(d=>{
    const isCur=d.m===curM;
    const prevD=data[d.m-2];
    const chg=prevD&&prevD.rev>0?Math.round((d.rev-prevD.rev)/prevD.rev*100):null;
    const trendTxt=chg!==null?(chg>0?`<span style="color:#059669">▲${chg}%</span>`:`<span style="color:#dc2626">▼${Math.abs(chg)}%</span>`):`<span style="color:#d1d5db">—</span>`;
    const pct=d.rev>0?Math.round(d.rev/maxRev*100):0;
    return`<div class="chart-row${isCur?' cur':d.rev>0?' has':' empty'}" onclick="showBarTip(${d.m-1},${d.rev},${d.count},'${d.name}')">
      <div class="chart-row-mo${isCur?' cur':''}">${d.name}</div>
      <div class="chart-row-bar-wrap"><div class="chart-row-bar${isCur?' cur':''}" style="width:${pct}%" id="rb-${d.m}"></div></div>
      <div class="chart-row-rev${isCur?' cur':''}">${d.rev>0?'₪'+d.rev.toLocaleString():'—'}</div>
      <div class="chart-row-trend">${d.rev>0?trendTxt:'—'}</div>
    </div>`;
  }).join('');

  const html=`<div class="chart-screen" id="chart-screen">
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs></svg>
  <div class="chart-hero">
    <div class="chart-hero-nav">
      <button class="chart-back" onclick="document.getElementById('chart-screen').remove()">←</button>
      <div class="chart-hero-title">📊 ניתוח הכנסות</div>
      <div class="chart-year-sel">
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear-1})">‹</button>
        <span class="chart-year-val">${chartYear}</span>
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear+1})">›</button>
      </div>
    </div>
    <div class="chart-kpis">
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${totalY>=1000?Math.round(totalY/1000)+'K':totalY.toLocaleString()}</div>
        <div class="chart-kpi-lbl">סה"כ ${chartYear}</div>
        ${diff!==0&&curM?`<div class="chart-kpi-diff ${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'}${diffPct}% החודש</div>`:''}
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${avgM>=1000?Math.round(avgM/1000)+'K':avgM}</div>
        <div class="chart-kpi-lbl">ממוצע חודשי</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">${data.filter(d=>d.rev>0).length} חודשים פעילים</div>
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">${bestM.short}</div>
        <div class="chart-kpi-lbl">חודש הכי חזק</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">₪${bestM.rev.toLocaleString()}</div>
      </div>
    </div>
  </div>
  <div class="chart-body">
    <!-- SVG Chart -->
    <div style="background:white;padding:16px 16px 8px;position:relative" id="chart-area">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
        <defs>
          <linearGradient id="gc2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        ${gridLines}
        ${bars}
        ${labels}
      </svg>
      <div style="display:flex;align-items:center;gap:14px;margin-top:6px;padding:0 4px;font-size:10px;color:#9ca3af">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:linear-gradient(#a855f7,#7c3aed);margin-left:4px;vertical-align:middle"></span>החודש</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#c4b5fd;margin-left:4px;vertical-align:middle"></span>חודש קודם</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#ede9fe;margin-left:4px;vertical-align:middle"></span>שאר</span>
      </div>
    </div>
    <!-- Monthly breakdown -->
    <div class="chart-table-wrap">
      <div class="chart-table-title">פירוט חודשי</div>
      ${tableRows}
    </div>
  </div>
  </div>`;

  // Remove existing
  document.getElementById('chart-screen')?.remove();
  const el=document.createElement('div');el.innerHTML=html;
  document.body.appendChild(el.firstChild);

  // Animate bars on load
  setTimeout(()=>{
    document.querySelectorAll('.chart-row-bar').forEach((el,i)=>{
      el.style.transition=`width .8s cubic-bezier(.34,1.56,.64,1) ${i*0.04}s`;
    });
  },50);
}

function showBarTip(idx,rev,count,name){
  document.querySelectorAll('.chart-tooltip-box').forEach(e=>e.remove());
  if(!rev)return;
  const bar=document.getElementById('bar-'+idx);
  if(!bar)return;
  const rect=bar.getBoundingClientRect();
  const chartRect=document.getElementById('chart-area').getBoundingClientRect();
  const tip=document.createElement('div');
  tip.className='chart-tooltip-box';
  tip.style.cssText=`position:absolute;bottom:${chartRect.bottom-rect.top+8}px;left:${rect.left-chartRect.left+rect.width/2}px;transform:translateX(-50%)`;
  tip.innerHTML=`${name}: ₪${rev.toLocaleString()} · ${count} טיפולים`;
  document.getElementById('chart-area').style.position='relative';
  document.getElementById('chart-area').appendChild(tip);
  setTimeout(()=>tip.remove(),3000);
}

function savePkg(){
  const name=(document.getElementById('pk-name')||{}).value||'';
  if(!name.trim()){alert('נא להזין שם מטופל');return;}
  const id='pkg_'+Date.now();
  if(!S.PKGS)S.PKGS={};
  S.PKGS[id]={
    name,
    type:(document.getElementById('pk-type')||{}).value||'',
    cost:(document.getElementById('pk-cost')||{}).value||'0',
    paid:(document.getElementById('pk-paid')||{}).value||'0',
    note:(document.getElementById('pk-note')||{}).value||'',
    created:new Date().toISOString()
  };
  store.set('packages',S.PKGS);
  S.showAddPkg=false;
  hRender();
}
function updatePkg(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id]={
    ...S.PKGS[id],
    name:(document.getElementById('pe-name-'+id)||{}).value||'',
    type:(document.getElementById('pe-type-'+id)||{}).value||'',
    cost:(document.getElementById('pe-cost-'+id)||{}).value||'0',
    paid:(document.getElementById('pe-paid-'+id)||{}).value||'0',
    note:(document.getElementById('pe-note-'+id)||{}).value||''
  };
  store.set('packages',S.PKGS);
  S.editPkgKey=null;
  hRender();
}
function deletePkg(id){
  if(!confirm('למחוק חבילה זו?'))return;
  if(S.PKGS&&S.PKGS[id])delete S.PKGS[id];
  store.set('packages',S.PKGS||{});
  S.editPkgKey=null;
  hRender();
}
function markPkgPaid(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id].paid=S.PKGS[id].cost;
  store.set('packages',S.PKGS);
  hRender();
}
function updatePkgCalc(id){
  const cost=Number((document.getElementById((id?'pe-cost-'+id:'pk-cost'))||{}).value||0);
  const paid=Number((document.getElementById((id?'pe-paid-'+id:'pk-paid'))||{}).value||0);
  const rem=Math.max(0,cost-paid);
  const remEl=document.getElementById(id?'per-'+id:'pk-rem');
  const calcEl=document.getElementById(id?'pec-'+id:'pk-calc');
  if(remEl)remEl.textContent='₪'+rem.toLocaleString();
  if(calcEl)calcEl.style.display='flex';
}

// Get reminders map from localStorage (keyed by appointmentId)
function getReminders(){
  try{return JSON.parse(localStorage.getItem('hodaya_reminders')||'{}');}catch(e){return {};}
}
function setReminder(apptId,data){
  const r=getReminders();
  if(data)r[apptId]=data;else delete r[apptId];
  localStorage.setItem('hodaya_reminders',JSON.stringify(r));
}
function hasReminder(apptId){
  return !!getReminders()[apptId];
}

function cancelApptReminder(apptId){

// Download .ics file for system calendar
function downloadApptICS(encodedAppt,minutesBefore){
  let appt;try{appt=JSON.parse(decodeURIComponent(encodedAppt));}catch(e){return;}
  const apptId=`${appt.date}_${appt.time}_${(appt.name||'').replace(/\s+/g,'_')}`;
  
  // Parse to UTC
  const [y,mo,d]=appt.date.split('-').map(Number);
  const [hh,mm]=appt.time.split(':').map(Number);
  const start=new Date(y,mo-1,d,hh,mm,0);
  const duration=Number(appt.duration)||60;
  const end=new Date(start.getTime()+duration*60000);
  
  const fmt=(dt)=>dt.getUTCFullYear().toString().padStart(4,'0')+
                  (dt.getUTCMonth()+1).toString().padStart(2,'0')+
                  dt.getUTCDate().toString().padStart(2,'0')+'T'+
                  dt.getUTCHours().toString().padStart(2,'0')+
                  dt.getUTCMinutes().toString().padStart(2,'0')+
                  dt.getUTCSeconds().toString().padStart(2,'0')+'Z';
  
  const uid=apptId+'@diary-hodaya';
  const summary=`${appt.name||'תור'}${appt.type?' - '+appt.type:''}`;
  const description=`מטופלת: ${appt.name||''}\\n${appt.type?'טיפול: '+appt.type+'\\n':''}${appt.phone?'טלפון: '+appt.phone+'\\n':''}${appt.price?'מחיר: ₪'+appt.price:''}`;
  
  const ics=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Diary Rinat//HE
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:${uid}
DTSTAMP:${fmt(new Date())}
DTSTART:${fmt(start)}
DTEND:${fmt(end)}
SUMMARY:${summary}
DESCRIPTION:${description}
LOCATION:הקליניקה
BEGIN:VALARM
ACTION:DISPLAY
DESCRIPTION:${summary}
TRIGGER:-PT${minutesBefore}M
END:VALARM
END:VEVENT
END:VCALENDAR`;
  
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`appointment_${appt.date}_${appt.time.replace(':','-')}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  
  // Save reminder state
  setReminder(apptId,{minutes:minutesBefore,method:'ics',createdAt:Date.now()});
  closeReminderSheet();
  toast('✅ הקובץ הורד — פתחי אותו כדי להוסיף ללוח השנה');
  if(typeof hRender==='function')hRender();
}

// Browser notification reminder (using Notification API + setTimeout)
async function enableBrowserReminder(apptId,encodedAppt,minutesBefore){
  let appt;try{appt=JSON.parse(decodeURIComponent(encodedAppt));}catch(e){return;}
  
  // Request notification permission
  if(!('Notification'in window)){
    toast('❌ הדפדפן לא תומך בהתראות',true);
    return;
  }
  
  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){
      toast('⚠️ אישור התראות נדחה',true);
      return;
    }
  }else if(Notification.permission==='denied'){
    toast('❌ התראות חסומות בהגדרות הדפדפן',true);
    return;
  }
  
  // Schedule the notification
  const [y,mo,d]=appt.date.split('-').map(Number);
  const [hh,mm]=appt.time.split(':').map(Number);
  const apptDt=new Date(y,mo-1,d,hh,mm,0);
  const triggerAt=apptDt.getTime()-minutesBefore*60*1000;
  const delay=triggerAt-Date.now();
  
  if(delay<=0){
    toast('⚠️ הזמן כבר עבר',true);
    return;
  }
  
  if(delay>2147483647){ // > ~24.8 days (setTimeout max)
    toast('⚠️ ההתראה רחוקה מדי — השתמשי בלוח השנה',true);
    return;
  }
  
  // Clear any existing timeout for this apptId
  if(!window._apptReminderTimeouts)window._apptReminderTimeouts={};
  if(window._apptReminderTimeouts[apptId]){
    clearTimeout(window._apptReminderTimeouts[apptId]);
  }
  
  window._apptReminderTimeouts[apptId]=setTimeout(()=>{
    try{
      new Notification(`🔔 תור בעוד ${minutesBefore>=1440?(minutesBefore/1440)+' יום':minutesBefore>=60?(minutesBefore/60)+' שעות':minutesBefore+' דקות'}`,{
        body:`${appt.name} · ${appt.time}${appt.type?' · '+appt.type:''}`,
        icon:'https://pinto1212121212-create.github.io/diary-hodaya/favicon.png',
        tag:apptId,
        requireInteraction:true
      });
    }catch(e){console.warn('Notification failed:',e);}
    delete window._apptReminderTimeouts[apptId];
  },delay);
  
  setReminder(apptId,{minutes:minutesBefore,method:'browser',scheduledFor:triggerAt,createdAt:Date.now()});
  closeReminderSheet();
  toast('🔔 התראת דפדפן תופעל בזמן');
  if(typeof hRender==='function')hRender();
}

// Restore scheduled browser reminders on page load
function restoreReminders(){
  const reminders=getReminders();
  const now=Date.now();
  if(!window._apptReminderTimeouts)window._apptReminderTimeouts={};
  Object.entries(reminders).forEach(([apptId,rem])=>{
    if(rem.method!=='browser'||!rem.scheduledFor)return;
    const delay=rem.scheduledFor-now;
    if(delay<=0){
      // Already past — clean it up
      setReminder(apptId,null);
      return;
    }
    if(delay>2147483647)return;
    // Need to parse apptId back into basic info
    const parts=apptId.split('_');
    const date=parts[0],time=parts[1],name=parts.slice(2).join(' ');
    window._apptReminderTimeouts[apptId]=setTimeout(()=>{
      try{
        new Notification(`🔔 תור בעוד ${rem.minutes>=1440?(rem.minutes/1440)+' יום':rem.minutes>=60?(rem.minutes/60)+' שעות':rem.minutes+' דקות'}`,{
          body:`${name} · ${time}`,
          tag:apptId,
          requireInteraction:true
        });
      }catch(e){}
      delete window._apptReminderTimeouts[apptId];
    },delay);
  });
}

// Call on load
if(typeof window!=='undefined'){
  window.addEventListener('load',function(){setTimeout(restoreReminders,1000);});
}

function getClientTags(name,phone){
  // Auto-detect tags based on data
  const key=phone||name;
  const cd=S.CL?.[key]||{};
  const manual=cd.tags||[];
  const tags=[];
  // Count visits
  const visits=[];
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name)visits.push({date,time,d});
    });
  });
  // Check debt
  const n=new Date();
  const hasDebt=visits.some(v=>v.d.price&&Number(v.d.price)>0&&!v.d.paid&&new Date(v.date+'T'+v.time)<=n);
  // Check package
  const hasPkg=Object.values(S.PKGS||{}).some(p=>p.name===name);
  // Auto tags
  if(manual.includes('vip'))tags.push({id:'vip',label:'👑 VIP',cls:'vip'});
  if(visits.length===1){
    // Check if this is first ever visit (only 1 total)
    tags.push({id:'new',label:'✨ מטופל חדש',cls:'new'});
  } else if(visits.length>=3&&!manual.includes('vip'))tags.push({id:'returning',label:'🔄 חוזר',cls:'returning'});
  if(hasPkg)tags.push({id:'package',label:'📦 חבילה',cls:'package'});
  if(hasDebt)tags.push({id:'debt',label:'⚠️ חוב',cls:'debt'});
  if(manual.includes('problematic'))tags.push({id:'problematic',label:'⚠️ בעייתי',cls:'problematic'});
  if(manual.includes('nopay'))tags.push({id:'nopay',label:'💳 לא משלם',cls:'nopay'});
  return tags;
}
function getDebtAmount(name){
  const n=new Date();
  let total=0;
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name&&d.price&&Number(d.price)>0&&!d.paid&&new Date(date+'T'+time)<=n)
        total+=Number(d.price);
    });
  });
  return total;
}

}

function getWeekDates(offset){
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const mon=new Date(now);
  mon.setDate(now.getDate()-day+offset*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);
    d.setDate(mon.getDate()+i);
    days.push(d);
  }
  return days;
}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pLaserWeekly(){
  const days=getWeekDates(S.weekOffset);
  const DY_HEB=['א\'','ב\'','ג\'','ד\'','ה\'','ו\'','ש\''];
  const now=new Date(),todayStr=fmtDate(now);
  // Week range label
  const first=days[0],last=days[6];
  const weekLbl=first.getDate()+' '+MO[first.getMonth()]+' — '+last.getDate()+' '+MO[last.getMonth()]+' '+last.getFullYear();
  // Week stats
  let weekRev=0,weekAppts=0,weekClients=new Set();
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    Object.values(slots).forEach(ap=>{
      if(!ap||!ap.name)return;
      weekAppts++;
      weekClients.add(ap.name);
      if(ap.price&&Number(ap.price)>0)weekRev+=Number(ap.price);
    });
  });
  // Today appts for bottom detail
  const selStr=S.lSel&&days.find(d=>fmtDate(d)===S.lSel)?S.lSel:todayStr;
  const selSlots=S.A[selStr]||{};
  const selAppts=Object.entries(selSlots).filter(([,d])=>d&&d.name).sort((a,b)=>a[0].localeCompare(b[0]));

  let h=`<div style="background:white;border-radius:0 0 20px 20px;margin-bottom:8px;padding-bottom:8px;box-shadow:0 4px 16px rgba(0,0,0,.06)">`;
  // Navigation
  h+=`<div class="week-nav">
    <button class="week-nav-btn" onclick="S.weekOffset++;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">›</button>
    <div class="week-nav-lbl">${weekLbl}</div>
    <button class="week-nav-btn" onclick="S.weekOffset--;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">‹</button>
  </div>`;
  // Week summary
  h+=`<div class="week-summary">
    <div class="ws"><div class="ws-val">${weekAppts}</div><div class="ws-lbl">תורים</div></div>
    <div class="ws"><div class="ws-val">${weekClients.size}</div><div class="ws-lbl">מטופלות</div></div>
    <div class="ws"><div class="ws-val">₪${weekRev.toLocaleString()}</div><div class="ws-lbl">הכנסות</div></div>
    <div class="ws"><div class="ws-val">${S.weekOffset===0?'השבוע':S.weekOffset>0?'הבא':'שעבר'}</div><div class="ws-lbl">שבוע</div></div>
  </div>`;
  // Day headers
  h+=`<div class="week-row">`;
  days.forEach(d=>{h+=`<div class="week-day-hdr${fmtDate(d)===todayStr?' today':''}">${DY_HEB[d.getDay()]}</div>`;});
  h+=`</div>`;
  // Day columns
  h+=`<div class="week-row">`;
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    const appts=Object.entries(slots).filter(([,ap])=>ap&&ap.name).sort((a,b)=>a[0].localeCompare(b[0]));
    const isToday=ds===todayStr;
    const isSel=ds===S.lSel;
    const isShabat=d.getDay()===6;
    const dayRev=appts.reduce((s,[,ap])=>s+(ap.price?Number(ap.price):0),0);
    h+=`<div class="week-day-col${isToday?' today-col':''}${appts.length?' has-appts':''}${isShabat?' shabbat':''}${isSel&&!isToday?' has-appts':''}" onclick="S.lSel='${ds}';S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()" style="${isSel&&!isToday?'border:2px solid #7c3aed;':''}">
      <div class="week-day-num">${d.getDate()}</div>
      ${appts.slice(0,3).map(([time,ap])=>`<span class="week-appt-dot${ap.paid?' paid':(!ap.paid&&ap.price&&Number(ap.price)>0)?' debt':''}">${time.substring(0,5)} ${x(ap.name.split(' ')[0])}</span>`).join('')}
      ${appts.length>3?`<span style="font-size:8px;color:#a78bfa;text-align:center;display:block">+${appts.length-3}</span>`:''}
      ${dayRev>0?`<div class="week-day-rev">₪${dayRev>=1000?Math.round(dayRev/1000)+'K':dayRev}</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;
  // Selected day detail
  const selDay=days.find(d=>fmtDate(d)===selStr)||days.find(d=>fmtDate(d)===todayStr);
  const selDayHeb=selDay?DY_HEB[selDay.getDay()]+' '+selDay.getDate()+' '+MO[selDay.getMonth()]:'';
  h+=`<div style="padding:0 12px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <button onclick="S.lModal='add';S.lSlot=null;S.lF={};modalRender()" style="background:#7c3aed;color:white;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ תור</button>
    <span style="font-size:13px;font-weight:800;color:#1e1b4b">${selDayHeb}</span>
  </div>`;
  if(selAppts.length){
    h+=selAppts.map(([time,ap])=>`<div class="appt-card-pro" style="margin-bottom:7px">
      <div class="appt-time-pill" style="background:#f0fdf4;color:#059669;border-color:#bbf7d0;font-size:12px">${time}</div>
      <div class="appt-card-info">

        <div class="appt-card-meta">${ap.type?x(ap.type):''}${ap.price?' · ₪'+ap.price:''}</div>
        ${clientTagsHTML(ap.name,ap.phone)}
      </div>
      ${contactBtns(ap.phone,ap.name,selStr+' '+time)}
    </div>`).join('');
  } else {
    h+=`<div style="text-align:center;padding:20px;color:#d1d5db;font-size:13px">אין תורים ביום זה</div>`;
  }
  h+=`</div>`;
  return h;
}

// Get days between two date strings YYYY-MM-DD
function daysBetween(d1,d2){
  const a=new Date(d1),b=new Date(d2);
  return Math.floor((b-a)/86400000);
}

// Get all clients with their visit history
function getAllClientsWithHistory(){
  const cm={};
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(!d||!d.name)return;
      const k=d.phone||d.name;
      if(!cm[k])cm[k]={name:d.name,phone:d.phone||'',visits:[],total:0,lastVisit:null,lastType:'',lastPrice:0};
      cm[k].visits.push({date,time,...d});
      if(d.price)cm[k].total+=Number(d.price)||0;
    });
  });
  // Add clients from CL that might not have appointments
  Object.entries(S.CL||{}).forEach(([k,cd])=>{
    if(!cm[k])cm[k]={name:cd.name||k,phone:cd.phone||'',visits:[],total:0,lastVisit:null,lastType:'',lastPrice:0};
    Object.assign(cm[k],{notes:cd.notes,sens:cd.sens,bday:cd.bday,email:cd.email,tags:cd.tags});
  });
  // Sort visits per client, find last
  Object.values(cm).forEach(c=>{
    c.visits.sort((a,b)=>b.date.localeCompare(a.date));
    if(c.visits.length){
      c.lastVisit=c.visits[0].date;
      c.lastType=c.visits[0].type||'';
      c.lastPrice=Number(c.visits[0].price)||0;
    }
  });
  return cm;
}

// Find missing clients (haven't visited in 45+ days)
function findMissingClients(minDays=45){
  const cm=getAllClientsWithHistory();
  const today=todayISO();
  const missing=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.lastVisit||!c.phone)return;
    const daysMissing=daysBetween(c.lastVisit,today);
    if(daysMissing>=minDays&&c.visits.length>=1){
      missing.push({...c,key:k,daysMissing});
    }
  });
  // Sort by most missing first
  missing.sort((a,b)=>b.daysMissing-a.daysMissing);
  return missing;
}

// Find upcoming birthdays (next 14 days)
function findUpcomingBirthdays(){
  const cm=getAllClientsWithHistory();
  const today=new Date();
  const todayMM=today.getMonth()+1,todayDD=today.getDate();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.bday)return;
    // Support formats: DD/MM, DD.MM, DD-MM, or full YYYY-MM-DD / DD/MM/YYYY
    const str=c.bday.trim();
    let mm,dd;
    const m1=str.match(/^(\d{1,2})[/.\-](\d{1,2})(?:[/.\-]\d{2,4})?$/);
    const m2=str.match(/^\d{4}-(\d{1,2})-(\d{1,2})/);
    if(m1){dd=Number(m1[1]);mm=Number(m1[2]);}
    else if(m2){mm=Number(m2[1]);dd=Number(m2[2]);}
    if(!mm||!dd)return;
    // Calculate days until birthday
    let thisYear=new Date(today.getFullYear(),mm-1,dd);
    let daysUntil=Math.floor((thisYear-new Date(today.getFullYear(),todayMM-1,todayDD))/86400000);
    if(daysUntil<0)daysUntil+=365;
    if(daysUntil<=14){
      results.push({...c,key:k,bdayMM:mm,bdayDD:dd,daysUntil});
    }
  });
  results.sort((a,b)=>a.daysUntil-b.daysUntil);
  return results;
}

// Find recent clients (finished treatment in last 3 days, ideal for review request)
function findRecentClients(minHours=6,maxHours=96){
  const cm=getAllClientsWithHistory();
  const now=new Date();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.phone||!c.visits.length)return;
    const last=c.visits[0];
    const visitDate=new Date(last.date+'T'+(last.time||'12:00'));
    const hoursAgo=(now-visitDate)/3600000;
    if(hoursAgo>=minHours&&hoursAgo<=maxHours&&last.paid){
      // Only include paid visits (happy clients)
      results.push({...c,key:k,hoursAgo:Math.round(hoursAgo),lastVisit:last});
    }
  });
  results.sort((a,b)=>a.hoursAgo-b.hoursAgo);
  return results;
}

// Find clients with outstanding debt
function findDebtClients(){
  const cm=getAllClientsWithHistory();
  const results=[];
  const now=new Date();
  Object.entries(cm).forEach(([k,c])=>{
    const debts=c.visits.filter(v=>{
      if(!v.price||v.paid)return false;
      const visitDate=new Date(v.date+'T'+(v.time||'12:00'));
      return visitDate<=now; // only past appointments
    });
    if(debts.length){
      const totalDebt=debts.reduce((s,v)=>s+(Number(v.price)||0),0);
      results.push({...c,key:k,debtCount:debts.length,totalDebt,oldestDebt:debts[debts.length-1].date});
    }
  });
  results.sort((a,b)=>b.totalDebt-a.totalDebt);
  return results;
}

// Find upcoming appointments today (for pre-visit reminders)
function findTodayAppointments(){
  const today=todayISO();
  const slots=S.A[today]||{};
  const results=[];
  Object.entries(slots).forEach(([time,d])=>{
    if(!d||!d.name)return;
    results.push({time,...d});
  });
  results.sort((a,b)=>a.time.localeCompare(b.time));
  return results;
}

      type:'debt',priority:2,client:c,
      t:`${c.name}`,
      d:`חוב ₪${c.totalDebt.toLocaleString()} · ${c.debtCount} טיפולים · הכי ישן: ${c.oldestDebt}`,
      action:'שלחי תזכורת עדינה על התשלום (או תשאלי בצורה יפה בביקור הבא)',
      actionType:'debt_reminder'
    });
    usedTypes.add('debt');
    taskIds.push('smart_debt');
  }
  
  // ═══ ROTATING DATA-DRIVEN — daily variety ═══
  const today=new Date();
  const dayOfYear=Math.floor((today-new Date(today.getFullYear(),0,0))/86400000);
  const dayOfWeek=today.getDay(); // 0=Sunday, 6=Saturday
  
  // Pool of data-driven options — pick based on rotation
  const dataOptions=[];
  
  // REVIEW REQUEST
  const recent=findRecentClients();
  if(recent.length){
    const c=recent[0];
    const daysAgo=Math.floor(c.hoursAgo/24);
    dataOptions.push({
      key:'review',type:'review',priority:3,client:c,
      t:`${c.name}`,
      d:`הייתה לפני ${daysAgo>0?daysAgo+' ימים':c.hoursAgo+' שעות'} · ${c.lastType||'טיפול'}${c.lastVisit&&c.lastVisit.price?' · שילמה ₪'+c.lastVisit.price:''}`,
      action:'הזמן מושלם לבקש ביקורת ב-Google — היא עוד זוכרת חוויה טובה',
      actionType:'review_request'
    });
  }
  
  // MISSING CLIENTS - different levels
  const missing=findMissingClients(45);
  if(missing.length){
    const c=missing[dayOfYear%Math.min(missing.length,5)]; // rotate through top 5
    dataOptions.push({
      key:'winback',type:'winback',priority:3,client:c,
      t:`${c.name}`,
      d:`לא הייתה ${c.daysMissing} יום · ${c.visits.length} ביקורים · סה"כ ₪${c.total.toLocaleString()}`,
      action:'בואי נחזיר אותה — שלחי הודעה עם הצעה מיוחדת (הנחה 15-20%)',
      actionType:'winback_msg'
    });
  }
  
  // BIRTHDAYS
  const birthdays=findUpcomingBirthdays();
  if(birthdays.length){
    const c=birthdays[0];
    const bdayStr=String(c.bdayDD).padStart(2,'0')+'/'+String(c.bdayMM).padStart(2,'0');
    const when=c.daysUntil===0?'היום 🎉':c.daysUntil===1?'מחר':`בעוד ${c.daysUntil} ימים`;
    dataOptions.push({
      key:'birthday',type:'birthday',priority:3,client:c,
      t:`${c.name} חוגגת ${when}`,
      d:`תאריך: ${bdayStr}${c.visits.length?' · '+c.visits.length+' ביקורים':''}`,
      action:'שלחי ברכה חמה + הצעה מיוחדת ליומולדת (20% הנחה לטיפול הבא)',
      actionType:'birthday_msg'
    });
  }
  
  // FIRST-TIMERS LOST
  const firstTimers=findFirstTimersLost();
  if(firstTimers.length){
    const c=firstTimers[dayOfYear%Math.min(firstTimers.length,3)];
    dataOptions.push({
      key:'first_lost',type:'winback',priority:4,client:c,
      t:`${c.name}`,
      d:`הייתה ${c.visitCount} פעמים · נעלמה לפני ${c.daysSince} יום`,
      action:'מטופלת חדשה שלא חזרה - שלחי "איך הרגשת? בא לך לחזור?"',
      actionType:'winback_msg'
    });
  }
  
  // VIP CLIENT - loyal deserves attention
  const vips=findVIPClients();
  if(vips.length){
    const c=vips[dayOfYear%Math.min(vips.length,3)];
    dataOptions.push({
      key:'vip',type:'vip',priority:4,client:c,
      t:`${c.name} 💎`,
      d:`${c.visits.length} ביקורים · סה"כ ₪${c.total.toLocaleString()} · לא הייתה ${c.daysSince} יום`,
      action:'מטופלת נאמנה - הציעי לה טיפול חינם/הנחת VIP כהערכה',
      actionType:'winback_msg'
    });
  }
  
  // FOLLOW-UP needed
  const followups=findFollowUpNeeded();
  if(followups.length){
    const c=followups[dayOfYear%Math.min(followups.length,3)];
    dataOptions.push({
      key:'followup',type:'followup',priority:4,client:c,
      t:`${c.name}`,
      d:`לא הייתה ${c.daysSince} יום · מעולה לקבוע טיפול עוקב`,
      action:'תזמון נכון! תזכירי לה שזה הזמן הטוב ביותר לטיפול הבא',
      actionType:'winback_msg'
    });
  }
  
  // ANNIVERSARIES
  const anniversaries=findAnniversaries();
  if(anniversaries.length){
    const c=anniversaries[0];
    const whenText=c.daysToAnniversary>0?`בעוד ${c.daysToAnniversary} ימים`:c.daysToAnniversary===0?'היום!':`לפני ${Math.abs(c.daysToAnniversary)} ימים`;
    dataOptions.push({
      key:'anniversary',type:'vip',priority:5,client:c,
      t:`שנה של ${c.name} 🎉`,
      d:`יום שנה לטיפול הראשון ${whenText} · ${c.visits.length} ביקורים מאז`,
      action:'הזדמנות מוצלחת - שלחי ברכה + הצעה מיוחדת ליום השנה',
      actionType:'winback_msg'
    });
  }
  
  // Pick 1-2 data-driven (not already shown) based on day rotation
  const sortedOptions=dataOptions.filter(o=>!usedTypes.has(o.type));
  sortedOptions.sort((a,b)=>a.priority-b.priority);
  
  // Pick top 1-2 varied
  for(const opt of sortedOptions){
    if(tasks.length>=3)break;
    if(!usedTypes.has(opt.type)){
      tasks.push(opt);
      usedTypes.add(opt.type);
      taskIds.push('smart_'+opt.key);
    }
  }
  
  // ═══ FILL WITH VARIED GENERIC TASKS ═══
  const remaining=3-tasks.length;
  if(remaining>0){
    const genericPicked=pickVariedGenericTasks(remaining,usedTypes);
    genericPicked.forEach(g=>{
      tasks.push({
        type:g.type,priority:9,
        t:g.t,d:g.d,action:g.action,
        actionType:g.actionType,
        genType:g.genType,url:g.url
      });
      taskIds.push(g.id);
    });
  }
  
  // Mark all as shown for future rotation
  markTaskShown(taskIds);
  
  return tasks.slice(0,3);
}

function doTaskAction(taskIdx){
  const tasks=getSmartTodayTasks();
  const task=tasks[taskIdx];
  if(!task)return;
  
  if(task.actionType==='send_reminder')sendReminderToClient(task.client);
  else if(task.actionType==='review_request')sendReviewRequestTo(task.client);
  else if(task.actionType==='winback_msg')sendWinbackTo(task.client);
  else if(task.actionType==='birthday_msg')sendBirthdayTo(task.client);
  else if(task.actionType==='debt_reminder')sendDebtReminderTo(task.client);
  else if(task.actionType==='generate_post')generatePostFor(task.genType||'instagram_tip',task.t);
  else if(task.actionType==='open_url'&&task.url)window.open(task.url,'_blank');
}

// Helper: Open WhatsApp with pre-filled message
function openWhatsAppWith(phone,msg){
  const cleanPhone=(phone||'').replace(/[^0-9]/g,'');
  if(!cleanPhone){
    alert('אין מספר טלפון למטופלת');
    return;
  }
  // Israel: if starts with 0, replace with 972
  const intlPhone=cleanPhone.startsWith('0')?'972'+cleanPhone.substring(1):cleanPhone.startsWith('972')?cleanPhone:'972'+cleanPhone;
  const url=`https://wa.me/${intlPhone}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

// Smart message builder per client — uses Claude for personalization
let _msgBuilderState={client:null,type:null,title:'',messages:[],loading:false,error:null};

function openClientMsgBuilder(client,type,title){
  _msgBuilderState={client,type,title,messages:[],loading:false,error:null};
  renderClientMsgBuilder();
  // Auto-generate
  setTimeout(()=>generateClientMessages(),200);
}

function closeClientMsgBuilder(){

}

      </div>`:''}
      ${s.error?`<div class="cmb-error">⚠️ ${x(s.error)}</div>`:''}

async function generateClientMessages(){

  const key=getClaudeKey();
  if(!key){s.error='אין מפתח API של Claude';renderClientMsgBuilder();return;}
  s.loading=true;s.error=null;s.messages=[];
  renderClientMsgBuilder();
  
  const c=s.client;
  const type=s.type;
  const contextMap={
    reminder:`תזכורת חברית על תור שקבוע להיום. המטופלת ${c.name} קבועה לטיפול ${c.type||'בקליניקה'} בשעה ${c.time||''}${c.price?' בעלות ₪'+c.price:''}. המטרה: לוודא שהיא זוכרת ואישור הגעה.`,
    review:`בקשת ביקורת לגוגל. המטופלת ${c.name} סיימה טיפול ${c.lastType||''}${c.hoursAgo?' לפני '+Math.floor(c.hoursAgo/24||0)+' יום':''}${c.lastPrice?' ושילמה ₪'+c.lastPrice:''}. המטרה: לבקש בעדינות שתכתוב ביקורת בגוגל אם נהנתה. צריך לכלול קישור: https://g.page/r/ (יש להוסיף את ה-ID של הקליניקה בגוגל).`,
    winback:`החזרת מטופלת שנעלמה. ${c.name} לא הייתה כבר ${c.daysMissing} ימים, אבל קודם הייתה ${c.visits?c.visits.length:0} פעמים. הטיפול האחרון שלה: ${c.lastType||'לא ידוע'}. המטרה: להזכיר לה באופן חם ולתת תמריץ (הצעה, הנחה 15-20%).`,
    birthday:`ברכת יומולדת. ${c.name} חוגגת ${c.daysUntil===0?'היום':c.daysUntil===1?'מחר':'בעוד '+c.daysUntil+' ימים'}. ${c.visits?c.visits.length+' ביקורים בעבר.':''} המטרה: ברכה חמה ואישית + מתנת יומולדת (טיפול בהנחה או מוצר).`,
    debt:`תזכורת עדינה על תשלום. ${c.name} חייבת ₪${c.totalDebt} מ-${c.debtCount} טיפולים. הטיפול הישן ביותר: ${c.oldestDebt}. המטרה: להזכיר בעדינות מקסימלית — בלי להישמע תובעני, עם הצעה לתאם בנוחות.`
  };
  
  const systemPrompt=`את קופירייטרית מקצועית עבור קליניקת יופי של הודיה בירושלים (שכונת רמות). כתבי הודעות WhatsApp אישיות וחמות בעברית.

חוקים חשובים:
- תמיד בגוף נוכחת (את, לך)
- חמה, אישית, לא פורמלית — כמו חברה מדברת
- השתמשי בשם המטופלת בהתחלה (מועיל לאישיות)
- קצרה: מקסימום 4-5 שורות
- אמוג'ים במינון (1-2 מקסימום)
- ללא hashtags, ללא סוגריים מוזרות, ללא "לחצו כאן"
- מותג: הודיה RB Pro Laser

הקשר: ${contextMap[type]||''}

צרי 3 גרסאות שונות:
1. סגנון חם ואישי (כמו חברה לחברה)
2. סגנון מקצועי אבל חם (יותר מעוצב)
3. סגנון קליל וקצר (ישר לעניין)

פורמט JSON:
[
  {"style":"חם ואישי","text":"שלום ${c.name}..."},
  {"style":"מקצועי ונעים","text":"..."},
  {"style":"קליל וקצר","text":"..."}
]`;

  const userMsg=`כתבי 3 הודעות WhatsApp ל${c.name}. הסוג: ${s.title}.`;
  
  try{
    const response=await fetch(CLAUDE_API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:2000,system:systemPrompt,messages:[{role:'user',content:userMsg}]})
    });
    if(!response.ok){throw new Error('שגיאה מ-Claude: '+response.status);}
    const data=await response.json();
    const text=data.content?.[0]?.text||'';
    const match=text.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('תוצאה לא תקינה');
    const messages=JSON.parse(match[0]);
    s.messages=messages;s.loading=false;
    renderClientMsgBuilder();
  }catch(e){
    s.loading=false;s.error=e.message;
    renderClientMsgBuilder();
  }
}

function cmbCopy(idx){
  const m=_msgBuilderState.messages[idx];
  if(!m)return;
  navigator.clipboard.writeText(m.text).then(()=>webToast('✓ הועתק'));
}

function cmbSendWA(idx){
  const m=_msgBuilderState.messages[idx];
  const c=_msgBuilderState.client;
  if(!m||!c)return;
  openWhatsAppWith(c.phone,m.text);
}



// Get task status (done today?)
function getTaskStatus(taskIdx){
  const today=todayISO();
  const done=localStore.get('promo_tasks_done')||{};
  return !!(done[today]&&done[today][taskIdx]);
}

function togglePromoTask(taskIdx){
  const today=todayISO();
  const done=localStore.get('promo_tasks_done')||{};
  if(!done[today])done[today]={};
  done[today][taskIdx]=!done[today][taskIdx];
  // Cleanup old dates
  const keep={};
  const cutoff=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  Object.entries(done).forEach(([d,v])=>{if(d>=cutoff)keep[d]=v;});
  localStore.set('promo_tasks_done',keep);
  // Refresh
  const hc=document.querySelector('.hist-content');
  if(hc)hc.innerHTML=renderPromoTab();
  // Small celebration
  const total=getTodayPromoTasks().length;
  const doneCnt=Object.values(keep[today]||{}).filter(Boolean).length;
  if(doneCnt===total){
    webToast('🎉 כל הכבוד! סיימת את כל המשימות היום');
  }
}

// First-timers who didn't come back (1-2 visits only, 14+ days ago)
function findFirstTimersLost(){
  const cm=getAllClientsWithHistory();
  const today=todayISO();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.lastVisit||!c.phone)return;
    if(c.visits.length<=2){
      const days=daysBetween(c.lastVisit,today);
      if(days>=14&&days<=90){
        results.push({...c,key:k,daysSince:days,visitCount:c.visits.length});
      }
    }
  });
  results.sort((a,b)=>b.daysSince-a.daysSince);
  return results;
}

// VIP loyal clients (5+ visits) - deserve special attention
function findVIPClients(){
  const cm=getAllClientsWithHistory();
  const today=todayISO();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.phone||c.visits.length<5)return;
    const daysSince=c.lastVisit?daysBetween(c.lastVisit,today):0;
    // VIP that hasn't been in 14-60 days - gentle reach out
    if(daysSince>=14&&daysSince<=60){
      results.push({...c,key:k,daysSince});
    }
  });
  results.sort((a,b)=>b.visits.length-a.visits.length);
  return results;
}

// Follow-up needed after laser (4-6 weeks since last)
function findFollowUpNeeded(){
  const cm=getAllClientsWithHistory();
  const today=todayISO();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.phone||!c.lastVisit)return;
    const days=daysBetween(c.lastVisit,today);
    // Ideal laser followup window: 28-42 days after treatment
    if(days>=28&&days<=42){
      results.push({...c,key:k,daysSince:days});
    }
  });
  results.sort((a,b)=>a.daysSince-b.daysSince);
  return results;
}

// Treatment anniversaries (around 1 year since first visit)
function findAnniversaries(){
  const cm=getAllClientsWithHistory();
  const today=new Date();
  const results=[];
  Object.entries(cm).forEach(([k,c])=>{
    if(!c.visits||!c.visits.length||!c.phone)return;
    // Get first visit
    const sorted=[...c.visits].sort((a,b)=>a.date.localeCompare(b.date));
    const first=sorted[0];
    const firstDate=new Date(first.date);
    const oneYearLater=new Date(firstDate);
    oneYearLater.setFullYear(oneYearLater.getFullYear()+1);
    const daysToAnniversary=Math.floor((oneYearLater-today)/86400000);
    // Show within 14 days of anniversary (past or future)
    if(Math.abs(daysToAnniversary)<=14){
      results.push({...c,key:k,daysToAnniversary,firstVisit:first.date,yearMark:1});
    }
  });
  return results;
}

// Track shown tasks (7 day memory)
function getRecentlyShownTaskIds(){
  const mem=localStore.get('task_history')||{};
  const cutoff=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const shown=new Set();
  Object.entries(mem).forEach(([d,ids])=>{
    if(d>=cutoff)(ids||[]).forEach(id=>shown.add(id));
  });
  return shown;
}

function markTaskShown(ids){
  const today=todayISO();
  const mem=localStore.get('task_history')||{};
  if(!mem[today])mem[today]=[];
  ids.forEach(id=>{if(!mem[today].includes(id))mem[today].push(id);});
  // Cleanup old
  const cutoff=new Date(Date.now()-10*86400000).toISOString().slice(0,10);
  const kept={};
  Object.entries(mem).forEach(([d,v])=>{if(d>=cutoff)kept[d]=v;});
  localStore.set('task_history',kept);
}

// Pick varied generic tasks avoiding recent repeats
function pickVariedGenericTasks(count,excludeTypes){
  const recent=getRecentlyShownTaskIds();
  const today=new Date();
  const month=today.getMonth();
  const dayOfYear=Math.floor((today-new Date(today.getFullYear(),0,0))/86400000);
  
  // Filter pool - by season, by avoiding recent, by excluding already-shown types
  let pool=GENERIC_TASK_POOL.filter(t=>{
    // Season check
    if(t.months&&!t.months.includes(month))return false;
    // Not recently shown
    if(recent.has(t.id))return false;
    // Not same type as already shown today (variety)
    if(excludeTypes.has(t.type))return false;
    return true;
  });
  
  // Fallback: if too filtered, allow recent ones (but keep season filter)
  if(pool.length<count){
    pool=GENERIC_TASK_POOL.filter(t=>{
      if(t.months&&!t.months.includes(month))return false;
      if(excludeTypes.has(t.type))return false;
      return true;
    });
  }
  // Last fallback: just allow all
  if(pool.length<count)pool=[...GENERIC_TASK_POOL];
  
  // Rotate based on day to ensure day-to-day variation
  const rotated=[];
  const seen=new Set();
  let i=dayOfYear%pool.length;
  let tries=0;
  while(rotated.length<count&&tries<pool.length*2){
    const idx=i%pool.length;
    if(!seen.has(idx)){
      seen.add(idx);
      // Avoid same type repeats within selection
      const picked=pool[idx];
      if(!excludeTypes.has(picked.type)){
        rotated.push(picked);
        excludeTypes.add(picked.type);
      }
    }
    i=(i*7+3)%pool.length; // pseudo-random skip
    tries++;
  }
  
  // If still not enough (all same types), just fill
  while(rotated.length<count&&pool.length){
    const picked=pool[rotated.length%pool.length];
    if(!rotated.find(r=>r.id===picked.id))rotated.push(picked);
    else break;
  }
  
  return rotated;
}

  },800);
}

async function generatePostVariants(){
  const s=_pgState;
  const key=getClaudeKey();
  if(!key){
    s.error='אין מפתח API של Claude. הגדירי ב"יועץ AI"';
    renderPostGenerator();
    return;
  }
  s.loading=true;
  s.error=null;
  s.variants=[];
  renderPostGenerator();
  
  try{
    const channel=POST_CHANNELS[s.channel];
    const goal=POST_GOALS[s.goal];
    const context=buildBusinessContext();
    
    const systemPrompt=`אתה קופירייטר מקצועי לעסקים מקומיים בישראל. העסק הוא קליניקת לייזר יופי בשכונת רמות בירושלים, של הודיה.

משימה: כתוב 5 גרסאות של פוסט שיווקי בעברית, כל אחת בסגנון שונה.

הגרסאות השונות:
1. חם ואישי — כמו שחברה מדברת לחברה
2. מקצועי ורציני — מציב את הודיה כמומחית
3. הומור וקליל — כיף ושובר את הקרח
4. רגשי ומעורר השראה — סיפור, transformation
5. ישיר ופעולתי — CTA חזק, פחות מילים

כללים:
- עברית טבעית, לא מתורגמת
- מותאם ל${channel.l} (מקסימום ${channel.chars} תווים)
- ${channel.tips}
- סוג הפוסט: ${goal.l} — ${goal.desc}
${s.customInput?'- תוספת ספציפית: '+s.customInput:''}
- אמוג\'ים במינון הגיוני
- כל גרסה עצמאית ומלאה (לא התחלת גרסה קודמת)

פורמט JSON בלבד — מערך של 5 אובייקטים:
[
  {"style":"חם ואישי","text":"..."},
  {"style":"מקצועי ורציני","text":"..."},
  {"style":"הומור וקליל","text":"..."},
  {"style":"רגשי ומעורר השראה","text":"..."},
  {"style":"ישיר ופעולתי","text":"..."}
]`;

    const userMsg=`פרטי העסק:
${JSON.stringify(context,null,2)}

ערוץ: ${channel.l}
סוג פוסט: ${goal.l} — ${goal.desc}
${s.customInput?'תוספת אישית: '+s.customInput:''}

תן לי 5 גרסאות של פוסט.`;
    
    const response=await fetch(CLAUDE_API_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:CLAUDE_MODEL,
        max_tokens:4000,
        system:systemPrompt,
        messages:[{role:'user',content:userMsg}]
      })
    });
    
    if(!response.ok){
      const err=await response.text();
      throw new Error('שגיאה מה-API: '+err.substring(0,150));
    }
    
    const data=await response.json();
    const text=data.content?.[0]?.text||'';
    
    // Extract JSON array from response
    const match=text.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('Claude לא החזיר תוצאה תקינה');
    const variants=JSON.parse(match[0]);
    
    if(!Array.isArray(variants)||variants.length===0)throw new Error('לא התקבלו גרסאות');
    
    s.variants=variants;
    s.loading=false;
    renderPostGenerator();
    // Save to history
    const history=localStore.get('pg_history')||[];
    history.unshift({date:todayISO(),channel:s.channel,goal:s.goal,variants:variants,input:s.customInput});
    if(history.length>30)history.length=30;
    localStore.set('pg_history',history);
  }catch(e){
    s.loading=false;
    s.error=e.message||'שגיאה לא ידועה';
    renderPostGenerator();
  }
}

function copyVariantText(idx){
  const v=_pgState.variants[idx];
  if(!v)return;
  navigator.clipboard.writeText(v.text).then(()=>{
    webToast('✓ הועתק! עכשיו פתחי את האפליקציה והדביקי');
  }).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');
    ta.value=v.text;
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy');webToast('✓ הועתק!');}
    catch(e){alert('העתקה נכשלה. הטקסט:\n\n'+v.text);}
    document.body.removeChild(ta);
  });
}

      <div class="promo-card-ico" style="background:${s.bg};color:white">${s.ico}</div>
      <div class="promo-card-body">
        <div class="promo-card-title">${x(s.title)}${s.pill?`<span class="promo-card-pill ${s.pill.c}">${s.pill.l}</span>`:''}</div>
        <div class="promo-card-desc">${x(s.desc)}</div>
        ${s.price?`<div class="promo-card-price ${priceCls}">💰 ${x(s.price)}</div>`:''}
      </div>
      <div class="promo-card-arrow">←</div>
    </a>`;}).join('');
    return`<div class="promo-cat">
      <div class="promo-cat-hdr"><span class="promo-cat-badge">${cat.badge}</span>${x(cat.title)}</div>
      ${cards}
      ${cat.tip?`<div class="promo-tip">${x(cat.tip)}</div>`:''}
    </div>`;
  }).join('');
  
  if(sub==='tasks'){
    return`${subNav}
      ${renderPromoTasks()}`;
  } else {
    return`${subNav}
      ${topSection}
      <div class="promo-all-hdr">📚 כל האתרים לפי קטגוריה</div>
      ${cats}
      <div class="promo-disclaimer">💡 המחירים הם הערכה ממוצעת בלבד — משתנים לפי גודל מודעה, תדירות ותקופה. תמיד שווה להתמקח ולהשוות.</div>`;
  }
}
