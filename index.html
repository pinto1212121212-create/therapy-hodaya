/* ═══════════════════════════════════════════════════════════════ */
/* ═══ DESIGN SYSTEM v1 — Tokens, Accessibility, Foundation   ═══ */
/* ═══════════════════════════════════════════════════════════════ */

:root{
  /* ═══════════════════════════════════════════════════════════════ */
  /* ═══ PREMIUM Design System v2 — Inspired by Linear, Stripe ═══ */
  /* ═══════════════════════════════════════════════════════════════ */
  
  /* ─── Brand (Purple — minimal, sophisticated) ─── */
  --brand-50:  #f5f3ff;
  --brand-100: #ede9fe;
  --brand-200: #ddd6fe;
  --brand-300: #c4b5fd;
  --brand-400: #a78bfa;
  --brand-500: #8b5cf6;
  --brand-600: #7c3aed;  /* Primary action */
  --brand-700: #6d28d9;
  --brand-800: #5b21b6;
  --brand-900: #4c1d95;
  --brand-950: #2e1065;
  
  /* ─── Neutrals (true neutrals with subtle warmth) ─── */
  --gray-0:   #ffffff;
  --gray-25:  #fcfcfd;
  --gray-50:  #f9fafb;
  --gray-100: #f3f4f6;
  --gray-150: #ebedf0;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --gray-950: #030712;
  
  /* ─── Semantic (minimal palette) ─── */
  --success-50:  #ecfdf5;
  --success-100: #d1fae5;
  --success-500: #10b981;
  --success-600: #059669;
  --success-700: #047857;
  
  --warning-50:  #fffbeb;
  --warning-100: #fef3c7;
  --warning-500: #f59e0b;
  --warning-600: #d97706;
  --warning-700: #b45309;
  
  --danger-50:   #fef2f2;
  --danger-100:  #fee2e2;
  --danger-500:  #ef4444;
  --danger-600:  #dc2626;
  --danger-700:  #b91c1c;
  
  /* ─── Design Tokens — Semantic Aliases ─── */
  --color-primary:         var(--brand-600);
  --color-primary-hover:   var(--brand-700);
  --color-primary-active:  var(--brand-800);
  
  --color-bg-page:         #f7f5fb;
  --color-bg-card:         var(--gray-0);
  --color-bg-subtle:       var(--gray-50);
  --color-bg-muted:        var(--gray-100);
  
  --color-text-primary:    var(--gray-900);
  --color-text-secondary:  var(--gray-600);
  --color-text-tertiary:   var(--gray-500);
  --color-text-muted:      var(--gray-400);
  --color-text-inverse:    var(--gray-0);
  --color-text-brand:      var(--brand-700);
  
  --color-border-subtle:   var(--gray-150);
  --color-border-default:  var(--gray-200);
  --color-border-strong:   var(--gray-300);
  --color-border-focus:    var(--brand-500);
  
  /* Keep legacy names working (backward compatibility) */
  --color-primary-50:  var(--brand-50);
  --color-primary-100: var(--brand-100);
  --color-primary-200: var(--brand-200);
  --color-primary-300: var(--brand-300);
  --color-primary-400: var(--brand-400);
  --color-primary-500: var(--brand-500);
  --color-primary-600: var(--brand-600);
  --color-primary-700: var(--brand-700);
  --color-primary-800: var(--brand-800);
  --color-primary-900: var(--brand-900);
  
  --color-success-50:  var(--success-50);
  --color-success-100: var(--success-100);
  --color-success-500: var(--success-500);
  --color-success-600: var(--success-600);
  --color-success-700: var(--success-700);
  --color-warning-50:  var(--warning-50);
  --color-warning-100: var(--warning-100);
  --color-warning-500: var(--warning-500);
  --color-warning-600: var(--warning-600);
  --color-warning-700: var(--warning-700);
  --color-danger-50:   var(--danger-50);
  --color-danger-100:  var(--danger-100);
  --color-danger-500:  var(--danger-500);
  --color-danger-600:  var(--danger-600);
  --color-danger-700:  var(--danger-700);
  --color-neutral-0:   var(--gray-0);
  --color-neutral-50:  var(--gray-50);
  --color-neutral-100: var(--gray-100);
  --color-neutral-200: var(--gray-200);
  --color-neutral-300: var(--gray-300);
  --color-neutral-400: var(--gray-400);
  --color-neutral-500: var(--gray-500);
  --color-neutral-600: var(--gray-600);
  --color-neutral-700: var(--gray-700);
  --color-neutral-800: var(--gray-800);
  --color-neutral-900: var(--gray-900);
  --color-text-inverse:   var(--gray-0);
  --color-surface-page:    var(--color-bg-page);
  --color-surface-card:    var(--color-bg-card);
  --color-surface-raised:  var(--color-bg-card);
  --color-surface-sunken:  var(--color-bg-subtle);
  --color-info-50:  #eff6ff;
  --color-info-100: #dbeafe;
  --color-info-500: #3b82f6;
  --color-info-600: #2563eb;
  --color-info-700: #1d4ed8;
  
  /* ─── Typography (System-first for speed) ─── */
  /* Modern system font stack — loads INSTANTLY, looks great on any device */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans Hebrew', Arial, sans-serif;
  --font-family-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-family-mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
  
  /* Type scale (1.250 — Major Third) */
  --text-xs:   0.6875rem;    /* 11px */
  --text-sm:   0.8125rem;    /* 13px */
  --text-base: 0.9375rem;    /* 15px */
  --text-md:   1rem;         /* 16px */
  --text-lg:   1.125rem;     /* 18px */
  --text-xl:   1.3125rem;    /* 21px */
  --text-2xl:  1.625rem;     /* 26px */
  --text-3xl:  2rem;         /* 32px */
  --text-4xl:  2.5rem;       /* 40px */
  --text-5xl:  3.25rem;      /* 52px */
  
  --font-normal:   400;
  --font-medium:   500;
  --font-semibold: 600;
  --font-bold:     700;
  --font-extrabold:800;
  --font-black:    900;
  
  --leading-none:    1;
  --leading-tight:   1.15;
  --leading-snug:    1.35;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;
  
  /* Negative tracking for large text (premium feel) */
  --tracking-tightest: -0.04em;
  --tracking-tighter:  -0.025em;
  --tracking-tight:    -0.015em;
  --tracking-normal:   0;
  --tracking-wide:     0.015em;
  --tracking-wider:    0.05em;
  
  /* ─── Spacing (8px grid — premium apps use this) ─── */
  --space-0:  0;
  --space-px: 1px;
  --space-0_5: 0.125rem;   /* 2px */
  --space-1:   0.25rem;    /* 4px */
  --space-1_5: 0.375rem;   /* 6px */
  --space-2:   0.5rem;     /* 8px  ★ base */
  --space-2_5: 0.625rem;   /* 10px */
  --space-3:   0.75rem;    /* 12px */
  --space-3_5: 0.875rem;   /* 14px */
  --space-4:   1rem;       /* 16px ★ */
  --space-5:   1.25rem;    /* 20px */
  --space-6:   1.5rem;     /* 24px ★ */
  --space-7:   1.75rem;    /* 28px */
  --space-8:   2rem;       /* 32px ★ */
  --space-10:  2.5rem;     /* 40px */
  --space-12:  3rem;       /* 48px ★ */
  --space-14:  3.5rem;     /* 56px */
  --space-16:  4rem;       /* 64px */
  --space-20:  5rem;       /* 80px */
  --space-24:  6rem;       /* 96px */
  
  /* ─── Radius (Premium — slightly smaller, more refined) ─── */
  --radius-xs:   3px;
  --radius-sm:   6px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;
  --radius-2xl:  20px;
  --radius-3xl:  28px;
  --radius-full: 9999px;
  
  /* ─── Premium Shadows (multi-layer for depth) ─── */
  --shadow-xs: 0 0 0 1px rgba(17, 24, 39, 0.04);
  --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04), 0 0 0 1px rgba(17, 24, 39, 0.03);
  --shadow-md: 0 4px 8px -2px rgba(17, 24, 39, 0.06), 0 2px 4px -2px rgba(17, 24, 39, 0.04), 0 0 0 1px rgba(17, 24, 39, 0.04);
  --shadow-lg: 0 12px 24px -6px rgba(17, 24, 39, 0.1), 0 4px 10px -4px rgba(17, 24, 39, 0.06), 0 0 0 1px rgba(17, 24, 39, 0.04);
  --shadow-xl: 0 20px 36px -10px rgba(17, 24, 39, 0.14), 0 8px 14px -6px rgba(17, 24, 39, 0.08), 0 0 0 1px rgba(17, 24, 39, 0.05);
  --shadow-2xl: 0 32px 64px -16px rgba(17, 24, 39, 0.18), 0 12px 24px -8px rgba(17, 24, 39, 0.1);
  
  --shadow-primary: 0 8px 16px -4px rgba(124, 58, 237, 0.25), 0 2px 6px -2px rgba(124, 58, 237, 0.15);
  --shadow-primary-lg: 0 16px 32px -8px rgba(124, 58, 237, 0.3), 0 4px 12px -4px rgba(124, 58, 237, 0.2);
  
  /* Inner shadows for depth */
  --shadow-inner-sm: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
  --shadow-inner-highlight: inset 0 1px 0 0 rgba(255, 255, 255, 0.15);
  
  /* ─── Motion (Premium spring curves) ─── */
  --duration-instant: 50ms;
  --duration-fast:    150ms;
  --duration-base:    220ms;
  --duration-slow:    400ms;
  --duration-slower:  600ms;
  
  /* Easing functions (premium apps use these specific curves) */
  --ease-linear:     linear;
  --ease-out:        cubic-bezier(0.16, 1, 0.3, 1);      /* Smooth stop */
  --ease-in:         cubic-bezier(0.7, 0, 0.84, 0);
  --ease-in-out:     cubic-bezier(0.87, 0, 0.13, 1);
  --ease-spring:     cubic-bezier(0.5, 1.4, 0.5, 1);     /* Gentle bounce */
  --ease-elastic:    cubic-bezier(0.68, -0.55, 0.27, 1.55);
  
  /* ─── Z-index ─── */
  --z-dropdown:  100;
  --z-sticky:    200;
  --z-drawer:    300;
  --z-overlay:   400;
  --z-modal:     500;
  --z-popover:   600;
  --z-toast:     700;
  --z-install:   800;
  --z-critical:  900;
  
  /* ─── Focus Ring (Premium — refined) ─── */
  --focus-ring:         0 0 0 2px var(--color-bg-page), 0 0 0 4px var(--brand-500);
  --focus-ring-simple:  0 0 0 3px rgba(139, 92, 246, 0.35);
  --focus-ring-offset:  0 0 0 2px var(--color-bg-page), 0 0 0 5px rgba(124,58,237,.5);
  --focus-ring-danger:  0 0 0 2px var(--color-bg-page), 0 0 0 4px var(--danger-500);
  --focus-ring-success: 0 0 0 2px var(--color-bg-page), 0 0 0 4px var(--success-500);
  
  /* Blur effects (premium glass) */
  --blur-sm:  blur(8px);
  --blur-md:  blur(16px);
  --blur-lg:  blur(24px);
  --blur-xl:  blur(40px);
}

/* ─── Reduced Motion — respect accessibility preference ─── */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ─── Font Size Scaling (respect user preferences) ─── */
html{font-size:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}

/* ─── Screen reader only utility class ─── */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.sr-only-focusable:focus,.sr-only-focusable:focus-within{position:static;width:auto;height:auto;padding:revert;margin:revert;overflow:visible;clip:auto;white-space:normal}
/* ═══════════════════════════════════════════════════════════════ */
/* ═══ Professional Component Library v1                      ═══ */
/* ═══════════════════════════════════════════════════════════════ */

/* ─── Universal button baseline ─── */
.btn-v2{display:inline-flex;align-items:center;justify-content:center;gap:.5em;padding:.75em 1em;border-radius:var(--radius-md);border:1px solid transparent;font-family:inherit;font-size:var(--text-sm);font-weight:var(--font-semibold);line-height:1;cursor:pointer;transition:all var(--duration-fast) var(--ease-out);text-decoration:none;white-space:nowrap;min-height:40px;letter-spacing:.1px;user-select:none;-webkit-user-select:none}
.btn-v2:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-v2:active:not(:disabled){transform:scale(.97)}

/* Button variants */
.btn-primary-v2{background:linear-gradient(135deg,var(--color-primary-600),var(--color-primary-700));color:white;box-shadow:var(--shadow-sm)}
.btn-primary-v2:hover:not(:disabled){background:linear-gradient(135deg,var(--color-primary-700),var(--color-primary-800));box-shadow:var(--shadow-md);transform:translateY(-1px)}

.btn-secondary-v2{background:var(--color-surface-card);color:var(--color-primary-700);border-color:var(--color-border-subtle);box-shadow:var(--shadow-xs)}
.btn-secondary-v2:hover:not(:disabled){background:var(--color-primary-50);border-color:var(--color-primary-300)}

.btn-ghost-v2{background:transparent;color:var(--color-text-secondary)}
.btn-ghost-v2:hover:not(:disabled){background:var(--color-neutral-100);color:var(--color-text-primary)}

.btn-danger-v2{background:linear-gradient(135deg,var(--color-danger-500),var(--color-danger-600));color:white;box-shadow:var(--shadow-sm)}
.btn-danger-v2:hover:not(:disabled){background:linear-gradient(135deg,var(--color-danger-600),var(--color-danger-700));box-shadow:var(--shadow-md)}
.btn-danger-v2:focus-visible{box-shadow:var(--focus-ring-danger)}

.btn-success-v2{background:linear-gradient(135deg,var(--color-success-500),var(--color-success-600));color:white;box-shadow:var(--shadow-sm)}
.btn-success-v2:focus-visible{box-shadow:var(--focus-ring-success)}

/* Button sizes */
.btn-sm-v2{padding:.5em .75em;font-size:var(--text-xs);min-height:32px;border-radius:var(--radius-sm)}
.btn-lg-v2{padding:1em 1.5em;font-size:var(--text-base);min-height:48px;border-radius:var(--radius-lg)}

/* Icon button (accessible square button) */
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--radius-md);border:1px solid var(--color-border-subtle);background:var(--color-surface-card);color:var(--color-text-secondary);cursor:pointer;transition:all var(--duration-fast) var(--ease-out);font-family:inherit;flex-shrink:0}
.icon-btn:hover{background:var(--color-neutral-100);color:var(--color-text-primary);border-color:var(--color-border-default)}
.icon-btn:active{transform:scale(.92)}
.icon-btn-sm{width:32px;height:32px;border-radius:var(--radius-sm)}
.icon-btn-lg{width:48px;height:48px;border-radius:var(--radius-lg)}

/* ─── Card variants ─── */
.card-v2{background:var(--color-surface-card);border:1px solid var(--color-border-subtle);border-radius:var(--radius-lg);padding:var(--space-4);transition:all var(--duration-base) var(--ease-out)}
.card-v2-interactive{cursor:pointer}
.card-v2-interactive:hover{border-color:var(--color-primary-300);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.card-v2-elevated{box-shadow:var(--shadow-md);border-color:transparent}
.card-v2-flat{box-shadow:none}

/* ─── Form inputs ─── */
.input-v2{width:100%;padding:.75em 1em;background:var(--color-surface-card);border:1.5px solid var(--color-border-default);border-radius:var(--radius-md);font-family:inherit;font-size:var(--text-base);color:var(--color-text-primary);transition:all var(--duration-fast) var(--ease-out);outline:none;-webkit-user-select:text;user-select:text;min-height:44px}
.input-v2::placeholder{color:var(--color-text-tertiary)}
.input-v2:hover{border-color:var(--color-border-strong)}
.input-v2:focus-visible{border-color:var(--color-primary-700);box-shadow:var(--focus-ring)}
.input-v2:disabled{background:var(--color-neutral-100);cursor:not-allowed;opacity:.7}

.label-v2{display:block;font-size:var(--text-sm);font-weight:var(--font-semibold);color:var(--color-text-primary);margin-bottom:var(--space-2);letter-spacing:.1px}
.label-v2-required::after{content:' *';color:var(--color-danger-600)}

.helper-v2{font-size:var(--text-xs);color:var(--color-text-secondary);margin-top:var(--space-1);line-height:var(--leading-normal)}
.error-v2{font-size:var(--text-xs);color:var(--color-danger-700);margin-top:var(--space-1);font-weight:var(--font-semibold);display:flex;align-items:center;gap:4px}

/* ─── Badges & Tags ─── */
.badge-v2{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--radius-sm);font-size:var(--text-xs);font-weight:var(--font-bold);line-height:1.4;letter-spacing:.2px;white-space:nowrap}
.badge-v2-primary{background:var(--color-primary-100);color:var(--color-primary-800);border:1px solid var(--color-primary-200)}
.badge-v2-success{background:var(--color-success-100);color:var(--color-success-700);border:1px solid var(--color-success-500)}
.badge-v2-warning{background:var(--color-warning-100);color:var(--color-warning-700);border:1px solid var(--color-warning-500)}
.badge-v2-danger{background:var(--color-danger-100);color:var(--color-danger-700);border:1px solid var(--color-danger-500)}
.badge-v2-neutral{background:var(--color-neutral-100);color:var(--color-neutral-700);border:1px solid var(--color-neutral-300)}

/* ─── Dividers ─── */
.divider-v2{height:1px;background:var(--color-border-subtle);margin:var(--space-4) 0;border:none}
.divider-v2-dashed{border-top:1px dashed var(--color-border-default)}

/* ─── Loading spinner (accessible) ─── */
.spinner-v2{width:20px;height:20px;border:2.5px solid var(--color-primary-100);border-top-color:var(--color-primary-700);border-radius:50%;animation:spin-v2 .8s linear infinite;display:inline-block}
.spinner-v2-lg{width:32px;height:32px;border-width:3px}
@keyframes spin-v2{to{transform:rotate(360deg)}}
.spinner-v2-wrap{display:flex;align-items:center;justify-content:center;gap:var(--space-3);padding:var(--space-6);color:var(--color-text-secondary);font-weight:var(--font-semibold);font-size:var(--text-sm)}

/* ─── Tooltip (basic, accessible) ─── */
[data-tooltip]{position:relative}
[data-tooltip]:hover::after,[data-tooltip]:focus::after{content:attr(data-tooltip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--color-neutral-900);color:white;padding:6px 10px;border-radius:var(--radius-sm);font-size:var(--text-xs);font-weight:var(--font-semibold);white-space:nowrap;z-index:var(--z-popover);margin-bottom:6px;pointer-events:none;animation:fadeIn-v2 .15s ease-out}
@keyframes fadeIn-v2{from{opacity:0;transform:translateX(-50%) translateY(2px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ─── Live region for accessibility announcements ─── */
.live-region{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
/* ═══ Keyboard Help Overlay ═══ */
.kbd-help-ov{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:var(--z-modal);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .25s ease}
.kbd-help-ov.on{opacity:1}
.kbd-help-sheet{background:var(--color-surface-card);width:100%;max-width:440px;border-radius:var(--radius-2xl);padding:24px;position:relative;box-shadow:var(--shadow-2xl);direction:rtl;font-family:inherit;transform:scale(.92);transition:transform .3s var(--ease-spring)}
.kbd-help-ov.on .kbd-help-sheet{transform:scale(1)}
.kbd-help-close{position:absolute;top:14px;left:14px;width:32px;height:32px;border-radius:50%;background:var(--color-neutral-100);border:none;color:var(--color-text-secondary);font-size:15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s}
.kbd-help-close:hover{background:var(--color-neutral-200);color:var(--color-text-primary)}
.kbd-help-title{font-size:var(--text-xl);font-weight:var(--font-black);color:var(--color-primary-800);margin-bottom:18px;letter-spacing:var(--tracking-tight)}
.kbd-help-list{display:flex;flex-direction:column;gap:8px}
.kbd-help-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--color-neutral-50);border:1px solid var(--color-border-subtle);border-radius:var(--radius-md);font-size:var(--text-sm)}
.kbd-help-item span{color:var(--color-text-secondary);font-weight:var(--font-medium);flex:1}
.kbd-help-item kbd{display:inline-block;padding:4px 9px;background:var(--color-surface-card);border:1.5px solid var(--color-border-default);border-bottom-width:2.5px;border-radius:var(--radius-sm);font-family:var(--font-family-mono);font-size:var(--text-xs);font-weight:var(--font-bold);color:var(--color-text-primary);box-shadow:var(--shadow-xs);letter-spacing:.2px;min-width:30px;text-align:center}



/* ─── Skip to main content link (keyboard users) ─── */
.skip-to-main{position:absolute;top:-40px;right:10px;background:var(--color-primary-700);color:white;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:700;z-index:var(--z-critical);transition:top .2s;font-size:14px}
.skip-to-main:focus{top:10px;outline:2px solid white;outline-offset:2px}

/* ─── Universal focus states (accessibility) ─── */
:focus{outline:none}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:inherit;transition:box-shadow .15s ease-out}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:none;box-shadow:var(--focus-ring)}

/* ─── Selection color ─── */
::selection{background:var(--color-primary-200);color:var(--color-primary-900)}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

/* ─── Performance-optimized background ───
   Single subtle gradient (not fixed), no backdrop-filter.
   Much faster scroll than v50's mesh gradients. */
body{
  font-family:var(--font-family);
  background:linear-gradient(180deg, #f7f5fb 0%, #f3f0ff 100%);
  min-height:100vh;
  min-height:100dvh;
  overscroll-behavior-y:contain;
  -webkit-user-select:none;
  user-select:none;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  color:var(--color-text-primary);
  line-height:var(--leading-normal);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
}
input,textarea,[contenteditable],.wt-editable,.editable-text{-webkit-user-select:text;user-select:text;font-variant-numeric:normal}
button,input{font-family:inherit}
::-webkit-scrollbar{display:none}

/* ─── Performance: contain layout for cards ───
   Tells browser each card is its own rendering layer. */
.card,.card-diary,.apt2,.client-card,.appt-card{contain:layout style}

/* ─── Performance: lazy-render offscreen content ─── */
.apt2-day-group,.client-card{content-visibility:auto;contain-intrinsic-size:auto 200px}
/* ═══ PWA Install Banner ═══ */
.install-banner-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 12px calc(12px + env(safe-area-inset-bottom,0));z-index:9998;pointer-events:none;transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.install-banner-wrap.on{transform:translateY(0)}
.install-banner{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border-radius:20px;padding:16px 16px 14px;max-width:480px;margin:0 auto;box-shadow:0 20px 50px rgba(124,58,237,.45);pointer-events:auto;position:relative;overflow:hidden;direction:rtl;font-family:inherit}
.install-banner::before{content:'';position:absolute;top:-40px;left:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.install-banner::after{content:'';position:absolute;bottom:-50px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.install-banner-close{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px);transition:background .15s}
.install-banner-close:hover{background:rgba(255,255,255,.32)}
.install-banner-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;position:relative;z-index:1}
.install-banner-icon{width:54px;height:54px;background:rgba(255,255,255,.18);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.install-banner-body{flex:1;min-width:0}
.install-banner-title{font-size:16px;font-weight:900;letter-spacing:.2px;line-height:1.2}
.install-banner-sub{font-size:11.5px;opacity:.9;margin-top:3px;font-weight:600;line-height:1.4}
.install-banner-btn{width:100%;padding:12px;background:white;color:#6d28d9;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;margin-top:2px;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.15);transition:all .15s;letter-spacing:.2px}
.install-banner-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.2)}
.install-banner-btn:active{transform:scale(.98)}
.install-ios-hint{background:rgba(255,255,255,.12);;border-radius:10px;padding:10px 12px;font-size:11.5px;line-height:1.55;color:rgba(255,255,255,.95);font-weight:600;position:relative;z-index:1;border:1px solid rgba(255,255,255,.15)}
.install-ios-hint b{color:white;font-weight:900}

/* Standalone PWA mode — make it feel even more like an app */
@media all and (display-mode:standalone){
  body{padding-top:env(safe-area-inset-top,20px)}
  /* hide any "open in browser" hints if shown */
  .install-banner-wrap{display:none!important}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#f3f0ff}

/* ── Desktop & Tablet (768px+) ── */
@media(min-width:768px){
  body{background:linear-gradient(135deg,#ede9fe 0%,#e0e7ff 50%,#fae8ff 100%);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;min-height:100vh}
  #app{max-width:520px;border-radius:28px;box-shadow:0 20px 60px rgba(76,29,149,.18);min-height:calc(100vh - 48px);max-height:calc(100vh - 48px);overflow:hidden;position:sticky;top:24px;background:white}
  .content{overflow-y:auto;max-height:calc(100vh - 200px)}
  /* Bigger home title */
  .home-title h1{font-size:36px}
  .home-title p{font-size:15px}
  /* Slightly bigger cards on desktop */
  .card .card-emoji{font-size:52px}
  .card .card-name{font-size:24px}
  /* Diary card scale up */
  .dc-title{font-size:38px}
  .dc-tag{font-size:14px}
  .dc-feat-ico{font-size:22px}
  .dc-feat-lbl{font-size:11px}
  .dc-ico{font-size:58px}
  .dc-cta{font-size:15px;padding:14px}
  /* Hist sheet - stay centered, not fullscreen */
  .hist-sheet{position:fixed;max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(76,29,149,.25);overflow:hidden}
  /* Personal sheet (Daniel/Rinat) */
  .profile-sheet{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(76,29,149,.25);overflow:hidden}
  /* Chart full screen adaptation */
  .chart-screen{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(76,29,149,.25);overflow:hidden}
  /* Laser beam overlay should cover the app only */
  .laser-beam-overlay{max-width:520px;right:50%;transform:translateX(50%);inset:auto}
  /* Tap targets a bit bigger */
  .tab{padding:14px 0;font-size:14px}
  .hist-tab{padding:12px 16px;font-size:12px}
  /* PWA button hidden on desktop */
  .pwa-btn{display:none!important}
  /* Scrollbar styling for desktop */
  .content::-webkit-scrollbar,.hist-content::-webkit-scrollbar{display:block!important;width:8px}
  .content::-webkit-scrollbar-thumb,.hist-content::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:4px}
  .content::-webkit-scrollbar-track,.hist-content::-webkit-scrollbar-track{background:#f3f0ff}
}

/* ── Large Desktop (1200px+) - add side decorations ── */
@media(min-width:1200px){
  body{position:relative}
  body::before{content:'📖';position:fixed;top:50%;right:calc(50% + 340px);transform:translateY(-50%);font-size:120px;opacity:.04;pointer-events:none;animation:float 5s ease-in-out infinite}
  body::after{content:'💆‍♀️';position:fixed;top:50%;left:calc(50% + 340px);transform:translateY(-50%);font-size:120px;opacity:.04;pointer-events:none;animation:float 5s ease-in-out infinite;animation-delay:-2.5s}
}


/* ═══════════════════════════════════════════════════════════════ */
/* ═══ Home Screen v3 — Professional + Fast (NO blur)          ═══ */
/* ═══════════════════════════════════════════════════════════════ */

.home{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:var(--space-5) var(--space-5) var(--space-8);
  gap:var(--space-4);
  overflow-y:auto;
  max-width:520px;
  margin:0 auto;
  width:100%;
  animation:pageEnter 0.4s var(--ease-out)
}
@keyframes pageEnter{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Title Block ── */
.home-title{
  text-align:center;
  padding:var(--space-8) 0 var(--space-2);
}

.home-title h1{
  font-family:var(--font-family-display);
  font-size:var(--text-4xl);
  font-weight:var(--font-black);
  letter-spacing:var(--tracking-tightest);
  line-height:var(--leading-none);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:var(--space-3);
  color:var(--brand-900);
  cursor:default
}
.home-title h1 .book-ico{
  display:inline-block;
  font-size:0.95em
}
.home-title p{
  font-size:var(--text-sm);
  color:var(--color-text-tertiary);
  margin-top:var(--space-2);
  font-weight:var(--font-medium);
  letter-spacing:var(--tracking-wide)
}
.home-title p .heart{
  color:var(--brand-500);
  font-size:0.9em
}

/* ── Person Cards Row ── */
.cards-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--space-3)
}

.card{
  border-radius:var(--radius-2xl);
  padding:var(--space-5) var(--space-4);
  cursor:pointer;
  border:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--space-2);
  position:relative;
  overflow:hidden;
  transition:transform var(--duration-fast) var(--ease-out),box-shadow var(--duration-fast) var(--ease-out);
  min-height:130px;
  color:white;
  font-family:inherit;
  will-change:transform
}

.card:active{transform:scale(0.97)}
.card:hover{transform:translateY(-2px)}

.card .card-emoji{
  font-size:42px;
  line-height:1;
  margin-bottom:2px
}

.card .card-name{
  font-size:var(--text-lg);
  font-weight:var(--font-extrabold);
  letter-spacing:var(--tracking-tight);
  color:white;
  line-height:var(--leading-none)
}
.card .card-sub{
  font-size:var(--text-xs);
  font-weight:var(--font-medium);
  color:rgba(255,255,255,0.85);
  letter-spacing:var(--tracking-wide);
  margin-top:2px
}

.card-daniel{
  background:linear-gradient(135deg, #3b82f6, #1d4ed8);
  box-shadow:0 4px 12px -2px rgba(59,130,246,0.3)
}
.card-rinat{
  background:linear-gradient(135deg, #ec4899, #be185d);
  box-shadow:0 4px 12px -2px rgba(236,72,153,0.3)
}
.card-daniel:hover{box-shadow:0 8px 20px -4px rgba(59,130,246,0.4)}
.card-rinat:hover{box-shadow:0 8px 20px -4px rgba(236,72,153,0.4)}

/* ── Main Diary Card — Hero (MINIMAL) ── */
.card-diary{
  flex:1;
  border-radius:var(--radius-3xl);
  padding:var(--space-6);
  cursor:pointer;
  border:none;
  background:linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
  color:white;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:360px;
  transition:transform var(--duration-fast) var(--ease-out),box-shadow var(--duration-fast) var(--ease-out);
  text-align:right;
  font-family:inherit;
  box-shadow:0 10px 24px -4px rgba(124,58,237,0.3);
  will-change:transform;
  gap:var(--space-5)
}
.card-diary:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 32px -6px rgba(124,58,237,0.4)
}
.card-diary:active{transform:translateY(0) scale(0.995)}

/* One static decorative highlight (no animation, no blur) */
.card-diary::before{
  content:'';
  position:absolute;
  top:-40px;
  left:-40px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  pointer-events:none
}

.dc-top{
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-between;
  align-items:flex-start
}
.dc-badge{
  background:rgba(255,255,255,0.15);
  padding:var(--space-1_5) var(--space-3);
  border-radius:var(--radius-full);
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  letter-spacing:var(--tracking-wider);
  text-transform:uppercase;
  color:white
}
.dc-ico{
  font-size:44px;
  line-height:1
}

.dc-mid{
  position:relative;
  z-index:1;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:var(--space-4) 0 var(--space-3);
  gap:var(--space-3)
}
.dc-title{
  font-family:var(--font-family-display);
  font-size:var(--text-3xl);
  font-weight:var(--font-black);
  letter-spacing:var(--tracking-tightest);
  line-height:var(--leading-none);
  color:white;
  margin-bottom:2px
}
.dc-tag{
  font-size:var(--text-sm);
  opacity:0.9;
  font-weight:var(--font-medium);
  letter-spacing:var(--tracking-tight);
  line-height:var(--leading-snug);
  color:white;
  max-width:90%
}

/* ── AI Tip Panel (no blur, solid with transparency) ── */
.dc-tip{
  position:relative;
  background:rgba(255,255,255,0.1);
  border-radius:var(--radius-xl);
  padding:var(--space-4);
  cursor:pointer;
  overflow:hidden;
  transition:background var(--duration-fast) var(--ease-out);
  border:1px solid rgba(255,255,255,0.15);
  margin-top:var(--space-2);
  z-index:1
}
.dc-tip:hover{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.25)
}
.dc-tip:active{transform:scale(0.99)}

.dc-tip-hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:var(--space-2_5)
}
.dc-tip-brand{
  display:flex;
  align-items:center;
  gap:var(--space-2_5)
}
.dc-tip-orb{
  width:18px;
  height:18px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fde68a, #f59e0b 60%, #b45309);

  flex-shrink:0
}
.dc-tip-brand-label{
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  color:rgba(255,255,255,0.95);
  letter-spacing:var(--tracking-wider);
  text-transform:uppercase
}
.dc-tip-meta{
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  color:rgba(255,255,255,0.7);
  background:rgba(0,0,0,0.15);
  padding:3px var(--space-2);
  border-radius:var(--radius-sm)
}

.dc-tip-body{
  font-size:var(--text-sm);
  font-weight:var(--font-medium);
  color:white;
  line-height:var(--leading-snug);
  letter-spacing:var(--tracking-tight);
  margin-bottom:var(--space-2_5);
  min-height:40px
}
.dc-tip-body b{
  font-weight:var(--font-extrabold);
  color:#fde68a
}

.dc-tip-ftr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding-top:var(--space-2);
  border-top:1px solid rgba(255,255,255,0.1)
}
.dc-tip-cta{
  display:flex;
  align-items:center;
  gap:var(--space-1_5);
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  color:rgba(255,255,255,0.85)
}
.dc-tip-arrow{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--text-sm);
  color:white;
  transition:background var(--duration-fast) var(--ease-out),transform var(--duration-fast) var(--ease-out)
}
.dc-tip:hover .dc-tip-arrow{
  background:rgba(255,255,255,0.25);
  transform:translateX(-3px)
}

/* ── Feature Grid ── */
.dc-feats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:var(--space-2);
  position:relative;
  z-index:1;
  margin-top:var(--space-2)
}
.dc-feat{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-1);
  text-align:center;
  transition:background var(--duration-fast) var(--ease-out),transform var(--duration-fast) var(--ease-out),border-color var(--duration-fast) var(--ease-out);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--space-1);
  min-height:64px;
  color:white;
  font-family:inherit
}
.dc-feat:hover{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.22);
  transform:translateY(-1px)
}
.dc-feat:active{transform:scale(0.95)}
.dc-feat-ico{font-size:var(--text-xl);line-height:1}
.dc-feat-lbl{
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  letter-spacing:var(--tracking-tight);
  line-height:var(--leading-tight)
}

/* ── CTA Button ── */
.dc-cta{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--radius-xl);
  padding:var(--space-3_5) var(--space-4);
  text-align:center;
  font-size:var(--text-base);
  font-weight:var(--font-bold);
  margin-top:var(--space-3);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:var(--space-2);
  letter-spacing:var(--tracking-tight);
  color:white;
  transition:background var(--duration-fast) var(--ease-out)
}
.card-diary:hover .dc-cta{background:rgba(255,255,255,0.2)}
.dc-cta .dc-arrow{
  display:inline-block;
  transition:transform var(--duration-fast) var(--ease-out);
  font-size:var(--text-lg)
}
.card-diary:hover .dc-cta .dc-arrow{transform:translateX(-4px)}

/* ── Footer ── */
.home-ftr{
  text-align:center;
  margin-top:var(--space-2);
  padding:var(--space-3);
  font-size:var(--text-xs);
  color:var(--color-text-tertiary);
  font-weight:var(--font-medium);
  letter-spacing:var(--tracking-wider);
  text-transform:uppercase
}
.home-ftr .divider{
  display:inline-block;
  margin:0 var(--space-2);
  opacity:0.4;
  color:var(--brand-400)
}

/* ── Install Pill (minimalist) ── */
.install-pill{
  display:flex;
  align-items:center;
  gap:var(--space-3);
  width:100%;
  background:var(--color-bg-card);
  color:var(--color-text-primary);
  border:1px solid var(--color-border-default);
  border-radius:var(--radius-xl);
  padding:var(--space-3_5) var(--space-4);
  margin-top:var(--space-1);
  cursor:pointer;
  font-family:inherit;
  box-shadow:var(--shadow-sm);
  transition:transform var(--duration-fast) var(--ease-out),box-shadow var(--duration-fast) var(--ease-out),border-color var(--duration-fast) var(--ease-out)
}
.install-pill:hover{
  transform:translateY(-1px);
  border-color:var(--brand-300);
  box-shadow:var(--shadow-md)
}
.install-pill:active{transform:translateY(0) scale(0.99)}
.install-pill-ico{
  width:40px;
  height:40px;
  background:linear-gradient(135deg,var(--brand-500),var(--brand-700));
  border-radius:var(--radius-md);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--text-xl);
  flex-shrink:0;
  box-shadow:var(--shadow-primary);
  color:white
}
.install-pill-txt{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:2px;
  text-align:right
}
.install-pill-title{
  font-size:var(--text-sm);
  font-weight:var(--font-bold);
  color:var(--color-text-primary);
  line-height:var(--leading-tight)
}
.install-pill-sub{
  font-size:var(--text-xs);
  font-weight:var(--font-medium);
  color:var(--color-text-tertiary);
  line-height:var(--leading-tight)
}
.install-pill-arrow{
  font-size:var(--text-md);
  color:var(--color-text-tertiary);
  font-weight:var(--font-bold);
  transition:transform var(--duration-fast) var(--ease-out),color var(--duration-fast) var(--ease-out)
}
.install-pill:hover .install-pill-arrow{
  color:var(--brand-600);
  transform:translateX(-3px)
}

@media all and (display-mode:standalone){
  .install-pill{display:none!important}
}


/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:14px 16px 12px;flex-shrink:0;color:white}
.hdr-back{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:white}
.hdr-info{flex:1;text-align:center}

/* ── TABS ── */
.tabs{background:white;border-bottom:1px solid #f3f4f6;display:flex;flex-shrink:0}
.tab{flex:1;padding:12px 0;font-size:13px;font-weight:bold;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;color:#9ca3af}

.content{flex:1;overflow-y:auto;padding:12px}

/* ── CALENDAR ── */

.cal-card{border-radius:18px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 16px rgba(0,0,0,.10)}
.cal-hdr{position:relative;height:90px;overflow:hidden}
.cal-hdr-grad{position:absolute;top:0;left:0;right:0;bottom:0}

.cal-hdr-title{color:#fff;font-size:19px;font-weight:900;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.cal-hdr-year{color:rgba(255,255,255,.7);font-size:12px;font-weight:500;margin-top:1px}
.cal-hdr-btns{display:flex;gap:6px}
.cal-hdr-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.18);color:#fff;font-size:15px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-body{background:#fff;padding:8px 10px 12px}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-banner{width:100%;height:140px;border-radius:16px;object-fit:cover;margin-bottom:12px;display:block;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.cnb{background:none;border:none;cursor:pointer;font-size:22px;font-weight:bold;width:34px;height:34px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:11px;color:#9ca3af;padding:2px 0}
.cal-day{min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;padding:1px;position:relative;border:none;background:transparent;color:#374151;font-size:13px;font-family:inherit}
.cal-day.today{background:#ede9fe;color:#4c1d95;font-weight:bold}
.cal-day.sel{color:white!important}
.cal-day.hol{border:1px solid #fcd34d}
.cal-day-heb{font-size:9px;line-height:1;color:#a78bfa}
.cal-day.sel .cal-day-heb,.cal-day.sel .cal-day-hol{color:rgba(255,255,255,.8)}
.cal-day-hol{font-size:7px;line-height:1;color:#d97706;max-width:100%;overflow:hidden;padding:0 1px}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.task-num{font-weight:bold;font-size:12px;width:18px;text-align:center;flex-shrink:0;opacity:.5}
.task-inp{flex:1;border:1px solid #ede9fe;border-radius:10px;padding:10px 12px;text-align:right;font-size:14px;outline:none;background:white}
.add-btn{width:100%;margin-top:6px;padding:10px;border-radius:10px;border:2px dashed;background:transparent;font-size:13px;cursor:pointer;font-family:inherit}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.sheet{background:white;width:100%;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;padding-bottom:24px;animation:slideUp .25s ease}

.btn-g{background:#f3f4f6;color:#374151}
.appt-card{margin-bottom:10px;padding:12px;background:#f5f3ff;border-radius:14px;border:1px solid #ede9fe}
.slot-btn{width:100%;text-align:right;padding:9px 14px;border-radius:10px;border:none;margin-bottom:2px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit}
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.mo-btn{padding:11px 0;border-radius:14px;cursor:pointer;position:relative;font-size:13px;font-weight:bold;font-family:inherit;border:2px solid transparent}
.task-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.task-modal{background:white;border-radius:20px;width:100%;max-width:380px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .2s ease}
.task-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.task-modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#9ca3af;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.task-modal-close:hover{background:#f3f4f6;color:#374151}
textarea.task-modal-area{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:12px 14px;font-size:15px;text-align:right;resize:none;outline:none;font-family:inherit;line-height:1.6;min-height:160px}

.spinner{width:44px;height:44px;border:4px solid #c4b5fd;border-top-color:#7c3aed;border-radius:50%;animation:spin .9s linear infinite}

/* ── History Panel ─────────────────────────────── */
.hist-sheet{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:#f8f7fc}

.hist-badge{border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;color:white;display:inline-block;margin-right:3px}

/* ═══ Smart Tip Card (in AI Advisor tab) ═══ */

.adv-tip-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;border:none;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.2px;box-shadow:0 4px 14px rgba(245,158,11,.4),inset 0 1px 0 rgba(255,255,255,.35);transition:all .2s}

.claude-setup-hdr-txt{flex:1;min-width:0;position:relative;z-index:1}
.claude-setup-hdr-title{font-size:17px;font-weight:900;line-height:1.2}

.claude-setup-close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:white;font-size:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:background .15s;flex-shrink:0}

.claude-setup-info-title{font-size:13px;font-weight:900;color:#1e1b4b;margin-bottom:10px}

.claude-setup-step{display:flex;gap:10px;align-items:flex-start}

.claude-setup-pricing{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #fcd34d;border-radius:14px;padding:14px;display:flex;gap:12px}
.claude-setup-pricing-ico{font-size:26px;flex-shrink:0}
.claude-setup-pricing-title{font-size:13px;font-weight:900;color:#78350f;margin-bottom:3px}
.claude-setup-pricing-desc{font-size:11.5px;color:#92400e;line-height:1.55;font-weight:600}
.claude-setup-howto{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:14px;padding:14px}
.claude-setup-howto-title{font-size:13px;font-weight:900;color:#0c4a6e;margin-bottom:10px}
.claude-setup-howto-list{margin:0;padding:0 16px 0 0;font-size:12.5px;color:#0c4a6e;line-height:1.75;font-weight:600}

.claude-setup-howto-list code{background:#1e1b4b;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
.claude-setup-active{background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center}
.claude-setup-active-ico{font-size:28px;flex-shrink:0}
.claude-setup-active-title{font-size:13px;font-weight:900;color:#065f46}
.claude-setup-active-key{font-size:12px;color:#047857;font-weight:600;margin-top:2px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;text-align:right}
.claude-setup-form{display:flex;flex-direction:column;gap:8px}
.claude-setup-label{font-size:12px;font-weight:800;color:#1e1b4b;padding-right:2px}
.claude-setup-input{padding:12px 14px;border-radius:12px;border:1.5px solid #e5e7eb;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;outline:none;transition:border-color .15s;background:white}
.claude-setup-input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.claude-setup-hint{font-size:11px;color:#6b7280;font-weight:600;line-height:1.55;margin-top:2px}
.claude-setup-actions{display:flex;gap:8px}
.claude-setup-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.2px}
.claude-setup-btn.primary{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;box-shadow:0 4px 12px rgba(124,58,237,.3)}
.claude-setup-btn.primary:hover{box-shadow:0 6px 16px rgba(124,58,237,.4);transform:translateY(-1px)}
.claude-setup-btn.danger{background:white;color:#b91c1c;border:1.5px solid #fecaca}
.claude-setup-btn.danger:hover{background:#fef2f2}
.claude-setup-btn:active{transform:scale(.98)}
.claude-setup-test{background:#fafaf9;border-radius:12px;padding:12px;text-align:center;border:1px dashed #d1d5db}
.claude-setup-test-btn{padding:10px 18px;border-radius:10px;border:1.5px solid #c4b5fd;background:white;color:#7c3aed;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.claude-setup-test-btn:hover{background:#faf5ff}
.claude-setup-test-hint{font-size:10.5px;color:#6b7280;margin-top:6px;line-height:1.5;font-weight:600}

/* Claude button in advisor tab header */
.claude-btn-row{display:flex;gap:8px;margin-top:10px;position:relative;z-index:1}
.claude-btn{flex:1;background:rgba(255,255,255,.9);border:1.5px solid rgba(0,0,0,.06);color:#78350f;font-size:11.5px;font-weight:900;padding:8px 10px;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.claude-btn:hover{background:white;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.claude-btn.connected{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#86efac;color:#065f46}

/* Claude tip card in advisor */
.claude-tip-card{background:linear-gradient(135deg,#0c0a1e 0%,#1e1b4b 50%,#0c0a1e 100%);border-radius:20px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;border:1.5px solid rgba(251,191,36,.3);box-shadow:0 10px 32px rgba(12,10,30,.5)}
.claude-tip-card::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.25),transparent 65%);pointer-events:none;animation:advOrbFloat 10s ease-in-out infinite}
.claude-tip-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;z-index:1}
.claude-tip-badge{font-size:9px;font-weight:900;color:#78350f;background:linear-gradient(135deg,#fbbf24,#f59e0b);padding:3px 9px;border-radius:8px;letter-spacing:.5px;box-shadow:0 2px 6px rgba(245,158,11,.4)}
.claude-tip-label{font-size:12px;font-weight:900;color:#fbbf24;letter-spacing:.3px}
.claude-tip-date{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;margin-right:auto}
.claude-tip-body{position:relative;z-index:1;font-size:14.5px;color:white;line-height:1.65;font-weight:600;letter-spacing:.1px;margin-bottom:12px}
.claude-tip-emoji{font-size:22px;margin-left:8px;display:inline-block;vertical-align:middle}
.claude-tip-action{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:10px 12px;position:relative;z-index:1}
.claude-tip-action-label{font-size:10px;font-weight:900;color:#fbbf24;letter-spacing:.8px;margin-bottom:4px}
.claude-tip-action-body{font-size:12.5px;color:#fde68a;font-weight:700;line-height:1.55}
.claude-tip-meta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.claude-tip-type{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.claude-tip-refresh{margin-right:auto;background:none;border:none;color:rgba(255,255,255,.7);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all .15s}
.claude-tip-refresh:hover{background:rgba(255,255,255,.08);color:white}
.claude-tip-refresh:disabled{opacity:.4;cursor:not-allowed}
.adv-hdr{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:18px;padding:16px;margin-bottom:14px}
.adv-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.adv-hdr-icon{font-size:36px;flex-shrink:0}
.adv-hdr-txt{flex:1;min-width:0}
.adv-hdr-title{font-size:18px;font-weight:900;color:#78350f}
.adv-hdr-sub{font-size:12px;color:#92400e;font-weight:600;margin-top:2px}
.adv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.adv-stat{background:rgba(255,255,255,.6);border-radius:12px;padding:10px 8px;text-align:center;}
.adv-stat-val{font-size:20px;font-weight:900;color:#78350f;line-height:1}
.adv-stat-lbl{font-size:10px;font-weight:700;color:#92400e;margin-top:4px;line-height:1.3}
.adv-insights{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.adv-card{background:white;border-radius:16px;padding:14px;border:1.5px solid #e5e7eb;box-shadow:0 2px 10px rgba(0,0,0,.04);overflow:hidden;position:relative}
.adv-card.adv-p-high{border-color:#fecaca;background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.adv-card.adv-p-high::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#dc2626,#f87171)}
.adv-card.adv-p-medium{border-color:#fcd34d;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.adv-card.adv-p-medium::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.adv-card.adv-p-good{border-color:#a7f3d0;background:linear-gradient(135deg,#f0fdf4,#d1fae5)}
.adv-card.adv-p-good::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#059669,#10b981)}
.adv-card.adv-p-low{border-color:#bfdbfe;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.adv-card.adv-p-low::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
.adv-card-hdr{display:flex;gap:10px;margin-bottom:10px}
.adv-card-ico{font-size:26px;flex-shrink:0}
.adv-card-hdr-txt{flex:1;min-width:0}
.adv-card-priority{font-size:10px;font-weight:800;color:#6b7280;letter-spacing:.5px;margin-bottom:3px}
.adv-card-title{font-size:15px;font-weight:900;color:#1e1b4b;line-height:1.3}
.adv-card-body{font-size:13px;color:#374151;line-height:1.55;margin-bottom:10px}
.adv-card-body b{font-weight:800;color:#1e1b4b}
.adv-card-details{background:rgba(255,255,255,.6);border-radius:10px;padding:10px 12px;font-size:11.5px;color:#4b5563;font-weight:600;line-height:1.75;margin-bottom:10px;white-space:pre-line}
.adv-card-action{background:rgba(255,255,255,.75);border-radius:12px;padding:11px 13px;border-right:3px solid #7c3aed}
.adv-card-action-label{font-size:10px;font-weight:900;color:#7c3aed;letter-spacing:.8px;margin-bottom:5px}
.adv-card-action-body{font-size:12.5px;color:#1e1b4b;font-weight:600;line-height:1.6}
.adv-card-action-body b{font-weight:900;color:#7c3aed}
.adv-empty{background:white;border-radius:18px;padding:40px 24px;text-align:center;border:1.5px dashed #d1fae5}
.adv-empty-ico{font-size:56px;margin-bottom:10px}
.adv-empty-title{font-size:18px;font-weight:900;color:#059669;margin-bottom:6px}
.adv-empty-sub{font-size:13px;color:#6b7280;line-height:1.6}
.adv-footer{background:#f9fafb;border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;border:1px solid #f3f4f6;margin-top:8px}
.adv-footer-ico{font-size:20px;flex-shrink:0}
.adv-footer-txt{font-size:11px;color:#6b7280;line-height:1.55;font-weight:600}
/* Next appt hero */
.next-hero{background:linear-gradient(135deg,#7c3aed,#5b21b6);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(124,58,237,.35);overflow:hidden}
.next-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.next-hero-name{font-size:20px;font-weight:900;color:white;margin-bottom:4px}
.next-hero-detail{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:12px}
.next-hero-date{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:white;margin-bottom:12px}
.countdown{display:flex;gap:7px;justify-content:center}
.cd-seg{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px;text-align:center;min-width:50px}
.cd-num{font-size:22px;font-weight:900;color:white;line-height:1;font-family:monospace;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.cd-sep{color:rgba(255,255,255,.5);font-size:22px;font-weight:900;align-self:flex-start;margin-top:8px}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.65}}
.countdown.urgent .cd-num{color:#fca5a5;animation:urgentPulse 1s ease-in-out infinite}.countdown.warning .cd-num{color:#fed7aa;animation:urgentPulse 1.5s ease-in-out infinite}.countdown.soon .cd-num{color:#fef08a}
/* Appt cards */
.appt-card-pro{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;border:1px solid transparent}
.appt-time-pill{border-radius:10px;padding:7px 10px;text-align:center;font-size:13px;font-weight:800;flex-shrink:0;min-width:52px;border:1.5px solid}
.appt-card-info{flex:1;text-align:right}
.appt-card-name{font-size:14px;font-weight:800;color:#1e1b4b;margin-bottom:2px}
.appt-card-meta{font-size:12px;color:#6b7280}
.appt-card-date{display:inline-flex;align-items:center;background:#f5f3ff;color:#7c3aed;border-radius:8px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:4px}
.hist-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;gap:12px;align-items:center;opacity:.85;border:1px solid #f3f4f6}
.hist-time-pill{background:#f9fafb;color:#6b7280;border-radius:10px;padding:7px 10px;text-align:center;font-size:12px;font-weight:700;flex-shrink:0;min-width:48px;border:1.5px solid #e5e7eb}
.hist-card-info{flex:1;text-align:right}
.hist-card-name{font-size:14.5px;font-weight:600;color:#5b3a87;font-family:Georgia,"Times New Roman",serif;letter-spacing:-.1px}
.hist-card-meta{font-size:11px;color:#9ca3af;margin-top:2px}
/* Payments */
.pay-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pay-stat-val{font-size:20px;font-weight:900;color:#7c3aed}
.pay-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}
.pay-stat.full{grid-column:1/-1;background:linear-gradient(135deg,#7c3aed,#5b21b6)}
.pay-stat.full .pay-stat-val{color:white;font-size:26px}
.pay-stat.full .pay-stat-lbl{color:rgba(255,255,255,.7)}
.pay-filter{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto}
.pay-filter-btn{flex-shrink:0;padding:5px 12px;border-radius:18px;border:1.5px solid #ede9fe;background:white;color:#6b7280;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.pay-filter-btn.on{background:#7c3aed;color:white;border-color:#7c3aed}
.pay-row{background:white;border-radius:12px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.04)}
.pay-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pay-row-name{font-size:14px;font-weight:600;color:#5b3a87;font-family:Georgia,"Times New Roman",serif;letter-spacing:-.1px}
.pay-row-amount{font-size:15px;font-weight:900;color:#059669}
.pay-row-meta{font-size:11px;color:#6b7280}
.pay-row-date{font-size:10px;color:#a78bfa;font-weight:600;margin-top:2px}
.export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#059669,#047857);color:white;border:none;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(5,150,105,.3);margin-bottom:14px}
.pay-month-hdr{font-size:10px;font-weight:800;color:#a78bfa;letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px;display:flex;justify-content:space-between}
/* Goals */
.goals-hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:18px;padding:16px;margin-bottom:14px}
.goals-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.goals-hero-rev{font-size:22px;font-weight:900;color:white;margin-bottom:12px}
.goals-prog{background:rgba(255,255,255,.1);border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px}
.goals-prog-fill{height:100%;border-radius:20px;transition:width .8s}
.goals-prog-fill.gn{background:linear-gradient(90deg,#059669,#34d399)}
.goals-prog-fill.gy{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goals-prog-fill.gp{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.goals-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.ghs{text-align:center}
.ghs-val{font-size:15px;font-weight:900;color:white}
.ghs-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.goal-card{background:white;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.goal-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.goal-card-title{font-size:14px;font-weight:800;color:#1e1b4b}
.goal-card-period{font-size:10px;color:#a78bfa;font-weight:700;background:#f5f3ff;padding:2px 8px;border-radius:14px}
.goal-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.goal-current{font-size:20px;font-weight:900;color:#7c3aed}
.goal-target{font-size:13px;color:#9ca3af}
.goal-bar{background:#f3f4f6;border-radius:20px;height:8px;overflow:hidden;margin-bottom:7px}
.goal-bar-fill{height:100%;border-radius:20px;transition:width .8s}
.goal-bar-fill.hit{background:linear-gradient(90deg,#059669,#34d399)}
.goal-bar-fill.close{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goal-bar-fill.far{background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.goal-footer{display:flex;justify-content:space-between;align-items:center}
.goal-pct.hit{color:#059669;font-size:12px;font-weight:800}
.goal-pct.close{color:#d97706;font-size:12px;font-weight:800}
.goal-pct.far{color:#7c3aed;font-size:12px;font-weight:800}
.add-goal-btn{width:100%;padding:13px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.goal-inp-card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;border:2px solid #7c3aed}
.goal-inp{width:100%;border:1.5px solid #ede9fe;border-radius:12px;padding:10px 14px;text-align:right;font-size:14px;outline:none;margin-bottom:8px;background:#faf5ff;font-family:inherit}
.goal-inp:focus{border-color:#7c3aed}
.goal-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.goal-type-btn{padding:9px;border-radius:12px;border:1.5px solid #ede9fe;background:#faf5ff;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.goal-type-btn.on{border-color:#7c3aed;background:#ede9fe;color:#7c3aed}
/* CRM */
.crm-search-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:white;border:1.5px solid #ede9fe;border-radius:16px;padding:6px 6px 6px 14px;box-shadow:0 2px 12px rgba(124,58,237,.08);transition:border .2s}

.crm-add-btn{background:#7c3aed;color:white;border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0;font-family:inherit}

/* ═══════════════════════════════════════════════════════ */
/* ═══ Appointment Cards v2 — Linear/Notion-style design ═══ */
/* ═══════════════════════════════════════════════════════ */

.apt2-day-group{margin-bottom:22px;animation:fadeUp .4s ease-out}
.apt2-day-group:last-child{margin-bottom:8px}

.apt2-day-header{display:flex;justify-content:space-between;align-items:flex-end;padding:0 2px 10px;margin-bottom:10px;border-bottom:1px solid #ede9fe;position:relative}
.apt2-day-header::before{content:'';position:absolute;bottom:-1px;right:0;width:36px;height:2px;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:2px}
.apt2-day-group.today .apt2-day-header::before{background:linear-gradient(90deg,#dc2626,#f97316);width:60px}
.apt2-day-label{display:flex;align-items:baseline;gap:8px;min-width:0;flex:1}
.apt2-day-main{font-size:18px;font-weight:900;color:#1f2937;letter-spacing:-.3px;line-height:1}
.apt2-day-main.today{color:#dc2626;background:linear-gradient(135deg,#dc2626,#f97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.apt2-day-sub{font-size:11.5px;color:#9ca3af;font-weight:600;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apt2-day-stats{display:flex;gap:6px;align-items:center;flex-shrink:0}
.apt2-day-count{font-size:10.5px;font-weight:700;color:#6b7280;background:#ffffff;border:1px solid #e5e7eb;padding:3px 8px;border-radius:8px;white-space:nowrap}
.apt2-day-total{font-size:11px;font-weight:800;color:#065f46;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:1px solid #6ee7b7;padding:3px 9px;border-radius:8px;letter-spacing:.2px;white-space:nowrap}

.apt2-day-items{display:flex;flex-direction:column;gap:7px}

.apt2{display:flex;gap:0;background:white;border:1px solid #f1ecfb;border-radius:14px;padding:0;overflow:hidden;transition:all .2s;position:relative;animation:aptSlide .35s ease-out backwards}
.apt2:hover{border-color:#ddd6fe;box-shadow:0 4px 16px rgba(124,58,237,.08);transform:translateY(-1px)}
@keyframes aptSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.apt2-next{border-color:#c4b5fd;background:linear-gradient(135deg,#ffffff,#faf5ff);box-shadow:0 4px 20px rgba(124,58,237,.12)}
.apt2-next:hover{border-color:#a78bfa;box-shadow:0 6px 24px rgba(124,58,237,.18)}
.apt2-next::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#7c3aed,#a855f7);border-radius:3px 0 0 3px}
.apt2-today{background:linear-gradient(135deg,#ffffff,#fffbeb 140%)}

.apt2-time-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 12px;min-width:72px;background:linear-gradient(180deg,#fafafa,#f9fafb);border-left:1px solid #f3f4f6;position:relative;gap:4px}
.apt2-next .apt2-time-col{background:linear-gradient(180deg,#faf5ff,#f3e8ff);border-left-color:#ede9fe}
.apt2-today .apt2-time-col{background:linear-gradient(180deg,#fffbeb,#fef3c7)}
.apt2-time{font-size:17px;font-weight:900;color:#1f2937;letter-spacing:-.3px;line-height:1;font-variant-numeric:tabular-nums}
.apt2-next .apt2-time{color:#6d28d9}
.apt2-today .apt2-time{color:#b45309}
.apt2-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .2s}
.apt2-duration{font-size:9.5px;font-weight:700;color:#9ca3af;letter-spacing:.3px;text-transform:uppercase;line-height:1}

.apt2-main{flex:1;min-width:0;padding:11px 13px;display:flex;flex-direction:column;gap:5px}
.apt2-top{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.apt2-name-wrap{flex:1;min-width:0}
.apt2-name{font-size:14.5px;font-weight:700;color:#5b3a87;letter-spacing:-.1px;line-height:1.25;margin-bottom:2px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;font-family:Georgia,'Times New Roman',serif}
.apt2-next-bolt{display:inline-flex;animation:boltPulse 2s ease-in-out infinite}
@keyframes boltPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.85}}
.apt2-type{font-size:12px;color:#6b7280;font-weight:600;line-height:1.3;letter-spacing:.1px}
.apt2-price-wrap{flex-shrink:0}
.apt2-price{font-size:12.5px;font-weight:900;color:#1f2937;background:#f9fafb;border:1px solid #e5e7eb;padding:4px 9px;border-radius:8px;letter-spacing:.1px;font-variant-numeric:tabular-nums;white-space:nowrap}
.apt2-price.paid{color:#065f46;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#6ee7b7}

.apt2-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.apt2-badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;line-height:1.4;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
.apt2-badge.new{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border:1px solid #fcd34d}
.apt2-badge.debt{background:linear-gradient(135deg,#fee2e2,#fecaca);color:#991b1b;border:1px solid #fca5a5}
.apt2-badge.note{background:#f9fafb;color:#4b5563;border:1px solid #e5e7eb;font-style:italic;font-weight:600;max-width:200px}

.apt2-actions{display:flex;gap:5px;margin-top:4px;padding-top:8px;border-top:1px dashed #f3f4f6;align-items:center;flex-wrap:wrap}
.apt2-action-btn{width:28px;height:28px;border-radius:8px;border:1px solid #f3f4f6;background:#fafafa;color:#6b7280;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;flex-shrink:0;padding:0}
.apt2-action-btn:hover{background:#f3f4f6;color:#1f2937;border-color:#e5e7eb;transform:translateY(-1px)}
.apt2-action-btn.delete:hover{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.apt2-action-btn:active{transform:scale(.92)}

.empty-icon{font-size:48px;display:block;margin-bottom:12px}

.pwa-btn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border:none;border-radius:20px;padding:12px 24px;font-size:14px;font-weight:800;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(124,58,237,.5);gap:8px;align-items:center;font-family:inherit;white-space:nowrap}

/* ── Cancellations ── */
.canc-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.canc-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}

.canc-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}

.canc-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-right:4px solid #fca5a5}

.canc-card-meta{font-size:12px;color:#6b7280}
.canc-card-date{font-size:10px;color:#9ca3af;margin-top:3px}
/* Cancellation modal */
.canc-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end}
.canc-sheet{background:white;width:100%;border-radius:22px 22px 0 0;padding:20px 18px 32px;animation:slideUp .25s ease}
.canc-title{font-size:17px;font-weight:900;color:#dc2626;text-align:center;margin-bottom:6px}
.canc-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:18px}
.canc-reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}

.canc-reason-btn.orange{border-color:#fed7aa;background:#fff7ed;color:#c2410c}
.canc-reason-btn.gray{border-color:#e5e7eb;background:#f9fafb;color:#6b7280}

/* ── Month/Year Picker ── */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:flex-end}
.picker-sheet{background:white;width:100%;border-radius:22px 22px 0 0;padding:0 0 28px;animation:slideUp .25s ease;max-height:70vh;overflow-y:auto}
