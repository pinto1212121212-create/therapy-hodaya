// Chrome's automatic "Install App" banner requires a Service Worker.
// Since we can't host a separate .js file on GitHub Pages and Blob URL
// registration is blocked on most mobile browsers, we rely on:
//
// 1. Manifest + Apple Touch Icon → installation IS possible via
//    Chrome menu (⋮) → "Add to Home screen"
// 2. Our "Install Pill" button tells the user exactly what to do
// 3. Once installed, the app runs in standalone mode (no browser UI)

// ── Install Prompt System (Android/Chrome) ──
let _deferredPrompt=null;
let _isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  _deferredPrompt=e;
  // Show floating install banner (only if not dismissed in last 7 days)
  if(!_isStandalone && !wasInstallBannerDismissed()){
    setTimeout(()=>showInstallBanner(),2000);
  }
  // Also show FAB button
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='flex';
});

window.addEventListener('appinstalled',()=>{
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='none';
  hideInstallBanner();
  _deferredPrompt=null;
  _isStandalone=true;
  // Toast
  try{
    const t=document.createElement('div');
    t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 20px;border-radius:14px;font-weight:800;z-index:99999;box-shadow:0 10px 30px rgba(0,0,0,.3);font-family:inherit;font-size:14px';
    t.textContent='🎉 האפליקציה הותקנה בהצלחה!';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
  }catch(e){}
});

function wasInstallBannerDismissed(){
  try{
    const d=localStorage.getItem('pwa_banner_dismissed');
    if(!d)return false;
    return (Date.now()-Number(d))<7*24*60*60*1000;
  }catch(e){return false;}
}

function dismissInstallBanner(){
  try{localStorage.setItem('pwa_banner_dismissed',String(Date.now()));}catch(e){}
  hideInstallBanner();
}

function showInstallBanner(){
  if(_isStandalone)return;
  if(document.getElementById('install-banner'))return;
  // Detect iOS (has different install flow)
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const iosHint=isIOS?'<div class="install-ios-hint">📱 בספארי: לחצי על <b>כפתור השיתוף</b> ⬆ ובחרי <b>"הוסף למסך הבית"</b></div>':'';
  
  const el=document.createElement('div');
  el.id='install-banner';
  el.className='install-banner-wrap';
  el.innerHTML=`
    <div class="install-banner">
      <button class="install-banner-close" onclick="dismissInstallBanner()">✕</button>
      <div class="install-banner-top">
        <div class="install-banner-icon">📖</div>
        <div class="install-banner-body">
          <div class="install-banner-title">התקיני כאפליקציה</div>
          <div class="install-banner-sub">פתיחה מהירה מהמסך הבית · ללא דפדפן · גם offline</div>
        </div>
      </div>
      ${iosHint}
      ${!isIOS?'<button class="install-banner-btn" onclick="installPWA()">📲 הוסיפי למסך הבית</button>':''}
    </div>
  `;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('on'));
}

function hideInstallBanner(){
  const el=document.getElementById('install-banner');
  if(el){el.classList.remove('on');setTimeout(()=>el.remove(),300);}
}

function installPWA(){
  // Try native install prompt first (Android Chrome)
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then((choice)=>{
      if(choice.outcome==='accepted'){
        hideInstallBanner();
      }
      _deferredPrompt=null;
    });
    return;
  }
  // Show beautiful instructions overlay
  showInstallInstructions();
}

// Announce to screen readers politely (non-interrupting)
function a11yAnnounce(msg, priority){
  const region = document.getElementById(priority==='urgent' ? 'a11y-alert-region' : 'a11y-live-region');
  if(!region)return;
  region.textContent = '';
  // Small delay ensures screen readers pick up the change
  setTimeout(()=>{region.textContent = msg;}, 50);
  // Clear after a while to avoid repeated announcements
  setTimeout(()=>{region.textContent = '';}, 3000);
}

// Trap focus within an element (for modals/overlays)
function trapFocus(element){
  const focusableSelectors = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
  const focusables = element.querySelectorAll(focusableSelectors);
  if(focusables.length === 0) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  element.addEventListener('keydown', (e)=>{
    if(e.key !== 'Tab') return;
    if(e.shiftKey){
      if(document.activeElement === first){e.preventDefault();last.focus();}
    }else{
      if(document.activeElement === last){e.preventDefault();first.focus();}
    }
  });
  first.focus();
}

// Global keyboard shortcuts
function initKeyboardShortcuts(){
  document.addEventListener('keydown', (e)=>{
    // Don't interfere when typing in inputs
    const tag = e.target.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable){
      if(e.key === 'Escape'){
        e.target.blur();
      }
      return;
    }
    // Escape - close any open overlay/modal
    if(e.key === 'Escape'){
      const overlay = document.querySelector('.claude-setup-overlay.on, .guide-overlay.on, .instr-ov.on, .web-qr-overlay.on, #install-banner.on');
      if(overlay){
        const closeBtn = overlay.querySelector('[onclick*="close"]');
        if(closeBtn) closeBtn.click();
      }
    }
    // ? - show keyboard help
    if(e.key === '?' && !e.ctrlKey && !e.metaKey){
      e.preventDefault();
      showKeyboardHelp();
    }
    // Home key - go to home screen
    if(e.key === 'h' && (e.ctrlKey || e.metaKey) && e.altKey){
      e.preventDefault();
      if(typeof S !== 'undefined'){
        S.screen = 'home';
        if(typeof render === 'function') render();
        a11yAnnounce('עברת למסך הבית');
      }
    }
  });
}

function showKeyboardHelp(){
  if(document.getElementById('kbd-help-ov')) return;
  const ov = document.createElement('div');
  ov.id = 'kbd-help-ov';

    <button class="btn-v2 btn-primary-v2" onclick="closeKeyboardHelp()" style="width:100%;margin-top:16px">הבנתי</button>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>ov.classList.add('on'), 20);
  setTimeout(()=>trapFocus(ov.querySelector('.kbd-help-sheet')), 100);

function closeKeyboardHelp(){
  const ov = document.getElementById('kbd-help-ov');
  if(ov){ov.classList.remove('on');setTimeout(()=>ov.remove(), 250);}

<!-- ── Service Worker registration + auto-update banner ── -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').then(reg=>{
      // האזנה לעדכונים
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        if(!newSW)return;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed' && navigator.serviceWorker.controller){
            // יש גרסה חדשה זמינה
            _showUpdateBanner(newSW);
          }
        });
      });
    }).catch(e=>{/* SW רישום נכשל — לא נורא, האתר עובד בלעדיו */});
    
    // reload אוטומטי כשה-SW החדש תופס שליטה
    let _reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(_reloaded)return;
      _reloaded=true;
      location.reload();
    });
  });
}

function _showUpdateBanner(newSW){
  if(document.getElementById('sw-update-banner'))return;
  const b=document.createElement('div');
