.web-share-url-txt{flex:1;min-width:0;font-size:12px;color:#065f46;font-weight:700;direction:ltr;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,Menlo,Consolas,monospace}
.web-share-url-copy{font-size:11px;font-weight:900;color:#059669;background:#d1fae5;padding:4px 9px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.web-share-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;position:relative;z-index:1}
.web-share-btn{padding:11px 8px;border-radius:11px;border:none;font-family:inherit;font-size:11.5px;font-weight:900;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;color:white}
.web-share-btn span:first-child{font-size:18px;line-height:1}
.web-share-btn.copy{background:linear-gradient(135deg,#059669,#047857);box-shadow:0 3px 10px rgba(5,150,105,.3)}
.web-share-btn.copy:hover{box-shadow:0 5px 14px rgba(5,150,105,.45);transform:translateY(-1px)}
.web-share-btn.whatsapp{background:linear-gradient(135deg,#25d366,#128c7e);box-shadow:0 3px 10px rgba(37,211,102,.3)}
.web-share-btn.whatsapp:hover{box-shadow:0 5px 14px rgba(37,211,102,.45);transform:translateY(-1px)}
.web-share-btn.qr{background:linear-gradient(135deg,#6366f1,#4f46e5);box-shadow:0 3px 10px rgba(99,102,241,.3)}
.web-share-btn.qr:hover{box-shadow:0 5px 14px rgba(99,102,241,.45);transform:translateY(-1px)}
.web-share-btn:active{transform:scale(.96)}
.web-share-hint{background:rgba(255,255,255,.7);border-radius:10px;padding:9px 11px;font-size:11px;color:#065f46;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start;position:relative;z-index:1;margin-bottom:10px}
.web-share-hint-ico{font-size:14px;flex-shrink:0}
.web-share-hint b{color:#059669;font-weight:900}
.web-share-hint code{background:#065f46;color:#86efac;padding:1px 5px;border-radius:4px;font-size:10px;font-family:ui-monospace,Menlo,Consolas,monospace}
.web-share-last-pub{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:#047857;padding:8px 11px;background:rgba(255,255,255,.55);border-radius:10px;border:1px solid rgba(16,185,129,.2);position:relative;z-index:1}
.web-share-last-pub:empty{display:none}
.web-share-last-pub-ico{font-size:13px}
.web-share-last-pub b{font-weight:900;color:#065f46}

/* ═══ QR Code Popup ═══ */
.web-qr-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s ease;padding:16px}
.web-qr-overlay.on{opacity:1}
.web-qr-sheet{background:white;width:100%;max-width:420px;border-radius:24px;overflow:hidden;transform:scale(.9);transition:transform .3s cubic-bezier(.34,1.56,.64,1);font-family:inherit;direction:rtl;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.web-qr-overlay.on .web-qr-sheet{transform:scale(1)}
.web-qr-hdr{background:linear-gradient(135deg,#6366f1,#4338ca);color:white;padding:18px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.web-qr-hdr::before{content:'';position:absolute;top:-40px;left:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.15),transparent 65%)}
.web-qr-hdr-ico{font-size:28px;position:relative;z-index:1}
.web-qr-hdr-txt{flex:1;min-width:0;position:relative;z-index:1}
.web-qr-hdr-title{font-size:16px;font-weight:900;line-height:1.2}
.web-qr-hdr-sub{font-size:11.5px;font-weight:600;opacity:.9;margin-top:2px}
.web-qr-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:white;font-size:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;transition:background .15s}
.web-qr-close:hover{background:rgba(255,255,255,.3)}
.web-qr-body{padding:20px}
.web-qr-img-wrap{background:white;border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1.5px solid #e5e7eb;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.web-qr-img-wrap img{width:100%;max-width:260px;height:auto;display:block}
.web-qr-link{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:9px 11px;font-size:11px;color:#4b5563;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;text-align:left;word-break:break-all;line-height:1.4;font-weight:600;margin-bottom:12px}
.web-qr-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.web-qr-btn{padding:11px;border-radius:11px;border:none;font-family:inherit;font-size:12.5px;font-weight:900;cursor:pointer;transition:all .15s}
.web-qr-btn.copy{background:linear-gradient(135deg,#10b981,#059669);color:white;box-shadow:0 3px 10px rgba(16,185,129,.3)}
.web-qr-btn.copy:hover{box-shadow:0 5px 14px rgba(16,185,129,.45);transform:translateY(-1px)}
.web-qr-btn.download{background:white;color:#4338ca;border:1.5px solid #c7d2fe}
.web-qr-btn.download:hover{background:#eef2ff;border-color:#a5b4fc}
.web-qr-btn:active{transform:scale(.97)}
.web-qr-hint{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:10px 12px;font-size:11.5px;color:#0c4a6e;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start}
.web-qr-hint span:first-child{font-size:14px;flex-shrink:0}
.web-qr-hint b{color:#0369a1;font-weight:900}

.web-action-btn{flex:1;padding:12px 8px;border-radius:12px;border:1.5px solid #e5e7eb;background:white;font-size:13px;font-weight:800;color:#1e1b4b;cursor:pointer;text-decoration:none;text-align:center;font-family:inherit;transition:transform .12s}
.web-action-btn:active{transform:scale(.97)}
.web-action-btn.primary{background:linear-gradient(135deg,#1e40af,#1e3a8a);color:white;border-color:transparent}

/* Deploy card — כמו הצינור */
.web-deploy-card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 4px 16px rgba(124,58,237,.12);border:1px solid #ede9fe}
.web-deploy-title{font-size:15px;font-weight:900;color:#4c1d95;margin-bottom:4px;text-align:right}
.web-deploy-sub{font-size:12px;color:#6b7280;margin-bottom:14px;text-align:right;line-height:1.5}
.web-upload-btn{background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;border-radius:14px;padding:16px;color:white;font-weight:800;cursor:pointer;font-size:15px;font-family:inherit;width:100%;box-shadow:0 6px 20px rgba(124,58,237,.35);transition:all .15s}
.web-upload-btn:active{transform:scale(.98)}
.web-upload-btn:disabled{opacity:.7;cursor:wait}
.web-prog{background:#f3f0ff;border-radius:8px;overflow:hidden;margin-top:10px;height:6px;display:none}
.web-progbar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:8px;transition:width .4s}
.web-step{font-size:12px;color:#7c3aed;margin-top:8px;text-align:center;font-weight:700;min-height:18px}
.web-step.ok{color:#059669}
.web-step.err{color:#dc2626}
.web-step a{color:inherit;text-decoration:underline;font-weight:800}

/* Info card */
.web-info-card{background:linear-gradient(135deg,#fef9c3,#fde68a);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #fcd34d}

/* ═══ Website Performance Analyzer ═══ */
.web-perf-card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;border:1.5px solid #e5e7eb;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.web-perf-prompt{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px dashed #93c5fd;border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:12px}
.web-perf-prompt-ico{font-size:40px;margin-bottom:8px}
.web-perf-prompt-title{font-size:15px;font-weight:900;color:#1e3a8a;margin-bottom:4px}
.web-perf-prompt-sub{font-size:12px;color:#1e40af;line-height:1.5;font-weight:600}
.web-perf-hdr{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.web-perf-score{width:82px;height:82px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .5s ease}
.web-perf-score-inner{width:68px;height:68px;border-radius:50%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 4px rgba(0,0,0,.06)}
.web-perf-score-num{font-size:26px;font-weight:900;line-height:1}
.web-perf-score-lbl{font-size:9px;font-weight:700;color:#9ca3af;margin-top:2px;letter-spacing:.3px}
.web-perf-info{flex:1;min-width:0}
.web-perf-label{font-size:11px;font-weight:800;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.web-perf-title{font-size:20px;font-weight:900;line-height:1.1}
.web-perf-sub{font-size:12px;color:#6b7280;font-weight:600;margin-top:4px}
.web-perf-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;padding:10px;background:#f9fafb;border-radius:12px;border:1px solid #f3f4f6}
.web-perf-stat{text-align:center}
.web-perf-stat-val{font-size:17px;font-weight:900;color:#1e1b4b;line-height:1}
.web-perf-stat-lbl{font-size:10px;font-weight:700;color:#6b7280;margin-top:3px;letter-spacing:.2px}
.web-perf-section-title{font-size:11px;font-weight:900;color:#7c3aed;letter-spacing:.8px;text-transform:uppercase;margin:12px 0 10px}
.web-perf-issue{background:#fafafa;border:1px solid #e5e7eb;border-right:4px solid #9ca3af;border-radius:12px;padding:12px;margin-bottom:10px}
.web-perf-issue.sev-high{border-right-color:#dc2626;background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.web-perf-issue.sev-medium{border-right-color:#f59e0b;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.web-perf-issue.sev-low{border-right-color:#3b82f6;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.web-perf-issue-hdr{display:flex;gap:10px;margin-bottom:8px}
.web-perf-issue-ico{font-size:22px;flex-shrink:0}
.web-perf-issue-body{flex:1;min-width:0}
.web-perf-issue-title{font-size:13px;font-weight:900;color:#1e1b4b;line-height:1.3;margin-bottom:3px}
.web-perf-issue-detail{font-size:11.5px;color:#4b5563;font-weight:600;line-height:1.55}
.web-perf-issue-fix{background:rgba(255,255,255,.7);border-radius:10px;padding:9px 11px;font-size:12px;color:#1e1b4b;font-weight:600;line-height:1.55;margin-bottom:8px;border:1px solid rgba(0,0,0,.04)}
.web-perf-issue-fix code{background:#1e1b4b;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
.web-perf-issue-fix b{color:#7c3aed;font-weight:800}
.web-perf-fix-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;font-size:12.5px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(124,58,237,.3);transition:all .15s}
.web-perf-fix-btn:hover{box-shadow:0 5px 14px rgba(124,58,237,.45);transform:translateY(-1px)}
.web-perf-fix-btn:active{transform:scale(.97)}
.web-perf-fix-all{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(16,185,129,.35);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;transition:all .15s;letter-spacing:.3px}
.web-perf-fix-all:hover{box-shadow:0 8px 22px rgba(16,185,129,.5);transform:translateY(-2px)}
.web-perf-fix-all:active{transform:scale(.98)}
.web-perf-fix-all span:first-child{font-size:18px}
.web-perf-excellent{background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:24px 18px;text-align:center}
.web-perf-excellent-ico{font-size:42px;margin-bottom:8px}
.web-perf-excellent-title{font-size:16px;font-weight:900;color:#065f46;margin-bottom:4px}
.web-perf-excellent-sub{font-size:12px;color:#047857;font-weight:600;line-height:1.5}

.web-info-title{font-size:12.5px;font-weight:900;color:#78350f;margin-bottom:10px;text-align:right}
.web-info-item{font-size:12px;color:#78350f;line-height:1.7;padding:3px 0;text-align:right;font-weight:600}
.web-info-item b{color:#92400e;font-weight:900;margin-left:6px}
.web-info-sub{font-size:11.5px;color:#92400e;margin-top:10px;padding-top:8px;border-top:1px dashed #fcd34d;text-align:right;font-weight:700}

/* Editor screen — fullscreen light panel, matches the diary style */
.web-edit-screen{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;background:#f8f7fc;direction:rtl;font-family:inherit}
.web-edit-screen.on{display:flex}
.web-edit-hdr{background:linear-gradient(135deg,#7c3aed,#5b21b6);padding:16px 14px;flex-shrink:0;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.web-edit-back{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:50%;width:38px;height:38px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;font-weight:700}
.web-edit-hdr-info{flex:1;min-width:0}
.web-edit-hdr-title{font-size:16px;font-weight:900;color:white;text-align:right}
.web-edit-hdr-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;text-align:right;word-break:break-all}
/* View mode tabs */
.web-edit-tabs{display:flex;background:white;border-bottom:1px solid #ede9fe;flex-shrink:0}
.web-edit-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:800;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;color:#9ca3af;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s}
.web-edit-tab.on{color:#7c3aed;border-bottom-color:#7c3aed;background:#faf5ff}
.web-edit-tab-icon{font-size:15px}
.web-edit-status-bar{padding:10px 14px;font-size:12px;font-weight:700;text-align:center;background:#ede9fe;color:#4c1d95;flex-shrink:0;transition:all .2s}
.web-edit-status-bar.ok{background:#d1fae5;color:#065f46}
.web-edit-status-bar.err{background:#fee2e2;color:#991b1b}
.web-edit-status-bar a{color:inherit;text-decoration:underline;font-weight:900;margin-right:6px}
.web-edit-body{flex:1;min-height:0;display:flex;background:white;position:relative}
.web-edit-body.code-mode{padding:10px;background:#f8f7fc}
.web-edit-textarea{flex:1;background:#1e293b;border:1px solid #334155;border-radius:14px;color:#e2e8f0;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;padding:12px;resize:none;outline:none;direction:ltr;text-align:left;line-height:1.6;width:100%;display:none}
.web-edit-textarea.orig{display:block!important;background:#18181b;border-color:#3f3f46;color:#d4d4d8;min-height:200px;flex:1}
.web-edit-textarea.orig[readonly]{background:#27272a;color:#a1a1aa;cursor:not-allowed}

/* Original-code tab panel */
.web-edit-orig-wrap{flex:1;min-height:0;display:none;flex-direction:column;background:#f8f7fc;padding:10px;overflow-y:auto}
.web-edit-orig-wrap.on{display:flex}
.web-orig-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0}
.web-orig-hdr{background:linear-gradient(135deg,#18181b,#27272a);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;color:white;flex-shrink:0}
.web-orig-hdr-icon{font-size:32px;flex-shrink:0}
.web-orig-hdr-txt{flex:1;min-width:0}
.web-orig-hdr-title{font-size:15px;font-weight:900}
.web-orig-hdr-sub{font-size:11.5px;opacity:.7;margin-top:2px;direction:ltr;text-align:right;font-family:ui-monospace,monospace}
.web-orig-unlock-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:white;padding:8px 12px;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.web-orig-unlock-btn:hover{background:rgba(255,255,255,.25)}
.web-orig-unlock-btn.unlocked{background:#dc2626;border-color:#dc2626}
.web-orig-warn{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:11px 13px;font-size:11.5px;color:#78350f;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.web-orig-warn-ico{font-size:18px;flex-shrink:0}
.web-orig-actions{display:flex;gap:8px;flex-shrink:0}
.web-orig-action-btn{flex:1;padding:12px;border-radius:12px;border:1.5px solid transparent;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.web-orig-action-btn.save{background:linear-gradient(135deg,#10b981,#059669);color:white}
.web-orig-action-btn.save:hover{background:linear-gradient(135deg,#059669,#047857)}
.web-orig-action-btn.cancel{background:#f3f4f6;color:#4b5563;border-color:#e5e7eb}
.web-orig-action-btn.revert{background:white;color:#b91c1c;border-color:#fecaca}
.web-orig-action-btn.revert:hover{background:#fef2f2}
.web-edit-textarea.on{display:block}
.web-edit-textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.web-edit-iframe-wrap{flex:1;position:relative;overflow:hidden;display:none}
.web-edit-iframe-wrap.on{display:block}
.web-edit-iframe{width:100%;height:100%;border:0;background:white;display:block}
/* My own loader over the iframe — disappears as soon as iframe content is ready */
.web-iframe-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:white;z-index:5;transition:opacity .3s ease}
.web-iframe-loader.gone{opacity:0;pointer-events:none}
.web-iframe-loader-spin{width:44px;height:44px;border:4px solid #ede9fe;border-top-color:#7c3aed;border-radius:50%;animation:webspin 0.9s linear infinite}
@keyframes webspin{to{transform:rotate(360deg)}}
.web-iframe-loader-txt{color:#7c3aed;font-weight:800;font-size:14px}
.web-iframe-loader-sub{color:#a78bfa;font-weight:600;font-size:11px;margin-top:-6px}
.web-edit-hint{position:absolute;top:10px;right:10px;left:10px;background:linear-gradient(135deg,#fef9c3,#fde68a);border:1px solid #fcd34d;border-radius:12px;padding:10px 12px;font-size:11.5px;color:#78350f;font-weight:700;text-align:right;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:hintFade 6s ease forwards}
@keyframes hintFade{0%,70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px);pointer-events:none}}
.web-edit-btns{display:flex;gap:8px;padding:10px 12px 14px;background:white;border-top:1px solid #ede9fe;flex-shrink:0}
.web-edit-btn{border:none;border-radius:12px;padding:13px 10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;color:white;transition:transform .1s}
.web-edit-btn:active{transform:scale(.97)}
.web-edit-btn:disabled{opacity:.6;cursor:wait}
.web-edit-btn.save{flex:2;background:linear-gradient(135deg,#7c3aed,#5b21b6);box-shadow:0 4px 14px rgba(124,58,237,.35)}
.web-edit-btn.cancel{flex:1;background:#f3f4f6;color:#4b5563}
.web-edit-btn.download{flex:1;background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}

/* ═══ Editor Toolbar — Pro Toolkit ═══ */
.wt-toolbar{background:white;border-bottom:1px solid #ede9fe;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(76,29,149,.06)}
.wt-row{display:flex;gap:4px;padding:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.wt-row::-webkit-scrollbar{display:none}
.wt-row.contextual{background:linear-gradient(135deg,#faf5ff,#f3e8ff);border-top:1px solid #ede9fe;animation:wtSlide .25s ease}
@keyframes wtSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.wt-btn{flex-shrink:0;background:white;border:1px solid #e9d5ff;border-radius:10px;padding:8px 10px;color:#4c1d95;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .12s}
.wt-btn:active{transform:scale(.94)}
.wt-btn:hover{background:#f3e8ff;border-color:#c084fc}
.wt-btn.on{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border-color:#5b21b6;box-shadow:0 2px 8px rgba(124,58,237,.35)}
.wt-btn.primary{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border-color:transparent}
.wt-btn.primary:hover{background:linear-gradient(135deg,#6d28d9,#4c1d95)}
.wt-btn.danger{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.wt-btn.danger:hover{background:#fee2e2}
.wt-btn-ico{font-size:14px;line-height:1}
.wt-btn-txt{font-size:11px;font-weight:800}
.wt-btn.icon-only{padding:8px 10px}
.wt-btn.icon-only .wt-btn-txt{display:none}
.wt-sep{width:1px;background:#e9d5ff;margin:4px 2px;flex-shrink:0}
.wt-group-lbl{font-size:10px;font-weight:900;color:#7c3aed;letter-spacing:.8px;text-transform:uppercase;padding:0 10px 0 4px;display:flex;align-items:center;flex-shrink:0}

/* Popups (color picker, font size, link, etc.) */
.wt-pop-overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:450;display:none;align-items:flex-end;justify-content:center;}
.wt-pop-overlay.on{display:flex;animation:wtFade .2s ease}
@keyframes wtFade{from{opacity:0}to{opacity:1}}
.wt-pop{background:white;border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;animation:wtSlideUp .3s cubic-bezier(.34,1.56,.64,1);padding-bottom:env(safe-area-inset-bottom,0)}
@keyframes wtSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.wt-pop-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:white;z-index:2}
.wt-pop-title{font-size:15px;font-weight:900;color:#1e1b4b}
.wt-pop-close{background:#f3f4f6;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;color:#6b7280;display:flex;align-items:center;justify-content:center;font-family:inherit}
.wt-pop-close:hover{background:#e5e7eb}
.wt-pop-body{padding:16px 18px}
@media(min-width:768px){
  .wt-pop-overlay{align-items:center}
  .wt-pop{border-radius:22px;max-height:80vh;margin:16px}
}

/* Color palette */
.wt-colors{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.wt-color{aspect-ratio:1;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:transform .1s;position:relative}
.wt-color:active{transform:scale(.9)}
.wt-color.sel{border-color:#1e1b4b;box-shadow:0 0 0 2px white inset}
.wt-color.transparent{background:repeating-conic-gradient(#e5e7eb 0% 25%, white 0% 50%) 50%/10px 10px}
.wt-color-custom-wrap{margin-top:14px;padding-top:14px;border-top:1px dashed #e9d5ff}
.wt-color-custom-row{display:flex;gap:8px;align-items:center}
.wt-color-custom-row input[type=color]{width:46px;height:46px;border:2px solid #ede9fe;border-radius:10px;cursor:pointer;padding:0;background:white}
.wt-color-custom-row input[type=text]{flex:1;padding:12px 14px;border:1.5px solid #ede9fe;border-radius:12px;font-family:ui-monospace,monospace;font-size:13px;text-align:center;text-transform:uppercase;direction:ltr;outline:none}
.wt-color-custom-row input[type=text]:focus{border-color:#7c3aed}

/* Font size / alignment slider groups */
.wt-size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.wt-size-btn{padding:14px 8px;border-radius:12px;border:1.5px solid #ede9fe;background:white;color:#4c1d95;font-weight:800;cursor:pointer;font-family:inherit;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:4px}
.wt-size-btn:active{transform:scale(.96)}
.wt-size-btn.on{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border-color:transparent}
.wt-size-btn-name{font-size:11px;font-weight:700;opacity:.7}

/* Link form */
.wt-form-row{margin-bottom:12px}
.wt-form-lbl{font-size:12px;font-weight:800;color:#4c1d95;margin-bottom:6px;display:block}
.wt-form-inp{width:100%;padding:12px 14px;border:1.5px solid #ede9fe;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.wt-form-inp:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.wt-form-inp.ltr{direction:ltr;text-align:left;font-family:ui-monospace,monospace;font-size:13px}
.wt-form-hint{font-size:11px;color:#9ca3af;margin-top:4px;font-weight:600}
.wt-form-actions{display:flex;gap:8px;margin-top:16px}
.wt-form-btn{flex:1;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.wt-form-btn.ok{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white}
.wt-form-btn.cancel{background:#f3f4f6;color:#4b5563}
.wt-form-btn.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}

/* Media upload */
.wt-upload-drop{border:2.5px dashed #c4b5fd;border-radius:16px;padding:24px 18px;text-align:center;background:linear-gradient(135deg,#faf5ff,#f3e8ff);cursor:pointer;transition:all .2s;margin-bottom:12px}
.wt-upload-drop:hover{border-color:#7c3aed;background:linear-gradient(135deg,#f3e8ff,#e9d5ff)}
.wt-upload-drop.drag-over{border-color:#7c3aed;background:#e9d5ff;transform:scale(1.01)}
.wt-upload-ico{font-size:36px;margin-bottom:8px}
.wt-upload-title{font-size:14px;font-weight:900;color:#4c1d95;margin-bottom:4px}
.wt-upload-sub{font-size:11.5px;color:#7c3aed;font-weight:600}
.wt-upload-divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:#c084fc;font-size:11px;font-weight:800;letter-spacing:1px}
.wt-upload-divider::before,.wt-upload-divider::after{content:'';flex:1;height:1px;background:#ede9fe}
.wt-upload-progress{display:none;margin-top:10px;background:#ede9fe;border-radius:8px;overflow:hidden;height:6px}
.wt-upload-progress-bar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);width:0%;transition:width .3s}

/* Element actions (when image/video is selected) */
.wt-elem-info{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#faf5ff;border-bottom:1px solid #ede9fe;font-size:12px;font-weight:700;color:#4c1d95}
.wt-elem-info-ico{font-size:18px}
.wt-elem-info-close{margin-right:auto;background:none;border:none;color:#7c3aed;font-size:16px;cursor:pointer;font-family:inherit;padding:4px 8px}

/* Quick swatches (inline color buttons on toolbar) */
.wt-swatch{width:22px;height:22px;border-radius:6px;border:1.5px solid white;box-shadow:0 0 0 1px #c4b5fd;flex-shrink:0}

/* Emoji picker */
.wt-emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.wt-emoji{aspect-ratio:1;background:none;border:none;font-size:22px;cursor:pointer;border-radius:8px;transition:background .1s;padding:0;font-family:inherit}
.wt-emoji:hover{background:#f3e8ff}
.wt-emoji:active{transform:scale(.9);background:#e9d5ff}

/* Undo/Redo */
.wt-history{display:flex;gap:2px;margin-right:auto}

/* Insert menu grid (when clicking "+" between sections) */
.wt-insert-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wt-insert-item{background:white;border:1.5px solid #ede9fe;border-radius:14px;padding:16px 8px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s}
.wt-insert-item:hover{border-color:#7c3aed;background:#faf5ff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.15)}
.wt-insert-item:active{transform:scale(.96)}
.wt-insert-ico{font-size:28px}
.wt-insert-lbl{font-size:12px;font-weight:800;color:#4c1d95}

/* Divider styles grid */
.wt-divider-styles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.wt-divider-style{background:white;border:1.5px solid #ede9fe;border-radius:12px;padding:14px 12px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;gap:10px}
.wt-divider-style:hover{border-color:#7c3aed;background:#faf5ff}
.wt-divider-style:active{transform:scale(.97)}
.wt-divider-preview{width:100%;padding:8px 0}
.wt-divider-name{font-size:12px;font-weight:800;color:#4c1d95;text-align:center}

/* Guide cards inside popups */
.wt-guide{background:linear-gradient(135deg,#ecfeff,#cffafe);border:1.5px solid #a5f3fc;border-radius:14px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden}
.wt-guide::before{content:'';position:absolute;top:-20px;left:-20px;width:60px;height:60px;background:rgba(6,182,212,.08);border-radius:50%}
.wt-guide-title{font-size:13px;font-weight:900;color:#0e7490;margin-bottom:8px;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.wt-guide-steps{position:relative;z-index:1}
.wt-guide-step{display:flex;align-items:flex-start;gap:10px;padding:6px 0;color:#155e75;font-size:12.5px;font-weight:600;line-height:1.5}
.wt-guide-step-num{background:#0891b2;color:white;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wt-guide-step b{color:#0e7490;font-weight:800}
.wt-recommended{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #10b981;border-radius:14px;padding:14px;margin-bottom:12px;position:relative}
.wt-recommended-badge{position:absolute;top:-10px;right:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-size:10px;font-weight:900;padding:3px 10px;border-radius:12px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(16,185,129,.4)}
.wt-recommended-title{font-size:14px;font-weight:900;color:#065f46;margin-bottom:8px;margin-top:2px}
.wt-recommended-list{font-size:12.5px;color:#047857;line-height:1.7;font-weight:600}
.wt-recommended-list div{display:flex;align-items:center;gap:6px;padding:2px 0}
.wt-warn-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:12px;padding:10px 12px;margin-bottom:12px;font-size:11.5px;color:#78350f;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start}
.wt-warn-ico{font-size:18px;flex-shrink:0}
.wt-section-hdr{font-size:11px;font-weight:900;color:#7c3aed;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px;text-align:right;padding-top:8px;border-top:1px dashed #ede9fe}
.wt-section-hdr:first-child{margin-top:0;padding-top:0;border-top:none}
.wt-cursor-reminder{background:#faf5ff;border:1.5px dashed #c4b5fd;border-radius:12px;padding:10px 12px;margin-bottom:14px;font-size:11.5px;color:#5b21b6;font-weight:700;text-align:right;display:flex;align-items:center;gap:8px}
.wt-cursor-reminder-ico{font-size:20px;flex-shrink:0}

@media(min-width:768px){
  .web-edit-screen{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(76,29,149,.25);overflow:hidden}
}



/* Toast */
.web-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:800;z-index:99999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.25);direction:rtl;font-family:inherit}
.web-toast.err{background:linear-gradient(135deg,#ef4444,#dc2626)}
.web-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Monthly Chart — Professional ── */
.chart-screen{position:fixed;inset:0;z-index:500;background:#f8f7fc;display:flex;flex-direction:column;animation:slideUp .32s cubic-bezier(.22,.68,0,1.2)}
.chart-hero{background:linear-gradient(160deg,#4c1d95 0%,#7c3aed 50%,#6d28d9 100%);padding:20px 20px 28px;flex-shrink:0;position:relative;overflow:hidden}
.chart-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.chart-hero::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.chart-hero-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:relative;z-index:1}
.chart-back{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.chart-hero-title{font-size:17px;font-weight:900;color:white}
.chart-year-sel{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px}
.chart-year-btn{background:none;border:none;color:white;cursor:pointer;font-size:16px;font-weight:900;padding:0 2px}
.chart-year-val{font-size:14px;font-weight:700;color:white;min-width:40px;text-align:center}
.chart-kpis{display:flex;gap:0;position:relative;z-index:1}
.chart-kpi{flex:1;text-align:center}
.chart-kpi+.chart-kpi{border-right:1px solid rgba(255,255,255,.15)}
.chart-kpi-val{font-size:22px;font-weight:900;color:white;line-height:1}
.chart-kpi-lbl{font-size:10px;color:rgba(255,255,255,.65);margin-top:4px;letter-spacing:.3px}
.chart-kpi-diff{font-size:11px;font-weight:700;margin-top:3px}
.chart-kpi-diff.up{color:#6ee7b7}
.chart-kpi-diff.down{color:#fca5a5}
.chart-body{flex:1;overflow-y:auto;padding:0 0 20px}
/* Bar chart */
.chart-canvas{padding:16px 16px 0;background:white;margin:0}
@keyframes barRise{0%{height:0;opacity:0}100%{opacity:1}}
.chart-tooltip-box{background:#1e1b4b;color:white;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.chart-tooltip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e1b4b}
/* Monthly table */
.chart-table-wrap{padding:0 16px;margin-top:14px}
.chart-table-title{font-size:11px;font-weight:800;color:#a78bfa;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}
.chart-row{display:flex;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:4px;cursor:pointer;transition:.15s}
.chart-row:active{transform:scale(.99)}
.chart-row.cur{background:#f5f3ff;border:1.5px solid #c4b5fd}
.chart-row.has{background:white;border:1px solid #f3f4f6}
.chart-row.empty{background:#fafafa;opacity:.6}
.chart-row-mo{font-size:14px;font-weight:700;color:#374151;width:56px;flex-shrink:0}
.chart-row-mo.cur{color:#7c3aed;font-weight:900}
.chart-row-bar-wrap{flex:1;height:8px;background:#f3f4f6;border-radius:20px;overflow:hidden;margin:0 12px}
.chart-row-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#7c3aed,#a78bfa);transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.chart-row-bar.cur{background:linear-gradient(90deg,#7c3aed,#c084fc)}
.chart-row-rev{font-size:13px;font-weight:800;color:#1e1b4b;width:72px;text-align:left;flex-shrink:0}
.chart-row-rev.cur{color:#7c3aed}
.chart-row-trend{font-size:10px;font-weight:700;width:40px;text-align:left;flex-shrink:0}

/* ── Treatment Areas ── */
.areas-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.area-bubble{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:inherit;transition:.15s;user-select:none}
.area-bubble:active{transform:scale(.96)}
.area-bubble.on{background:#7c3aed;color:white;border-color:#7c3aed;box-shadow:0 2px 8px rgba(124,58,237,.35)}
.area-bubble.off{background:#f5f3ff;color:#6b7280;border-color:#ede9fe}
.area-bubble.full{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border-color:#7c3aed;font-size:13px}
.area-bubble.full.off{background:#f5f3ff;color:#6b7280;border-color:#ede9fe}
.areas-section-lbl{font-size:10px;font-weight:800;color:#a78bfa;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px}

/* ── Packages Tab ── */
.pkg-hero{background:linear-gradient(135deg,#0891b2,#0e7490);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 24px rgba(8,145,178,.3)}
.pkg-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.pkg-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.phs{text-align:center;flex:1}
.phs-val{font-size:18px;font-weight:900;color:white}
.phs-lbl{font-size:9px;color:rgba(255,255,255,.55);margin-top:1px}
.add-pkg-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;box-shadow:0 4px 14px rgba(8,145,178,.3)}
.pkg-form{background:white;border-radius:16px;padding:15px;margin-bottom:12px;border:2px solid #0891b2;box-shadow:0 4px 16px rgba(8,145,178,.12)}
.pkg-inp{width:100%;border:1.5px solid #e0f2fe;border-radius:12px;padding:10px 14px;text-align:right;font-size:14px;outline:none;margin-bottom:8px;background:#f0f9ff;font-family:inherit}
.pkg-inp:focus{border-color:#0891b2}
.pkg-row-calc{background:#f0f9ff;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pkg-calc-label{font-size:12px;color:#6b7280;font-weight:600}
.pkg-calc-val{font-size:18px;font-weight:900;color:#0891b2}
.pkg-calc-val.paid{color:#059669}
.pkg-calc-val.remaining{color:#dc2626}
.pkg-card{background:white;border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);border-right:4px solid #0891b2}
.pkg-card.paid-full{border-right-color:#059669}
.pkg-card.partial{border-right-color:#f59e0b}
.pkg-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pkg-card-name{font-size:15px;font-weight:800;color:#1e1b4b}
.pkg-card-type{font-size:12px;color:#0891b2;font-weight:700;background:#e0f2fe;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.pkg-progress-wrap{margin-bottom:10px}
.pkg-progress-bar{background:#f3f4f6;border-radius:20px;height:10px;overflow:hidden;margin-bottom:5px}
.pkg-progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#0891b2,#22d3ee);transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.pkg-progress-fill.full{background:linear-gradient(90deg,#059669,#34d399)}
.pkg-amounts{display:flex;justify-content:space-between;font-size:11px}
.pkg-amount-item{text-align:center}
.pkg-amount-val{font-weight:800;font-size:13px}
.pkg-amount-lbl{color:#9ca3af;margin-top:1px}
.pkg-card-actions{display:flex;gap:7px;margin-top:10px;border-top:1px solid #f3f4f6;padding-top:10px}
.pkg-action-btn{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pkg-action-btn.edit{background:#e0f2fe;color:#0891b2}
.pkg-action-btn.del{background:#fef2f2;color:#dc2626}
.pkg-action-btn.pay{background:linear-gradient(135deg,#059669,#047857);color:white}
.pkg-edit-form{background:#f0f9ff;border-radius:12px;padding:12px;margin-top:8px;border:1px solid #bae6fd}
.pkg-inp-sm{width:100%;border:1.5px solid #bae6fd;border-radius:10px;padding:8px 12px;text-align:right;font-size:13px;outline:none;background:white;font-family:inherit;margin-bottom:7px}
.pkg-inp-sm:focus{border-color:#0891b2}

/* ── Contact Bottom Sheet ── */
.contact-icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#9ca3af;transition:.15s;flex-shrink:0}
.contact-icon-btn:active{background:#f3f4f6;transform:scale(.9)}
/* ═══ Reminder Button (inline on appt cards) ═══ */
.rem-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#9ca3af;transition:all .15s;flex-shrink:0;position:relative}
.rem-btn:hover{color:#7c3aed;background:#faf5ff}
.rem-btn:active{transform:scale(.85)}

/* ═══════════════════════════════════════════════════════════════ */
/* ═══ Global UI Polish (fast, no blur)                        ═══ */
/* ═══════════════════════════════════════════════════════════════ */

/* Toast notifications */
.web-toast{
  position:fixed!important;
  top:var(--space-5)!important;
  left:50%!important;
  transform:translateX(-50%) translateY(-20px)!important;
  background:var(--gray-900)!important;
  color:var(--gray-0)!important;
  padding:var(--space-3) var(--space-5)!important;
  border-radius:var(--radius-lg)!important;
  font-weight:var(--font-semibold)!important;
  font-size:var(--text-sm)!important;
  z-index:var(--z-toast)!important;
  box-shadow:var(--shadow-lg)!important;
  max-width:calc(100% - var(--space-10))!important;
  animation:toastEnter 0.3s var(--ease-out) forwards!important;
  letter-spacing:var(--tracking-tight)!important
}
@keyframes toastEnter{
  to{transform:translateX(-50%) translateY(0)}
}

/* Next-up hero */
.next-hero{
  background:linear-gradient(135deg, var(--brand-600), var(--brand-800))!important;
  color:white;
  padding:var(--space-5);
  border-radius:var(--radius-2xl);
  margin-bottom:var(--space-4);
  box-shadow:0 8px 16px -4px rgba(124,58,237,0.25)
}
.next-hero-lbl{
  font-size:var(--text-xs);
  font-weight:var(--font-bold);
  letter-spacing:var(--tracking-wider);
  text-transform:uppercase;
  opacity:0.9;
  margin-bottom:var(--space-2)
}
.next-hero-name{
  font-family:var(--font-family-display);
  font-size:var(--text-2xl);
  font-weight:var(--font-black);
  letter-spacing:var(--tracking-tightest);
  margin-bottom:var(--space-1_5);
  line-height:var(--leading-tight)
}
.next-hero-detail{
  font-size:var(--text-sm);
  opacity:0.9;
  font-weight:var(--font-medium)
}
.countdown{
  display:flex;
  gap:var(--space-2);
  justify-content:center;
  align-items:center
}
.cd-seg{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-2_5);
  min-width:54px;
  text-align:center
}
.cd-num{
  font-family:var(--font-family-mono);
  font-size:var(--text-lg);
  font-weight:var(--font-black);
  letter-spacing:var(--tracking-tight);
  line-height:var(--leading-none);
  color:white
}
.cd-lbl{
  font-size:var(--text-xs);
  font-weight:var(--font-semibold);
  letter-spacing:var(--tracking-wider);
  text-transform:uppercase;
  opacity:0.8;
  margin-top:var(--space-0_5)
}
.cd-sep{
  font-size:var(--text-xl);
  font-weight:var(--font-black);
  color:rgba(255,255,255,0.5);
  line-height:1
}

/* Empty states */
.empty-state{
  text-align:center;
  padding:var(--space-12) var(--space-5);
  color:var(--color-text-tertiary);
  background:var(--color-bg-card);
  border:1px dashed var(--color-border-default);
  border-radius:var(--radius-xl)
}
.empty-icon{
  font-size:var(--text-4xl);
  display:block;
  margin-bottom:var(--space-3);
  opacity:0.5
}

/* Appointment cards (v48) - lighter shadow */
.apt2{
  transition:transform var(--duration-fast) var(--ease-out),box-shadow var(--duration-fast) var(--ease-out)!important;
  box-shadow:var(--shadow-sm)!important
}
.apt2:hover{
  box-shadow:var(--shadow-md)!important;
  transform:translateY(-1px)!important
}
.apt2-next{
  box-shadow:var(--shadow-primary)!important
}

/* Smooth scroll */
.home{scroll-behavior:smooth}

/* Fast button transitions everywhere */
button:not(:disabled){transition:transform var(--duration-fast) var(--ease-out),box-shadow var(--duration-fast) var(--ease-out),background-color var(--duration-fast) var(--ease-out),border-color var(--duration-fast) var(--ease-out)}

/* Universal focus state */
button:focus-visible,
a:focus-visible,

.icard-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--color-border-subtle);background:var(--color-bg-subtle);color:var(--color-text-secondary);font-size:var(--text-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--duration-fast) var(--ease-out),color var(--duration-fast) var(--ease-out),border-color var(--duration-fast) var(--ease-out);font-family:inherit;flex-shrink:0;padding:0}

/* Tab content container */
.tab-content{padding:var(--space-4) var(--space-3);max-width:560px;margin:0 auto;width:100%}

<script>

// ── שכבה 8: הצפנת localStorage עם AES-GCM ──
// כל נתון בקש מוצפן באופן שקוף. גם אם גנבו את הטלפון ופתחו DevTools — רואים רק ג'יבריש.
const secureStorage={
  _keyPromise:null,
  _getDeviceKey(){
    if(this._keyPromise)return this._keyPromise;
    this._keyPromise=(async()=>{
      // מפתח ייחודי למכשיר, נשמר פעם אחת
      let raw=localStorage.getItem('hodaya_sk');
      if(!raw){
        const arr=new Uint8Array(32);
        crypto.getRandomValues(arr);
        raw=btoa(String.fromCharCode(...arr));
        localStorage.setItem('hodaya_sk',raw);
      }
      const bytes=Uint8Array.from(atob(raw),c=>c.charCodeAt(0));
      return crypto.subtle.importKey('raw',bytes,{name:'AES-GCM'},false,['encrypt','decrypt']);
    })();
    return this._keyPromise;
  },
  async encrypt(text){
    try{
      const key=await this._getDeviceKey();
      const iv=crypto.getRandomValues(new Uint8Array(12));
      const enc=new TextEncoder().encode(text);
      const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc);
      const combined=new Uint8Array(iv.length+ct.byteLength);
      combined.set(iv,0);
      combined.set(new Uint8Array(ct),iv.length);
      return 'e:'+btoa(String.fromCharCode(...combined));
    }catch(e){return text;}
  },
  async decrypt(encText){
    try{
      if(!encText||!encText.startsWith('e:'))return encText; // נתון ישן לא מוצפן
      const key=await this._getDeviceKey();
      const combined=Uint8Array.from(atob(encText.substring(2)),c=>c.charCodeAt(0));
      const iv=combined.slice(0,12);
      const ct=combined.slice(12);
      const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
      return new TextDecoder().decode(dec);
    }catch(e){return null;}
  },
  async setItem(k,v){
    const enc=await this.encrypt(JSON.stringify(v));
    localStorage.setItem(k,enc);
  },
  async getItem(k){
    const raw=localStorage.getItem(k);
    if(!raw)return null;
    const dec=await this.decrypt(raw);
    if(!dec)return null;
    try{return JSON.parse(dec);}catch(e){return null;}
  }
};

// ── שכבות הגנה מתקדמות ─────────────────────────────────
// 1. Rate Limit: 5 כישלונות → חסימה 15 דקות
// 2. Session Timeout: 60 דקות ללא פעילות → יציאה
// 3. Password Strength: סיסמה חזקה (8+ תווים, אותיות, מספרים)
// 4. Device Fingerprint: זיהוי מכשיר חדש → לוג התראה
// 5. Tamper Detection: בדיקת שלמות ה-token בכל טעינה
// 6. Auto-lock: נעילה אוטומטית כשהטאב ברקע (PIN/סיסמה)
// 7. HTTPS-only: בדיקה שהאתר רץ רק ב-HTTPS (מונע MITM)

const RATE_LIMIT={MAX_ATTEMPTS:5,BLOCK_MINUTES:15};
const SESSION_TIMEOUT_MIN=60;
const BACKGROUND_LOCK_MIN=5; // נעילה אחרי 5 דקות ברקע

// שכבה 7: HTTPS-only (בדיקת פרוטוקול מיידית)
if(location.protocol==='http:' && location.hostname!=='localhost' && location.hostname!=='127.0.0.1'){
  location.href='https:'+location.href.substring(5);
}

// שכבה 3: בודק חוזק סיסמה
const passwordPolicy={
  check(pw){
    if(!pw||pw.length<8) return {ok:false,msg:'הסיסמה חייבת להיות לפחות 8 תווים'};
    if(!/[a-zA-Z\u0590-\u05FF]/.test(pw)) return {ok:false,msg:'הסיסמה חייבת להכיל אותיות'};
    if(!/[0-9]/.test(pw)) return {ok:false,msg:'הסיסמה חייבת להכיל מספר אחד לפחות'};
    if(/^(.)\1+$/.test(pw)) return {ok:false,msg:'סיסמה חלשה מדי (תווים חוזרים)'};
    const common=['12345678','password','123456789','qwerty','abc12345','11111111','00000000'];
    if(common.includes(pw.toLowerCase())) return {ok:false,msg:'סיסמה נפוצה מדי — בחר משהו אחר'};
    return {ok:true,strength:this._strength(pw)};
  },
  _strength(pw){
    let s=0;
    if(pw.length>=10)s++;
    if(pw.length>=14)s++;
    if(/[A-Z]/.test(pw))s++;
    if(/[^a-zA-Z0-9]/.test(pw))s++;
    if(/[\u0590-\u05FF]/.test(pw))s++;
    return Math.min(s,4);
  }
};

// שכבה 4: Device Fingerprint
const deviceFingerprint={
  async get(){
    const data=navigator.userAgent+'|'+navigator.language+'|'+screen.width+'x'+screen.height+'|'+(navigator.hardwareConcurrency||'')+'|'+new Date().getTimezoneOffset();
    const buf=new TextEncoder().encode(data);
    const hash=await crypto.subtle.digest('SHA-256',buf);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,16);
  }
};

const rateLimit={
  _key:'hodaya_fb_ratelimit',
  _load(){try{return JSON.parse(localStorage.getItem(this._key)||'{"fails":0,"blockedUntil":0}');}catch(e){return {fails:0,blockedUntil:0};}},
  _save(d){try{localStorage.setItem(this._key,JSON.stringify(d));}catch(e){}},
  check(){
    const d=this._load();
    if(d.blockedUntil>Date.now()){
      const min=Math.ceil((d.blockedUntil-Date.now())/60000);
      throw new Error(`יותר מדי נסיונות. נסה שוב בעוד ${min} דקות`);
    }
  },
  fail(){
    const d=this._load();
    d.fails=(d.fails||0)+1;
    if(d.fails>=RATE_LIMIT.MAX_ATTEMPTS){
      d.blockedUntil=Date.now()+(RATE_LIMIT.BLOCK_MINUTES*60000);
      d.fails=0;
    }
    this._save(d);
    const left=RATE_LIMIT.MAX_ATTEMPTS-d.fails;
    return left>0?`נותרו ${left} נסיונות`:null;
  },
  success(){this._save({fails:0,blockedUntil:0});}
};

// שכבה 2 + 6: Session Timeout + Background Lock
const session={
  _timer:null,
  _bgStart:null,
  _lastActivity:Date.now(),
  start(){
    this._lastActivity=Date.now();
    this._resetTimer();
    const evts=['click','touchstart','keydown','scroll','mousemove'];
    evts.forEach(e=>document.addEventListener(e,()=>this.touch(),{passive:true,capture:true}));
    // שכבה 6: נעילה כשהטאב יורד לרקע
    document.addEventListener('visibilitychange',()=>{
      if(document.hidden){
        this._bgStart=Date.now();
      }else if(this._bgStart){
        const mins=(Date.now()-this._bgStart)/60000;
        this._bgStart=null;
        if(mins>=BACKGROUND_LOCK_MIN && auth.user){
          alert('🔒 האפליקציה ננעלה — היית ברקע יותר מ-'+BACKGROUND_LOCK_MIN+' דקות');
          auth.signOut();
        }
      }
    });
  },
  touch(){
    this._lastActivity=Date.now();
    this._resetTimer();
  },
  _resetTimer(){
    if(this._timer)clearTimeout(this._timer);
    this._timer=setTimeout(()=>this._expire(),SESSION_TIMEOUT_MIN*60000);
  },
  _expire(){
    if(!auth.user)return;
    alert('🕐 יצאת מהמערכת אוטומטית אחרי '+SESSION_TIMEOUT_MIN+' דקות של חוסר פעילות');
    auth.signOut();
  },
  stop(){
    if(this._timer){clearTimeout(this._timer);this._timer=null;}
  }
};

// שכבה 5: Tamper Detection — בודק שה-token לא שונה ידנית
const tamperCheck={
  async verify(){
    try{
      const saved=JSON.parse(localStorage.getItem('hodaya_fb_auth')||'null');
      if(!saved||!saved.token)return true; // אין טוקן — אין מה לבדוק
      // בדיקה בסיסית: האם ה-token הוא JWT תקין (3 חלקים מופרדים בנקודה)
      const parts=saved.token.split('.');
      if(parts.length!==3){
        localStorage.removeItem('hodaya_fb_auth');
        return false;
      }
      return true;
    }catch(e){
      localStorage.removeItem('hodaya_fb_auth');
      return false;
    }
  }
};

const auth={
  _cached:null,
  _pending:null,
  user:null, // {uid, email, name}
  
  async getToken(){
    if(this._cached && this._cached.exp > Date.now()+300000) return this._cached.token;
    if(this._pending) return this._pending;
    this._pending = this._refreshToken().finally(()=>{this._pending=null;});
    return this._pending;
  },
  
  async _refreshToken(){
    try{
      const saved=JSON.parse(localStorage.getItem('hodaya_fb_auth')||'null');
      if(!saved || !saved.refresh) return null;
      if(saved.exp > Date.now()+300000){
        this._cached=saved;
        this.user={uid:saved.uid,email:saved.email,name:saved.name||saved.email};
        return saved.token;
      }
      const r=await fetch('https://securetoken.googleapis.com/v1/token?key='+FB_API_KEY,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(saved.refresh)
      });
      if(r.ok){
        const d=await r.json();
        const fresh={
          token:d.id_token,
          refresh:d.refresh_token,
          exp:Date.now()+(parseInt(d.expires_in)*1000),
          uid:saved.uid,
          email:saved.email,
          name:saved.name
        };
        localStorage.setItem('hodaya_fb_auth',JSON.stringify(fresh));
        this._cached=fresh;
        this.user={uid:fresh.uid,email:fresh.email,name:fresh.name||fresh.email};
        return fresh.token;
      }
    }catch(e){}
    return null;
  },
  
  async signIn(email,password){
    rateLimit.check();
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password,returnSecureToken:true})
    });
    if(!r.ok){
      const err=await r.json();
      const remaining=rateLimit.fail();
      const msg=this._errMsg(err);
      throw new Error(remaining?`${msg} (${remaining})`:msg);
    }
    rateLimit.success();
    const d=await r.json();
    // קבלת שם המשתמש מ-DB
    let name=d.email;
    try{
      const nr=await fetch(FB+'/users/'+d.localId+'/name.json?auth='+encodeURIComponent(d.idToken));
      if(nr.ok){const n=await nr.json();if(n)name=n;}
    }catch(e){}
    const fresh={
      token:d.idToken,
      refresh:d.refreshToken,
      exp:Date.now()+(parseInt(d.expiresIn)*1000),
      uid:d.localId,
      email:d.email,
      name:name
    };
    localStorage.setItem('hodaya_fb_auth',JSON.stringify(fresh));
    this._cached=fresh;
    this.user={uid:fresh.uid,email:fresh.email,name:fresh.name};
    this._audit('login');
    return fresh;
  },
  
  async signUp(email,password,name,inviteCode){
    rateLimit.check();
    if(inviteCode!==INVITE_CODE) throw new Error('קוד הזמנה לא נכון');
    if(!name||name.trim().length<2) throw new Error('חובה למלא שם');
    const pwCheck=passwordPolicy.check(password);
    if(!pwCheck.ok) throw new Error(pwCheck.msg);
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password,returnSecureToken:true})
    });
    if(!r.ok){
      const err=await r.json();
      throw new Error(this._errMsg(err));
    }
    const d=await r.json();
    // שמירת השם ב-DB
    try{
      await fetch(FB+'/users/'+d.localId+'/name.json?auth='+encodeURIComponent(d.idToken),{
        method:'PUT',body:JSON.stringify(name.trim())
      });
      await fetch(FB+'/users/'+d.localId+'/email.json?auth='+encodeURIComponent(d.idToken),{
        method:'PUT',body:JSON.stringify(email)
      });
      await fetch(FB+'/users/'+d.localId+'/createdAt.json?auth='+encodeURIComponent(d.idToken),{
        method:'PUT',body:JSON.stringify(new Date().toISOString())
      });
    }catch(e){}
    const fresh={
      token:d.idToken,
      refresh:d.refreshToken,
      exp:Date.now()+(parseInt(d.expiresIn)*1000),
      uid:d.localId,
      email:d.email,
      name:name.trim()
    };
    localStorage.setItem('hodaya_fb_auth',JSON.stringify(fresh));
    this._cached=fresh;
    this.user={uid:fresh.uid,email:fresh.email,name:fresh.name};
    this._audit('signup');
    return fresh;
  },
  
  async changePassword(newPassword){
    const token=await this.getToken();
    if(!token) throw new Error('לא מחובר');
    const pwCheck=passwordPolicy.check(newPassword);
    if(!pwCheck.ok) throw new Error(pwCheck.msg);
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:update?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idToken:token,password:newPassword,returnSecureToken:true})
    });
    if(!r.ok){const err=await r.json();throw new Error(this._errMsg(err));}
    const d=await r.json();
    const saved=JSON.parse(localStorage.getItem('hodaya_fb_auth')||'{}');
    saved.token=d.idToken;
    saved.refresh=d.refreshToken;
    saved.exp=Date.now()+(parseInt(d.expiresIn)*1000);
    localStorage.setItem('hodaya_fb_auth',JSON.stringify(saved));
    this._cached=saved;
    this._audit('password_change');
  },
  
  async resetPassword(email){
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:sendOobCode?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        requestType:'PASSWORD_RESET',
        email,
        continueUrl:'https://pinto1212121212-create.github.io/therapy-hodaya/'
      })
    });
    if(!r.ok){const err=await r.json();throw new Error(this._errMsg(err));}
  },
  
  // טיפול ב-oobCode שמגיע מ-URL (איפוס סיסמה דרך לינק במייל)
  async confirmPasswordReset(oobCode,newPassword){
    const pwCheck=passwordPolicy.check(newPassword);
    if(!pwCheck.ok) throw new Error(pwCheck.msg);
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({oobCode,newPassword})
    });
    if(!r.ok){const err=await r.json();throw new Error(this._errMsg(err));}
    return await r.json();
  },
  
  // בדיקת תקפות oobCode
  async verifyOobCode(oobCode){
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:resetPassword?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({oobCode})
    });
    if(!r.ok){const err=await r.json();throw new Error(this._errMsg(err));}
    return await r.json();
  },
  
  async deleteAccount(){
    const token=await this.getToken();
    if(!token) throw new Error('לא מחובר');
    this._audit('account_deleted');
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:delete?key='+FB_API_KEY,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idToken:token})
    });
    if(!r.ok){const err=await r.json();throw new Error(this._errMsg(err));}
    this.signOut();
  },
  
  signOut(){
    if(this.user)this._audit('logout');
    localStorage.removeItem('hodaya_fb_auth');
    this._cached=null;
    this.user=null;
    location.reload();
  },
  
  async _audit(action){
    try{
      if(!this.user||!this._cached)return;
      const fp=await deviceFingerprint.get();
      // בדיקה: האם זה מכשיר חדש? שומרים רשימת מכשירים מוכרים
      let knownDevices=[];
      try{knownDevices=JSON.parse(localStorage.getItem('hodaya_fb_devices')||'[]');}catch(e){}
      const isNewDevice=!knownDevices.includes(fp);
      if(isNewDevice && (action==='login'||action==='signup')){
        knownDevices.push(fp);
        if(knownDevices.length>10)knownDevices=knownDevices.slice(-10);
        try{localStorage.setItem('hodaya_fb_devices',JSON.stringify(knownDevices));}catch(e){}
      }
      const entry={
        action,
        uid:this.user.uid,
        name:this.user.name,
        email:this.user.email,
        at:new Date().toISOString(),
        device:fp,
        newDevice:isNewDevice && (action==='login'||action==='signup')
      };
      const key=Date.now()+'_'+Math.random().toString(36).substr(2,6);
      fetch(FB+'/audit_log/'+key+'.json?auth='+encodeURIComponent(this._cached.token),{
        method:'PUT',body:JSON.stringify(entry)
      });
      // 🔔 התראת Email על אירועים קריטיים
      this._sendAlert(action,entry,isNewDevice);
    }catch(e){}
  },
  
  // ── שליחת התראות אבטחה באימייל ──

📧 אימייל: ${entry.email}

🆔 מכשיר: ${entry.device}${isNewDevice?' ⚠️ (מכשיר חדש!)':''}

${isNewDevice?'⚠️ זה לא אתה? מומלץ לשנות סיסמה מיד!':''}

— מערכת היומן של הודיה 💙`;
      
      // שליחה דרך EmailJS (כבר מותקן ב-deploy-panel של אוריאל)
      const EMAILJS_SERVICE='service_szaqx49';

          template_params:{
            to_email:ALERT_EMAIL,
            subject:'🛡️ '+subject+' — היומן',
            message:body,
            from_name:'מערכת היומן'
          }
        })
      });
    }catch(e){
      // שגיאה בשליחת התראה לא מפילה את האפליקציה
      console.warn('Email alert failed:',e);
    }
  },
  
  _errMsg(err){
    const m=(err.error&&err.error.message)||'';
    const map={
      'EMAIL_EXISTS':'האימייל כבר רשום',
      'OPERATION_NOT_ALLOWED':'רישום כבוי',
      'TOO_MANY_ATTEMPTS_TRY_LATER':'יותר מדי ניסיונות — נסה שוב בעוד כמה דקות',
      'EMAIL_NOT_FOUND':'אימייל לא נמצא',
      'INVALID_PASSWORD':'סיסמה לא נכונה',
      'INVALID_LOGIN_CREDENTIALS':'אימייל או סיסמה לא נכונים',
      'USER_DISABLED':'החשבון הושבת',
      'WEAK_PASSWORD : Password should be at least 6 characters':'הסיסמה קצרה מדי (לפחות 6 תווים)',
      'INVALID_EMAIL':'כתובת אימייל לא תקינה'
    };
    for(const k in map)if(m.indexOf(k)===0)return map[k];
    return m||'שגיאה';
  }
};

// ── שכבה 9: WebAuthn — כניסה מהירה עם טביעת אצבע / FaceID ──
// משתמש ב-API רשמי של הדפדפן. ה-refreshToken של Firebase נשמר מוצפן
// ב-secureStorage (AES-GCM) ומופק רק לאחר אימות ביומטרי מוצלח.
// אם המכשיר לא תומך או שהאימות נכשל — חזרה אוטומטית למסך סיסמה.
const bioAuth={
  _KEY:'hodaya_bio_v1',
  
  // האם הדפדפן תומך ב-WebAuthn
  isSupported(){return !!(window.PublicKeyCredential && navigator.credentials);},
  
  // האם קיים platform authenticator זמין (טביעת אצבע/FaceID של המכשיר עצמו)
  async isAvailable(){
    if(!this.isSupported())return false;
    try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}
    catch(e){return false;}
  },
  
  async _getStored(){return await secureStorage.getItem(this._KEY);},
  
  // האם יש רישום פעיל למכשיר הזה
  async isRegistered(){
    const s=await this._getStored();
    return !!(s && s.credentialId && s.refresh && s.email);
  },
  
  async getEmail(){
    const s=await this._getStored();
    return s?.email||null;
  },
  
  async clear(){
    try{localStorage.removeItem(this._KEY);}catch(e){}
  },
  
  // רישום — מקבל את נתוני Firebase auth לאחר signIn מוצלח
  async register(authData){
    if(!await this.isAvailable())throw new Error('המכשיר לא תומך בטביעת אצבע');
    if(!authData||!authData.refresh||!authData.email)throw new Error('חסרים נתוני התחברות');
    
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const userId=crypto.getRandomValues(new Uint8Array(16));
    
    const cred=await navigator.credentials.create({
      publicKey:{
        challenge,
        rp:{name:'היומן של הודיה'},
        user:{
          id:userId,
          name:authData.email,
          displayName:authData.name||authData.email.split('@')[0]
        },
        pubKeyCredParams:[
          {alg:-7,type:'public-key'},
          {alg:-257,type:'public-key'}
        ],
        authenticatorSelection:{
          authenticatorAttachment:'platform',
          userVerification:'required',
          residentKey:'preferred'
        },
        timeout:60000,
        attestation:'none'
      }
    });
    
    if(!cred)throw new Error('רישום בוטל');
    
    await secureStorage.setItem(this._KEY,{
      credentialId:this._b64(new Uint8Array(cred.rawId)),
      email:authData.email,
      name:authData.name||authData.email,
      uid:authData.uid,
      refresh:authData.refresh,
      createdAt:Date.now()
    });
    return true;
  },
  
  // אימות — מחזיר true אם הצליח, וגם משחזר את ה-session
  async authenticate(){
    const s=await this._getStored();
    if(!s)throw new Error('אין רישום');
    
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const cred=await navigator.credentials.get({
      publicKey:{
        challenge,
        allowCredentials:[{id:this._unb64(s.credentialId),type:'public-key'}],
        userVerification:'required',
        timeout:60000
      }
    });
    
    if(!cred)throw new Error('אימות בוטל');
    
    // שיחזור session ב-localStorage (exp=0 → getToken יבצע רענון)
    localStorage.setItem('hodaya_fb_auth',JSON.stringify({
      token:'',
      refresh:s.refresh,
      exp:0,
      uid:s.uid,
      email:s.email,
      name:s.name
    }));
    
    auth._cached=null;
    const newToken=await auth.getToken();
    if(!newToken){
      // refreshToken פג תוקף (כנראה הסיסמה שונתה) — נקה ובקש התחברות עם סיסמה
      await this.clear();
      localStorage.removeItem('hodaya_fb_auth');
      throw new Error('הסיסמה השתנתה — התחבר עם סיסמה');
    }
    return true;
  },
  
  _b64(bytes){return btoa(String.fromCharCode(...bytes));},
  _unb64(str){
    const bin=atob(str);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return arr;
  }
};

function updatePwStrength(){
  const pw=document.getElementById('lg-pass');
  const bar=document.getElementById('pw-bar');
  const hint=document.getElementById('pw-hint');
  if(!pw||!bar||!hint)return;
  const v=pw.value;
  if(!v){bar.style.width='0';hint.textContent='';return;}
  const check=passwordPolicy.check(v);
  if(!check.ok){
    bar.style.width='25%';
    bar.style.background='#ef4444';
    hint.textContent=check.msg;
    hint.style.color='#fca5a5';
    return;
  }
  const s=check.strength||0;
  const colors=['#f97316','#eab308','#84cc16','#22c55e','#10b981'];
  const labels=['חלשה','בסדר','טובה','חזקה','מצוינת'];
  bar.style.width=((s+1)*20)+'%';
  bar.style.background=colors[s]||'#22c55e';
  hint.textContent='🔒 סיסמה '+labels[s];
  hint.style.color=colors[s]||'#22c55e';
}

let _currentOobCode=null;

async function initResetConfirm(oobCode){
  _currentOobCode=oobCode;
  showLogin('resetConfirm');
  // בדיקת תקפות הקוד
  try{
    const data=await auth.verifyOobCode(oobCode);
    document.getElementById('reset-email').innerHTML='איפוס סיסמה עבור:<br><b style="color:#fbab20">'+data.email+'</b>';
    document.getElementById('reset-fields-wrap').style.display='block';
    document.getElementById('rc-btn').style.display='flex';
  }catch(e){
    // ניקוי URL + הצגת הודעה ברורה
    window.history.replaceState({},'',location.pathname);
    const errMsg=(e.message||'').toLowerCase();
    document.getElementById('reset-email').innerHTML='⚠️ הקישור לא תקף';
    let reason='<b>הקישור הזה כבר לא תקף.</b>';
    if(errMsg.includes('expired'))reason='<b>הקישור פג תוקף (עובר שעה).</b>';
    else if(errMsg.includes('invalid'))reason='<b>הקישור שבור או כבר נוצל.</b>';
    _lgMsg(reason+'<br><br>זה קורה אם:<br>• לחצת עליו כבר פעם אחת<br>• חלפה שעה מאז שהתקבל<br>• Gmail סרק אותו אוטומטית<br>• פתחת בתוך אפליקציית Gmail במקום בדפדפן<br><br><b>פתרון:</b> לחץ "חזרה לכניסה" ובקש איפוס חדש. ברגע שתקבל מייל — פתח אותו בדפדפן Chrome/Safari <b>לא</b> בתוך אפליקציית Gmail.');
  }
}

async function doConfirmReset(){
  const pass=document.getElementById('rc-pass').value;
  const pass2=document.getElementById('rc-pass2').value;
  if(!pass){_lgMsg('הכנס סיסמה חדשה');return;}
  if(pass.length<8){_lgMsg('הסיסמה חייבת להיות לפחות 8 תווים');return;}
  if(!/[a-zA-Z\u0590-\u05FF]/.test(pass)){_lgMsg('הסיסמה חייבת להכיל אותיות');return;}
  if(!/[0-9]/.test(pass)){_lgMsg('הסיסמה חייבת להכיל מספר אחד לפחות');return;}
  if(pass!==pass2){_lgMsg('הסיסמאות לא תואמות — בדוק שוב');return;}
  _lgMsg('⏳ שומר סיסמה חדשה...','ok');
  let resetResult=null;
  try{
    resetResult=await auth.confirmPasswordReset(_currentOobCode,pass);
  }catch(e){
    const em=(e.message||'');
    if(em.toLowerCase().includes('expired')||em.toLowerCase().includes('invalid')){
      _lgMsg('❌ הקישור פג תוקף או כבר נוצל. בקש מייל חדש.');
    }else{_lgMsg('❌ שמירת הסיסמה נכשלה: '+em);}
    return;
  }
  const email=resetResult&&resetResult.email||'לא ידוע';
  _lgMsg('⏳ מוודא שהסיסמה עובדת...','ok');
  let loginWorked=false;
  try{
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key='+FB_API_KEY,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass,returnSecureToken:true})
    });
    loginWorked=r.ok;
  }catch(e){}
  _showCredsScreen(email,pass,loginWorked);
}

function _showCredsScreen(email,pass,ok){
  const cont=document.getElementById('reset-fields-wrap');
  const btn=document.getElementById('rc-btn');
  const emailEl=document.getElementById('reset-email');
  if(btn)btn.style.display='none';
  if(cont)cont.style.display='none';
  if(emailEl)emailEl.innerHTML=ok?'✅ הסיסמה שונתה בהצלחה!':'⚠️ הסיסמה נשמרה';
  const msgEl=document.getElementById('login-msg');
  if(!msgEl)return;

async function doLogin(){
  const rawEmail=document.getElementById('lg-email').value.trim();
  const pass=document.getElementById('lg-pass').value;
  if(!rawEmail||!pass){_lgMsg('מלא את כל השדות');return;}
  _lgMsg('⏳ מתחבר...','ok');
  
  // חכם: נסה קודם את ה-email כמו שהוכנס. אם נכשל בגלל "לא קיים" - נסה עם alias
  let freshAuth=null;
  let lastErr=null;
  const emailsToTry=[rawEmail];
  const aliased=applyAlias(rawEmail);
  if(aliased!==rawEmail)emailsToTry.push(aliased);
  
  for(const em of emailsToTry){
    try{
      freshAuth=await auth.signIn(em,pass);
      break;
    }catch(e){
      lastErr=e;
      const msg=(e.message||'').toLowerCase();
      // אם זה לא שגיאת "לא קיים" - תפסיק לנסות (בעיית סיסמה, רשת, וכו')
      if(!msg.includes('לא נמצא')&&!msg.includes('נכונים')&&!msg.includes('not found')&&!msg.includes('invalid_login'))break;
    }
  }
  
  if(!freshAuth){
    _lgMsg(lastErr?(lastErr.message||'שגיאה'):'שגיאה');
    return;
  }
  
  try{
    const declinedAt=Number(localStorage.getItem('hodaya_bio_declined_at')||0);
    const THIRTY_DAYS=30*24*60*60*1000;
    const recentlyDeclined=declinedAt && (Date.now()-declinedAt < THIRTY_DAYS);
    if(!recentlyDeclined && await bioAuth.isAvailable() && !await bioAuth.isRegistered()){
      _lgMsg('✅ מחובר!','ok');
      setTimeout(()=>_offerBioRegistration(freshAuth),400);
    }else{
      location.reload();
    }
  }catch(e){_lgMsg(e.message||'שגיאה');}
}

// ── Gmail Alias Auto-Separation ───────────────────────
// הודיה משתמשת ב-Firebase המשותף עם רינת/דניאל. כדי שהחשבונות יהיו נפרדים באמת
// (מיילים נפרדים, סיסמאות נפרדות), מוסיפים +hodaya ל-Gmail אוטומטית.
// Gmail מתעלם מ-+xxx, אבל Firebase רואה שני users שונים לגמרי.
const APP_ALIAS='hodaya';
function applyAlias(email){
  if(!email||!email.includes('@'))return email;
  email=email.trim().toLowerCase();
  // כבר יש alias - לא לגעת
  if(email.includes('+'))return email;
  // Gmail/Googlemail בלבד - שירותים אחרים לא תומכים ב-+aliases
  const [local,domain]=email.split('@');
  if(domain==='gmail.com'||domain==='googlemail.com'){
    return local+'+'+APP_ALIAS+'@'+domain;
  }
  return email;
}
function checkEmailAlias(){
  const inp=document.getElementById('lg-email');
  const hint=document.getElementById('alias-hint');
  const preview=document.getElementById('alias-preview');
  if(!inp||!hint||!preview)return;
  const raw=inp.value.trim().toLowerCase();
  if(!raw||!raw.includes('@')){hint.style.display='none';return;}
  const aliased=applyAlias(raw);
  if(aliased!==raw){
    preview.textContent=aliased;
    hint.style.display='block';
  }else{
    hint.style.display='none';
  }
}

function deployToGitHub(){
  const token=localStorage.getItem('hodaya_gh_token')||'';
  if(!token){
    const t=prompt('הכנס GitHub Token:');
    if(!t)return;
    localStorage.setItem('hodaya_gh_token',t.trim());
  }
  const ghToken=localStorage.getItem('hodaya_gh_token');
  const apiUrl='https://api.github.com/repos/pinto1212121212-create/diary-hodaya/contents/index.html';
  const btn=document.getElementById('deploy-btn');
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.html';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const content=ev.target.result;
      const encoded=btoa(unescape(encodeURIComponent(content)));
      fetch(apiUrl,{headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}})
        .then(r=>r.json())
        .then(data=>{
          const sha=data.sha||undefined;
          const body={message:'Update from app',content:encoded};
          if(sha)body.sha=sha;
          return fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
        })
        .then(r=>r.json())
        .then(d=>{
          if(d.content){if(btn){btn.textContent='✅';btn.style.background='#059669';}setTimeout(()=>{if(btn){btn.textContent='🚀';btn.disabled=false;btn.style.background='';}},3000);}
          else{localStorage.removeItem('hodaya_gh_token');if(btn){btn.textContent='❌';btn.disabled=false;}setTimeout(()=>{if(btn){btn.textContent='🚀';}},3000);}
        })
        .catch(()=>{localStorage.removeItem('hodaya_gh_token');if(btn){btn.textContent='❌';btn.disabled=false;}setTimeout(()=>{if(btn){btn.textContent='🚀';}},3000);});
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── Backup: הורדת גיבוי מלא של כל הנתונים ────────────
async function backupAllData(){
  const btn=document.getElementById('backup-btn');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  try{
    // מוריד טריים מ-Firebase (לא מה-cache)
    const keys=['appts','tasks','goals','bgoals','clients','cancellations','packages','expenses','website'];
    const backup={
      version:1,
      app:'rinat-diary',
      createdAt:new Date().toISOString(),
      data:{}
    };
    for(const k of keys){
      try{
        const token=await auth.getToken();
        const url=FB+'/'+k+'.json'+(token?'?auth='+encodeURIComponent(token):'');
        const r=await fetch(url);
        backup.data[k]=r.ok?(await r.json()):null;
      }catch(e){backup.data[k]=null;}
    }
    // יצירת קובץ JSON והורדה
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const stamp=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
    a.download=`rinat-backup-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    if(btn){btn.textContent='✅';btn.style.background='#059669';}
    setTimeout(()=>{if(btn){btn.textContent='💾';btn.disabled=false;btn.style.background='';}},2500);
  }catch(e){
    console.error('Backup failed:',e);
    if(btn){btn.textContent='❌';btn.disabled=false;}
    setTimeout(()=>{if(btn){btn.textContent='💾';}},2500);
  }
}

// ── Smart Partial Renders ─────────────────────────────
function diaryRender(){
  const dt=document.querySelector('#diary-tabs');
  const dc=document.querySelector('#diary-content');
  const dm=document.querySelector('#diary-modal');
  if(!dt||!dc){render();return;}
  const panels=[pLaser,pTasks,pGoals];
  // Only update active class on tabs - no full rebuild (no flash)
  dt.querySelectorAll('.tab').forEach((btn,n)=>{
    if(S.tab===n+1)btn.classList.add('on');
    else btn.classList.remove('on');
  });
  dc.innerHTML=panels[S.tab-1]();
  if(dm)dm.innerHTML=S.lModal?laserModal():'';
}
function modalRender(){
  const dm=document.querySelector('#diary-modal');
  if(!dm){render();return;}
  dm.innerHTML=S.lModal?laserModal():'';
}
function personalPanel(who){
  const isD=who==='daniel',color=isD?'#3b82f6':'#db2777',key=isD?'DT':'RT';
  const y=isD?S.dY:S.rY,m=isD?S.dM:S.rM,sel=isD?S.dSel:S.rSel;
  const data=S[key],dots=Object.keys(data).filter(k=>Array.isArray(data[k])&&data[k].some(t=>t));
  const raw=data[sel]||[],rows=raw.length<10?[...raw,...Array(10-raw.length).fill('')]:[...raw];
  window['dc_'+color.replace('#','')]=k=>{
    if(isD)S.dSel=k;else S.rSel=k;
    const _p=document.querySelector('#personal-content');
    if(_p)_p.innerHTML=personalPanel(who);else render();
  };
  window['upt_'+who]=(i,v)=>{
    const r=S[key][sel]||[],r2=r.length<10?[...r,...Array(10-r.length).fill('')]:[...r];
    r2[i]=v;S[key][sel]=r2;localStore.set(key.toLowerCase(),S[key]);
  };
  window['apt_'+who]=()=>{
    const r=S[key][sel]||[],r2=r.length<10?[...r,...Array(10-r.length).fill('')]:[...r];
    r2.push('');S[key][sel]=r2;localStore.set(key.toLowerCase(),S[key]);
    const _p=document.querySelector('#personal-content');
    if(_p)_p.innerHTML=personalPanel(who);else render();
  };
  let h=calHTML(y,m,sel,dots,true,color);
  h+=`<div style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:#9ca3af">${rows.filter(r=>r).length}/${rows.length}</span><b style="color:#374151">${sel}</b></div>`;
  rows.forEach((t,i)=>{h+=`<div class="task-row"><button class="task-num" style="background:${color}20;color:${color}" onclick="openTaskModal('${who}','${sel}',${i})">${i+1}</button><input class="task-inp" style="border-color:${color}22" value="${x(t)}" placeholder="משימה ${i+1}..." oninput="upt_${who}(${i},this.value)"></div>`;});
  h+=`<button class="add-btn" style="border-color:${color};color:${color}" onclick="apt_${who}()">+ הוסף שורה</button></div>`;
  if(S.tModal&&S.tModal.who===who){
    const rv=S[key][S.tModal.sel]||[],rr=rv.length<10?[...rv,...Array(10-rv.length).fill('')]:[...rv],val=rr[S.tModal.idx]||'';
    h+=`<div class="tmodal-ov" onclick="closeTaskModal()"><div class="tmodal" onclick="event.stopPropagation()"><div class="tmodal-hdr"><b style="color:${color}">משימה ${S.tModal.idx+1}</b><button class="tmodal-close" onclick="closeTaskModal()">✕</button></div><textarea class="tmodal-area" style="border-color:${color}44;outline-color:${color}" oninput="updateTaskModal(this.value)">${x(val)}</textarea><div style="display:flex;justify-content:flex-end;margin-top:10px"><button onclick="closeTaskModal()" style="background:${color};color:white;border:none;border-radius:12px;padding:10px 22px;font-weight:bold;cursor:pointer">✓ סגור</button></div></div></div>`;
  }
  return h;
}
