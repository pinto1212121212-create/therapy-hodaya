// ═══ 🤖 Real Claude API Integration (daily tip)      ═══
// ═══════════════════════════════════════════════════════
// Architecture: Claude called 1× per day from Hodaya's diary.
// Result cached in Firebase /daily_ai_tip/{YYYY-MM-DD}.
// Public site reads from Firebase — no API key exposed.

const CLAUDE_API_URL='https://api.anthropic.com/v1/messages';
const CLAUDE_MODEL='claude-opus-4-5'; // Best quality for business insights

// API key stored ONLY in localStorage of Hodaya's device. Never leaves it.
function getClaudeKey(){
  try{return localStorage.getItem('hodaya_claude_api_key')||'';}catch(e){return '';}
}
function setClaudeKey(k){
  try{
    if(k)localStorage.setItem('hodaya_claude_api_key',k);
    else localStorage.removeItem('hodaya_claude_api_key');
  }catch(e){}
}
function hasClaudeKey(){return !!getClaudeKey();}

// Format today's date key (YYYY-MM-DD)
function todayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Build a compact summary of the business for Claude to analyze
function buildBusinessContext(){
  const now=new Date();
  const all=allAppts();
  const past=all.filter(a=>a.dt<=now);
  const future=all.filter(a=>a.dt>now);
  const paidPast=past.filter(a=>a.paid&&Number(a.d?.price||a.price)>0);
  
  // Last 30 days stats
  const last30=past.filter(a=>(now-a.dt)<30*24*60*60*1000);
  const rev30=last30.filter(a=>a.paid).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  
  // Previous 30 days
  const prev30=past.filter(a=>(now-a.dt)>=30*24*60*60*1000&&(now-a.dt)<60*24*60*60*1000);
  const prevRev30=prev30.filter(a=>a.paid).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  
  // Clients
  const clientVisits={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit)clientVisits[name].lastVisit=a.dt;
    if(a.paid&&Number(a.d?.price||a.price)>0)clientVisits[name].totalPaid+=Number(a.d?.price||a.price);
  });
  
  const activeClients=Object.entries(clientVisits).filter(([,v])=>(now-v.lastVisit)<90*24*60*60*1000).length;
  const lostClients=Object.entries(clientVisits).filter(([,v])=>{
    const d=(now-v.lastVisit)/(1000*60*60*24);
    return d>60&&d<200&&v.count>=2;
  });
  const topLoyal=Object.entries(clientVisits).filter(([,v])=>v.count>=5).length;
  
  // Debts
  const debts=Object.entries(S.DEBTS||{}).filter(([,d])=>d.amount>0);
  const totalDebt=debts.reduce((s,[,d])=>s+d.amount,0);
  
  // Cancellations
  const cancs=Object.entries(S.CANC||{});
  const recentCancs=cancs.filter(([,c])=>(now-new Date(c.created))<30*24*60*60*1000).length;
  const cancRate=last30.length>0?Math.round((recentCancs/(last30.length+recentCancs))*100):0;
  
  // Day of week analysis (past 3 months)
  const dayStats=[0,0,0,0,0,0,0];
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  paidPast.filter(a=>(now-a.dt)<90*24*60*60*1000).forEach(a=>dayStats[a.dt.getDay()]++);
  const strongestDay=dayStats.indexOf(Math.max(...dayStats));
  const weakestWorkday=[0,1,2,3,4].reduce((w,d)=>dayStats[d]<dayStats[w]?d:w,0);
  
  // Average ticket
  const avgTicket=paidPast.length>0?Math.round(paidPast.reduce((s,a)=>s+Number(a.d?.price||a.price||0),0)/paidPast.length):0;
  
  // New clients last 30 days
  const firstSeen={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!firstSeen[name]||a.dt<firstSeen[name])firstSeen[name]=a.dt;
  });
  const newClients30=Object.values(firstSeen).filter(d=>(now-d)<30*24*60*60*1000).length;
  
  // Packages
  const pkgs=Object.entries(S.PKGS||{}).filter(([,p])=>p.remaining>0);
  const pkgsEndingSoon=pkgs.filter(([,p])=>p.remaining<=2).length;
  
  return {
    date:todayKey(),
    dayOfWeek:dayNames[now.getDay()],
    appointments:{
      upcomingTotal:future.length,
      today:future.filter(a=>a.date===TD).length,
      last30days:last30.length,
      historicalTotal:past.length
    },
    revenue:{
      last30Days:rev30,
      previous30Days:prevRev30,
      trendPercent:prevRev30>0?Math.round(((rev30-prevRev30)/prevRev30)*100):null,
      averageTicket:avgTicket
    },
    clients:{
      totalEver:Object.keys(clientVisits).length,
      activeLast90Days:activeClients,
      loyal5PlusVisits:topLoyal,
      newLast30Days:newClients30,
      dormantCouldReturn:lostClients.length
    },
    debts:{
      clientsWithDebt:debts.length,
      totalOwed:totalDebt
    },
    cancellations:{
      last30Days:recentCancs,
      percentOfAppts:cancRate
    },
    schedule:{
      strongestDay:dayNames[strongestDay],
      weakestWorkday:dayNames[weakestWorkday]
    },
    packages:{
      active:pkgs.length,
      endingSoon:pkgsEndingSoon
    }
  };
}

// Call Claude API with business context and get a daily tip back
async function callClaudeForTip(){
  const key=getClaudeKey();
  if(!key)throw new Error('אין מפתח API');
  
  const context=buildBusinessContext();
  
  const systemPrompt=`אתה יועץ עסקי ותיק של קליניקת טיפול רגשי בירושלים. הבעלים — הודיה, מטפלת רגשית מקצועית שעובדת עם נשים. את מדברת/כותבת בעברית בלבד, בטון חברי, אישי, ובגוף נקבה (אל הודיה). חשוב: את מכבדת את הייחודיות של מקצוע הטיפול — לא כמו עסק שירות רגיל. מדברים על מטופלות (לא לקוחות), פגישות (לא תורים), תהליך טיפולי (לא טיפול חד-פעמי).

משימה: תקבלי סיכום נתוני הקליניקה של הודיה, ותחזירי טיפ אחד מרכזי להיום — קצר, חד, מעשי, מבוסס על הנתונים.

פורמט התשובה — JSON בלבד (בלי טקסט נוסף):
{
  "tip": "תוכן הטיפ בעברית — 2-3 משפטים קצרים, אבל עם ערך אמיתי",
  "action": "פעולה ספציפית שהיא יכולה לעשות היום בבוקר — משפט אחד",
  "insight_type": "growth | retention | cashflow | scheduling | pricing | marketing | wellbeing",
  "emoji": "אימוג'י יחיד שמייצג את הטיפ"
}

חוקים:
- תהיי ספציפית ל*הנתונים* שלה — לא בנאליות כלליות
- אם הנתונים חלשים/חסרים, תני טיפ עונתי/כללי רלוונטי לקליניקת טיפול
- אל תמציאי מספרים — השתמשי רק במה שיש בנתונים
- שימי לב לרווחת המטפלת עצמה — שחיקה זה סיכון אמיתי במקצוע הזה
- מקסימום 250 תווים לכל שדה`;
  
  const userMsg=`הנה סיכום העסק שלי להיום:
\`\`\`json
${JSON.stringify(context,null,2)}
\`\`\`

תני לי טיפ אחד להיום.`;
  
  const response=await fetch(CLAUDE_API_URL,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:CLAUDE_MODEL,
      max_tokens:500,
      system:systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  
  if(!response.ok){
    const err=await response.text();
    throw new Error(`Claude API error ${response.status}: ${err.substring(0,200)}`);
  }
  
  const data=await response.json();
  const text=data.content?.[0]?.text||'';
  
  // Extract JSON from response
  let parsed;
  try{
    const match=text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('No JSON in response');
    parsed=JSON.parse(match[0]);
  }catch(e){
    throw new Error('Failed to parse Claude response: '+text.substring(0,100));
  }
  
  return {
    ...parsed,
    generated_at:new Date().toISOString(),
    date:todayKey(),
    source:'claude_opus_4_5'
  };
}

// Get cached tip for today (or null if not generated yet)
async function getCachedClaudeTip(){
  const key=todayKey();
  try{
    const r=await fetch(FB+'/daily_ai_tip/'+key+'.json',{cache:'no-store'});
    if(r.ok){
      const d=await r.json();
      if(d&&d.tip)return d;
    }
  }catch(e){}
  return null;
}

// Save today's tip to Firebase (public readable)
async function saveClaudeTipToFirebase(tip){
  const key=todayKey();
  try{
    await fetch(FB+'/daily_ai_tip/'+key+'.json',{
      method:'PUT',
      body:JSON.stringify(tip)
    });
    // Also save as "latest" for easy public access
    await fetch(FB+'/daily_ai_tip_latest.json',{
      method:'PUT',
      body:JSON.stringify(tip)
    });
    return true;
  }catch(e){
    console.warn('Failed to save tip to Firebase:',e);
    return false;
  }
}

// Main function — check if tip exists for today, generate if needed
async function ensureDailyClaudeTip(forceRefresh){
  // Check cache first (unless forced)
  if(!forceRefresh){
    const cached=await getCachedClaudeTip();
    if(cached)return {tip:cached,fromCache:true};
  }
  
  if(!hasClaudeKey())throw new Error('אין מפתח API — הגדירי קודם');
  
  // Generate new tip
  const tip=await callClaudeForTip();
  await saveClaudeTipToFirebase(tip);
  return {tip,fromCache:false};
}

function generateSmartTip(){
  const now=new Date();
  const all=allAppts();
  const future=all.filter(a=>a.dt>now);
  const past=all.filter(a=>a.dt<=now);
  const paidPast=past.filter(a=>a.paid&&Number(a.price)>0);
  
  // Build pool of data-driven tip candidates
  const candidates=[];
  
  // ── Client-focused insights ──
  // 1. Specific client not seen recently
  const clientVisits={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!clientVisits[name])clientVisits[name]={count:0,lastVisit:null,totalPaid:0,phone:a.d?.phone||a.phone||''};
    clientVisits[name].count++;
    if(!clientVisits[name].lastVisit||a.dt>clientVisits[name].lastVisit)clientVisits[name].lastVisit=a.dt;
    if(a.paid&&Number(a.price)>0)clientVisits[name].totalPaid+=Number(a.price);
  });
  const lostClients=Object.entries(clientVisits).filter(([n,v])=>{
    const d=(now-v.lastVisit)/(1000*60*60*24);
    return d>60&&d<200&&v.count>=2;
  }).sort((a,b)=>b[1].totalPaid-a[1].totalPaid);
  if(lostClients.length){
    const [name,info]=lostClients[Math.floor(Math.random()*Math.min(5,lostClients.length))];
    const daysGone=Math.floor((now-info.lastVisit)/(1000*60*60*24));
    candidates.push({
      i:'💌',
      t:`<b>${x(name)}</b> לא הגיעה כבר ${daysGone} ימים. היא ביקרה ${info.count} פעמים ושילמה בסה"כ ₪${info.totalPaid.toLocaleString()}. שלחי לה היום הודעה אישית — מטופלות "אבודות" כאלה חוזרות ב-40% מהמקרים.`,
      priority:2
    });
  }
  
  // 2. Very loyal client celebration
  const topLoyal=Object.entries(clientVisits).filter(([n,v])=>v.count>=8)
    .sort((a,b)=>b[1].count-a[1].count);
  if(topLoyal.length){
    const [name,info]=topLoyal[Math.floor(Math.random()*Math.min(3,topLoyal.length))];
    candidates.push({
      i:'👑',
      t:`<b>${x(name)}</b> הגיעה אליך ${info.count} פעמים — זו מטופלת מיוחדת. תני לה הטבה קטנה בתור הבא (תה צמחים, טיפול רגשי פנים בונוס) או הודעה "שמחה שאת איתי כבר ${info.count} טיפולים!". נאמנות כזאת שווה זהב.`,
      priority:2
    });
  }
  
  // 3. Debt reminder for specific client
  const debtors=Object.entries(S.DEBTS||{}).filter(([,d])=>d.amount>0)
    .sort((a,b)=>b[1].amount-a[1].amount);
  if(debtors.length){
    const [name,d]=debtors[Math.floor(Math.random()*Math.min(3,debtors.length))];
    candidates.push({
      i:'💳',
      t:`<b>${x(name)}</b> חייבת ₪${d.amount.toLocaleString()}. הדרך הכי נעימה לגבות: "היי ${x(name)}, נשאר חיוב פתוח של ₪${d.amount} — נוח לך לסגור בביט היום? לינק: [שלחי ביט]". 70% מהמטופלות משלמות בהזדמנות הראשונה שמזכירים.`,
      priority:1
    });
  }
  
  // ── Time-based insights ──
  // 4. Today's schedule
  const today=future.filter(a=>a.date===TD);
  if(today.length>=3){
    const totalToday=today.reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
    candidates.push({
      i:'🔥',
      t:`יש לך <b>${today.length} תורים היום</b> בהכנסה של ₪${totalToday.toLocaleString()}! קחי 2 דקות לסדר את הכלים, למלא מים, ולקחת נשימה. יום עמוס = שירות איכותי רק אם את רגועה.`,
      priority:2
    });
  }else if(today.length===0&&future.length){
    const nextDate=future[0].date;
    candidates.push({
      i:'📅',
      t:`היום ללא תורים. <b>תנצלי את היום</b> — שלחי הודעה ל-3 מטופלות קבועות שלא הגיעו לאחרונה, עדכני פוסט באינסטגרם, או סדרי את הקליניקה. התור הבא שלך: ${nextDate}.`,
      priority:2
    });
  }
  
  // 5. Day-of-week analysis
  const dayStats=[0,0,0,0,0,0,0];
  const dayRev=[0,0,0,0,0,0,0];
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  paidPast.forEach(a=>{
    if((now-a.dt)<90*24*60*60*1000){
      const d=a.dt.getDay();
      dayStats[d]++;
      dayRev[d]+=Number(a.d?.price||a.price)||0;
    }
  });
  const workdays=[0,1,2,3,4].map(i=>({d:i,c:dayStats[i],r:dayRev[i]}));
  const activeWorkdays=workdays.filter(d=>d.c>0);
  if(activeWorkdays.length>=3){
    const strongest=[...activeWorkdays].sort((a,b)=>b.r-a.r)[0];
    const weakest=[...activeWorkdays].sort((a,b)=>a.r-b.r)[0];
    if(strongest.r>weakest.r*2){
      candidates.push({
        i:'📊',
        t:`ב-3 חודשים אחרונים: <b>יום ${dayNames[strongest.d]}</b> הוא היום הכי רווחי (₪${strongest.r.toLocaleString()}), <b>יום ${dayNames[weakest.d]}</b> הכי חלש (₪${weakest.r.toLocaleString()}). שקלי "מבצע יום ${dayNames[weakest.d]}" עם 10% הנחה — עדיף לעבוד ברווח מופחת מלא לעבוד בכלל.`,
        priority:2
      });
    }
  }
  
  // 6. Revenue trend this month vs last
  const thisMonth=paidPast.filter(a=>{
    const d=a.dt;return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  const lastMonthDate=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lastMonth=paidPast.filter(a=>{
    const d=a.dt;return d.getMonth()===lastMonthDate.getMonth()&&d.getFullYear()===lastMonthDate.getFullYear();
  }).reduce((s,a)=>s+(Number(a.d?.price||a.price)||0),0);
  if(lastMonth>500){
    const diff=((thisMonth-lastMonth)/lastMonth)*100;
    if(Math.abs(diff)>=10){
      const isUp=diff>0;
      candidates.push({
        i:isUp?'📈':'📉',
        t:isUp?`<b>החודש עד עכשיו: ₪${thisMonth.toLocaleString()}</b> — ${diff.toFixed(0)}% יותר מחודש שעבר (₪${lastMonth.toLocaleString()})! תמשיכי במה שאת עושה, ותזהי מה השתנה בחודש הזה כדי לשחזר.`:`החודש עד עכשיו: ₪${thisMonth.toLocaleString()} — <b>ירידה של ${Math.abs(diff).toFixed(0)}%</b> מחודש שעבר (₪${lastMonth.toLocaleString()}). אולי הייתה חופשה/חגים? אם לא — בדקי את מטופלות ה-CRM, ייתכן שיש "נעלמות" שכדאי לדובב.`,
        priority:1
      });
    }
  }
  
  // 7. Cancellation alert
  const cancs=Object.entries(S.CANC||{});
  const recentCancs=cancs.filter(([,c])=>{
    const d=new Date(c.created);
    return (now-d)<14*24*60*60*1000;
  });
  if(recentCancs.length>=3){
    candidates.push({
      i:'⚠️',
      t:`<b>${recentCancs.length} ביטולים בשבועיים האחרונים</b> — זה יותר מהרגיל. הטיפ: שלחי אישור-תור ב-WhatsApp יום לפני כל תור. פסיכולוגית, כשמישהי "מאשרת" היא תבטל פחות. זה מוריד ביטולים ב-60%.`,
      priority:1
    });
  }
  
  // 8. New clients this month
  const firstSeen={};
  past.forEach(a=>{
    const name=a.d?.name||a.name;
    if(!name)return;
    if(!firstSeen[name]||a.dt<firstSeen[name])firstSeen[name]=a.dt;
  });
  const newThisMonth=Object.values(firstSeen).filter(d=>d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()).length;
  if(newThisMonth>=3){
    candidates.push({
      i:'🌱',
      t:`<b>${newThisMonth} מטופלות חדשות</b> הגיעו החודש! זה מצוין — אל תעצרי. תוך שבוע מהביקור הראשון, שלחי הודעה "איך את מרגישה? יש שאלות?". 80% יהפכו למטופלות קבועות אם מרגישות שחשוב לך.`,
      priority:2
    });
  }
  
  // 9. Pricing insight — cheap clients
  if(paidPast.length>=15){
    const avg=paidPast.reduce((s,a)=>s+Number(a.d?.price||a.price||0),0)/paidPast.length;
    const hasClient=Object.keys(clientVisits).length;
    if(hasClient&&avg<300){
      candidates.push({
        i:'💎',
        t:`ממוצע טיפול אצלך: <b>₪${avg.toFixed(0)}</b>. זה נמוך יחסית. לא חייב להעלות לכל המטופלות — תוסיפי "חבילת פרימיום" במחיר ₪${(avg*1.7).toFixed(0)} עם בונוס (טיפול רגשי פנים חינם / תה צמחים / בדיקת עור). 10% יבחרו בה אוטומטית.`,
        priority:2
      });
    }
  }
  
  // 10. Package reminders
  const pkgs=Object.entries(S.PKGS||{}).filter(([,p])=>p.remaining>0&&p.remaining<=2);
  if(pkgs.length){
    const [name,p]=pkgs[Math.floor(Math.random()*pkgs.length)];
    candidates.push({
      i:'📦',
      t:`<b>${x(name)}</b> נותרה לה ${p.remaining} טיפולים בחבילה. <b>זה הזמן להודיע לה</b>: "היי, נשאר לך ${p.remaining} טיפולים מהחבילה — נקבע?". חידוש חבילות אחרי תום ב-80% מהמקרים.`,
      priority:1
    });
  }
  
  // 11. Holiday/season tip (current month)
  const month=now.getMonth()+1; // 1-12
  const seasonTips={
    1:'ינואר — התחלת שנה. <b>פרסמי מחירון מעודכן</b> והציעי "חבילת התחלת שנה" עם הנחה לחתימה על 5+ טיפולים.',
    2:'פברואר — חורף אמצע. מטופלות פחות מתכננות יציאות, <b>זה הזמן לטיפולי עומק ומבצעי "הכנה לקיץ"</b>.',
    3:'מרץ — לקראת פורים ופסח. <b>נשים ישימו לב למראה יותר</b>. דחפי את הפרסום 2 שבועות לפני.',
    4:'אפריל — אחרי פסח. <b>עונת החתונות מתחילה</b>. הציעי חבילות "כלה" / "אמא של הכלה" עם 3-4 טיפולים.',
    5:'מאי — שבועות + קיץ. <b>מטופלות מתחילות להתכונן לים</b>. טיפול רגשי והבהרות הם לוהטים.',
    6:'יוני — תחילת קיץ. <b>שיא העומס</b>. תדאגי לרשימת המתנה — מטופלת שלא מצליחה לקבוע הולכת למתחרה.',
    7:'יולי — חופש גדול. <b>הרבה חוסר יציבות</b>. הציעי "כרטיסיית 5 טיפולים" עם תוקף 3 חודשים כדי לעגן אותן.',
    8:'אוגוסט — סוף חופש גדול. <b>אמהות עייפות ורוצות פינוק</b>. פרסמי "חצי שעה רק לעצמך" עם מחיר מיוחד.',
    9:'ספטמבר — חזרה לשגרה + חגים. <b>נשים רוצות להיראות טוב לראש השנה</b>. פתחי רשימת המתנה ליום כיפור.',
    10:'אוקטובר — סוף חגים. <b>תקופה שקטה</b>. שלחי הודעה "תנוחי מהחגים אצלי" עם הנחה 20%.',
    11:'נובמבר — חורף מתחיל. <b>טיפולי עור להכנה לחורף</b>. שיתוף עם קוסמטיקאית יכולה להיות מצוין.',
    12:'דצמבר — סיום שנה. <b>"בלאק פריידי קליניקה"</b> — מבצע 48 שעות בלבד, יצירת דחיפות.'
  };
  if(seasonTips[month]){
    candidates.push({i:'🗓',t:seasonTips[month],priority:3});
  }
  
  // ── Add some from the static pool for diversity ──
  const staticTips=AI_DAILY_TIPS.slice().sort(()=>Math.random()-0.5).slice(0,4);
  staticTips.forEach(s=>candidates.push({...s,priority:3,static:true}));
  
  // Priority-weighted random selection
  // Priority 1 (urgent data): weight 4
  // Priority 2 (important data): weight 3
  // Priority 3 (general): weight 1
  const weighted=[];
  candidates.forEach(c=>{
    const weight=c.priority===1?4:c.priority===2?3:1;
    for(let i=0;i<weight;i++)weighted.push(c);
  });
  
  if(weighted.length===0){
    // Fallback to random static tip
    const t=AI_DAILY_TIPS[Math.floor(Math.random()*AI_DAILY_TIPS.length)];
    return {...t,source:'static'};
  }
  
  const picked=weighted[Math.floor(Math.random()*weighted.length)];
  return {...picked,source:picked.static?'static':'data'};
}

// Counter for how many tips user has browsed
let _advTipCount=1;

// Generate and swap in a fresh tip with animation
function advNextTip(){
  const tip=generateSmartTip();
  const body=document.getElementById('adv-tip-body');
  const ico=document.getElementById('adv-tip-ico');
  const txt=document.getElementById('adv-tip-text');
  const src=document.getElementById('adv-tip-source');
  const counter=document.getElementById('adv-tip-counter');
  const svg=document.getElementById('adv-tip-icon-svg');
  if(!body)return;
  
  // Animate refresh icon spin
  if(svg){
    svg.style.transform='rotate(0deg)';
    svg.style.transition='transform .5s ease';
    requestAnimationFrame(()=>{svg.style.transform='rotate(360deg)';});
  }
  
  // Fade out
  body.style.opacity='0';
  body.style.transform='translateY(6px)';
  setTimeout(()=>{
    if(ico)ico.textContent=tip.i;
    if(txt)txt.innerHTML=tip.t;
    if(src)src.textContent=tip.source==='data'?'🎯 מנתון אמיתי מהעסק':'📚 מבסיס ידע';
    _advTipCount++;
    if(counter)counter.textContent='#'+_advTipCount;
    // Fade back in
    body.style.transform='translateY(0)';
    body.style.opacity='1';
  },220);
}

function renderDebts(){
  const n=new Date();
  const allDebts=[];
  Object.entries(S.A).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(!d||!d.name)return;
      const dt=new Date(date+'T'+time);
      if(dt>n)return;
      if(d.price&&Number(d.price)>0){
        allDebts.push({date,time,d,dt,key:date+'_'+time,paid:!!d.paid});
      }
    });
  });
  allDebts.sort((a,b)=>b.dt-a.dt);

  const openDebts=allDebts.filter(a=>!a.paid);
  const paidDebts=allDebts.filter(a=>a.paid);

  if(!allDebts.length)return`<div class="empty-state"><span class="empty-icon">🎉</span>אין חובות פתוחים<br><span style="font-size:13px">כל התשלומים מסודרים!</span></div>`;

  const totalDebt=openDebts.reduce((s,a)=>s+Number(a.d.price),0);
  const clientsWithDebt=new Set(openDebts.map(a=>a.d.name)).size;
  const mk=new Date().getFullYear()+'-'+String(new Date().getMonth()+1).padStart(2,'0');
  const monthDebt=openDebts.filter(a=>a.date.startsWith(mk)).reduce((s,a)=>s+Number(a.d.price),0);

  const byClient={};
  allDebts.forEach(a=>{
    const k=a.d.name;
    if(!byClient[k])byClient[k]={name:k,phone:a.d.phone||'',items:[],total:0,openTotal:0};
    byClient[k].items.push(a);
    byClient[k].total+=Number(a.d.price);
    if(!a.paid)byClient[k].openTotal+=Number(a.d.price);
  });

  const hero=openDebts.length?`<div class="debt-hero">
    <div class="debt-hero-lbl">💳 חובות פתוחים</div>
    <div class="debt-hero-amount">₪${totalDebt.toLocaleString()}</div>

      <div class="dhs"><div class="dhs-val">${openDebts.length}</div><div class="dhs-lbl">טיפולים</div></div>
      <div class="dhs"><div class="dhs-val">₪${monthDebt.toLocaleString()}</div><div class="dhs-lbl">החודש</div></div>
    </div>
  </div>`:`<div style="background:linear-gradient(135deg,#059669,#047857);border-radius:20px;padding:16px;margin-bottom:14px;text-align:center;color:white"><div style="font-size:22px">🎉</div><div style="font-weight:900;font-size:18px;margin-top:6px">כל החובות שולמו!</div></div>`;

  const cards=Object.values(byClient).sort((a,b)=>b.openTotal-a.openTotal).map(cl=>{
    const items=cl.items.map(a=>`<div class="debt-item" style="${a.paid?'opacity:.6;background:#f0fdf4':''}">
      <div class="debt-item-info">
        <div class="debt-item-name">${a.d.type||'טיפול'} — ${a.time}</div>
        <div class="debt-item-date">📅 ${a.date} · ₪${Number(a.d.price).toLocaleString()}</div>
      </div>
      ${a.paid
        ?`<span style="background:#dcfce7;color:#059669;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:800">✅ שולם</span>`
        :`<button class="debt-pay-btn" onclick="markPaid('${a.date}','${a.time}')">✓ שולם</button>`
      }
    </div>`).join('');
    return`<div class="debt-client-card">
      <div class="debt-client-hdr">
        <div class="debt-client-amount" style="${cl.openTotal===0?'color:#059669':''}">₪${cl.openTotal>0?cl.openTotal.toLocaleString():'שולם הכל'}</div>

function openMonthlyChart(yr){
  const n=new Date();
  const chartYear=yr||n.getFullYear();
  const curM=chartYear===n.getFullYear()?n.getMonth()+1:0;

  // Build data
  const data=[];
  for(let m=1;m<=12;m++){
    const mk=chartYear+'-'+String(m).padStart(2,'0');
    let rev=0,count=0;
    Object.entries(S.A||{}).forEach(([d,slots])=>{
      if(!d.startsWith(mk))return;
      Object.values(slots||{}).forEach(ap=>{
        if(ap&&ap.name)count++;
        if(ap&&ap.price&&Number(ap.price)>0)rev+=Number(ap.price);
      });
    });
    data.push({m,mk,name:MO[m-1],short:MO[m-1].slice(0,3),rev,count});
  }

  const maxRev=Math.max(...data.map(d=>d.rev),1);
  const totalY=data.reduce((s,d)=>s+d.rev,0);
  const avgM=data.filter(d=>d.rev>0).length?Math.round(totalY/data.filter(d=>d.rev>0).length):0;
  const cur=data[curM-1]||{rev:0,count:0};
  const prev=data[curM-2]||{rev:0};
  const diff=cur.rev-prev.rev;
  const diffPct=prev.rev>0?Math.round(Math.abs(diff)/prev.rev*100):0;
  const bestM=data.reduce((a,b)=>b.rev>a.rev?b:a,data[0]);

  // SVG Bar Chart
  const W=320,H=100,PL=8,PR=8,PT=24,PB=20;
  const innerW=W-PL-PR,innerH=H-PT-PB;
  const bw=Math.floor(innerW/12)-3;
  const gap=3;

  // Grid lines
  let gridLines='';
  [0.25,0.5,0.75,1].forEach(r=>{
    const y=PT+innerH*(1-r);
    const val=Math.round(maxRev*r);
    const lbl=val>=1000?Math.round(val/1000)+'K':val;
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
    gridLines+=`<text x="${PL-2}" y="${y+3}" text-anchor="end" font-size="6.5" fill="#d1d5db">${lbl}</text>`;
  });

  // Bars
  let bars='',labels='';
  data.forEach((d,i)=>{
    const x=PL+i*(bw+gap);
    const bh=d.rev>0?Math.max(3,Math.round((d.rev/maxRev)*innerH)):2;
    const y=PT+innerH-bh;
    const isCur=d.m===curM;
    const isPrev=d.m===curM-1&&chartYear===n.getFullYear();
    const id='bar-'+i;

    // Gradient per bar
    let fill,opacity=1;
    if(isCur){fill=`url(#gc)`;opacity=1;}
    else if(isPrev){fill='#5eead4';opacity=.9;}
    else if(d.rev>0){fill='#f0fdfa';opacity=.8;}
    else{fill='#f3f4f6';opacity=.5;}

    if(d.rev>0){
      bars+=`<rect id="${id}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${fill}" opacity="${opacity}" style="cursor:pointer;transition:opacity .2s" onclick="showBarTip(${i},${d.rev},${d.count},'${d.name}')" onmouseenter="this.style.opacity='.7'" onmouseleave="this.style.opacity='${opacity}'"/>`;
      if(isCur)bars+=`<rect x="${x-1}" y="${y-1}" width="${bw+2}" height="${bh+2}" rx="4" fill="none" stroke="#0d9488" stroke-width="1.5"/>`;
    } else {
      bars+=`<rect x="${x}" y="${PT+innerH-2}" width="${bw}" height="2" rx="1" fill="#e5e7eb"/>`;
    }
    labels+=`<text x="${x+bw/2}" y="${H-5}" text-anchor="middle" font-size="7.5" fill="${isCur?'#0d9488':'#9ca3af'}" font-weight="${isCur?'800':'400'}">${d.short}</text>`;
  });

  // Table rows
  const tableRows=data.map(d=>{
    const isCur=d.m===curM;
    const prevD=data[d.m-2];
    const chg=prevD&&prevD.rev>0?Math.round((d.rev-prevD.rev)/prevD.rev*100):null;
    const trendTxt=chg!==null?(chg>0?`<span style="color:#059669">▲${chg}%</span>`:`<span style="color:#dc2626">▼${Math.abs(chg)}%</span>`):`<span style="color:#d1d5db">—</span>`;
    const pct=d.rev>0?Math.round(d.rev/maxRev*100):0;
    return`<div class="chart-row${isCur?' cur':d.rev>0?' has':' empty'}" onclick="showBarTip(${d.m-1},${d.rev},${d.count},'${d.name}')">
      <div class="chart-row-mo${isCur?' cur':''}">${d.name}</div>
      <div class="chart-row-bar-wrap"><div class="chart-row-bar${isCur?' cur':''}" style="width:${pct}%" id="rb-${d.m}"></div></div>
      <div class="chart-row-rev${isCur?' cur':''}">${d.rev>0?'₪'+d.rev.toLocaleString():'—'}</div>
      <div class="chart-row-trend">${d.rev>0?trendTxt:'—'}</div>
    </div>`;
  }).join('');

  const html=`<div class="chart-screen" id="chart-screen">
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs></svg>
  <div class="chart-hero">
    <div class="chart-hero-nav">
      <button class="chart-back" onclick="document.getElementById('chart-screen').remove()">←</button>
      <div class="chart-hero-title">📊 ניתוח הכנסות</div>
      <div class="chart-year-sel">
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear-1})">‹</button>
        <span class="chart-year-val">${chartYear}</span>
        <button class="chart-year-btn" onclick="document.getElementById('chart-screen').remove();openMonthlyChart(${chartYear+1})">›</button>
      </div>
    </div>
    <div class="chart-kpis">
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${totalY>=1000?Math.round(totalY/1000)+'K':totalY.toLocaleString()}</div>
        <div class="chart-kpi-lbl">סה"כ ${chartYear}</div>
        ${diff!==0&&curM?`<div class="chart-kpi-diff ${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'}${diffPct}% החודש</div>`:''}
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">₪${avgM>=1000?Math.round(avgM/1000)+'K':avgM}</div>
        <div class="chart-kpi-lbl">ממוצע חודשי</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">${data.filter(d=>d.rev>0).length} חודשים פעילים</div>
      </div>
      <div class="chart-kpi">
        <div class="chart-kpi-val">${bestM.short}</div>
        <div class="chart-kpi-lbl">חודש הכי חזק</div>
        <div class="chart-kpi-diff" style="color:rgba(255,255,255,.5)">₪${bestM.rev.toLocaleString()}</div>
      </div>
    </div>
  </div>
  <div class="chart-body">
    <!-- SVG Chart -->
    <div style="background:white;padding:16px 16px 8px;position:relative" id="chart-area">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
        <defs>
          <linearGradient id="gc2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#14b8a6"/>
            <stop offset="100%" stop-color="#0d9488"/>
          </linearGradient>
        </defs>
        ${gridLines}
        ${bars}
        ${labels}
      </svg>
      <div style="display:flex;align-items:center;gap:14px;margin-top:6px;padding:0 4px;font-size:10px;color:#9ca3af">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:linear-gradient(#14b8a6,#0d9488);margin-left:4px;vertical-align:middle"></span>החודש</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#5eead4;margin-left:4px;vertical-align:middle"></span>חודש קודם</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:#f0fdfa;margin-left:4px;vertical-align:middle"></span>שאר</span>
      </div>
    </div>
    <!-- Monthly breakdown -->
    <div class="chart-table-wrap">
      <div class="chart-table-title">פירוט חודשי</div>
      ${tableRows}
    </div>
  </div>
  </div>`;

  // Remove existing
  document.getElementById('chart-screen')?.remove();
  const el=document.createElement('div');el.innerHTML=html;
  document.body.appendChild(el.firstChild);

  // Animate bars on load
  setTimeout(()=>{
    document.querySelectorAll('.chart-row-bar').forEach((el,i)=>{
      el.style.transition=`width .8s cubic-bezier(.34,1.56,.64,1) ${i*0.04}s`;
    });
  },50);
}

function showBarTip(idx,rev,count,name){
  document.querySelectorAll('.chart-tooltip-box').forEach(e=>e.remove());
  if(!rev)return;
  const bar=document.getElementById('bar-'+idx);
  if(!bar)return;
  const rect=bar.getBoundingClientRect();
  const chartRect=document.getElementById('chart-area').getBoundingClientRect();
  const tip=document.createElement('div');
  tip.className='chart-tooltip-box';
  tip.style.cssText=`position:absolute;bottom:${chartRect.bottom-rect.top+8}px;left:${rect.left-chartRect.left+rect.width/2}px;transform:translateX(-50%)`;
  tip.innerHTML=`${name}: ₪${rev.toLocaleString()} · ${count} טיפולים`;
  document.getElementById('chart-area').style.position='relative';
  document.getElementById('chart-area').appendChild(tip);
  setTimeout(()=>tip.remove(),3000);
}

    <div class="pkg-hero-lbl">📦 חבילות פעילות</div>

      <input class="pkg-inp" id="pk-paid" placeholder="שולם עד כה ₪" type="number" style="flex:1" oninput="updatePkgCalc(null)">
    </div>
    <input class="pkg-inp" id="pk-note" placeholder="הערות (אופציונלי)">
    <div id="pk-calc" style="display:none" class="pkg-row-calc">
      <span class="pkg-calc-label">נותר לתשלום:</span>
      <span class="pkg-calc-val remaining" id="pk-rem">₪0</span>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="S.showAddPkg=false;hRender()" style="flex:1;padding:11px;border-radius:12px;border:none;background:#f3f4f6;color:#374151;font-weight:700;cursor:pointer;font-family:inherit">ביטול</button>
      <button onclick="savePkg()" style="flex:2;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;font-weight:700;cursor:pointer;font-family:inherit">💾 שמור חבילה</button>
    </div>
  </div>`:`<button class="add-pkg-btn" onclick="S.showAddPkg=true;hRender()">➕ הוסף חבילה חדשה</button>`;

  const cards=pkgs.map(([id,p])=>{
    const cost=Number(p.cost||0),paid=Number(p.paid||0),rem=Math.max(0,cost-paid);
    const pct=cost>0?Math.min(100,Math.round(paid/cost*100)):0;
    const isFullPaid=paid>=cost&&cost>0;
    const isEdit=S.editPkgKey===id;

    if(isEdit){
      return`<div class="pkg-card" style="border-color:#0891b2">
        <div style="font-size:13px;font-weight:800;color:#0891b2;margin-bottom:10px;text-align:right">✏️ עריכה</div>
        <input class="pkg-inp-sm" id="pe-name-${id}" placeholder="שם מטופלת" value="${x(p.name||'')}">
        <input class="pkg-inp-sm" id="pe-type-${id}" placeholder="סוג חבילה" value="${x(p.type||'')}">
        <div style="display:flex;gap:7px">
          <input class="pkg-inp-sm" id="pe-cost-${id}" placeholder="עלות ₪" type="number" value="${x(p.cost||'')}" style="flex:1;margin-bottom:7px" oninput="updatePkgCalc('${id}')">
          <input class="pkg-inp-sm" id="pe-paid-${id}" placeholder="שולם ₪" type="number" value="${x(p.paid||'')}" style="flex:1;margin-bottom:7px" oninput="updatePkgCalc('${id}')">

          <button onclick="S.editPkgKey=null;hRender()" style="flex:1;padding:9px;border-radius:10px;border:none;background:#f3f4f6;color:#374151;font-weight:700;cursor:pointer;font-family:inherit">ביטול</button>
          <button onclick="deletePkg('${id}')" style="flex:1;padding:9px;border-radius:10px;border:none;background:#fef2f2;color:#dc2626;font-weight:700;cursor:pointer;font-family:inherit">🗑 מחק</button>
          <button onclick="updatePkg('${id}')" style="flex:2;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,#0891b2,#0e7490);color:white;font-weight:700;cursor:pointer;font-family:inherit">💾 שמור</button>

        </div>

          <div class="pkg-card-name">${x(p.name||'')}</div>

          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#059669">₪${paid.toLocaleString()}</div><div class="pkg-amount-lbl">שולם</div></div>
          <div class="pkg-amount-item"><div class="pkg-amount-val" style="color:#0891b2">₪${cost.toLocaleString()}</div><div class="pkg-amount-lbl">סה"כ</div></div>
        </div>
      </div>
      ${p.note?`<div style="font-size:12px;color:#6b7280;margin-bottom:8px;text-align:right">📝 ${x(p.note)}</div>`:''}
      <div style="font-size:10px;color:#9ca3af;text-align:right;margin-bottom:8px">📅 ${p.created?p.created.substring(0,10):''}</div>
      <div class="pkg-card-actions">
        <button class="pkg-action-btn del" onclick="deletePkg('${id}')">🗑 מחק</button>
        <button class="pkg-action-btn edit" onclick="S.editPkgKey='${id}';hRender()">✏️ ערוך</button>
        ${!isFullPaid?`<button class="pkg-action-btn pay" onclick="markPkgPaid('${id}')">✓ סומן כשולם</button>`:''}

  return (hero||'')+addForm+(pkgs.length?`<div class="section-lbl">חבילות קיימות</div>`+cards:`<div class="empty-state" style="padding:28px"><span class="empty-icon">📦</span>אין חבילות עדיין</div>`);
}

function savePkg(){
  const name=(document.getElementById('pk-name')||{}).value||'';
  if(!name.trim()){alert('נא להזין שם מטופלת');return;}
  const id='pkg_'+Date.now();
  if(!S.PKGS)S.PKGS={};
  S.PKGS[id]={
    name,
    type:(document.getElementById('pk-type')||{}).value||'',
    cost:(document.getElementById('pk-cost')||{}).value||'0',
    paid:(document.getElementById('pk-paid')||{}).value||'0',
    note:(document.getElementById('pk-note')||{}).value||'',
    created:new Date().toISOString()
  };
  store.set('packages',S.PKGS);
  S.showAddPkg=false;
  hRender();
}
function updatePkg(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id]={
    ...S.PKGS[id],
    name:(document.getElementById('pe-name-'+id)||{}).value||'',
    type:(document.getElementById('pe-type-'+id)||{}).value||'',
    cost:(document.getElementById('pe-cost-'+id)||{}).value||'0',
    paid:(document.getElementById('pe-paid-'+id)||{}).value||'0',
    note:(document.getElementById('pe-note-'+id)||{}).value||''
  };
  store.set('packages',S.PKGS);
  S.editPkgKey=null;
  hRender();
}
function deletePkg(id){
  if(!confirm('למחוק חבילה זו?'))return;
  delete S.PKGS[id];
  store.set('packages',S.PKGS);
  S.editPkgKey=null;
  hRender();
}
function markPkgPaid(id){
  if(!S.PKGS||!S.PKGS[id])return;
  S.PKGS[id].paid=S.PKGS[id].cost;
  store.set('packages',S.PKGS);
  hRender();
}
function updatePkgCalc(id){
  const cost=Number((document.getElementById((id?'pe-cost-'+id:'pk-cost'))||{}).value||0);
  const paid=Number((document.getElementById((id?'pe-paid-'+id:'pk-paid'))||{}).value||0);
  const rem=Math.max(0,cost-paid);
  const remEl=document.getElementById(id?'per-'+id:'pk-rem');
  const calcEl=document.getElementById(id?'pec-'+id:'pk-calc');
  if(remEl)remEl.textContent='₪'+rem.toLocaleString();
  if(calcEl)calcEl.style.display='flex';
}

// Get reminders map from localStorage (keyed by appointmentId)
function getReminders(){
  try{return JSON.parse(localStorage.getItem('hodaya_reminders')||'{}');}catch(e){return {};}
}
function setReminder(apptId,data){
  const r=getReminders();
  if(data)r[apptId]=data;else delete r[apptId];
  localStorage.setItem('hodaya_reminders',JSON.stringify(r));
}
function hasReminder(apptId){
  return !!getReminders()[apptId];
}

// Build a stable ID for an appointment
function apptReminderId(a){
  return `${a.date}_${a.time}_${(a.d.name||'').replace(/\s+/g,'_')}`;
}

// The reminder button to inject into every appointment card
function reminderBtn(a){
  const id=apptReminderId(a);
  const active=hasReminder(id);
  return `<button class="rem-btn${active?' active':''}" onclick="event.stopPropagation();openReminderSheet('${encodeURIComponent(JSON.stringify({date:a.date,time:a.time,name:a.d.name||'',type:a.d.type||'',duration:a.d.duration||'',price:a.d.price||'',phone:a.d.phone||''}))}')" title="${active?'התראה פעילה — לחצי לשינוי':'הוסף התראה'}">
    ${active?'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zm6-6V11a6 6 0 00-5-5.91V5a1 1 0 10-2 0v.09A6 6 0 006 11v5l-2 2v1h16v-1z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 003.4 0"/></svg>'}
  </button>`;
}

// Open the reminder options sheet
function openReminderSheet(encodedAppt){
  let appt;
  try{appt=JSON.parse(decodeURIComponent(encodedAppt));}catch(e){return;}
  const apptId=`${appt.date}_${appt.time}_${(appt.name||'').replace(/\s+/g,'_')}`;
  const existing=getReminders()[apptId];
  
  // Parse appt datetime
  const apptDt=new Date(appt.date+'T'+appt.time+':00');
  const now=new Date();
  const dt=apptDt-now;
  
  const options=[
    {v:15,l:'15 דקות לפני',ms:15*60*1000,ico:'⚡',sub:'קצר לפני התור'},
    {v:30,l:'30 דקות לפני',ms:30*60*1000,ico:'🕐',sub:'זמן לצאת מהבית'},
    {v:60,l:'שעה לפני',ms:60*60*1000,ico:'⏰',sub:'מומלץ לרוב המטופלות'},
    {v:180,l:'3 שעות לפני',ms:180*60*1000,ico:'📅',sub:'הכנה מוקדמת'},
    {v:1440,l:'יום שלם לפני',ms:1440*60*1000,ico:'🌅',sub:'לתכנון יום מראש'}
  ];
  
  const timeInfo=dt<=0?'<span style="color:#dc2626;font-weight:700">⚠️ התור כבר עבר</span>':
                 dt<3600000?`<span style="color:#ea580c;font-weight:700">⏰ בעוד ${Math.floor(dt/60000)} דקות</span>`:
                 dt<86400000?`<span style="color:#059669;font-weight:700">📅 בעוד ${Math.floor(dt/3600000)} שעות</span>`:
                 `<span style="color:#059669;font-weight:700">📅 בעוד ${Math.floor(dt/86400000)} ימים</span>`;
  
  // Create overlay
  let ov=document.getElementById('rem-overlay');
  if(ov)ov.remove();
  ov=document.createElement('div');
  ov.id='rem-overlay';
  ov.className='rem-overlay';
  ov.onclick=function(e){if(e.target===ov)closeReminderSheet();};
  
  ov.innerHTML=`<div class="rem-sheet">
    <div class="rem-hdr">
      <div class="rem-hdr-top">
        <div class="rem-hdr-icon">🔔</div>
        <div class="rem-hdr-txt">
          <div class="rem-hdr-title">הוסף התראה</div>
          <div class="rem-hdr-sub">${timeInfo}</div>
        </div>
        <button class="rem-close" onclick="closeReminderSheet()">✕</button>
      </div>
      <div class="rem-appt-info">
        <div class="rem-appt-name">${x(appt.name)}</div>
        <div class="rem-appt-meta">${appt.date===TD?'היום':appt.date} · ${appt.time}${appt.type?' · '+x(appt.type):''}</div>
      </div>
    </div>
    
    <div class="rem-body">
      <div class="rem-section-title">⏱ מתי להתריע?</div>
      <div class="rem-options">
        ${options.map(o=>{
          const futureTime=new Date(apptDt.getTime()-o.ms);
          const isPast=futureTime<=now;
          const sel=existing&&existing.minutes===o.v;
          return`<button class="rem-option${sel?' selected':''}${isPast?' disabled':''}" ${isPast?'disabled':`onclick="setApptReminder('${apptId}',${o.v},'${encodeURIComponent(JSON.stringify(appt))}')"`}>
            <div class="rem-option-ico">${o.ico}</div>
            <div class="rem-option-txt">
              <div class="rem-option-title">${o.l}</div>
              <div class="rem-option-sub">${isPast?'⚠️ עבר כבר':o.sub}</div>
            </div>
            ${sel?'<div class="rem-option-check">✓</div>':''}
          </button>`;
        }).join('')}
      </div>
      
      <div class="rem-section-title" style="margin-top:16px">📲 איך להתריע?</div>
      <div class="rem-methods">
        <div class="rem-method-card">

// Download .ics file for system calendar
function downloadApptICS(encodedAppt,minutesBefore){
  let appt;try{appt=JSON.parse(decodeURIComponent(encodedAppt));}catch(e){return;}
  const apptId=`${appt.date}_${appt.time}_${(appt.name||'').replace(/\s+/g,'_')}`;
  
  // Parse to UTC
  const [y,mo,d]=appt.date.split('-').map(Number);
  const [hh,mm]=appt.time.split(':').map(Number);
  const start=new Date(y,mo-1,d,hh,mm,0);
  const duration=Number(appt.duration)||60;
  const end=new Date(start.getTime()+duration*60000);
  
  const fmt=(dt)=>dt.getUTCFullYear().toString().padStart(4,'0')+
                  (dt.getUTCMonth()+1).toString().padStart(2,'0')+
                  dt.getUTCDate().toString().padStart(2,'0')+'T'+
                  dt.getUTCHours().toString().padStart(2,'0')+
                  dt.getUTCMinutes().toString().padStart(2,'0')+
                  dt.getUTCSeconds().toString().padStart(2,'0')+'Z';
  
  const uid=apptId+'@therapy-hodaya';
  const summary=`${appt.name||'תור'}${appt.type?' - '+appt.type:''}`;
  const description=`מטופלת: ${appt.name||''}\\n${appt.type?'טיפול: '+appt.type+'\\n':''}${appt.phone?'טלפון: '+appt.phone+'\\n':''}${appt.price?'מחיר: ₪'+appt.price:''}`;
  
  const ics=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Diary Rinat//HE
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:${uid}
DTSTAMP:${fmt(new Date())}
DTSTART:${fmt(start)}
DTEND:${fmt(end)}
SUMMARY:${summary}
DESCRIPTION:${description}
LOCATION:הקליניקה
BEGIN:VALARM
ACTION:DISPLAY
DESCRIPTION:${summary}
TRIGGER:-PT${minutesBefore}M
END:VALARM
END:VEVENT
END:VCALENDAR`;
  
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`appointment_${appt.date}_${appt.time.replace(':','-')}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  
  // Save reminder state
  setReminder(apptId,{minutes:minutesBefore,method:'ics',createdAt:Date.now()});
  closeReminderSheet();
  toast('✅ הקובץ הורד — פתחי אותו כדי להוסיף ללוח השנה');
  if(typeof hRender==='function')hRender();
}

// Browser notification reminder (using Notification API + setTimeout)
async function enableBrowserReminder(apptId,encodedAppt,minutesBefore){
  let appt;try{appt=JSON.parse(decodeURIComponent(encodedAppt));}catch(e){return;}
  
  // Request notification permission
  if(!('Notification'in window)){
    toast('❌ הדפדפן לא תומך בהתראות',true);
    return;
  }
  
  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){
      toast('⚠️ אישור התראות נדחה',true);
      return;
    }
  }else if(Notification.permission==='denied'){
    toast('❌ התראות חסומות בהגדרות הדפדפן',true);
    return;
  }
  
  // Schedule the notification
  const [y,mo,d]=appt.date.split('-').map(Number);
  const [hh,mm]=appt.time.split(':').map(Number);
  const apptDt=new Date(y,mo-1,d,hh,mm,0);
  const triggerAt=apptDt.getTime()-minutesBefore*60*1000;
  const delay=triggerAt-Date.now();
  
  if(delay<=0){
    toast('⚠️ הזמן כבר עבר',true);
    return;
  }
  
  if(delay>2147483647){ // > ~24.8 days (setTimeout max)
    toast('⚠️ ההתראה רחוקה מדי — השתמשי בלוח השנה',true);
    return;
  }
  
  // Clear any existing timeout for this apptId
  if(!window._apptReminderTimeouts)window._apptReminderTimeouts={};
  if(window._apptReminderTimeouts[apptId]){
    clearTimeout(window._apptReminderTimeouts[apptId]);
  }
  
  window._apptReminderTimeouts[apptId]=setTimeout(()=>{
    try{
      new Notification(`🔔 תור בעוד ${minutesBefore>=1440?(minutesBefore/1440)+' יום':minutesBefore>=60?(minutesBefore/60)+' שעות':minutesBefore+' דקות'}`,{
        body:`${appt.name} · ${appt.time}${appt.type?' · '+appt.type:''}`,
        icon:'https://pinto1212121212-create.github.io/therapy-hodaya/favicon.png',
        tag:apptId,
        requireInteraction:true
      });
    }catch(e){console.warn('Notification failed:',e);}
    delete window._apptReminderTimeouts[apptId];
  },delay);
  
  setReminder(apptId,{minutes:minutesBefore,method:'browser',scheduledFor:triggerAt,createdAt:Date.now()});
  closeReminderSheet();
  toast('🔔 התראת דפדפן תופעל בזמן');
  if(typeof hRender==='function')hRender();
}

// Restore scheduled browser reminders on page load
function restoreReminders(){
  const reminders=getReminders();
  const now=Date.now();
  if(!window._apptReminderTimeouts)window._apptReminderTimeouts={};
  Object.entries(reminders).forEach(([apptId,rem])=>{
    if(rem.method!=='browser'||!rem.scheduledFor)return;
    const delay=rem.scheduledFor-now;
    if(delay<=0){
      // Already past — clean it up
      setReminder(apptId,null);
      return;
    }
    if(delay>2147483647)return;
    // Need to parse apptId back into basic info
    const parts=apptId.split('_');
    const date=parts[0],time=parts[1],name=parts.slice(2).join(' ');
    window._apptReminderTimeouts[apptId]=setTimeout(()=>{
      try{
        new Notification(`🔔 תור בעוד ${rem.minutes>=1440?(rem.minutes/1440)+' יום':rem.minutes>=60?(rem.minutes/60)+' שעות':rem.minutes+' דקות'}`,{
          body:`${name} · ${time}`,
          tag:apptId,
          requireInteraction:true
        });
      }catch(e){}
      delete window._apptReminderTimeouts[apptId];
    },delay);
  });
}

// Call on load

  window.addEventListener('load',function(){setTimeout(restoreReminders,1000);});

function getClientTags(name,phone){
  // Auto-detect tags based on data
  const key=phone||name;
  const cd=S.CL?.[key]||{};
  const manual=cd.tags||[];
  const tags=[];
  // Count visits
  const visits=[];
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name)visits.push({date,time,d});
    });
  });
  // Check debt
  const n=new Date();
  const hasDebt=visits.some(v=>v.d.price&&Number(v.d.price)>0&&!v.d.paid&&new Date(v.date+'T'+v.time)<=n);
  // Check package
  const hasPkg=Object.values(S.PKGS||{}).some(p=>p.name===name);
  // Auto tags
  if(manual.includes('vip'))tags.push({id:'vip',label:'👑 VIP',cls:'vip'});
  if(visits.length===1){
    // Check if this is first ever visit (only 1 total)
    tags.push({id:'new',label:'✨ מטופלת חדשה',cls:'new'});
  } else if(visits.length>=3&&!manual.includes('vip'))tags.push({id:'returning',label:'🔄 חוזר',cls:'returning'});
  if(hasPkg)tags.push({id:'package',label:'📦 חבילה',cls:'package'});
  if(hasDebt)tags.push({id:'debt',label:'⚠️ חוב',cls:'debt'});
  if(manual.includes('problematic'))tags.push({id:'problematic',label:'⚠️ בעייתי',cls:'problematic'});
  if(manual.includes('nopay'))tags.push({id:'nopay',label:'💳 לא משלם',cls:'nopay'});
  return tags;
}
function getDebtAmount(name){
  const n=new Date();
  let total=0;
  Object.entries(S.A||{}).forEach(([date,slots])=>{
    Object.entries(slots||{}).forEach(([time,d])=>{
      if(d&&d.name===name&&d.price&&Number(d.price)>0&&!d.paid&&new Date(date+'T'+time)<=n)
        total+=Number(d.price);
    });
  });
  return total;
}

function getWeekDates(offset){
  const now=new Date();
  const day=now.getDay(); // 0=Sun
  const mon=new Date(now);
  mon.setDate(now.getDate()-day+offset*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);
    d.setDate(mon.getDate()+i);
    days.push(d);
  }
  return days;
}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pLaserWeekly(){
  const days=getWeekDates(S.weekOffset);
  const DY_HEB=['א\'','ב\'','ג\'','ד\'','ה\'','ו\'','ש\''];
  const now=new Date(),todayStr=fmtDate(now);
  // Week range label
  const first=days[0],last=days[6];
  const weekLbl=first.getDate()+' '+MO[first.getMonth()]+' — '+last.getDate()+' '+MO[last.getMonth()]+' '+last.getFullYear();
  // Week stats
  let weekRev=0,weekAppts=0,weekClients=new Set();
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    Object.values(slots).forEach(ap=>{
      if(!ap||!ap.name)return;
      weekAppts++;
      weekClients.add(ap.name);
      if(ap.price&&Number(ap.price)>0)weekRev+=Number(ap.price);
    });
  });
  // Today appts for bottom detail
  const selStr=S.lSel&&days.find(d=>fmtDate(d)===S.lSel)?S.lSel:todayStr;
  const selSlots=S.A[selStr]||{};
  const selAppts=Object.entries(selSlots).filter(([,d])=>d&&d.name).sort((a,b)=>a[0].localeCompare(b[0]));

  let h=`<div style="background:white;border-radius:0 0 20px 20px;margin-bottom:8px;padding-bottom:8px;box-shadow:0 4px 16px rgba(0,0,0,.06)">`;
  // Navigation
  h+=`<div class="week-nav">
    <button class="week-nav-btn" onclick="S.weekOffset++;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">›</button>
    <div class="week-nav-lbl">${weekLbl}</div>
    <button class="week-nav-btn" onclick="S.weekOffset--;S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()">‹</button>
  </div>`;
  // Week summary
  h+=`<div class="week-summary">
    <div class="ws"><div class="ws-val">${weekAppts}</div><div class="ws-lbl">תורים</div></div>
    <div class="ws"><div class="ws-val">${weekClients.size}</div><div class="ws-lbl">מטופלות</div></div>
    <div class="ws"><div class="ws-val">₪${weekRev.toLocaleString()}</div><div class="ws-lbl">הכנסות</div></div>
    <div class="ws"><div class="ws-val">${S.weekOffset===0?'השבוע':S.weekOffset>0?'הבא':'שעבר'}</div><div class="ws-lbl">שבוע</div></div>
  </div>`;
  // Day headers
  h+=`<div class="week-row">`;
  days.forEach(d=>{h+=`<div class="week-day-hdr${fmtDate(d)===todayStr?' today':''}">${DY_HEB[d.getDay()]}</div>`;});
  h+=`</div>`;
  // Day columns
  h+=`<div class="week-row">`;
  days.forEach(d=>{
    const ds=fmtDate(d);
    const slots=S.A[ds]||{};
    const appts=Object.entries(slots).filter(([,ap])=>ap&&ap.name).sort((a,b)=>a[0].localeCompare(b[0]));
    const isToday=ds===todayStr;
    const isSel=ds===S.lSel;
    const isShabat=d.getDay()===6;
    const dayRev=appts.reduce((s,[,ap])=>s+(ap.price?Number(ap.price):0),0);
    h+=`<div class="week-day-col${isToday?' today-col':''}${appts.length?' has-appts':''}${isShabat?' shabbat':''}${isSel&&!isToday?' has-appts':''}" onclick="S.lSel='${ds}';S.calView='week';const _c=document.querySelector('#diary-content');if(_c)_c.innerHTML=pLaser()" style="${isSel&&!isToday?'border:2px solid #0d9488;':''}">
      <div class="week-day-num">${d.getDate()}</div>
      ${appts.slice(0,3).map(([time,ap])=>`<span class="week-appt-dot${ap.paid?' paid':(!ap.paid&&ap.price&&Number(ap.price)>0)?' debt':''}">${time.substring(0,5)} ${x(ap.name.split(' ')[0])}</span>`).join('')}
      ${appts.length>3?`<span style="font-size:8px;color:#2dd4bf;text-align:center;display:block">+${appts.length-3}</span>`:''}
      ${dayRev>0?`<div class="week-day-rev">₪${dayRev>=1000?Math.round(dayRev/1000)+'K':dayRev}</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;
  // Selected day detail
  const selDay=days.find(d=>fmtDate(d)===selStr)||days.find(d=>fmtDate(d)===todayStr);
  const selDayHeb=selDay?DY_HEB[selDay.getDay()]+' '+selDay.getDate()+' '+MO[selDay.getMonth()]:'';
  h+=`<div style="padding:0 12px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <button onclick="S.lModal='add';S.lSlot=null;S.lF={};modalRender()" style="background:#0d9488;color:white;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ תור</button>
    <span style="font-size:13px;font-weight:800;color:#1e1b4b">${selDayHeb}</span>
  </div>`;
  if(selAppts.length){
    h+=selAppts.map(([time,ap])=>`<div class="appt-card-pro" style="margin-bottom:7px">
      <div class="appt-time-pill" style="background:#f0fdf4;color:#059669;border-color:#bbf7d0;font-size:12px">${time}</div>
      <div class="appt-card-info">
        <div class="appt-card-name" style="font-size:14px">${x(ap.name)}</div>
        <div class="appt-card-meta">${ap.type?x(ap.type):''}${ap.price?' · ₪'+ap.price:''}</div>
        ${clientTagsHTML(ap.name,ap.phone)}
      </div>
      ${contactBtns(ap.phone,ap.name,selStr+' '+time)}
    </div>`).join('');
  } else {
    h+=`<div style="text-align:center;padding:20px;color:#d1d5db;font-size:13px">אין תורים ביום זה</div>`;
  }
  h+=`</div>`;
  return h;
}

  const ov=document.createElement('div');
  ov.className='guide-overlay';
  ov.id='promo-guide-overlay';
  ov.onclick=function(e){if(e.target===ov)closePromoGuide();};
  
  const sectionsHtml=guide.sections.map((sec,i)=>`
    <div class="guide-section">
      <div class="guide-section-hdr">${x(sec.heading)}</div>
      <div class="guide-section-items">
        ${sec.items.map((item,j)=>`<div class="guide-item">
          <div class="guide-item-num">${j+1}</div>
          <div class="guide-item-body">${item}</div>
        </div>`).join('')}
      </div>
    </div>
  `).join('');
  
  ov.innerHTML=`<div class="guide-sheet">
    <div class="guide-hdr">
      <div class="guide-hdr-top">
        <div class="guide-hdr-badge">📖 מדריך מקצועי</div>
        <button class="guide-close" onclick="closePromoGuide()">✕</button>
      </div>

function webToast(msg,isErr){

async function webUpload(input){
  const file=input.files[0];
  if(!file)return;
  let token=localStorage.getItem('gh_deploy_token');
  if(!token){
    token=prompt('הכנס GitHub Token (נשמר במכשיר):');
    if(!token){input.value='';return;}
    localStorage.setItem('gh_deploy_token',token.trim());
    token=token.trim();
  }
  const btn=document.getElementById('web-upload-btn');
  const prog=document.getElementById('web-prog');
  const pb=document.getElementById('web-progbar');
  const step=document.getElementById('web-step');
  btn.disabled=true;btn.textContent='⏳ מעלה...';
  prog.style.display='block';pb.style.width='10%';
  step.textContent='📄 קורא קובץ...';step.className='web-step';
  const hdr={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'};
  const hdrJson={...hdr,'Content-Type':'application/json'};
  try{
    const content=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.onerror=rej;
      r.readAsText(file);
    });
    const encoded=btoa(unescape(encodeURIComponent(content)));
    pb.style.width='25%';step.textContent='🔍 בודק אם הריפו קיים...';
    // ── Step 1: Check if repo+file exist ──
    const apiUrl=`https://api.github.com/repos/${WEB_OWNER}/${WEB_REPO}/contents/index.html`;
    let sha=null,needCreateRepo=false;
    const chkRes=await fetch(apiUrl+'?t='+Date.now(),{headers:hdr});
    if(chkRes.status===401){localStorage.removeItem('gh_deploy_token');throw new Error('הטוקן לא תקף — נסי שוב');}
    if(chkRes.status===404){
      // Either repo doesn't exist, or file doesn't. Check the repo itself.
      const repoCheck=await fetch(`https://api.github.com/repos/${WEB_OWNER}/${WEB_REPO}`,{headers:hdr});
      if(repoCheck.status===404)needCreateRepo=true;
      else if(repoCheck.status===401){localStorage.removeItem('gh_deploy_token');throw new Error('הטוקן לא תקף');}
      // If repoCheck.ok — repo exists but file doesn't. sha stays null, that's fine.
    }else if(chkRes.ok){
      const chk=await chkRes.json();
      if(chk.sha)sha=chk.sha;
    }
    // ── Step 2: Create repo if needed ──
    if(needCreateRepo){
      pb.style.width='40%';step.textContent='🏗️ יוצר את הריפו '+WEB_REPO+'...';
      const cr=await fetch('https://api.github.com/user/repos',{method:'POST',headers:hdrJson,
        body:JSON.stringify({name:WEB_REPO,private:false,auto_init:false,description:'RB Pro Laser website'})});
      const crd=await cr.json();
      if(cr.status===401){localStorage.removeItem('gh_deploy_token');throw new Error('הטוקן לא תקף');}
      if(!cr.ok){
        const exists=(crd.message||'').toLowerCase().includes('already exist');
        if(!exists)throw new Error('יצירת ריפו נכשלה: '+(crd.message||'לא ידוע'));
      }
      // Let GitHub propagate the new repo
      await new Promise(r=>setTimeout(r,1500));
    }
    // ── Step 3: Upload file ──
    pb.style.width='70%';step.textContent='⬆️ מעלה קובץ...';
    const body={message:'Update via diary · '+new Date().toLocaleString('he-IL'),content:encoded};
    if(sha)body.sha=sha;
    const res=await fetch(apiUrl,{method:'PUT',headers:hdrJson,body:JSON.stringify(body)});
    const d=await res.json();
    if(res.status===401){localStorage.removeItem('gh_deploy_token');throw new Error('הטוקן לא תקף');}
    if(!d.content)throw new Error(d.message||'שגיאה בהעלאה');
    // ── Step 4: Enable Pages (only if new repo) ──
    if(needCreateRepo){
      pb.style.width='90%';step.textContent='🌐 מפעיל Pages...';
      try{
        await fetch(`https://api.github.com/repos/${WEB_OWNER}/${WEB_REPO}/pages`,{method:'POST',headers:hdrJson,
          body:JSON.stringify({source:{branch:'main',path:'/'}})});
      }catch(e){}
    }
    pb.style.width='100%';
    btn.textContent='✅ עלה!';btn.style.background='linear-gradient(135deg,#10b981,#059669)';
    const msg=needCreateRepo?'🎉 הריפו נוצר ופורסם! יהיה זמין תוך דקה':'✅ האתר התעדכן בהצלחה!';
    step.innerHTML=`✅ <a href="${WEB_LIVE_URL}?v=${Date.now()}" target="_blank">פתח אתר חי ←</a>`;
    step.className='web-step ok';
    webMarkPublished();
    webToast(msg);
    setTimeout(()=>{
      btn.disabled=false;
      btn.innerHTML='🚀 בחר קובץ ופרסם';
      btn.style.background='';
      step.textContent='';
      step.className='web-step';
      prog.style.display='none';
      pb.style.width='0%';
      input.value='';
    },10000);
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='🚀 בחר קובץ ופרסם';
    btn.style.background='';
    step.textContent='❌ '+e.message;step.className='web-step err';
    webToast('❌ '+e.message,true);
    setTimeout(()=>{step.textContent='';step.className='web-step';prog.style.display='none';pb.style.width='0%';input.value='';},4500);
  }
}

// Switch between visual (iframe), code (current), and orig (original) views
function webSwitchView(mode){
  _webEdit.view=mode;
  const tabV=document.getElementById('web-tab-visual');
  const tabC=document.getElementById('web-tab-code');
  const tabO=document.getElementById('web-tab-orig');
  const ifr=document.getElementById('web-iframe-wrap');
  const ta=document.getElementById('web-edit-textarea');
  const origWrap=document.getElementById('web-edit-orig-wrap');
  const body=document.getElementById('web-edit-body');
  const toolbar=document.getElementById('wt-toolbar');
  if(!tabV||!tabC)return;
  
  // Reset all tabs
  [tabV,tabC,tabO].forEach(t=>t&&t.classList.remove('on'));
  if(ifr)ifr.classList.remove('on');
  if(ta)ta.classList.remove('on');
  if(origWrap)origWrap.classList.remove('on');
  if(body)body.classList.remove('code-mode');
  
  if(mode==='visual'){
    tabV.classList.add('on');
    if(ifr)ifr.classList.add('on');
    if(toolbar)toolbar.style.display='';
    // If textarea was edited directly, sync changes back into iframe
    if(_webEdit.loaded&&ta&&ta.value&&ta.value!==_webEdit.rawHtml){
      _webEdit.rawHtml=ta.value;
      webLoadIframe();
    }
  }else if(mode==='code'){
    tabC.classList.add('on');
    if(ta)ta.classList.add('on');
    if(body)body.classList.add('code-mode');
    if(toolbar)toolbar.style.display='none';
    // Pull latest edits out of iframe into textarea+rawHtml
    if(_webEdit.loaded){
      webExtractFromIframe(function(html){
        _webEdit.rawHtml=html;
        if(ta)ta.value=html;
      });
    }
  }else if(mode==='orig'){
    tabO.classList.add('on');
    if(origWrap)origWrap.classList.add('on');
    if(toolbar)toolbar.style.display='none';
    // Load the original into the original-textarea
    const taOrig=document.getElementById('web-edit-textarea-orig');
    if(taOrig)taOrig.value=_webEdit.originalHtml||'(טרם נטען)';
    webUpdateOrigInfo();
  }
}

// Update the info text shown in the original-code tab header
function webUpdateOrigInfo(){
  const info=document.getElementById('web-orig-info');
  if(!info)return;
  if(!_webEdit.originalHtml){
    info.textContent='טרם נטען';
    return;
  }
  const sizeKB=(_webEdit.originalHtml.length/1024).toFixed(1);
  const date=new Date(_webEdit.originalLoadedAt);
  const dateStr=date.toLocaleString('he-IL',{dateStyle:'short',timeStyle:'short'});
  info.textContent=`${sizeKB}KB · עודכן: ${dateStr}`;
}

// Toggle between read-only and editable for the original-code textarea
function webToggleOrigEdit(){
  const ta=document.getElementById('web-edit-textarea-orig');
  const btn=document.getElementById('web-orig-unlock-btn');
  const actions=document.getElementById('web-orig-actions');
  if(!ta||!btn)return;
  if(ta.hasAttribute('readonly')){
    // Unlock
    if(!confirm('⚠️ שימי לב: עריכה של הקוד המקורי משנה את נקודת ההתחלה של האתר.\n\nאם תרצי לחזור למצב הזה אחרי שינויים של הודיה — זה מה שיוחזר.\n\nלהמשיך?'))return;
    ta.removeAttribute('readonly');
    ta.focus();
    btn.textContent='🔓 מצב עריכה';
    btn.classList.add('unlocked');
    if(actions)actions.style.display='flex';
  }else{
    // Re-lock without saving
    ta.value=_webEdit.originalHtml;
    ta.setAttribute('readonly','');
    btn.textContent='🔒 פתח לעריכה';
    btn.classList.remove('unlocked');
    if(actions)actions.style.display='none';
  }
}

// Cancel edit mode (revert textarea to stored original)
function webCancelOrigEdit(){
  const ta=document.getElementById('web-edit-textarea-orig');
  if(ta){
    ta.value=_webEdit.originalHtml;
    ta.setAttribute('readonly','');
  }
  const btn=document.getElementById('web-orig-unlock-btn');
  if(btn){btn.textContent='🔒 פתח לעריכה';btn.classList.remove('unlocked');}
  const actions=document.getElementById('web-orig-actions');
  if(actions)actions.style.display='none';
  webToast('ביטול שינויים');
}

// Save the edited "original" code as the new original baseline
function webSaveOrigAsCurrent(){
  const ta=document.getElementById('web-edit-textarea-orig');
  if(!ta)return;
  const newOriginal=ta.value;
  if(!newOriginal){webToast('⚠️ הקוד ריק',true);return;}
  if(!confirm('לעדכן את הקוד המקורי?\n\n• זה הופך לנקודת ההתחלה החדשה\n• הקוד הנוכחי (שהודיה עורכת) לא משתנה\n• לחיצה על "החזר את האתר למקור" תחזיר לקוד הזה'))return;
  _webEdit.originalHtml=newOriginal;
  _webEdit.originalLoadedAt=Date.now();
  ta.setAttribute('readonly','');
  const btn=document.getElementById('web-orig-unlock-btn');
  if(btn){btn.textContent='🔒 פתח לעריכה';btn.classList.remove('unlocked');}
  const actions=document.getElementById('web-orig-actions');
  if(actions)actions.style.display='none';
  webUpdateOrigInfo();
  webToast('✅ הקוד המקורי עודכן');
}

// Revert the current edited version back to the original
function webConfirmRevertToOrig(){
  if(!_webEdit.originalHtml){webToast('⚠️ אין גרסה מקורית',true);return;}
  if(!confirm('⚠️ אזהרה: פעולה זו תחליף את האתר הנוכחי בגרסה המקורית.\n\n• כל השינויים של הודיה יימחקו\n• האתר יחזור לגרסה שמופיעה בטאב "קוד מקורי"\n• פעולה זו לא נשמרת בגיטהאב עד שתלחצי "שמור ופרסם"\n\nלהמשיך?'))return;
  _webEdit.rawHtml=_webEdit.originalHtml;
  const ta=document.getElementById('web-edit-textarea');
  if(ta)ta.value=_webEdit.rawHtml;
  webLoadIframe();
  webSwitchView('visual');
  webToast('↩️ האתר חזר לגרסה המקורית');
}

<scr`+`ipt data-webedit-tag="1">
(function(){

  // ── TEXT-BEARING element detector (rewritten — more inclusive) ──
  const INLINE_TAGS=new Set(['SPAN','STRONG','EM','B','I','U','S','SMALL','MARK','SUB','SUP','CODE','FONT','BIG','CITE','Q','ABBR','TIME']);
  const BLOCK_TAGS=new Set(['H1','H2','H3','H4','H5','H6','P','LI','TD','TH','LABEL','BUTTON','FIGCAPTION','BLOCKQUOTE','DT','DD','SUMMARY','CAPTION','A']);
  const CONTAINER_TAGS=new Set(['DIV','SECTION','ARTICLE','ASIDE','NAV','HEADER','FOOTER','MAIN']);
  const SKIP_TAGS=new Set(['SCRIPT','STYLE','NOSCRIPT','IFRAME','IMG','VIDEO','AUDIO','SOURCE','TRACK','CANVAS','SVG','INPUT','TEXTAREA','SELECT','OPTION','PICTURE','OBJECT','EMBED','BR','HR','META','LINK']);
  
  function hasDirectText(el){
    for(let i=0;i<el.childNodes.length;i++){
      const n=el.childNodes[i];
      if(n.nodeType===3&&n.textContent.trim().length>0)return true;
    }
    return false;
  }
  
  function hasBlockChildren(el){
    for(let i=0;i<el.children.length;i++){
      const c=el.children[i];
      // If child is a container or block, it's a block child
      if(CONTAINER_TAGS.has(c.tagName))return true;
      if(BLOCK_TAGS.has(c.tagName)&&c.tagName!=='A')return true;
      // Recursive check for nested blocks
      if(hasBlockChildren(c))return true;

    return false;

    return (el.textContent||'').trim().length;

    if(BLOCK_TAGS.has(el.tagName)){
      // Editable if it has text AND no nested block elements
      if(!hasBlockChildren(el))return true;
    }
    
    // Container tags (div, section, etc.)
    if(CONTAINER_TAGS.has(el.tagName)){
      // Editable if no nested blocks (children are all inline/span)
      if(!hasBlockChildren(el))return true;
    }
    
    // Inline tags (span, strong, etc.) — editable if leaf with text
    if(INLINE_TAGS.has(el.tagName)){
      // Only if it's a direct leaf (no element children with text)
      let hasElementChild=false;
      for(let i=0;i<el.children.length;i++){
        if(getTextLen(el.children[i])>0){hasElementChild=true;break;}

      if(!hasElementChild&&hasDirectText(el))return true;

    const topLevel=Array.from(body.children).filter(el=>{
      if(SKIP_TAGS.has(el.tagName))return false;
      if(el.classList&&el.classList.contains('__w-insert'))return false;
      return true;

        body.insertBefore(before,el);
      }
      // After every element

      if(el.nextSibling)body.insertBefore(after,el.nextSibling);

  function createInsertPoint(refEl,position){
    const div=document.createElement('div');
    div.className='__w-insert';

// Load the current rawHtml into the iframe via blob URL
function webLoadIframe(){
  const ifr=document.getElementById('web-edit-iframe');
  const ldr=document.getElementById('web-iframe-loader');
  if(!ifr||!_webEdit.rawHtml)return;
  // Show my loader
  if(ldr){ldr.classList.remove('gone');}
  const injected=webInjectEditor(_webEdit.rawHtml);
  const blob=new Blob([injected],{type:'text/html;charset=utf-8'});
  if(ifr._prevUrl){try{URL.revokeObjectURL(ifr._prevUrl);}catch(e){}}
  const url=URL.createObjectURL(blob);
  ifr._prevUrl=url;
  // Hide loader once iframe load event fires — even if images are still loading, DOM is ready
  ifr.onload=function(){
    setTimeout(()=>{if(ldr)ldr.classList.add('gone');},150);
  };
  // Absolute fallback — hide loader after 4 seconds no matter what
  setTimeout(()=>{if(ldr)ldr.classList.add('gone');},4000);
  ifr.src=url;
}

// Extract edited HTML from iframe via postMessage round-trip
let _webExtractCb=null,_webExtractReqId=0;
if(!window._webMsgHandler){
  window._webMsgHandler=true;
  window.addEventListener('message',function(e){
    if(!e.data||typeof e.data!=='object')return;
    // Iframe signals it's alive — kill the loader right away
    if(e.data.type==='__webedit-ready'||e.data.type==='__webedit-active'){
      const ldr=document.getElementById('web-iframe-loader');
      if(ldr)ldr.classList.add('gone');
    }
    if(e.data.type==='__webedit-result'&&_webExtractCb){
      const cb=_webExtractCb;_webExtractCb=null;
      cb(e.data.html);
    }
  });
}
function webExtractFromIframe(cb){
  const ifr=document.getElementById('web-edit-iframe');
  if(!ifr||!ifr.contentWindow){cb(_webEdit.rawHtml);return;}
  _webExtractCb=cb;
  _webExtractReqId++;
  ifr.contentWindow.postMessage({type:'__webedit-extract',reqId:_webExtractReqId},'*');
  // Safety timeout - if iframe doesn't respond in 2 sec, fall back to rawHtml
  setTimeout(()=>{
    if(_webExtractCb===cb){_webExtractCb=null;cb(_webEdit.rawHtml);}
  },2000);
}

function webCloseEditor(){

function webDownloadEdit(){

  webGetFinalHtml((content)=>{

    const blob=new Blob([content],{type:'text/html;charset=utf-8'});

async function webSaveEdit(){
  if(!_webEdit.loaded){webToast('⚠️ הקובץ עוד לא נטען',true);return;}
  const token=localStorage.getItem('gh_deploy_token');
  if(!token){webToast('⚠️ אין טוקן',true);return;}
  const st=document.getElementById('web-edit-status');
  const btn=document.getElementById('web-edit-save');
  btn.disabled=true;btn.textContent='⏳ אוסף שינויים...';
  st.textContent='📤 אוסף שינויים...';st.className='web-edit-status-bar';
  webGetFinalHtml(async(content)=>{
    if(!content){btn.disabled=false;btn.textContent='💾 שמור ופרסם';st.textContent='❌ לא הצלחתי לאסוף את השינויים';st.className='web-edit-status-bar err';return;}
    btn.textContent='⏳ שומר...';st.textContent='⬆️ מעלה לגיטהאב...';
    try{
      const encoded=btoa(unescape(encodeURIComponent(content)));
      const body={message:'Edit via diary · '+new Date().toLocaleString('he-IL'),content:encoded,sha:_webEdit.sha};
      const r=await fetch(`https://api.github.com/repos/${WEB_OWNER}/${WEB_REPO}/contents/index.html`,
        {method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      if(r.status===401){localStorage.removeItem('gh_deploy_token');throw new Error('הטוקן לא תקף');}
      if(!d.content)throw new Error(d.message||'שגיאה');
      // Update tracked state so the next save doesn't conflict
      if(d.content.sha)_webEdit.sha=d.content.sha;
      _webEdit.rawHtml=content;
      // After successful publish, the new content IS the original (it's in GitHub now)
      _webEdit.originalHtml=content;
      _webEdit.originalLoadedAt=Date.now();
      const ta=document.getElementById('web-edit-textarea');
      if(ta)ta.value=content;
      const taOrig=document.getElementById('web-edit-textarea-orig');
      if(taOrig)taOrig.value=content;
      // Refresh the original tab info panel if visible
      webUpdateOrigInfo();
      btn.textContent='✅ נשמר!';
      btn.style.background='linear-gradient(135deg,#10b981,#059669)';
      st.innerHTML=`✅ נשמר בהצלחה! <a href="${WEB_LIVE_URL}?v=${Date.now()}" target="_blank">פתח אתר חי ←</a>`;
      st.className='web-edit-status-bar ok';
      webMarkPublished();
      webToast('✅ האתר עודכן בהצלחה!');
      setTimeout(()=>{
        btn.disabled=false;
        btn.textContent='💾 שמור ופרסם';
        btn.style.background='';
      },3000);
    }catch(e){
      btn.disabled=false;
      btn.textContent='💾 שמור ופרסם';
      st.textContent='❌ '+e.message;
      st.className='web-edit-status-bar err';
      webToast('❌ '+e.message,true);
    }
  });
}

// Handle messages from iframe about selection changes
if(!window._wtSelHandler){
  window._wtSelHandler=true;
  window.addEventListener('message',function(e){
    if(!e.data)return;
    if(e.data.type==='__wt-selection'){
      _wtSelection={mode:e.data.mode,text:e.data.text,kind:e.data.kind,info:e.data.info};
      wtUpdateContextual();
    }else if(e.data.type==='__wt-open-insert'){
      // User clicked a "+ insert point" in the iframe
      wtOpenPop('insert-menu');
    }
  });
}

// ── Popups ──
function wtOpenPop(kind){
  const ov=document.getElementById('wt-pop-overlay');
  const title=document.getElementById('wt-pop-title');
  const body=document.getElementById('wt-pop-body');
  if(!ov||!title||!body)return;
  
  const cfg=wtPopConfigs[kind];
  if(!cfg){console.warn('Unknown popup:',kind);return;}
  title.textContent=cfg.title;
  body.innerHTML=cfg.html();
  ov.classList.add('on');
  if(cfg.onOpen)setTimeout(cfg.onOpen,50);
}

function wtClosePop(){
  const ov=document.getElementById('wt-pop-overlay');
  if(ov)ov.classList.remove('on');
}

// ── Toolbar actions ──
function wtApplyColor(color,kind){
  if(kind==='fore')wtSend('color',{value:color});
  else wtSend('bgcolor',{value:color});
}

function wtInsertLink(){
  const url=(document.getElementById('wt-link-url')||{}).value||'';
  const text=(document.getElementById('wt-link-text')||{}).value||'';
  const blank=(document.getElementById('wt-link-blank')||{}).checked;
  if(!url||url==='https://'){webToast('⚠️ חסרה כתובת',true);return;}
  const target=blank?' target="_blank" rel="noopener"':'';
  const displayText=text||url;
  wtInsertSmart(`<a href="${url}"${target} class="w-inserted" style="color:#0d9488;text-decoration:underline">${displayText}</a>`);
  wtClosePop();
  webToast('✅ קישור נוסף');
}

function wtImageFile(e){
  const f=e.target.files&&e.target.files[0];
  if(!f)return;
  if(f.size>5*1024*1024){webToast('⚠️ התמונה גדולה מדי (מקס 5MB)',true);return;}
  const prog=document.getElementById('wt-image-progress');
  const bar=document.getElementById('wt-image-progress-bar');
  if(prog){prog.style.display='block';bar.style.width='30%';}
  const reader=new FileReader();
  reader.onload=(ev)=>{
    if(bar)bar.style.width='100%';
    const dataUrl=ev.target.result;
    const alt=(document.getElementById('wt-image-alt')||{}).value||'';
    wtInsertSmart(`<img src="${dataUrl}" alt="${alt}" class="w-inserted" style="max-width:100%;height:auto;border-radius:12px;margin:10px 0;display:block">`);
    wtClosePop();
    webToast('✅ תמונה נוספה');
  };
  reader.onerror=()=>webToast('❌ שגיאה בקריאת הקובץ',true);
  reader.readAsDataURL(f);
}

function wtImageDrop(e){
  e.preventDefault();
  const drop=document.getElementById('wt-image-drop');
  if(drop)drop.classList.remove('drag-over');
  const f=e.dataTransfer.files&&e.dataTransfer.files[0];
  if(!f||!f.type.startsWith('image/')){webToast('⚠️ צריך קובץ תמונה',true);return;}
  const inp=document.getElementById('wt-image-file');
  if(inp){const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;wtImageFile({target:inp});}
}

function wtInsertImage(){
  const url=(document.getElementById('wt-image-url')||{}).value||'';
  const alt=(document.getElementById('wt-image-alt')||{}).value||'';
  if(!url){
    const file=(document.getElementById('wt-image-file')||{}).files;
    if(file&&file[0]){wtImageFile({target:{files:file}});return;}
    webToast('⚠️ חסר קובץ או קישור',true);return;
  }
  wtInsertSmart(`<img src="${url}" alt="${alt}" class="w-inserted" style="max-width:100%;height:auto;border-radius:12px;margin:10px 0;display:block">`);
  wtClosePop();
  webToast('✅ תמונה נוספה');
}

function wtVideoFile(e){
  const f=e.target.files&&e.target.files[0];
  if(!f)return;
  if(f.size>15*1024*1024){webToast('⚠️ הסרטון גדול מדי (מקס 15MB)',true);return;}
  const prog=document.getElementById('wt-video-progress');
  const bar=document.getElementById('wt-video-progress-bar');
  if(prog){prog.style.display='block';bar.style.width='30%';}
  const reader=new FileReader();
  reader.onload=(ev)=>{
    if(bar)bar.style.width='100%';
    const dataUrl=ev.target.result;
    wtInsertSmart(`<video src="${dataUrl}" controls class="w-inserted" style="max-width:100%;height:auto;border-radius:12px;margin:10px 0;display:block"></video>`);
    wtClosePop();
    webToast('✅ סרטון נוסף');
  };
  reader.onerror=()=>webToast('❌ שגיאה בקריאת הקובץ',true);
  reader.readAsDataURL(f);
}

function wtInsertVideoUrl(){
  const url=(document.getElementById('wt-video-url')||{}).value||'';
  if(!url){webToast('⚠️ חסר קישור',true);return;}
  // Parse YouTube
  let embedUrl='';
  const ytMatch=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\/\s]+)/);
  const vimeoMatch=url.match(/vimeo\.com\/(\d+)/);
  if(ytMatch){
    embedUrl=`https://www.youtube.com/embed/${ytMatch[1]}`;
  }else if(vimeoMatch){
    embedUrl=`https://player.vimeo.com/video/${vimeoMatch[1]}`;
  }else if(url.match(/\.(mp4|webm|ogg|mov)$/i)){
    wtInsertSmart(`<video src="${url}" controls class="w-inserted" style="max-width:100%;height:auto;border-radius:12px;margin:10px 0;display:block"></video>`);
    wtClosePop();
    webToast('✅ סרטון נוסף');
    return;
  }else{
    webToast('⚠️ רק YouTube, Vimeo או MP4',true);return;
  }
  wtInsertSmart(`<div class="w-inserted" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:10px 0"><iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:12px" allowfullscreen></iframe></div>`);
  wtClosePop();
  webToast('✅ סרטון נוסף');
}

function wtInsertQuick(kind){
  const templates={
    text:`<p class="w-inserted" style="padding:14px 18px;font-size:16px;line-height:1.6;color:#374151">טקסט חדש — לחצי כאן כדי לערוך</p>`,
    heading:`<h2 class="w-inserted" style="padding:12px 18px;font-size:28px;font-weight:900;color:#1e1b4b;text-align:center">כותרת חדשה</h2>`,
    divider:`<hr class="w-inserted" style="border:0;border-top:1.5px solid #e5e7eb;margin:24px 18px">`,
    spacer:`<div class="w-inserted" style="height:40px"></div>`,
    card:`<div class="w-inserted" style="padding:20px;margin:14px;background:linear-gradient(135deg,#faf5ff,#f0fdfa);border-radius:16px;box-shadow:0 4px 14px rgba(13,148,136,.1);text-align:center"><div style="font-size:28px;margin-bottom:8px">✨</div><div style="font-size:18px;font-weight:900;color:#115e59;margin-bottom:6px">כותרת הכרטיס</div><div style="font-size:14px;color:#6b7280;line-height:1.6">תיאור קצר של מה שהכרטיס מציג למטופלות</div></div>`
  };
  if(templates[kind]){
    wtSend('insertAtPoint',{html:templates[kind]});
    wtClosePop();
    webToast('✅ נוסף!');
    return;
  }
  // For image/video/button — open their existing popups
  wtClosePop();
  setTimeout(()=>{
    // Mark a flag so the image/video/button popup inserts at the point, not at cursor
    _wtUseInsertPoint=true;
    wtOpenPop(kind==='image'?'media':kind);
  },250);
}

function wtReplaceImageFile(e){
  const f=e.target.files&&e.target.files[0];

    wtSend('updateSelectedAttr',{attr:'src',value:ev.target.result});

    webToast('✅ תמונה הוחלפה');

}

function wtSetSize(width){
  if(!_wtSelection.info)return;
  // We use updateSelectedAttr with a new complete style, which overrides
  // Better: send a custom command that preserves existing style but changes width
  const existing=_wtSelection.info.styleFull||'';
  // Just set the width via style attribute — iframe will merge
  wtSend('updateSelectedAttr',{attr:'style',value:`max-width:${width};width:${width};height:auto;border-radius:12px;margin:10px auto;display:block`});
  wtClosePop();
  webToast('✅ גודל עודכן');
}
