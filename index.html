// Analyze HTML content and return performance report
function analyzeWebPerf(html){
  if(!html){
    return {score:0,issues:[],stats:{},hasData:false};
  }
  const stats={
    totalSize:html.length,
    totalKB:(html.length/1024).toFixed(1),
    imgCount:0,
    base64Images:0,
    base64Size:0,
    videoCount:0,
    base64Videos:0,
    externalScripts:0,
    externalStyles:0,
    googleFonts:0,
    inlineStyles:0,
    inlineScriptsSize:0,
    commentsSize:0,
    hasLazyLoad:false,
    hasViewportMeta:false,
    hasPreconnect:false,
    hasCacheHeaders:false
  };
  const issues=[];
  
  // Parse structure
  const doc=new DOMParser().parseFromString(html,'text/html');
  
  // Images
  const imgs=doc.querySelectorAll('img');
  stats.imgCount=imgs.length;
  imgs.forEach(img=>{
    const src=img.getAttribute('src')||'';
    if(src.startsWith('data:image')){
      stats.base64Images++;
      stats.base64Size+=src.length;
    }
    if(img.hasAttribute('loading')&&img.getAttribute('loading')==='lazy'){
      stats.hasLazyLoad=true;
    }
  });
  
  // Videos
  const vids=doc.querySelectorAll('video');
  stats.videoCount=vids.length;
  vids.forEach(v=>{
    const src=v.getAttribute('src')||'';
    if(src.startsWith('data:video')){
      stats.base64Videos++;
      stats.base64Size+=src.length;
    }
  });
  
  // Scripts
  const scripts=doc.querySelectorAll('script');
  scripts.forEach(s=>{
    const src=s.getAttribute('src');
    if(src){
      stats.externalScripts++;
    }else{
      stats.inlineScriptsSize+=(s.textContent||'').length;
    }
  });
  
  // Styles
  const links=doc.querySelectorAll('link[rel="stylesheet"]');
  stats.externalStyles=links.length;
  links.forEach(l=>{
    const href=l.getAttribute('href')||'';
    if(href.includes('fonts.googleapis.com')||href.includes('fonts.gstatic.com')){
      stats.googleFonts++;
    }
  });
  
  const styles=doc.querySelectorAll('style');
  styles.forEach(s=>stats.inlineStyles+=(s.textContent||'').length);
  
  // Meta
  stats.hasViewportMeta=!!doc.querySelector('meta[name="viewport"]');
  stats.hasPreconnect=!!doc.querySelector('link[rel="preconnect"]');
  
  // Comments rough estimate
  const commentMatches=html.match(/<!--[\s\S]*?-->/g)||[];
  stats.commentsSize=commentMatches.reduce((s,c)=>s+c.length,0);
  
  // ── Build issues list ──
  if(stats.base64Images>0){
    issues.push({
      severity:stats.base64Images>2?'high':'medium',
      icon:'🖼',
      title:`${stats.base64Images} תמונות מוטמעות בקוד (Base64)`,
      detail:`גודל כולל של תמונות מוטמעות: ${(stats.base64Size/1024).toFixed(0)}KB. כל ביקור באתר מוריד את זה מחדש, גם אם זה אותה תמונה בדף אחר.`,
      fix:'העלי תמונות כ-<b>קבצים נפרדים</b> (למשל ל-imgbb.com או ל-GitHub) וקשרי אותן דרך URL. האתר יהיה מהיר פי 3-5.',
      autoFix:false
    });
  }
  if(stats.base64Videos>0){
    issues.push({
      severity:'high',
      icon:'🎬',
      title:`${stats.base64Videos} סרטונים מוטמעים בקוד`,
      detail:`סרטונים מוטמעים מאטים את האתר משמעותית. גודל: ${(stats.base64Size/1024/1024).toFixed(1)}MB.`,
      fix:'העלי את הסרטון ל-<b>YouTube</b> (Unlisted — לא לחיפוש) והחליפי לקוד הטמעה של iframe. האתר יקל פי 10.',
      autoFix:false
    });
  }
  if(stats.imgCount>0&&!stats.hasLazyLoad){
    issues.push({
      severity:'medium',
      icon:'⚡',
      title:`${stats.imgCount} תמונות ללא טעינה עצלה (lazy loading)`,
      detail:`התמונות נטענות כולן בבת אחת גם אם לא רואים אותן. מטופלת שפותחת את האתר מחכה עד שהכל יירד.`,
      fix:'הוספת <code>loading="lazy"</code> לכל התמונות — תמונה תיטען רק כשהיא מגיעה למסך. <b>ניתן לתיקון אוטומטי</b> ⚡',
      autoFix:'addLazyLoading'
    });
  }
  if(stats.googleFonts>0){
    issues.push({
      severity:'low',
      icon:'🔤',
      title:`${stats.googleFonts} גופנים חיצוניים מ-Google Fonts`,
      detail:`גופנים חיצוניים יפים אבל מוסיפים 200-400ms לטעינה. הדפדפן חייב להמתין עד שהם יורדים.`,
      fix:'הוסף <code>&lt;link rel="preconnect" href="https://fonts.gstatic.com"&gt;</code> לתוך <code>&lt;head&gt;</code>. מקצר זמן טעינה. <b>ניתן לתיקון אוטומטי</b> ⚡',
      autoFix:'addFontPreconnect'
    });
  }
  if(stats.commentsSize>500){
    issues.push({
      severity:'low',
      icon:'💬',
      title:`הערות בקוד — ${(stats.commentsSize/1024).toFixed(1)}KB`,
      detail:`יש הערות HTML בקוד שגולשות לא רואות אבל הדפדפן עדיין מוריד.`,
      fix:'ניתן להסיר אוטומטית <b>בלי לפגוע בפונקציונליות</b>. <b>ניתן לתיקון אוטומטי</b> ⚡',
      autoFix:'removeComments'
    });
  }
  if(stats.inlineStyles>50000){
    issues.push({
      severity:'low',
      icon:'🎨',
      title:`CSS פנימי גדול — ${(stats.inlineStyles/1024).toFixed(0)}KB`,
      detail:`CSS בתוך הקובץ עצמו. אי אפשר לשמור אותו במטמון בנפרד.`,
      fix:'בעתיד: העבירי את ה-CSS לקובץ נפרד. כרגע זה יחסית קטן ולא קריטי.',
      autoFix:false
    });
  }
  if(!stats.hasViewportMeta){
    issues.push({
      severity:'medium',
      icon:'📱',
      title:'אין meta viewport',
      detail:'בלי זה האתר לא מתאים את עצמו לטלפון — נראה כמו מחשב קטן. <b>ניתן לתיקון אוטומטי</b>',
      fix:'הוספת <code>&lt;meta name="viewport" content="width=device-width, initial-scale=1"&gt;</code>. <b>ניתן לתיקון אוטומטי</b> ⚡',
      autoFix:'addViewport'
    });
  }
  if(stats.totalSize>500*1024){
    issues.push({
      severity:'high',
      icon:'📦',
      title:`האתר גדול מאוד — ${stats.totalKB}KB`,
      detail:`אתר מעל 500KB נחשב "כבד". קליינט על 4G יחכה 3-5 שניות עד שיראה משהו.`,
      fix:'הסרת סרטונים/תמונות Base64 תוריד את הגודל דרמטית. שקלי גם פיצול לכמה דפים קטנים.',
      autoFix:false
    });
  }
  
  // ── Calculate score (0-100) ──
  let score=100;
  issues.forEach(i=>{
    if(i.severity==='high')score-=20;
    else if(i.severity==='medium')score-=10;
    else score-=5;
  });
  score=Math.max(0,Math.min(100,score));
  
  return {score,issues,stats,hasData:true};
}

// Auto-fix: add loading="lazy" to all images
function webOptAddLazyLoading(html){
  // Skip first 2 images (above the fold) so they load immediately
  let count=0;
  return html.replace(/<img\b([^>]*)>/gi,(match,attrs)=>{
    count++;
    if(count<=2)return match; // keep hero images eager
    if(/\bloading\s*=/i.test(attrs))return match; // already has loading attr
    return `<img${attrs} loading="lazy" decoding="async">`;
  });
}

// Auto-fix: add preconnect for Google Fonts
function webOptAddFontPreconnect(html){
  if(html.includes('rel="preconnect" href="https://fonts.gstatic.com"'))return html;
  const preconnect='\n    <link rel="preconnect" href="https://fonts.googleapis.com">\n    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>';
  if(html.includes('<head>'))return html.replace('<head>','<head>'+preconnect);
  return html;
}

// Auto-fix: remove HTML comments (but keep IE conditionals)
function webOptRemoveComments(html){
  // Remove <!-- ... --> but preserve conditional comments starting with <!--[if
  return html.replace(/<!--(?!\[if)[\s\S]*?-->/g,'');
}

// Auto-fix: add viewport meta
function webOptAddViewport(html){
  if(html.match(/<meta[^>]*name=["']viewport["']/i))return html;
  const vp='\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">';
  if(html.includes('<head>'))return html.replace('<head>','<head>'+vp);
  return html;
}

// Apply all automatic fixes at once
function webOptimizeAll(html){
  let out=html;
  const applied=[];
  if(!out.match(/<meta[^>]*name=["']viewport["']/i)){
    out=webOptAddViewport(out);applied.push('viewport');
  }
  const hasGF=/fonts\.googleapis\.com|fonts\.gstatic\.com/.test(out);
  if(hasGF&&!out.includes('rel="preconnect" href="https://fonts.gstatic.com"')){
    out=webOptAddFontPreconnect(out);applied.push('preconnect');
  }
  // Count imgs without loading attr
  const imgsWithoutLazy=(out.match(/<img\b(?![^>]*\bloading\s*=)[^>]*>/gi)||[]).length;
  if(imgsWithoutLazy>2){
    out=webOptAddLazyLoading(out);applied.push('lazy loading');
  }
  const commentsSize=(out.match(/<!--(?!\[if)[\s\S]*?-->/g)||[]).reduce((s,c)=>s+c.length,0);
  if(commentsSize>500){
    out=webOptRemoveComments(out);applied.push('comments');
  }
  return {html:out,applied};
}

// Apply a single optimization
function webApplySingleFix(fixName){
  if(!_webEdit||!_webEdit.loaded||!_webEdit.rawHtml){
    webToast('⚠️ פתחי קודם את עורך האתר וטעני אותו',true);
    return;
  }
  const fns={
    addLazyLoading:webOptAddLazyLoading,
    addFontPreconnect:webOptAddFontPreconnect,
    removeComments:webOptRemoveComments,
    addViewport:webOptAddViewport
  };
  const fn=fns[fixName];
  if(!fn){webToast('❌ תיקון לא מזוהה',true);return;}
  const before=_webEdit.rawHtml.length;
  _webEdit.rawHtml=fn(_webEdit.rawHtml);
  const after=_webEdit.rawHtml.length;
  const diff=before-after;
  webToast(`✅ התיקון הוחל${diff>0?` · נחסך ${(diff/1024).toFixed(1)}KB`:''}`);
  // Refresh the analysis panel
  if(typeof hRender==='function')hRender();
}

// Apply all fixes
function webApplyAllFixes(){
  if(!_webEdit||!_webEdit.loaded||!_webEdit.rawHtml){
    webToast('⚠️ פתחי קודם את עורך האתר וטעני אותו',true);
    return;
  }
  const before=_webEdit.rawHtml.length;
  const {html,applied}=webOptimizeAll(_webEdit.rawHtml);
  _webEdit.rawHtml=html;
  const diff=before-html.length;
  if(applied.length===0){
    webToast('✅ הכל כבר מיטוב — אין מה לתקן');
  }else{
    webToast(`✅ ${applied.length} אופטימיזציות הוחלו${diff>0?` · נחסך ${(diff/1024).toFixed(1)}KB`:''}`);
  }
  if(typeof hRender==='function')hRender();
}

// Build the freshest possible link (forces browser to re-download)
function webGetFreshLink(){
  const now=new Date();
  // Format: ddmmyyyy-hhmm for readability in URL
  const pad=(n)=>String(n).padStart(2,'0');
  const stamp=pad(now.getDate())+pad(now.getMonth()+1)+now.getFullYear()+'-'+pad(now.getHours())+pad(now.getMinutes());
  return WEB_LIVE_URL+'?v='+stamp;
}

// Get info about last publish time (stored when we publish)
function webGetLastPublishInfo(){
  try{
    const data=localStorage.getItem('hodaya_last_web_publish');
    if(!data)return '';
    const info=JSON.parse(data);
    if(!info.time)return '';
    const then=new Date(info.time);
    const now=new Date();
    const diffMs=now-then;
    const diffMin=Math.floor(diffMs/60000);
    const diffHour=Math.floor(diffMs/3600000);
    const diffDay=Math.floor(diffMs/86400000);
    let timeAgo;
    if(diffMin<1)timeAgo='לפני רגע';
    else if(diffMin<60)timeAgo=`לפני ${diffMin} דקות`;
    else if(diffHour<24)timeAgo=`לפני ${diffHour} שעות`;
    else if(diffDay<30)timeAgo=`לפני ${diffDay} ימים`;
    else timeAgo=then.toLocaleDateString('he-IL');
    return `<span class="web-share-last-pub-ico">📅</span><span>פורסם לאחרונה: <b>${timeAgo}</b></span>`;
  }catch(e){return '';}
}

// Mark as published (called after successful upload)
function webMarkPublished(){
  try{
    localStorage.setItem('hodaya_last_web_publish',JSON.stringify({time:Date.now()}));
  }catch(e){}
}

// Copy fresh link to clipboard
async function webCopyFreshLink(){
  const link=webGetFreshLink();
  // Update display
  const txt=document.getElementById('web-share-url-txt');
  if(txt)txt.textContent=link;
  
  try{
    await navigator.clipboard.writeText(link);
    webToast('✅ הקישור הטרי הועתק · הדביקי בוואטסאפ/SMS');
  }catch(e){
    // Fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=link;
    ta.style.position='fixed';
    ta.style.left='-9999px';
    document.body.appendChild(ta);
    ta.select();
    try{
      document.execCommand('copy');
      webToast('✅ הועתק!');
    }catch(e2){
      webToast('❌ לא הצלחתי להעתיק',true);
    }
    document.body.removeChild(ta);
  }
}

// Download QR as image
async function webDownloadQR(){
  const img=document.getElementById('web-qr-img');
  if(!img)return;
  try{
    const res=await fetch(img.src);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='beit-laregesh-qr.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    webToast('✅ QR נשמר בגלריה');
  }catch(e){
    webToast('❌ שגיאה בהורדה',true);
  }
}

// Get today's tip deterministically based on day-of-year
function getTodayTip(){
  const now=new Date();
  const start=new Date(now.getFullYear(),0,0);
  const diff=now-start;
  const dayOfYear=Math.floor(diff/(1000*60*60*24));
  const idx=dayOfYear%AI_DAILY_TIPS.length;
  return {...AI_DAILY_TIPS[idx],num:idx+1,date:now};
}

function formatTipDate(d){
  const day=d.getDate().toString().padStart(2,'0');
  const month=(d.getMonth()+1).toString().padStart(2,'0');
  return `${day}/${month}`;
}

// ═══ 📱 PWA System — Clean, works without Service Worker ═══
// ═══════════════════════════════════════════════════════
// Chrome's automatic "Install App" banner requires a Service Worker.
// Since we can't host a separate .js file on GitHub Pages and Blob URL
// registration is blocked on most mobile browsers, we rely on:
//
// 1. Manifest + Apple Touch Icon → installation IS possible via
//    Chrome menu (⋮) → "Add to Home screen"
// 2. Our "Install Pill" button tells the user exactly what to do
// 3. Once installed, the app runs in standalone mode (no browser UI)

// ── Install Prompt System (Android/Chrome) ──
let _deferredPrompt=null;
let _isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  _deferredPrompt=e;
  // Show floating install banner (only if not dismissed in last 7 days)
  if(!_isStandalone && !wasInstallBannerDismissed()){
    setTimeout(()=>showInstallBanner(),2000);
  }
  // Also show FAB button
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='flex';
});

window.addEventListener('appinstalled',()=>{
  const btn=document.getElementById('pwa-install-btn');
  if(btn)btn.style.display='none';
  hideInstallBanner();
  _deferredPrompt=null;
  _isStandalone=true;
  // Toast
  try{
    const t=document.createElement('div');
    t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 20px;border-radius:14px;font-weight:800;z-index:99999;box-shadow:0 10px 30px rgba(0,0,0,.3);font-family:inherit;font-size:14px';
    t.textContent='🎉 האפליקציה הותקנה בהצלחה!';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
  }catch(e){}
});

function wasInstallBannerDismissed(){
  try{
    const d=localStorage.getItem('pwa_banner_dismissed');
    if(!d)return false;
    return (Date.now()-Number(d))<7*24*60*60*1000;
  }catch(e){return false;}
}

function dismissInstallBanner(){
  try{localStorage.setItem('pwa_banner_dismissed',String(Date.now()));}catch(e){}
  hideInstallBanner();
}

function showInstallBanner(){
  if(_isStandalone)return;
  if(document.getElementById('install-banner'))return;
  // Detect iOS (has different install flow)
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const iosHint=isIOS?'<div class="install-ios-hint">📱 בספארי: לחצי על <b>כפתור השיתוף</b> ⬆ ובחרי <b>"הוסף למסך הבית"</b></div>':'';
  
  const el=document.createElement('div');
  el.id='install-banner';
  el.className='install-banner-wrap';
  el.innerHTML=`
    <div class="install-banner">
      <button class="install-banner-close" onclick="dismissInstallBanner()">✕</button>
      <div class="install-banner-top">
        <div class="install-banner-icon">📖</div>
        <div class="install-banner-body">
          <div class="install-banner-title">התקיני כאפליקציה</div>
          <div class="install-banner-sub">פתיחה מהירה מהמסך הבית · ללא דפדפן · גם offline</div>
        </div>
      </div>
      ${iosHint}
      ${!isIOS?'<button class="install-banner-btn" onclick="installPWA()">📲 הוסיפי למסך הבית</button>':''}
    </div>
  `;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('on'));
}

function hideInstallBanner(){
  const el=document.getElementById('install-banner');
  if(el){el.classList.remove('on');setTimeout(()=>el.remove(),300);}
}

function installPWA(){
  // Try native install prompt first (Android Chrome)
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then((choice)=>{
      if(choice.outcome==='accepted'){
        hideInstallBanner();
      }
      _deferredPrompt=null;
    });
    return;
  }
  // Show beautiful instructions overlay
  showInstallInstructions();
}

  if(rt&&typeof rt==='object')S.RT=rt;
  render();
})();
</script>

<!-- כפתור פרסום מהיר -->
<div id="deploy-fab" style="position:fixed;bottom:24px;left:16px;z-index:9999;display:none">
  <button onclick="quickDeploy()" id="deploy-fab-btn" style="background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:50px;padding:12px 20px;color:white;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(249,115,22,0.5);font-family:inherit">🚀 פרסם לאתר</button>
</div>
<script>
let _deployTaps=0,_deployTimer=null;
function diaryTap(){
  _deployTaps++;
  clearTimeout(_deployTimer);
  if(_deployTaps>=5){
    document.getElementById('deploy-fab').style.display='block';
    _deployTaps=0;
  } else {
    _deployTimer=setTimeout(()=>{_deployTaps=0;},2000);
  }
}
async function quickDeploy(){
  let token=localStorage.getItem('gh_deploy_token');
  if(!token){
    token=prompt('הכנס GitHub Token (נשמר פעם אחת):');
    if(!token)return;
    localStorage.setItem('gh_deploy_token',token);
  }
  const btn=document.getElementById('deploy-fab-btn');
  const fab=document.getElementById('deploy-fab');
  fab.style.display='none';
  const html=document.documentElement.outerHTML;
  fab.style.display='block';btn.textContent='⏳ מפרסם...';btn.disabled=true;
  try{
    const encoded=btoa(unescape(encodeURIComponent(html)));
    const owner='pinto1212121212-create';
    const repo='therapy-hodaya';
    const apiUrl=`https://api.github.com/repos/${owner}/${repo}/contents/index.html`;
    const r=await fetch(apiUrl,{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}});
    const data=await r.json();
    const body={message:'Update from app',content:encoded};
    if(data.sha)body.sha=data.sha;
    const r2=await fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r2.json();
    if(d.content){btn.textContent='✅ עלה!';btn.style.background='#059669';setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';btn.disabled=false;btn.style.background='';},3000);}
    else{btn.textContent='❌ שגיאה';btn.disabled=false;setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';},3000);}
  }catch(e){btn.textContent='❌ שגיאה';btn.disabled=false;setTimeout(()=>{btn.textContent='🚀 פרסם לאתר';},3000);}
}
</script>
</body>
