<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0fbfa;min-height:100vh;min-height:100dvh;overscroll-behavior-y:contain;-webkit-user-select:none;user-select:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
input,textarea,[contenteditable],.wt-editable,.editable-text{-webkit-user-select:text;user-select:text}
button,input{font-family:inherit}
::-webkit-scrollbar{display:none}
/* ═══ PWA Install Banner ═══ */
.install-banner-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 12px calc(12px + env(safe-area-inset-bottom,0));z-index:9998;pointer-events:none;transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.install-banner-wrap.on{transform:translateY(0)}
.install-banner{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border-radius:20px;padding:16px 16px 14px;max-width:480px;margin:0 auto;box-shadow:0 20px 50px rgba(13,148,136,.45);pointer-events:auto;position:relative;overflow:hidden;direction:rtl;font-family:inherit}
.install-banner::before{content:'';position:absolute;top:-40px;left:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.install-banner::after{content:'';position:absolute;bottom:-50px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.install-banner-close{position:absolute;top:10px;left:10px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px);transition:background .15s}
.install-banner-close:hover{background:rgba(255,255,255,.32)}
.install-banner-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;position:relative;z-index:1}
.install-banner-icon{width:54px;height:54px;background:rgba(255,255,255,.18);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;backdrop-filter:blur(8px);flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.install-banner-body{flex:1;min-width:0}
.install-banner-title{font-size:16px;font-weight:900;letter-spacing:.2px;line-height:1.2}
.install-banner-sub{font-size:11.5px;opacity:.9;margin-top:3px;font-weight:600;line-height:1.4}
.install-banner-btn{width:100%;padding:12px;background:white;color:#0f766e;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;margin-top:2px;position:relative;z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.15);transition:all .15s;letter-spacing:.2px}
.install-banner-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,0,0,.2)}
.install-banner-btn:active{transform:scale(.98)}
.install-ios-hint{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:10px;padding:10px 12px;font-size:11.5px;line-height:1.55;color:rgba(255,255,255,.95);font-weight:600;position:relative;z-index:1;border:1px solid rgba(255,255,255,.15)}
.install-ios-hint b{color:white;font-weight:900}

/* Standalone PWA mode — make it feel even more like an app */
@media all and (display-mode:standalone){
  body{padding-top:env(safe-area-inset-top,20px)}
  /* hide any "open in browser" hints if shown */
  .install-banner-wrap{display:none!important}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#f0fbfa}

/* ── Desktop & Tablet (768px+) ── */
@media(min-width:768px){
  body{background:linear-gradient(135deg,#f0fdfa 0%,#e0e7ff 50%,#ccfbf1 100%);display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;min-height:100vh}
  #app{max-width:520px;border-radius:28px;box-shadow:0 20px 60px rgba(15,118,110,.18);min-height:calc(100vh - 48px);max-height:calc(100vh - 48px);overflow:hidden;position:sticky;top:24px;background:white}
  .content{overflow-y:auto;max-height:calc(100vh - 200px)}
  /* Bigger home title */
  .home-title h1{font-size:36px}
  .home-title p{font-size:15px}
  /* Slightly bigger cards on desktop */
  .card .card-emoji{font-size:52px}
  .card .card-name{font-size:24px}
  /* Diary card scale up */
  .dc-title{font-size:38px}
  .dc-tag{font-size:14px}
  .dc-feat-ico{font-size:22px}
  .dc-feat-lbl{font-size:11px}
  .dc-ico{font-size:58px}
  .dc-cta{font-size:15px;padding:14px}
  /* Hist sheet - stay centered, not fullscreen */
  .hist-sheet{position:fixed;max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(15,118,110,.25);overflow:hidden}
  /* Personal sheet (Daniel/Rinat) */
  .profile-sheet{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(15,118,110,.25);overflow:hidden}
  /* Chart full screen adaptation */
  .chart-screen{max-width:520px;width:100%;right:50%;transform:translateX(50%);height:calc(100vh - 48px);top:24px;bottom:24px;inset:auto;border-radius:28px;box-shadow:0 20px 60px rgba(15,118,110,.25);overflow:hidden}
  /* Laser beam overlay should cover the app only */
  .laser-beam-overlay{max-width:520px;right:50%;transform:translateX(50%);inset:auto}
  /* Tap targets a bit bigger */
  .tab{padding:14px 0;font-size:14px}
  .hist-tab{padding:12px 16px;font-size:12px}
  /* PWA button hidden on desktop */
  .pwa-btn{display:none!important}
  /* Scrollbar styling for desktop */
  .content::-webkit-scrollbar,.hist-content::-webkit-scrollbar{display:block!important;width:8px}
  .content::-webkit-scrollbar-thumb,.hist-content::-webkit-scrollbar-thumb{background:#5eead4;border-radius:4px}
  .content::-webkit-scrollbar-track,.hist-content::-webkit-scrollbar-track{background:#f0fbfa}
}

/* ── Large Desktop (1200px+) - add side decorations ── */
@media(min-width:1200px){
  body{position:relative}
  body::before{content:'📖';position:fixed;top:50%;right:calc(50% + 340px);transform:translateY(-50%);font-size:120px;opacity:.04;pointer-events:none;animation:float 5s ease-in-out infinite}
  body::after{content:'💆‍♀️';position:fixed;top:50%;left:calc(50% + 340px);transform:translateY(-50%);font-size:120px;opacity:.04;pointer-events:none;animation:float 5s ease-in-out infinite;animation-delay:-2.5s}
}

/* ── HOME ── */
.home{flex:1;display:flex;flex-direction:column;padding:14px 18px 22px;gap:12px;overflow-y:auto}
.home-title{text-align:center;padding:22px 0 8px;animation:fadeUp .5s ease}
.home-title h1{font-size:30px;font-weight:900;color:#115e59;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:10px;line-height:1.1}
.home-title h1 .book-ico{display:inline-block;animation:float 3s ease-in-out infinite}
.home-title p{font-size:13px;color:#2dd4bf;margin-top:6px;font-weight:600;letter-spacing:.8px}
.home-title p .heart{color:#ec4899;margin:0 4px}

/* Top row cards (Daniel + Rinat) */
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0;animation:fadeUp .55s ease}
.card{border-radius:22px;padding:22px 14px 18px;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;transition:transform .15s;box-shadow:0 8px 24px rgba(0,0,0,.08);min-height:165px;color:white}
.card:active{transform:scale(.97)}
.card::before{content:'';position:absolute;top:-40px;right:-40px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.13)}
.card::after{content:'';position:absolute;bottom:-30px;left:-30px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.card .card-emoji{font-size:44px;line-height:1;position:relative;z-index:1;margin-bottom:0;filter:drop-shadow(0 4px 10px rgba(0,0,0,.15))}
.card .card-name{font-size:21px;font-weight:900;color:white;position:relative;z-index:1;letter-spacing:.5px}
.card .card-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);position:relative;z-index:1;letter-spacing:.3px;margin-top:0;opacity:1}
.card-daniel{background:linear-gradient(145deg,#60a5fa 0%,#2563eb 60%,#1d4ed8 100%)}
.card-rinat{background:linear-gradient(145deg,#f472b6 0%,#db2777 60%,#be185d 100%)}

/* Main diary card (full width, bigger) */
.card-diary{flex:1;border-radius:24px;padding:20px;cursor:pointer;border:none;background:linear-gradient(145deg,#14b8a6 0%,#0d9488 50%,#0f766e 100%);color:white;box-shadow:0 12px 32px rgba(13,148,136,.35);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;min-height:420px;transition:transform .15s;animation:fadeUp .6s ease;text-align:right}
.card-diary:active{transform:scale(.98)}
.card-diary::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
.card-diary::after{content:'';position:absolute;bottom:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.06)}
.dc-top{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start}
.dc-badge{background:rgba(255,255,255,.18);backdrop-filter:blur(10px);padding:6px 12px;border-radius:14px;font-size:10.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.dc-ico{font-size:48px;line-height:1;filter:drop-shadow(0 6px 14px rgba(0,0,0,.2));animation:float 3.5s ease-in-out infinite}
.dc-mid{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:14px 0 12px;gap:10px}
.dc-title{font-size:28px;font-weight:900;letter-spacing:.3px;line-height:1;color:white;margin-bottom:2px}
.dc-tag{font-size:12px;opacity:.85;font-weight:600;letter-spacing:.2px;line-height:1.45;color:white}

/* ═══ AI Tip Panel — premium glass morphism ═══ */
.dc-tip{position:relative;background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:18px;padding:14px 14px 12px;cursor:pointer;overflow:hidden;transition:transform .2s ease,box-shadow .3s ease;border:1px solid rgba(255,255,255,.22);box-shadow:0 8px 24px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.15);margin-top:6px}
.dc-tip::before{content:'';position:absolute;inset:0;border-radius:18px;padding:1.5px;background:linear-gradient(135deg,#fbbf24,#f472b6,#60a5fa,#fbbf24);background-size:300% 300%;animation:tipBorder 8s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;pointer-events:none}
@keyframes tipBorder{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.dc-tip:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2)}
.dc-tip:hover::before{opacity:.9}
.dc-tip:active{transform:scale(.985)}

.dc-tip-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative;z-index:1}
.dc-tip-brand{display:flex;align-items:center;gap:8px}
.dc-tip-orb{position:relative;width:22px;height:22px;flex-shrink:0}
.dc-tip-orb::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fde68a,#f59e0b 60%,#b45309);box-shadow:0 0 10px rgba(251,191,36,.7),0 0 20px rgba(251,191,36,.4);animation:orbPulse 2.5s ease-in-out infinite}
.dc-tip-orb::after{content:'';position:absolute;inset:4px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.9),transparent 50%);pointer-events:none}
@keyframes orbPulse{0%,100%{box-shadow:0 0 10px rgba(251,191,36,.7),0 0 20px rgba(251,191,36,.4)}50%{box-shadow:0 0 14px rgba(251,191,36,.9),0 0 28px rgba(251,191,36,.55)}}
.dc-tip-brand-label{font-size:11px;font-weight:900;color:rgba(255,255,255,.95);letter-spacing:.8px;text-transform:uppercase}
.dc-tip-meta{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:.3px;background:rgba(0,0,0,.15);padding:3px 8px;border-radius:8px;backdrop-filter:blur(4px)}

.dc-tip-body{font-size:13.5px;font-weight:600;color:white;line-height:1.55;position:relative;z-index:1;letter-spacing:.1px;margin-bottom:10px;min-height:42px}
.dc-tip-body b{font-weight:900;color:#fde68a}

.dc-tip-ftr{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;padding-top:8px;border-top:1px solid rgba(255,255,255,.12)}
.dc-tip-cta{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:rgba(255,255,255,.8);letter-spacing:.2px}
.dc-tip-cta-ico{font-size:12px}
.dc-tip-arrow{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;color:white;transition:background .2s,transform .2s}
.dc-tip:hover .dc-tip-arrow{background:rgba(255,255,255,.28);transform:translateX(-3px)}

.dc-feats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;position:relative;z-index:1;margin-top:2px}
.dc-feat{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:11px 4px 10px;text-align:center;transition:transform .15s,background .2s,border-color .2s;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:60px}
.dc-feat:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.32)}
.dc-feat:active{transform:scale(.93);background:rgba(255,255,255,.28)}
.dc-feat-ico{font-size:19px;line-height:1}
.dc-feat-lbl{font-size:10.5px;font-weight:700;letter-spacing:.2px;line-height:1.2}
.dc-cta{position:relative;z-index:1;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.28);border-radius:14px;padding:13px;text-align:center;font-size:13.5px;font-weight:800;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;color:white;transition:background .2s,border-color .2s}
.card-diary:hover .dc-cta{background:rgba(255,255,255,.24);border-color:rgba(255,255,255,.4)}
.dc-cta .dc-arrow{display:inline-block;transition:transform .2s}
.card-diary:active .dc-cta .dc-arrow{transform:translateX(-4px)}
.home-ftr{text-align:center;margin-top:10px;padding:6px;font-size:10.5px;color:#2dd4bf;font-weight:600;letter-spacing:.5px;animation:fadeUp .7s ease}
/* ═══ Install Pill — always-visible install button ═══ */

.claude-setup-howto-list a{color:#0284c7;text-decoration:underline}
.claude-setup-howto-list code{background:#1e1b4b;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,Consolas,monospace}
.claude-setup-active{background:linear-gradient(135deg,#f0fdf4,#d1fae5);border:1.5px solid #86efac;border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center}
.claude-setup-active-ico{font-size:28px;flex-shrink:0}
.claude-setup-active-title{font-size:13px;font-weight:900;color:#065f46}
.claude-setup-active-key{font-size:12px;color:#047857;font-weight:600;margin-top:2px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;text-align:right}
.claude-setup-form{display:flex;flex-direction:column;gap:8px}
.claude-setup-label{font-size:12px;font-weight:800;color:#1e1b4b;padding-right:2px}
.claude-setup-input{padding:12px 14px;border-radius:12px;border:1.5px solid #e5e7eb;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace;direction:ltr;outline:none;transition:border-color .15s;background:white}
.claude-setup-input:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.15)}
.claude-setup-hint{font-size:11px;color:#6b7280;font-weight:600;line-height:1.55;margin-top:2px}
.claude-setup-actions{display:flex;gap:8px}
.claude-setup-btn{flex:1;padding:12px;border-radius:12px;border:none;font-size:13.5px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.2px}
.claude-setup-btn.primary{background:linear-gradient(135deg,#0d9488,#134e4a);color:white;box-shadow:0 4px 12px rgba(13,148,136,.3)}
.claude-setup-btn.primary:hover{box-shadow:0 6px 16px rgba(13,148,136,.4);transform:translateY(-1px)}
.claude-setup-btn.danger{background:white;color:#b91c1c;border:1.5px solid #fecaca}
.claude-setup-btn.danger:hover{background:#fef2f2}
.claude-setup-btn:active{transform:scale(.98)}
.claude-setup-test{background:#fafaf9;border-radius:12px;padding:12px;text-align:center;border:1px dashed #d1d5db}
.claude-setup-test-btn{padding:10px 18px;border-radius:10px;border:1.5px solid #5eead4;background:white;color:#0d9488;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.claude-setup-test-btn:hover{background:#faf5ff}
.claude-setup-test-hint{font-size:10.5px;color:#6b7280;margin-top:6px;line-height:1.5;font-weight:600}

/* Claude button in advisor tab header */
.claude-btn-row{display:flex;gap:8px;margin-top:10px;position:relative;z-index:1}
.claude-btn{flex:1;background:rgba(255,255,255,.9);border:1.5px solid rgba(0,0,0,.06);color:#78350f;font-size:11.5px;font-weight:900;padding:8px 10px;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;backdrop-filter:blur(4px)}
.claude-btn:hover{background:white;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.claude-btn.connected{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#86efac;color:#065f46}

/* Claude tip card in advisor */
.claude-tip-card{background:linear-gradient(135deg,#0c0a1e 0%,#1e1b4b 50%,#0c0a1e 100%);border-radius:20px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;border:1.5px solid rgba(251,191,36,.3);box-shadow:0 10px 32px rgba(12,10,30,.5)}
.claude-tip-card::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(251,191,36,.25),transparent 65%);pointer-events:none;animation:advOrbFloat 10s ease-in-out infinite}
.claude-tip-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:relative;z-index:1}
.claude-tip-badge{font-size:9px;font-weight:900;color:#78350f;background:linear-gradient(135deg,#fbbf24,#f59e0b);padding:3px 9px;border-radius:8px;letter-spacing:.5px;box-shadow:0 2px 6px rgba(245,158,11,.4)}
.claude-tip-label{font-size:12px;font-weight:900;color:#fbbf24;letter-spacing:.3px}
.claude-tip-date{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;margin-right:auto}
.claude-tip-body{position:relative;z-index:1;font-size:14.5px;color:white;line-height:1.65;font-weight:600;letter-spacing:.1px;margin-bottom:12px}
.claude-tip-emoji{font-size:22px;margin-left:8px;display:inline-block;vertical-align:middle}
.claude-tip-action{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:10px 12px;position:relative;z-index:1}
.claude-tip-action-label{font-size:10px;font-weight:900;color:#fbbf24;letter-spacing:.8px;margin-bottom:4px}
.claude-tip-action-body{font-size:12.5px;color:#fde68a;font-weight:700;line-height:1.55}
.claude-tip-meta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.claude-tip-type{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);padding:3px 8px;border-radius:6px;letter-spacing:.3px}
.claude-tip-refresh{margin-right:auto;background:none;border:none;color:rgba(255,255,255,.7);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all .15s}
.claude-tip-refresh:hover{background:rgba(255,255,255,.08);color:white}
.claude-tip-refresh:disabled{opacity:.4;cursor:not-allowed}
.adv-hdr{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:18px;padding:16px;margin-bottom:14px}
.adv-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.adv-hdr-icon{font-size:36px;flex-shrink:0}
.adv-hdr-txt{flex:1;min-width:0}
.adv-hdr-title{font-size:18px;font-weight:900;color:#78350f}
.adv-hdr-sub{font-size:12px;color:#92400e;font-weight:600;margin-top:2px}
.adv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.adv-stat{background:rgba(255,255,255,.6);border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(4px)}
.adv-stat-val{font-size:20px;font-weight:900;color:#78350f;line-height:1}
.adv-stat-lbl{font-size:10px;font-weight:700;color:#92400e;margin-top:4px;line-height:1.3}
.adv-insights{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
.adv-card{background:white;border-radius:16px;padding:14px;border:1.5px solid #e5e7eb;box-shadow:0 2px 10px rgba(0,0,0,.04);overflow:hidden;position:relative}
.adv-card.adv-p-high{border-color:#fecaca;background:linear-gradient(135deg,#fef2f2,#fee2e2)}
.adv-card.adv-p-high::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#dc2626,#f87171)}
.adv-card.adv-p-medium{border-color:#fcd34d;background:linear-gradient(135deg,#fffbeb,#fef3c7)}
.adv-card.adv-p-medium::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.adv-card.adv-p-good{border-color:#a7f3d0;background:linear-gradient(135deg,#f0fdf4,#d1fae5)}
.adv-card.adv-p-good::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#059669,#10b981)}
.adv-card.adv-p-low{border-color:#bfdbfe;background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.adv-card.adv-p-low::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
.adv-card-hdr{display:flex;gap:10px;margin-bottom:10px}
.adv-card-ico{font-size:26px;flex-shrink:0}
.adv-card-hdr-txt{flex:1;min-width:0}
.adv-card-priority{font-size:10px;font-weight:800;color:#6b7280;letter-spacing:.5px;margin-bottom:3px}
.adv-card-title{font-size:15px;font-weight:900;color:#1e1b4b;line-height:1.3}
.adv-card-body{font-size:13px;color:#374151;line-height:1.55;margin-bottom:10px}
.adv-card-body b{font-weight:800;color:#1e1b4b}
.adv-card-details{background:rgba(255,255,255,.6);border-radius:10px;padding:10px 12px;font-size:11.5px;color:#4b5563;font-weight:600;line-height:1.75;margin-bottom:10px;white-space:pre-line}
.adv-card-action{background:rgba(255,255,255,.75);border-radius:12px;padding:11px 13px;border-right:3px solid #0d9488}
.adv-card-action-label{font-size:10px;font-weight:900;color:#0d9488;letter-spacing:.8px;margin-bottom:5px}
.adv-card-action-body{font-size:12.5px;color:#1e1b4b;font-weight:600;line-height:1.6}
.adv-card-action-body b{font-weight:900;color:#0d9488}
.adv-empty{background:white;border-radius:18px;padding:40px 24px;text-align:center;border:1.5px dashed #d1fae5}
.adv-empty-ico{font-size:56px;margin-bottom:10px}
.adv-empty-title{font-size:18px;font-weight:900;color:#059669;margin-bottom:6px}
.adv-empty-sub{font-size:13px;color:#6b7280;line-height:1.6}
.adv-footer{background:#f9fafb;border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;border:1px solid #f3f4f6;margin-top:8px}
.adv-footer-ico{font-size:20px;flex-shrink:0}
.adv-footer-txt{font-size:11px;color:#6b7280;line-height:1.55;font-weight:600}
/* Next appt hero */
.next-hero{background:linear-gradient(135deg,#0d9488,#134e4a);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 28px rgba(13,148,136,.35);overflow:hidden}
.next-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.next-hero-name{font-size:20px;font-weight:900;color:white;margin-bottom:4px}
.next-hero-detail{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:12px}
.next-hero-date{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:white;margin-bottom:12px}
.countdown{display:flex;gap:7px;justify-content:center}
.cd-seg{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px;text-align:center;min-width:50px}
.cd-num{font-size:22px;font-weight:900;color:white;line-height:1;font-family:monospace;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.cd-sep{color:rgba(255,255,255,.5);font-size:22px;font-weight:900;align-self:flex-start;margin-top:8px}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.65}}
.countdown.urgent .cd-num{color:#fca5a5;animation:urgentPulse 1s ease-in-out infinite}.countdown.warning .cd-num{color:#fed7aa;animation:urgentPulse 1.5s ease-in-out infinite}.countdown.soon .cd-num{color:#fef08a}
/* Appt cards */
.appt-card-pro{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;border:1px solid transparent}
.appt-time-pill{border-radius:10px;padding:7px 10px;text-align:center;font-size:13px;font-weight:800;flex-shrink:0;min-width:52px;border:1.5px solid}
.appt-card-info{flex:1;text-align:right}
.appt-card-name{font-size:14px;font-weight:800;color:#1e1b4b;margin-bottom:2px}
.appt-card-meta{font-size:12px;color:#6b7280}
.appt-card-date{display:inline-flex;align-items:center;background:#f5f3ff;color:#0d9488;border-radius:8px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:4px}
.hist-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;gap:12px;align-items:center;opacity:.85;border:1px solid #f3f4f6}
.hist-time-pill{background:#f9fafb;color:#6b7280;border-radius:10px;padding:7px 10px;text-align:center;font-size:12px;font-weight:700;flex-shrink:0;min-width:48px;border:1.5px solid #e5e7eb}
.hist-card-info{flex:1;text-align:right}
.hist-card-name{font-size:14px;font-weight:700;color:#374151}
.hist-card-meta{font-size:11px;color:#9ca3af;margin-top:2px}
/* Payments */
.pay-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.pay-stat-val{font-size:20px;font-weight:900;color:#0d9488}
.pay-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}
.pay-stat.full{grid-column:1/-1;background:linear-gradient(135deg,#0d9488,#134e4a)}
.pay-stat.full .pay-stat-val{color:white;font-size:26px}
.pay-stat.full .pay-stat-lbl{color:rgba(255,255,255,.7)}
.pay-filter{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto}
.pay-filter-btn{flex-shrink:0;padding:5px 12px;border-radius:18px;border:1.5px solid #f0fdfa;background:white;color:#6b7280;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.pay-filter-btn.on{background:#0d9488;color:white;border-color:#0d9488}
.pay-row{background:white;border-radius:12px;padding:11px 14px;margin-bottom:7px;box-shadow:0 1px 5px rgba(0,0,0,.04)}
.pay-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pay-row-name{font-size:13px;font-weight:800;color:#1e1b4b}
.pay-row-amount{font-size:15px;font-weight:900;color:#059669}
.pay-row-meta{font-size:11px;color:#6b7280}
.pay-row-date{font-size:10px;color:#2dd4bf;font-weight:600;margin-top:2px}
.export-btn{width:100%;padding:13px;background:linear-gradient(135deg,#059669,#047857);color:white;border:none;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(5,150,105,.3);margin-bottom:14px}
.pay-month-hdr{font-size:10px;font-weight:800;color:#2dd4bf;letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px;display:flex;justify-content:space-between}
/* Goals */
.goals-hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);border-radius:18px;padding:16px;margin-bottom:14px}
.goals-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.goals-hero-rev{font-size:22px;font-weight:900;color:white;margin-bottom:12px}
.goals-prog{background:rgba(255,255,255,.1);border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px}
.goals-prog-fill{height:100%;border-radius:20px;transition:width .8s}
.goals-prog-fill.gn{background:linear-gradient(90deg,#059669,#34d399)}
.goals-prog-fill.gy{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goals-prog-fill.gp{background:linear-gradient(90deg,#0d9488,#2dd4bf)}
.goals-hero-stats{display:flex;justify-content:space-between;margin-top:10px}
.ghs{text-align:center}
.ghs-val{font-size:15px;font-weight:900;color:white}
.ghs-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.goal-card{background:white;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.goal-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.goal-card-title{font-size:14px;font-weight:800;color:#1e1b4b}
.goal-card-period{font-size:10px;color:#2dd4bf;font-weight:700;background:#f5f3ff;padding:2px 8px;border-radius:14px}
.goal-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.goal-current{font-size:20px;font-weight:900;color:#0d9488}
.goal-target{font-size:13px;color:#9ca3af}
.goal-bar{background:#f3f4f6;border-radius:20px;height:8px;overflow:hidden;margin-bottom:7px}
.goal-bar-fill{height:100%;border-radius:20px;transition:width .8s}
.goal-bar-fill.hit{background:linear-gradient(90deg,#059669,#34d399)}
.goal-bar-fill.close{background:linear-gradient(90deg,#d97706,#fbbf24)}
.goal-bar-fill.far{background:linear-gradient(90deg,#0d9488,#2dd4bf)}
.goal-footer{display:flex;justify-content:space-between;align-items:center}
.goal-pct.hit{color:#059669;font-size:12px;font-weight:800}
.goal-pct.close{color:#d97706;font-size:12px;font-weight:800}
.goal-pct.far{color:#0d9488;font-size:12px;font-weight:800}
.add-goal-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.goal-inp-card{background:white;border-radius:16px;padding:14px;margin-bottom:12px;border:2px solid #0d9488}
.goal-inp{width:100%;border:1.5px solid #f0fdfa;border-radius:12px;padding:10px 14px;text-align:right;font-size:14px;outline:none;margin-bottom:8px;background:#faf5ff;font-family:inherit}
.goal-inp:focus{border-color:#0d9488}
.goal-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.goal-type-btn{padding:9px;border-radius:12px;border:1.5px solid #f0fdfa;background:#faf5ff;color:#6b7280;font-size:12px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit}
.goal-type-btn.on{border-color:#0d9488;background:#f0fdfa;color:#0d9488}
/* CRM */
.crm-search-wrap{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:white;border:1.5px solid #f0fdfa;border-radius:16px;padding:6px 6px 6px 14px;box-shadow:0 2px 12px rgba(13,148,136,.08);transition:border .2s}
.crm-search-wrap:focus-within{border-color:#0d9488;box-shadow:0 2px 16px rgba(13,148,136,.18)}
.crm-search-icon{font-size:16px;flex-shrink:0;opacity:.5}
.crm-search-inp{flex:1;border:none;padding:8px 0;font-size:15px;outline:none;background:transparent;text-align:right;font-family:inherit;color:#1e1b4b;min-width:0}
.crm-clear-btn{background:none;border:none;color:#9ca3af;font-size:16px;cursor:pointer;padding:4px 6px;border-radius:50%;flex-shrink:0;font-family:inherit}.crm-clear-btn:hover{background:#f3f4f6;color:#6b7280}
.crm-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.crm-add-btn{background:#0d9488;color:white;border:none;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0;font-family:inherit}
.crm-stat{background:white;border-radius:12px;padding:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.crm-stat-val{font-size:18px;font-weight:900;color:#0d9488}
.crm-stat-lbl{font-size:10px;color:#9ca3af;margin-top:2px}
.client-card{background:white;border-radius:16px;padding:13px 14px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;gap:12px;align-items:center;cursor:pointer;transition:.15s}
.client-card:active{transform:scale(.99)}
.client-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#2dd4bf);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;flex-shrink:0}
.client-info{flex:1;text-align:right}
.client-name{font-size:15px;font-weight:800;color:#1e1b4b}
.client-phone{font-size:12px;color:#6b7280;margin-top:2px}
.client-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;justify-content:flex-end}
.client-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#f5f3ff;color:#0d9488}
.client-tag.red{background:#fef2f2;color:#dc2626}
.client-total{text-align:center;flex-shrink:0}
.client-total-val{font-size:14px;font-weight:900;color:#059669}
.client-total-lbl{font-size:9px;color:#9ca3af;margin-top:1px}
.profile-sheet{position:fixed;inset:0;z-index:400;background:white;display:flex;flex-direction:column;animation:slideUp .28s ease}
.profile-hdr{background:linear-gradient(135deg,#0d9488,#134e4a);padding:18px 16px;flex-shrink:0}
.profile-hdr-row{display:flex;align-items:center;gap:12px}
.profile-avatar-lg{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.profile-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:50%;width:34px;height:34px;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-name{font-size:19px;font-weight:900;color:white}
.profile-phone{font-size:13px;color:rgba(255,255,255,.75);margin-top:1px}
.profile-stats-row{display:flex;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
.psr{text-align:center;flex:1}
.psr-val{font-size:17px;font-weight:900;color:white}
.psr-lbl{font-size:9px;color:rgba(255,255,255,.6);margin-top:1px}
.profile-body{flex:1;overflow-y:auto;padding:16px}
.profile-sec-title{font-size:10px;font-weight:800;color:#2dd4bf;letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px}
.profile-field{background:#faf5ff;border-radius:12px;padding:11px 14px;margin-bottom:7px;border:1px solid #f0fdfa;text-align:right}
.profile-field-lbl{font-size:10px;color:#2dd4bf;font-weight:700;margin-bottom:2px}
.profile-field-val{font-size:14px;color:#1e1b4b;font-weight:600}
.profile-inp{width:100%;border:1.5px solid #f0fdfa;border-radius:12px;padding:10px 14px;font-size:14px;outline:none;background:white;text-align:right;font-family:inherit;margin-bottom:8px}
.profile-inp:focus{border-color:#0d9488}
.profile-textarea{width:100%;border:1.5px solid #f0fdfa;border-radius:12px;padding:10px 14px;font-size:14px;outline:none;background:white;text-align:right;resize:none;min-height:80px;font-family:inherit}
.profile-save-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px}
.visit-row{display:flex;gap:10px;align-items:center;padding:9px 11px;background:#f9fafb;border-radius:11px;margin-bottom:6px}
.visit-time{background:#0d9488;color:white;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;flex-shrink:0}
.visit-info{flex:1;text-align:right}
.visit-type{font-size:13px;font-weight:700;color:#374151}
.visit-meta{font-size:11px;color:#9ca3af}
.sens-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.sens-tag{padding:5px 11px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;font-family:inherit}
.sens-tag.on{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.sens-tag.off{background:#f9fafb;color:#9ca3af;border-color:#e5e7eb}
.section-lbl{font-size:10px;font-weight:800;color:#2dd4bf;letter-spacing:1.2px;text-transform:uppercase;margin:12px 0 8px}
.empty-state{text-align:center;padding:44px 20px;color:#9ca3af}
.empty-icon{font-size:48px;display:block;margin-bottom:12px}

.pwa-btn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0d9488,#134e4a);color:white;border:none;border-radius:20px;padding:12px 24px;font-size:14px;font-weight:800;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(13,148,136,.5);gap:8px;align-items:center;font-family:inherit;white-space:nowrap}

/* ── Cancellations ── */
.canc-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.canc-stat{background:white;border-radius:14px;padding:12px;text-align:right;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.canc-stat-val{font-size:20px;font-weight:900}
.canc-stat-lbl{font-size:10px;color:#9ca3af;margin-top:3px;font-weight:600}
.canc-stat.full{grid-column:1/-1;background:linear-gradient(135deg,#dc2626,#b91c1c)}
.canc-stat.full .canc-stat-val{color:white;font-size:22px}
.canc-stat.full .canc-stat-lbl{color:rgba(255,255,255,.75)}
.canc-card{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-right:4px solid #fca5a5}
.canc-card.noshow{border-right-color:#f97316}
.canc-card.me{border-right-color:#2dd4bf}
.canc-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.canc-card-name{font-size:14px;font-weight:800;color:#1e1b4b}
.canc-card-reason{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.canc-card-reason.client{background:#fef2f2;color:#dc2626}
.canc-card-reason.noshow{background:#fff7ed;color:#c2410c}
.canc-card-reason.me{background:#f5f3ff;color:#0d9488}
.canc-card-reason.other{background:#f9fafb;color:#6b7280}
.canc-card-meta{font-size:12px;color:#6b7280}
.canc-card-date{font-size:10px;color:#9ca3af;margin-top:3px}
/* Cancellation modal */
.canc-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end}
.canc-sheet{background:white;width:100%;border-radius:22px 22px 0 0;padding:20px 18px 32px;animation:slideUp .25s ease}
.canc-title{font-size:17px;font-weight:900;color:#dc2626;text-align:center;margin-bottom:6px}
.canc-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:18px}
.canc-reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.canc-reason-btn{padding:14px 10px;border-radius:16px;border:2px solid #fee2e2;background:#fef2f2;cursor:pointer;font-size:13px;font-weight:700;color:#dc2626;text-align:center;font-family:inherit;transition:.15s}
.canc-reason-btn:active{transform:scale(.97)}
.canc-reason-btn.purple{border-color:#f0fdfa;background:#f5f3ff;color:#0d9488}
.canc-reason-btn.orange{border-color:#fed7aa;background:#fff7ed;color:#c2410c}
.canc-reason-btn.gray{border-color:#e5e7eb;background:#f9fafb;color:#6b7280}

/* ── Month/Year Picker ── */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:flex-end}
.picker-sheet{background:white;width:100%;border-radius:22px 22px 0 0;padding:0 0 28px;animation:slideUp .25s ease;max-height:70vh;overflow-y:auto}
.picker-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:white;z-index:1}
.picker-title{font-size:17px;font-weight:900;color:#115e59}
.picker-close{background:none;border:none;cursor:pointer;font-size:20px;color:#9ca3af;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.months-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px}
.mo-pick-btn{padding:14px 0;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid transparent;font-family:inherit;transition:.15s}
.mo-pick-btn.has{background:#f0fdfa;color:#0f766e;border-color:#5eead4}
.mo-pick-btn.sel{background:#0d9488;color:white;border-color:#0d9488}
.mo-pick-btn.today{border-color:#2dd4bf}
.mo-pick-btn.empty{background:#f9fafb;color:#9ca3af}
.years-picker-list{padding:8px 16px}
.yr-pick-btn{width:100%;padding:14px 18px;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;border:none;background:transparent;font-family:inherit;text-align:right;display:flex;align-items:center;justify-content:space-between;transition:.1s}
.yr-pick-btn:active{background:#f5f3ff}
.yr-pick-btn.sel{color:#0d9488;background:#f5f3ff}
.yr-pick-btn .yr-count{font-size:11px;color:#2dd4bf;font-weight:600}

/* ── Debts Tab ── */
.debt-hero{background:linear-gradient(135deg,#b91c1c,#991b1b);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 24px rgba(185,28,28,.35)}
.debt-hero-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.debt-hero-amount{font-size:28px;font-weight:900;color:white;margin-bottom:4px}
.debt-hero-sub{font-size:13px;color:rgba(255,255,255,.7)}
.debt-hero-stats{display:flex;gap:0;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
.dhs{text-align:center;flex:1}
.dhs-val{font-size:16px;font-weight:900;color:white}
.dhs-lbl{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.debt-client-card{background:white;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid #fee2e2}
.debt-client-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fef2f2}
.debt-client-name{font-size:15px;font-weight:800;color:#1e1b4b}
.debt-client-amount{font-size:17px;font-weight:900;color:#dc2626}
.debt-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid #fee2e2}
.debt-item-info{text-align:right}
.debt-item-name{font-size:13px;font-weight:700;color:#374151}
.debt-item-date{font-size:11px;color:#9ca3af;margin-top:2px}
.debt-pay-btn{background:#059669;color:white;border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.debt-pay-btn:active{background:#047857}

.pay-row-actions{display:flex;gap:6px;margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px}
.pay-edit-btn{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pay-edit-btn.edit{background:#f5f3ff;color:#0d9488}
.pay-edit-btn.del{background:#fef2f2;color:#dc2626}
.pay-edit-btn.save{background:#0d9488;color:white}
.pay-edit-btn.cancel{background:#f3f4f6;color:#374151}
.pay-inp-sm{width:100%;border:1.5px solid #f0fdfa;border-radius:10px;padding:8px 12px;text-align:right;font-size:13px;outline:none;background:#faf5ff;font-family:inherit;margin-top:6px}
.pay-inp-sm:focus{border-color:#0d9488}

/* ── Expenses Tab ── */
.exp-hero{background:linear-gradient(135deg,#ea580c 0%,#c2410c 100%);border-radius:18px;padding:18px;margin-bottom:14px;color:white;box-shadow:0 8px 24px rgba(234,88,12,.28);position:relative;overflow:hidden}
.exp-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.exp-hero-lbl{font-size:11px;font-weight:700;opacity:.85;letter-spacing:.5px;margin-bottom:4px;position:relative;z-index:1}
.exp-hero-val{font-size:30px;font-weight:900;line-height:1;margin-bottom:10px;position:relative;z-index:1;font-variant-numeric:tabular-nums}
.exp-hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;position:relative;z-index:1;padding-top:10px;border-top:1px solid rgba(255,255,255,.18);margin-top:10px}
.exp-hero-stat{text-align:center}
.exp-hero-stat-v{font-size:14px;font-weight:800;line-height:1.1}
.exp-hero-stat-l{font-size:9.5px;opacity:.75;margin-top:2px;font-weight:600}
.exp-delta{display:inline-block;padding:4px 11px;border-radius:14px;font-size:11px;font-weight:800;position:relative;z-index:1;backdrop-filter:blur(4px);margin-bottom:2px}
.exp-delta.good{background:rgba(34,197,94,.3);color:#dcfce7}
.exp-delta.bad{background:rgba(0,0,0,.3);color:#fecaca}
.exp-delta.neutral{background:rgba(255,255,255,.18);color:rgba(255,255,255,.95)}
.profit-card{background:white;border-radius:14px;padding:13px 14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.profit-cell{text-align:center;padding:4px 2px}
.profit-cell+.profit-cell{border-right:1px solid #f3f4f6}
.profit-cell-lbl{font-size:10px;color:#9ca3af;font-weight:700;margin-bottom:3px}
.profit-cell-val{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums}
.profit-cell-val.in{color:#059669}
.profit-cell-val.out{color:#ea580c}
.profit-cell-val.net{color:#0d9488}
.profit-cell-val.net.neg{color:#dc2626}
.profit-delta{font-size:9.5px;font-weight:700;margin-top:2px;white-space:nowrap;color:#6b7280}
.profit-delta.good{color:#059669}
.profit-delta.bad{color:#dc2626}
.exp-forecast{background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 100%);border:1.5px solid #c7d2fe;border-radius:14px;padding:13px 14px;margin-bottom:12px}
.exp-forecast-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px}
.exp-forecast-title{font-size:12.5px;font-weight:800;color:#4338ca}
.exp-forecast-btn{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;padding:7px 12px;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.exp-forecast-sub{font-size:11px;color:#115e59;margin-bottom:8px;font-weight:600;text-align:right}
.exp-forecast-list{display:flex;flex-direction:column;gap:3px}
.exp-forecast-item{font-size:11px;color:#4338ca;padding:3px 0;text-align:right}
.exp-cat-bar{background:white;border-radius:14px;padding:13px 14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.exp-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11.5px}
.exp-cat-row:last-child{margin-bottom:0}
.exp-cat-ico{width:22px;text-align:center;font-size:14px}
.exp-cat-name{width:68px;font-weight:700;color:#374151;font-size:11px}
.exp-cat-track{flex:1;height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.exp-cat-fill{height:100%;border-radius:4px}
.exp-cat-amt{font-size:11px;font-weight:800;color:#ea580c;min-width:78px;text-align:left;font-variant-numeric:tabular-nums}
.exp-add-btn{width:100%;padding:13px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;border:none;border-radius:14px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:12px;box-shadow:0 4px 14px rgba(249,115,22,.3);display:flex;align-items:center;justify-content:center;gap:6px}
.exp-form{background:white;border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(234,88,12,.1);border:2px solid #fed7aa}
.exp-form-ttl{font-size:14px;font-weight:800;color:#7c2d12;margin-bottom:12px;text-align:right;display:flex;align-items:center;justify-content:space-between}
.exp-inp{width:100%;border:1.5px solid #ffedd5;border-radius:10px;padding:9px 12px;text-align:right;font-size:13px;outline:none;background:#fff7ed;font-family:inherit;margin-bottom:8px;box-sizing:border-box}
.exp-inp:focus{border-color:#ea580c;background:white}
.exp-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.exp-cat-btn{padding:8px 4px;border:1.5px solid #ffedd5;border-radius:10px;background:white;cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:700;color:#9a3412;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s}
.exp-cat-btn.on{background:linear-gradient(135deg,#f97316,#ea580c);color:white;border-color:#ea580c;box-shadow:0 2px 8px rgba(234,88,12,.3)}
.exp-cat-btn-i{font-size:17px}
.exp-recur{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff7ed;border-radius:10px;margin-bottom:10px;cursor:pointer;font-size:12px;font-weight:700;color:#9a3412;border:1.5px solid #ffedd5}
.exp-recur.on{background:#ffedd5;border-color:#ea580c;color:#7c2d12}
.exp-recur-chk{width:18px;height:18px;border-radius:5px;border:2px solid #ea580c;display:flex;align-items:center;justify-content:center;background:white;flex-shrink:0;font-size:12px;font-weight:800}
.exp-recur.on .exp-recur-chk{background:#ea580c;color:white}
.exp-form-btns{display:flex;gap:8px}
.exp-form-btns button{flex:1;padding:11px;border-radius:12px;border:none;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px}
.exp-btn-cancel{background:#f3f4f6;color:#374151}
.exp-btn-save{background:linear-gradient(135deg,#f97316,#ea580c);color:white;flex:2!important;box-shadow:0 3px 10px rgba(234,88,12,.3)}
.exp-row{background:white;border-radius:13px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 5px rgba(0,0,0,.05);border-right:4px solid #ea580c}
.exp-row.recurring{border-right-color:#0d9488}
.exp-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.exp-row-left{text-align:right;flex:1;min-width:0}
.exp-row-amt{font-size:17px;font-weight:900;color:#ea580c;line-height:1;font-variant-numeric:tabular-nums;flex-shrink:0}
.exp-row-amt.recurring{color:#0d9488}
.exp-row-desc{font-size:13px;font-weight:800;color:#1e1b4b;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis}
.exp-row-meta{font-size:11px;color:#6b7280;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.exp-row-pill{background:#fff7ed;color:#9a3412;padding:2px 7px;border-radius:10px;font-weight:700;font-size:10px}
.exp-row-pill.recur{background:#f0fdfa;color:#0f766e}
.exp-row-date{font-size:10px;color:#2dd4bf;font-weight:600;margin-top:3px}
.exp-row-actions{display:flex;gap:6px;margin-top:8px;border-top:1px solid #f3f4f6;padding-top:8px}
.exp-row-actions button{flex:1;padding:7px 0;border:none;border-radius:9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit}
.exp-row-actions .edit{background:#fff7ed;color:#ea580c}
.exp-row-actions .del{background:#fef2f2;color:#dc2626}
.exp-empty{background:white;border-radius:16px;padding:32px 20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.exp-empty-i{font-size:42px;margin-bottom:10px;display:block}
.exp-empty-t{font-size:14px;font-weight:800;color:#115e59;margin-bottom:4px}
.exp-empty-s{font-size:11.5px;color:#9ca3af;line-height:1.5}
.exp-month-hdr{font-size:10px;font-weight:800;color:#ea580c;letter-spacing:1px;text-transform:uppercase;margin:14px 0 7px;display:flex;justify-content:space-between}

/* ── Promo Panel (אתרי פרסום) ── */
.promo-sheet{position:fixed;inset:0;z-index:350;background:#f8f7fc;display:flex;flex-direction:column;animation:slideUp .28s ease;overflow:hidden}
.promo-hdr{background:linear-gradient(135deg,#0891b2 0%,#0e7490 100%);padding:18px 16px 14px;flex-shrink:0;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(8,145,178,.3);position:relative;overflow:hidden}
.promo-hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.promo-hdr-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;color:white;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.promo-hdr-info{flex:1;position:relative;z-index:1}
.promo-hdr-title{font-size:17px;font-weight:900;color:white;letter-spacing:.3px}
.promo-hdr-sub{font-size:11.5px;color:rgba(255,255,255,.8);margin-top:2px}
.promo-body{flex:1;overflow-y:auto;padding:16px 14px 24px}
.promo-intro{background:linear-gradient(135deg,#e0f2fe 0%,#cffafe 100%);border:1.5px solid #7dd3fc;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#0c4a6e;line-height:1.55;font-weight:600;text-align:right}
.promo-intro-t{font-size:13px;font-weight:800;color:#0e7490;margin-bottom:4px}
.promo-cat{margin-bottom:18px}
.promo-cat-hdr{font-size:11px;font-weight:800;color:#0891b2;letter-spacing:1px;text-transform:uppercase;margin:0 2px 8px;text-align:right;display:flex;align-items:center;gap:6px;justify-content:flex-end}
.promo-cat-badge{background:#cffafe;color:#0e7490;padding:2px 8px;border-radius:10px;font-size:9.5px;font-weight:800;letter-spacing:.3px}

/* ═══ Promo Guide Popup ═══ */
.guide-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s ease}

.guide-hdr-title{font-size:20px;font-weight:900;color:white;margin-bottom:6px;position:relative;z-index:1;line-height:1.2}
.guide-hdr-sub{font-size:13px;color:rgba(255,255,255,.85);font-weight:600;line-height:1.5;position:relative;z-index:1;margin-bottom:10px}

.guide-body{padding:20px 18px}

.guide-item-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#134e4a);color:white;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-top:1px}

.guide-item-body a{color:#0d9488;text-decoration:underline;font-weight:800}

.guide-footer{background:linear-gradient(135deg,#faf5ff,#f0fdfa);border:1.5px solid #ddd6fe;border-radius:14px;padding:13px;display:flex;gap:11px;align-items:flex-start;margin-top:6px}

.guide-footer-txt{font-size:12px;color:#115e59;line-height:1.6;font-weight:600}

.promo-card-price{font-size:10.5px;font-weight:800;margin-top:4px;letter-spacing:.3px;display:inline-block;padding:2px 8px;border-radius:8px}

.promo-card-price.mixed{background:#fef3c7;color:#92400e}
.promo-card-price.paid{background:#fee2e2;color:#991b1b}

/* ── Website Tab — פרסום פשוט כמו הצינור ── */
.web-status{background:linear-gradient(135deg,#1e40af,#1e3a8a);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:0 6px 20px rgba(30,64,175,.25);color:white;position:relative;overflow:hidden}

.web-share-card{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:1.5px solid #a7f3d0;border-radius:18px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(16,185,129,.08)}

.web-share-hint{background:rgba(255,255,255,.7);border-radius:10px;padding:9px 11px;font-size:11px;color:#065f46;line-height:1.55;font-weight:600;display:flex;gap:8px;align-items:flex-start;position:relative;z-index:1;margin-bottom:10px}

.web-share-last-pub-ico{font-size:13px}
.web-share-last-pub b{font-weight:900;color:#065f46}

/* ═══ QR Code Popup ═══ */
.web-qr-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s ease;padding:16px}

.web-qr-hdr{background:linear-gradient(135deg,#6366f1,#4338ca);color:white;padding:18px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}

.web-qr-hdr-txt{flex:1;min-width:0;position:relative;z-index:1}
.web-qr-hdr-title{font-size:16px;font-weight:900;line-height:1.2}
.web-qr-hdr-sub{font-size:11.5px;font-weight:600;opacity:.9;margin-top:2px}

.web-qr-btn.copy{background:linear-gradient(135deg,#10b981,#059669);color:white;box-shadow:0 3px 10px rgba(16,185,129,.3)}
